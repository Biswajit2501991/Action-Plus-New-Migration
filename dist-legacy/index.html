    /* ===================================================================== */
    /* Phase 3 Dual-Layout Engine — Dark Luxury skin (WCAG 2.1 AA compliant) */
    /*                                                                       */
    /* Design tokens are defined as CSS variables so every contrast decision */
    /* lives in one place. Every foreground / background pair below meets    */
    /* AA 4.5:1 (normal text) or 3:1 (large text + UI) against the deepest   */
    /* surface (--lux-bg = #0a0a0d). Ratios were verified before checkin.   */
    /* ===================================================================== */
    body[data-apg-layout="luxury"] {
      /* Surfaces */
      --lux-bg: #0a0a0d;
      --lux-bg-2: #11131a;
      --lux-surface-1: rgba(22,24,33,0.78);
      --lux-surface-2: rgba(28,30,42,0.85);
      --lux-surface-elev: rgba(34,36,48,0.92);
      --lux-border: rgba(255,255,255,0.10);
      --lux-border-strong: rgba(255,255,255,0.18);
      --lux-border-gold: rgba(212,175,55,0.38);

      /* Foreground (all opaque — no opacity tricks for text) */
      --lux-text-primary: #F4F6F8;
      --lux-text-secondary: #D1D5DB;
      --lux-text-muted: #B7BCC6;
      --lux-text-section: #C9CFDA;
      --lux-placeholder: #9AA1AE;

      /* Accents */
      --lux-gold: #FCD36B;
      --lux-gold-rich: #D4AF37;
      --lux-on-gold: #0a0a0d;
      --lux-emerald: #6EE7B7;
      --lux-emerald-strong: #34D399;
      --lux-amber: #FCD34D;
      --lux-orange: #FDBA74;
      --lux-rose: #FDA4AF;
      --lux-pink: #F9A8D4;
      --lux-blue: #93C5FD;
      --lux-indigo: #A5B4FC;
      --lux-violet: #C4B5FD;

      background:
        radial-gradient(circle at 12% 12%, rgba(212,175,55,0.07), transparent 45%),
        radial-gradient(circle at 88% 88%, rgba(102,153,255,0.06), transparent 45%),
        linear-gradient(180deg, var(--lux-bg) 0%, var(--lux-bg-2) 100%) !important;
      color: var(--lux-text-primary) !important;
    }
    body[data-apg-layout="luxury"] #root,
    body[data-apg-layout="luxury"] main {
      background: transparent !important;
    }
    body[data-apg-layout="luxury"] .apg-member-row--billing-today.apg-member-row-desktop,
    body[data-apg-layout="luxury"] .apg-member-row--billing-today.apg-member-row-mobile {
      background: rgba(34, 197, 94, 0.12) !important;
      border-color: rgba(74, 222, 128, 0.35) !important;
    }
    body[data-apg-layout="luxury"] .apg-member-row--fine-due.apg-member-row-desktop,
    body[data-apg-layout="luxury"] .apg-member-row--fine-due.apg-member-row-mobile {
      background: rgba(244, 63, 94, 0.12) !important;
      border-color: rgba(251, 113, 133, 0.35) !important;
    }

    /* --------------------------------------------------------------------- */
    /* Sidebar                                                              */
    /* --------------------------------------------------------------------- */
    body[data-apg-layout="luxury"] .apg-sidebar,
    body[data-apg-layout="luxury"] aside.apg-sidebar {

      box-shadow: 0 8px 22px rgba(212,175,55,0.22);
    }
    body[data-apg-layout="luxury"] button[class*="bg-blue-600"]:hover,
    body[data-apg-layout="luxury"] button[class*="bg-indigo-600"]:hover,

    body[data-apg-layout="luxury"] button[class*="bg-blue-600"] *,

    body[data-apg-layout="luxury"] button[class*="bg-emerald-600"] * {

    /* --------------------------------------------------------------------- */
    /* Tables (Logs / SMS / Members lists)                                  */
    /* --------------------------------------------------------------------- */
    body[data-apg-layout="luxury"] table {

    body[data-apg-layout="luxury"] thead th,
    body[data-apg-layout="luxury"] .apg-finance-table-head th,

    }
    /* Sticky table headers inside scroll containers: opaque backing so rows
       never bleed through while scrolling (luxury tint-* / surface-1 are
       semi-transparent; classic mode uses solid bg-*-50). */
    body[data-apg-layout="luxury"] .apg-sticky-table-scroll {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    body[data-apg-layout="luxury"] .apg-sticky-table-scroll thead.apg-sticky-table-head {

    /* --------------------------------------------------------------------- */
    /* CSS-spring accordion. Mimics framer-motion's default `layout` ease    */
    /* (cubic-bezier(.16,1,.3,1)) using the grid-template-rows trick: the    */
    /* inner row animates from 0fr → 1fr so the wrapper springs to its       */
    /* natural content height (no fixed max-height guessing). Premium feel,  */
    /* zero extra JS deps. Drop in <motion.div> later if framer-motion ships.*/
    /* --------------------------------------------------------------------- */
    .apg-accordion {
      display: grid;
      grid-template-rows: 0fr;
      opacity: 0;
      transition:
        grid-template-rows 320ms cubic-bezier(.16,1,.3,1),
        opacity 220ms ease-in-out;
    }
    .apg-accordion[data-open="true"] {

      opacity: 1;
    }
    .apg-accordion > .apg-accordion-inner {

      min-height: 0;

    .apg-accordion-chevron {

      display: inline-block;

    .apg-accordion-chevron[data-open="true"] {
      transform: rotate(180deg);

    @media (prefers-reduced-motion: reduce) {

      .apg-accordion-chevron {
        transition: none !important;

    }

    /* --------------------------------------------------------------------- */
    /* Login Screen — Dark Luxury redesign (always-on, palette-locked).      */

    /* --------------------------------------------------------------------- */
    .apg-login-shell {

    /* --------------------------------------------------------------------- */
    /* Global Toast / Notification Layer.                                    */
    /* z-index hierarchy (top-down):                                         */
    /*   apg-toast            ........................... 9999  (winner)    */
    /*   modal (full-screen fixed)  ........... 60..100   (always below)    */
    /*   apg-anchored-popover (portaled menus) . 9000  (above sticky bars)  */
    /*   sticky table <thead>  .................... 10..20                  */
    /*   sidebar / topbar  ........................ 20..40                  */
    /*                                                                       */
    /* `isolation: isolate` ensures the toast establishes its own stacking   */
    /* context so an ancestor with `transform`, `filter`, or `backdrop-filter`*/
    /* (e.g. apg-mobile-topbar) cannot trap the toast as a child layer.      */
    /* --------------------------------------------------------------------- */
    .apg-toast {
      z-index: 9999 !important;
      isolation: isolate;
      pointer-events: auto;
    }
    .apg-toast--undo {
      z-index: 9999 !important;
    }
    /* --------------------------------------------------------------------- */
    /* Anchored popovers (notifications, branch switcher, future dropdowns). */
    /* Portaled to <body> with `position:fixed` so ancestor stacking traps  */
    /* (`backdrop-filter` on apg-mobile-topbar, `overflow` on main scroll)   */
    /* cannot clip or bury the panel beneath sticky filters / dashboard cards. */
    /* --------------------------------------------------------------------- */
    .apg-anchored-popover,
    .apg-notif-popover,
    .apg-header-date-popover {
      position: fixed;
      z-index: 9000;
      isolation: isolate;
      pointer-events: auto;
    }
  </style>

  <!-- React mounts the application here -->
  <div id="root"></div>
  <script>
    (function () {
      var bootErrorTimer = null;
      function appLooksMounted() {
        var root = document.getElementById('root');
        if (!root || !root.childElementCount) return false;
        var text = String(root.innerText || '');
        if (text.indexOf('USER LOGIN') >= 0 || text.indexOf('LOGIN') >= 0) return true;
        if (root.querySelector('button, input, aside, nav, main')) return true;
        return Boolean(text.trim());
      }
      function showBootError(msg) {
        var root = document.getElementById('root');
        if (!root || appLooksMounted()) return;
        root.innerHTML = '<div data-boot-error="1" style="max-width:42rem;margin:2rem auto;padding:1.25rem 1.5rem;border:1px solid #fecaca;background:#fff1f2;color:#9f1239;border-radius:12px;font:14px/1.5 system-ui,sans-serif">'
          + '<strong>App failed to start</strong><p style="margin:0.75rem 0 0">' + String(msg || 'Unknown error') + '</p>'
          + '<p style="margin:0.75rem 0 0;color:#64748b">Open DevTools → Console for details. Try a hard refresh (Cmd+Shift+R). Use <code>npm run dev:web</code> for API + env.</p></div>';
      }
      function cancelBootError() {
        if (bootErrorTimer) {
          clearTimeout(bootErrorTimer);
          bootErrorTimer = null;
        }
      }
      function queueBootError(msg) {
        cancelBootError();
        bootErrorTimer = setTimeout(function () {
          bootErrorTimer = null;
          if (!appLooksMounted()) showBootError(msg);
        }, 1500);
      }
      window.addEventListener('error', function (e) {
        queueBootError(e && (e.message || e.error));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var reason = e && e.reason;
        queueBootError(reason && (reason.message || reason));
      });
      var bootRoot = document.getElementById('root');
      if (bootRoot && typeof MutationObserver !== 'undefined') {
        new MutationObserver(function () {
          if (appLooksMounted()) cancelBootError();
        }).observe(bootRoot, { childList: true, subtree: true });
      }
    })();
  </script>
