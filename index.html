                      )}
                    </div>
                  </div>
                )}
                {activeSubTab === 'Workout Plan' && (
                  <div>
                    <label className="text-sm font-medium">Weekly Workout Plan</label>
                    <textarea rows={6} value={profile.workoutPlan || ''} onChange={(e) => persistProfile(selectedMember.memberId, { workoutPlan: e.target.value }, 'plan')} disabled={!canEditPtPlan} placeholder="Day-wise split, reps, sets, progressive overload notes." className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500" />
                  </div>
                )}
                {activeSubTab === 'Diet Plan' && (
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div><label className="text-sm font-medium">Calories / day</label><input value={profile.calories || ''} onChange={(e) => persistProfile(selectedMember.memberId, { calories: e.target.value }, 'plan')} disabled={!canEditPtPlan} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500" /></div>
                    <div><label className="text-sm font-medium">Protein (g)</label><input value={profile.protein || ''} onChange={(e) => persistProfile(selectedMember.memberId, { protein: e.target.value }, 'plan')} disabled={!canEditPtPlan} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500" /></div>
                    <div><label className="text-sm font-medium">Water (L)</label><input value={profile.water || ''} onChange={(e) => persistProfile(selectedMember.memberId, { water: e.target.value }, 'plan')} disabled={!canEditPtPlan} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500" /></div>
                    <div className="md:col-span-3"><label className="text-sm font-medium">Diet Plan Details</label><textarea rows={5} value={profile.dietPlan || ''} onChange={(e) => persistProfile(selectedMember.memberId, { dietPlan: e.target.value }, 'plan')} disabled={!canEditPtPlan} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500" /></div>
                    <div className="md:col-span-3 rounded-xl border border-slate-200 bg-slate-50 p-3 space-y-3">
                      <div className="flex flex-wrap items-center justify-between gap-2">
                        <div>
                          <div className="text-sm font-semibold text-slate-900">Diet Plan Documents</div>
                          <div className="text-xs text-slate-500">Upload paper diet-plan photos/files (max 10MB each).</div>
                        </div>
                        {canUploadDietDocuments && <label className="cursor-pointer rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">
                          <input
                            type="file"
                            accept="image/*,.pdf"
                            capture="environment"
                            multiple
                            className="hidden"
                            onChange={(e) => {
                              const files = e.target.files;
                              addDietAttachments(files);
                              e.target.value = '';
                            }}
                          />
                          Add Document
                        </label>}
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
                        {(profile.dietAttachments || []).map((doc) => (
                          <div key={doc.id} className="rounded-lg border border-slate-200 bg-white p-2 space-y-2">
                            {String(doc.mime || '').startsWith('image/') ? (
                              <img src={doc.dataUrl} alt={doc.name || 'Diet attachment'} className="h-28 w-full rounded object-cover border border-slate-200" />
                            ) : (
                              <div className="h-28 w-full rounded border border-slate-200 bg-slate-100 flex items-center justify-center text-xs text-slate-600">Document</div>
                            )}
                            <div className="text-xs text-slate-700 truncate" title={doc.name}>{doc.name}</div>
                            <div className="flex items-center gap-2">
                              <a href={doc.dataUrl} target="_blank" rel="noreferrer" className="rounded border border-blue-300 bg-blue-50 px-2 py-1 text-[11px] font-semibold text-blue-700">Open</a>
                              {canUploadDietDocuments && <button type="button" onClick={() => removeDietAttachment(doc.id)} className="rounded border border-rose-300 bg-rose-50 px-2 py-1 text-[11px] font-semibold text-rose-700">Remove</button>}
                            </div>
                          </div>
                        ))}
                        {(!profile.dietAttachments || profile.dietAttachments.length === 0) && (
                          <div className="text-sm text-slate-500">No documents uploaded yet.</div>
                        )}
                      </div>
                    </div>
                  </div>
                )}
                {activeSubTab === 'Chat Trainer' && (
                  <div className="space-y-3">
                    <div className="flex gap-2">
                      <input value={chatDraft} onChange={(e) => setChatDraft(e.target.value)} placeholder="Enter trainer update / member concern..." className="flex-1 rounded-xl border border-slate-300 px-3 py-2 text-sm" />
                      <button onClick={addChatMessage} disabled={!canEditPtWorkout} className="rounded-full bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed">Save Note</button>
                    </div>
                    <div className="space-y-2">
                      {(profile.chat || []).slice(0, 10).map(msg => (
                        <div key={msg.id} className="rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm">
                          <div className="font-medium text-slate-800">{msg.by}</div>
                          <div className="text-slate-700">{msg.text}</div>
                          <div className="text-xs text-slate-500 mt-1">{formatDateTimeTz(msg.ts, displayTimeZone)} <span className="text-[10px] uppercase">{displayTimeZone}</span></div>
                        </div>
                      ))}
                      {(!profile.chat || profile.chat.length === 0) && <div className="text-sm text-slate-500">No trainer notes yet.</div>}
                    </div>
                  </div>
                )}
                {activeSubTab === 'Today Sessions' && (
                  <div className="space-y-3">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                      <div><label className="text-sm font-medium">Date</label><input type="date" value={sessionDraft.date} onChange={(e) => setSessionDraft(v => ({ ...v, date: e.target.value }))} disabled={!canEditPtWorkout} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500" /></div>
                      <div><label className="text-sm font-medium">Time</label><input type="time" value={sessionDraft.time} onChange={(e) => setSessionDraft(v => ({ ...v, time: e.target.value }))} disabled={!canEditPtWorkout} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500" /></div>
                      <div><label className="text-sm font-medium">Status</label><select value={sessionDraft.status} onChange={(e) => setSessionDraft(v => ({ ...v, status: e.target.value }))} disabled={!canEditPtWorkout} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500"><option>Scheduled</option><option>Completed</option><option>Missed</option></select></div>
                      <div className="md:self-end"><button onClick={addSession} disabled={!canEditPtWorkout} className="w-full rounded-full bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed">Add Session</button></div>
                      <div className="md:col-span-4"><input value={sessionDraft.note} onChange={(e) => setSessionDraft(v => ({ ...v, note: e.target.value }))} disabled={!canEditPtWorkout} placeholder="Session note" className="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500" /></div>
                    </div>
                    <div className="space-y-2">
                      {(profile.sessions || []).slice(0, 8).map(s => (
                        <div key={s.id} className="rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
                          <div>{fmt(s.date)} • {s.time || '--'} • <span className="font-medium">{s.status}</span></div>
                          <div className="text-slate-600">{s.note || '-'}</div>
                        </div>
                      ))}
                      {(!profile.sessions || profile.sessions.length === 0) && <div className="text-sm text-slate-500">No sessions added.</div>}
                    </div>
                  </div>
                )}
                {activeSubTab === 'Weight Progress' && (
                  <div className="space-y-3">
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                      <div><label className="text-sm font-medium">Date</label><input type="date" value={weightDraft.date} onChange={(e) => setWeightDraft(v => ({ ...v, date: e.target.value }))} disabled={!canEditPtWorkout} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500" /></div>
                      <div><label className="text-sm font-medium">Weight (kg)</label><input value={weightDraft.weight} onChange={(e) => setWeightDraft(v => ({ ...v, weight: e.target.value }))} disabled={!canEditPtWorkout} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:bg-slate-100 disabled:text-slate-500" /></div>
                      <div className="md:self-end"><button onClick={addWeightLog} disabled={!canEditPtWorkout} className="w-full rounded-full bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed">Add Weight</button></div>
                    </div>
                    <div className="text-sm text-slate-700">Current: <span className="font-semibold">{latestWeight == null ? 'NA' : `${latestWeight} kg`}</span> • Change: <span className="font-semibold">{weightDelta == null ? 'NA' : `${weightDelta > 0 ? '+' : ''}${weightDelta.toFixed(1)} kg`}</span></div>
                    <div className="space-y-1">
                      {weightLogs.slice().reverse().map(w => (
                        <div key={w.id} className="rounded-lg border border-slate-200 px-3 py-2 text-sm">{fmt(w.date)}: <span className="font-medium">{w.weight} kg</span></div>
                      ))}
                      {weightLogs.length === 0 && <div className="text-sm text-slate-500">No weight logs yet.</div>}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ---- Attendance Page ----
    function AttendancePage({ users, settings, updateSetting, currentUser, access, displayTimeZone = 'IST' }) {
      const [date, setDate] = React.useState(iso(new Date()));
      const [expandedStaffId, setExpandedStaffId] = React.useState('');
      const [historyPageByStaff, setHistoryPageByStaff] = React.useState({});
      const attendanceAccess = normalizeAccess(access).attendance;
      const canViewAttendance = attendanceAccess?.viewAttendance !== false;
      const canMarkAllPresent = attendanceAccess?.markAllPresent !== false;
      const canEditAttendance = attendanceAccess?.editAttendance !== false;
      const staff = (users || []).filter(u => !u.blocked);
      const records = settings.staffAttendance || [];
      const keyFor = (userId) => `${date}__${userId}`;
      const map = React.useMemo(() => {
        const out = {};
        records.forEach(r => { out[`${iso(r.date)}__${r.userId}`] = r; });
        return out;
      }, [records]);
      const upsert = (userId, patch) => {
        const existing = records.find(r => iso(r.date) === date && r.userId === userId);
        let next;
        if (existing) {
          next = records.map(r => (r.id === existing.id ? { ...r, ...patch, updatedAt: new Date().toISOString(), updatedBy: currentUser?.name || currentUser?.id || '' } : r));
        } else {
          next = [{ id: crypto.randomUUID(), date, userId, status: 'Present', checkIn: '', checkOut: '', note: '', markedBy: currentUser?.name || currentUser?.id || '', ...patch }, ...records];
        }
        updateSetting('staffAttendance', next);
      };
      const presentCount = staff.filter(s => (map[keyFor(s.id)]?.status || 'Absent') === 'Present').length;
      const leaveCount = staff.filter(s => (map[keyFor(s.id)]?.status || '') === 'Leave').length;
      const twoMonthCutoff = React.useMemo(() => {
        const base = new Date();
        base.setMonth(base.getMonth() - 2);
        return base;
      }, []);
      const attendanceHistoryByUser = React.useMemo(() => {
        const out = {};
        staff.forEach((s) => { out[s.id] = []; });
        records.forEach((r) => {
          const dt = new Date(r.date);
          if (!Number.isNaN(dt.getTime()) && dt >= twoMonthCutoff && out[r.userId]) out[r.userId].push(r);
        });
        Object.keys(out).forEach((userId) => {
          out[userId].sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
        });
        return out;
      }, [records, staff, twoMonthCutoff]);
      const HISTORY_PAGE_SIZE = 5;
      if (!canViewAttendance) {
        return (
          <div className="p-3 md:p-8">
            <div className="rounded-2xl border border-amber-200 bg-amber-50 p-3 text-sm text-amber-800">
              Attendance dashboard access is disabled for this profile.
            </div>
          </div>
        );
      }
      return (
        <div className="p-3 md:p-8 space-y-4">
          <div className="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
            <div>
              <h1 className="text-xl md:text-2xl font-semibold text-slate-900">Attendance</h1>
              <p className="text-sm text-slate-600">Daily staff attendance with first-login and last-logout tracking.</p>
            </div>
            <div className="flex items-center gap-2">
              <input type="date" value={date} onChange={(e) => setDate(iso(e.target.value))} className="rounded-xl border border-slate-300 px-3 py-2 text-sm" />
              <button disabled={!canMarkAllPresent} onClick={() => canMarkAllPresent && staff.forEach(s => upsert(s.id, { status: 'Present' }))} className="rounded-full bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">Mark All Present</button>
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div className="rounded-2xl border border-emerald-200 bg-emerald-50 p-3"><div className="text-xs text-emerald-700">Present</div><div className="text-xl font-semibold text-emerald-900">{presentCount}</div></div>
            <div className="rounded-2xl border border-amber-200 bg-amber-50 p-3"><div className="text-xs text-amber-700">On Leave</div><div className="text-xl font-semibold text-amber-900">{leaveCount}</div></div>
            <div className="rounded-2xl border border-slate-200 bg-slate-50 p-3"><div className="text-xs text-slate-600">Total Staff</div><div className="text-xl font-semibold text-slate-900">{staff.length}</div></div>
          </div>
          <div className="rounded-3xl border border-slate-200 bg-white p-3 sm:p-4 space-y-3">
            {staff.map(s => {
              const rec = map[keyFor(s.id)] || {};
              const isOpen = expandedStaffId === s.id;
              const historyRows = attendanceHistoryByUser[s.id] || [];
              const totalPages = Math.max(1, Math.ceil(historyRows.length / HISTORY_PAGE_SIZE));
              const currentPage = Math.min(Math.max(1, Number(historyPageByStaff[s.id] || 1)), totalPages);
              const start = (currentPage - 1) * HISTORY_PAGE_SIZE;
              const visibleRows = historyRows.slice(start, start + HISTORY_PAGE_SIZE);
              return (
                <div key={s.id} className="rounded-2xl border border-slate-200 bg-white">
                  <button
                    type="button"
                    onClick={() => setExpandedStaffId((prev) => (prev === s.id ? '' : s.id))}
                    className="w-full p-3 text-left flex flex-wrap items-center justify-between gap-2 hover:bg-slate-50 rounded-2xl"
                  >
                    <div>
                      <div className="text-sm font-semibold text-slate-900">{s.name}</div>
                      <div className="text-xs text-slate-500">{s.id}</div>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className={cx('rounded-full px-2 py-1 text-xs font-semibold border', (rec.status || 'Absent') === 'Present' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-100 text-slate-600 border-slate-200')}>
                        {rec.status || 'Absent'}
                      </span>
                      <span className="text-xs font-semibold text-slate-500">{isOpen ? 'Hide' : 'Expand'}</span>
                    </div>
                  </button>
                  {isOpen && (
                    <div className="border-t border-slate-200 p-3 space-y-3">
                      <div className="grid grid-cols-1 lg:grid-cols-4 gap-2">
                        <div>
                          <label className="text-xs text-slate-500">Status</label>
                          <select disabled={!canEditAttendance} value={rec.status || 'Absent'} onChange={(e) => canEditAttendance && upsert(s.id, { status: e.target.value })} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:opacity-60 disabled:bg-slate-100">
                            <option>Present</option><option>Absent</option><option>Half Day</option><option>Leave</option>
                          </select>
                          {rec.leaveAutoSynced && (
                            <div className="mt-1 inline-flex rounded-full border border-violet-300 bg-violet-50 px-2 py-0.5 text-[10px] font-semibold text-violet-700">
                              Synced from Leave
                            </div>
                          )}
                        </div>
                        <div>
                          <label className="text-xs text-slate-500">First Login In</label>
                          <div className="mt-1 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">{rec.firstLoginAt ? <>{formatDateTimeTz(rec.firstLoginAt, displayTimeZone)} <span className="text-[10px] uppercase">{displayTimeZone}</span></> : '—'}</div>
                        </div>
                        <div>
                          <label className="text-xs text-slate-500">Last Logout</label>
                          <div className="mt-1 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">{rec.lastLogoutAt ? <>{formatDateTimeTz(rec.lastLogoutAt, displayTimeZone)} <span className="text-[10px] uppercase">{displayTimeZone}</span></> : '—'}</div>
                        </div>
                        <div className="lg:col-span-4">
                          <label className="text-xs text-slate-500">Note</label>
                          <input disabled={!canEditAttendance} value={rec.note || ''} onChange={(e) => canEditAttendance && upsert(s.id, { note: e.target.value })} placeholder="Reason / shift notes" className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm disabled:opacity-60 disabled:bg-slate-100" />
                        </div>
                        {rec.autoMarked && rec.autoPresentWindowUntil && (
                          <div className="lg:col-span-4">
                            <div className="inline-flex rounded-full border border-emerald-300 bg-emerald-50 px-2 py-0.5 text-[10px] font-semibold text-emerald-700">
                              Auto Present 24h until {formatDateTimeTz(rec.autoPresentWindowUntil, displayTimeZone)} <span className="text-[10px] uppercase">{displayTimeZone}</span>
                            </div>
                          </div>
                        )}
                      </div>
                      <div className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                        <div className="flex flex-wrap items-center justify-between gap-2 mb-2">
                          <div className="text-sm font-semibold text-slate-800">Last 2 Months Attendance</div>
                          <div className="text-xs text-slate-500">Showing {visibleRows.length} of {historyRows.length}</div>
                        </div>
                        <div className="overflow-x-auto">
                          <table className="min-w-full text-xs">
                            <thead>
                              <tr className="bg-slate-100 text-slate-700">
                                <th className="px-2 py-1 text-left">Date</th>
                                <th className="px-2 py-1 text-left">Status</th>
                                <th className="px-2 py-1 text-left">First Login</th>
                                <th className="px-2 py-1 text-left">Last Logout</th>
                              </tr>
                            </thead>
                            <tbody>
                              {visibleRows.map((row) => (
                                <tr key={row.id} className="border-b border-slate-200">
                                  <td className="px-2 py-1 whitespace-nowrap">{formatDateTz(row.date, displayTimeZone)}</td>
                                  <td className="px-2 py-1 whitespace-nowrap">{row.status || 'Absent'}</td>
                                  <td className="px-2 py-1 whitespace-nowrap">{row.firstLoginAt ? <>{formatDateTimeTz(row.firstLoginAt, displayTimeZone)} <span className="text-[10px] uppercase">{displayTimeZone}</span></> : '—'}</td>
                                  <td className="px-2 py-1 whitespace-nowrap">{row.lastLogoutAt ? <>{formatDateTimeTz(row.lastLogoutAt, displayTimeZone)} <span className="text-[10px] uppercase">{displayTimeZone}</span></> : '—'}</td>
                                </tr>
                              ))}
                              {visibleRows.length === 0 && (
                                <tr>
                                  <td colSpan={4} className="px-2 py-2 text-slate-500">No attendance entries for the last 2 months.</td>
                                </tr>
                              )}
                            </tbody>
                          </table>
                        </div>
                        {historyRows.length > HISTORY_PAGE_SIZE && (
                          <div className="mt-2 flex items-center justify-between text-xs text-slate-600">
                            <span>Page {currentPage} / {totalPages}</span>
                            <div className="flex items-center gap-2">
                              <button
                                onClick={() => setHistoryPageByStaff((prev) => ({ ...prev, [s.id]: Math.max(1, currentPage - 1) }))}
                                disabled={currentPage <= 1}
                                className="rounded border border-slate-300 bg-white px-2 py-1 disabled:opacity-50"
                              >
                                Prev
                              </button>
                              <button
                                onClick={() => setHistoryPageByStaff((prev) => ({ ...prev, [s.id]: Math.min(totalPages, currentPage + 1) }))}
                                disabled={currentPage >= totalPages}
                                className="rounded border border-slate-300 bg-white px-2 py-1 disabled:opacity-50"
                              >
                                Next
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ---- Leave Tracker Page (module-registered) ----
    const LeaveTrackerPage = (window.__APG_MODULES__ && window.__APG_MODULES__.LeaveTrackerPageModule)
      ? window.__APG_MODULES__.LeaveTrackerPageModule
      : function LeaveTrackerFallback({ users = [], settings = {}, updateSetting, currentUser = null, access = {}, logEvent, theme = 'light', focusLeaveRequestId = '', focusLeaveUserId = '', onClearFocus }) {
        const leaveAccess = normalizeAccess(access).leave;
        const canViewCreateLeaveRequest = leaveAccess?.viewCreateLeaveRequest !== false;
        const canViewLeaveRequests = leaveAccess?.viewLeaveRequests !== false;
        const canViewAnnualLeaveBalance = leaveAccess?.viewAnnualLeaveBalance !== false;
        const canViewLeaveHistory = leaveAccess?.viewLeaveHistory !== false;
        const canApprove = (currentUser?.id === 'owner' || currentUser?.id === 'manager') && canViewLeaveRequests;
        const leaveRequests = settings.leaveRequests || [];
        const [form, setForm] = React.useState({ userId: currentUser?.id || '', type: 'Casual', startDate: iso(new Date()), endDate: iso(new Date()), reason: '' });
        const [formError, setFormError] = React.useState('');
        const [formSuccess, setFormSuccess] = React.useState('');
        const [historyUserFilter, setHistoryUserFilter] = React.useState('');
        const [leaveRequestPage, setLeaveRequestPage] = React.useState(1);
        const staff = (users || []).filter(u => !u.blocked);
        const filteredLeaveRequests = React.useMemo(() => {
          if (focusLeaveRequestId) return leaveRequests.filter((r) => r.id === focusLeaveRequestId);

    // ---- Logs Page ----
    function LogsPage({ logs, currentUser, onClearLogs, access, displayTimeZone = 'IST' }) {
      const [filter, setFilter] = React.useState('');
      const logsAccess = normalizeAccess(access).logs;
      const canViewLogs = logsAccess?.viewLogs !== false;
      const canExportLogs = logsAccess?.exportLogs !== false;
      const canClearLogs = logsAccess?.clearLogs !== false;
      const [actorFilter, setActorFilter] = React.useState('');
      const [actionFilter, setActionFilter] = React.useState('');
      const [entityFilter, setEntityFilter] = React.useState('');
      const [timeRange, setTimeRange] = React.useState('24h');
      const [expandedId, setExpandedId] = React.useState('');
      const [page, setPage] = React.useState(1);
      const pageSize = 25;
      const sinceTs = React.useMemo(() => {
        if (timeRange === '24h') return Date.now() - (24 * 60 * 60 * 1000);
        if (timeRange === '7d') return Date.now() - (7 * 24 * 60 * 60 * 1000);
        if (timeRange === '30d') return Date.now() - (30 * 24 * 60 * 60 * 1000);
        return 0;
      }, [timeRange]);
      const actors = React.useMemo(() => Array.from(new Set((logs || []).map(l => l.actor).filter(Boolean))), [logs]);
      const actions = React.useMemo(() => Array.from(new Set((logs || []).map(l => l.action).filter(Boolean))), [logs]);
      const entities = React.useMemo(() => Array.from(new Set((logs || []).map(l => l.entityType).filter(Boolean))), [logs]);
      const filtered = React.useMemo(() => {
        const q = filter.toLowerCase();
        return (logs || []).filter(l => {
          if (sinceTs && new Date(l.ts).getTime() < sinceTs) return false;
          if (actorFilter && l.actor !== actorFilter) return false;
          if (actionFilter && l.action !== actionFilter) return false;
          if (entityFilter && l.entityType !== entityFilter) return false;
          if (!q) return true;
          return (l.entityId || '').toLowerCase().includes(q) || (l.action || '').toLowerCase().includes(q) || (l.actor || '').toLowerCase().includes(q);
        });
      }, [logs, filter, actorFilter, actionFilter, entityFilter, sinceTs]);
      React.useEffect(() => {
        setPage(1);
      }, [filter, logs, actorFilter, actionFilter, entityFilter, timeRange]);
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      const safePage = page > totalPages ? 1 : page;
      const start = (safePage - 1) * pageSize;
      const pageRows = filtered.slice(start, start + pageSize);
      const flattenForDiff = React.useCallback((value, prefix = '', out = {}) => {
        if (value === null || value === undefined) return out;
        if (Array.isArray(value)) {
          value.forEach((item, idx) => {
            const k = prefix ? `${prefix}[${idx}]` : `[${idx}]`;
            if (item && typeof item === 'object') flattenForDiff(item, k, out);
            else out[k] = item;
          });
          return out;
        }
        if (typeof value === 'object') {
          Object.keys(value).forEach((k) => {
            const next = prefix ? `${prefix}.${k}` : k;
            const v = value[k];
            if (v && typeof v === 'object') flattenForDiff(v, next, out);
            else out[next] = v;
          });
          return out;
        }
        out[prefix || 'value'] = value;
        return out;
      }, []);
      const getChangedFields = React.useCallback((entry) => {
        const beforeFlat = flattenForDiff(entry?.before || {});
        const afterFlat = flattenForDiff(entry?.after || {});
        const keys = Array.from(new Set([...Object.keys(beforeFlat), ...Object.keys(afterFlat)]));
        return keys
          .filter((k) => JSON.stringify(beforeFlat[k]) !== JSON.stringify(afterFlat[k]))
          .map((k) => ({ key: k, before: beforeFlat[k], after: afterFlat[k] }));
      }, [flattenForDiff]);
      const prettyDiffValue = (v) => {
        if (v === undefined) return '—';
        if (v === null) return 'null';
        if (typeof v === 'string') return v || '""';
        if (typeof v === 'object') return JSON.stringify(v);
        return String(v);
      };
      const alertCount = React.useMemo(() => {
        return filtered.filter(l => String(l.action || '').includes('deleted') || String(l.action || '').includes('blocked')).length;
      }, [filtered]);
      const exportCsv = () => {
        if (!canExportLogs) return;
        const rows = filtered.map(l => [
          l.ts || '',
          l.actor || '',
          l.action || '',
          l.entityType || '',
          l.entityId || '',
          JSON.stringify(l.before || {}),
          JSON.stringify(l.after || {}),
        ]);
        const header = ['Time', 'Actor', 'Action', 'Entity Type', 'Entity ID', 'Before', 'After'];
        const csv = [header, ...rows]
          .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
          .join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `audit-logs-${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };
      if (!canViewLogs) {
        return (
          <div className="p-3 md:p-8">
            <div className="rounded-2xl border border-amber-200 bg-amber-50 p-3 text-sm text-amber-800">
              Audit logs access is disabled for this profile.
            </div>
          </div>
        );
      }
      return (
        <div className="p-3 md:p-8">
          <div className="mb-4 flex items-center justify-between gap-3 flex-wrap">
            <div>
              <h1 className="text-2xl font-semibold">Audit Command Center</h1>
              <div className="text-sm text-slate-600 mt-1">
                Log Health: <span className="text-emerald-700 font-medium">Operational</span> |
                {' '}Total Logs ({timeRange === '24h' ? '24h' : timeRange}): <span className="font-medium">{filtered.length}</span> |
                {' '}Security Alerts: <span className="font-medium text-amber-700">{alertCount}</span>
              </div>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              {currentUser && currentUser.id === 'owner' && canClearLogs && (
                <button
                  onClick={() => onClearLogs && onClearLogs()}
                  className="rounded-xl px-3 py-2 min-h-[44px] text-sm font-medium border border-rose-300 bg-rose-50 text-rose-700 hover:bg-rose-100"
                >
                  Clear Logs
                </button>
              )}
              <button disabled={!canExportLogs} onClick={exportCsv} className="rounded-xl px-3 py-2 min-h-[44px] text-sm font-medium bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed">Export to CSV</button>
            </div>
          </div>
          <div className="mb-4 grid grid-cols-1 md:grid-cols-5 gap-2">
            <select value={actorFilter} onChange={(e) => setActorFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="">Select Users</option>
              {actors.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <select value={actionFilter} onChange={(e) => setActionFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="">Select Actions</option>
              {actions.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <select value={entityFilter} onChange={(e) => setEntityFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="">Select Entity</option>
              {entities.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <select value={timeRange} onChange={(e) => setTimeRange(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="24h">Time Range: Last 24 Hours</option>
              <option value="7d">Time Range: Last 7 Days</option>
              <option value="30d">Time Range: Last 30 Days</option>
              <option value="all">Time Range: All</option>

    // ---- WhatsApp SMS Page ----
    function WhatsAppSmsPage({ members, setMembers, settings, updateSetting, smsEvents, logEvent, currentUser, access, displayTimeZone = 'IST' }) {
      const [ruleTab, setRuleTab] = React.useState('all');
      const [activeType, setActiveType] = React.useState('reminder');
      const [search, setSearch] = React.useState('');
      const [messagePage, setMessagePage] = React.useState(1);
      const [autoSyncPage, setAutoSyncPage] = React.useState(1);
      const [expandedTemplates, setExpandedTemplates] = React.useState({});
      const [templateEditor, setTemplateEditor] = React.useState({ open: false, key: '', value: '' });
      const messageCenterRef = React.useRef(null);
      const [preview, setPreview] = React.useState({ open: false, member: null, templateKey: '' });
      const VARIABLE_KEYS = ['[CustomerName]','[PLAN]','[CurrentPlan]','[Amount]','[BillingDate]','[PaymentBy]','[GymStartdate]','[NextPaymentDate]'];
      React.useEffect(() => {
        if (settings.smsTemplatePresetVersion === '2026-04-27') return;
        updateSetting('smsTemplates', { ...SMS_TEMPLATE_DEFAULTS });
        updateSetting('smsTemplatePresetVersion', '2026-04-27');
      }, [settings.smsTemplatePresetVersion]);
      React.useEffect(() => {
        const existing = settings.smsTemplates || {};
        const normalized = {};
        let changed = false;
        Object.keys(existing).forEach((k) => {
          const raw = String(existing[k] || '');
          const next = raw
            .replaceAll('[NextBillingDate]', '[NextPaymentDate]')
            .replaceAll('*[LastDate]*', '*[PaymentBy]*')
            .replaceAll('[LastDate]', '[PaymentBy]');
          normalized[k] = next;
          if (next !== raw) changed = true;
        });
        if (changed) {
          updateSetting('smsTemplates', { ...existing, ...normalized });
        }
      }, [settings.smsTemplates]);
      const templates = settings.smsTemplatePresetVersion === '2026-04-27'
        ? { ...SMS_TEMPLATE_DEFAULTS, ...(settings.smsTemplates || {}) }
        : { ...SMS_TEMPLATE_DEFAULTS };
      const templateCards = [
        { key: 'reminder', title: 'Billing Reminder SMS', subtitle: 'SMS / WHATSAPP', tone: 'bg-amber-50 border-amber-200' },
        { key: 'monthReminder', title: 'Month-Based Reminder', subtitle: 'SMS / WHATSAPP', tone: 'bg-blue-50 border-blue-200' },
        { key: 'success', title: 'Success SMS', subtitle: 'SMS / WHATSAPP', tone: 'bg-emerald-50 border-emerald-200' },
        { key: 'fine', title: 'Overdue / Fine SMS', subtitle: 'SMS / WHATSAPP', tone: 'bg-rose-50 border-rose-200' },
        { key: 'deactivate', title: 'Deactivate SMS', subtitle: 'SMS / WHATSAPP', tone: 'bg-pink-50 border-pink-200' },
        { key: 'hold', title: 'Hold SMS', subtitle: 'SMS / WHATSAPP', tone: 'bg-amber-50 border-amber-200' },
        { key: 'welcome', title: 'Welcome SMS', subtitle: 'SMS / WHATSAPP', tone: 'bg-emerald-50 border-emerald-200' },
      ];
      const smsTypes = [
        { key: 'reminder', label: 'Reminder' },
        { key: 'monthReminder', label: 'Month-Based Reminder' },
        { key: 'success', label: 'Success SMS' },
        { key: 'fine', label: 'Fine SMS' },
        { key: 'deactivate', label: 'Deactivate SMS' },
        { key: 'hold', label: 'Hold SMS' },
        { key: 'welcome', label: 'Welcome SMS' },
        { key: 'templates', label: 'WhatsApp Template' },

      const whatsappAccess = normalizeAccess(access).whatsapp;
      const whatsappTabPermissionByType = {
        reminder: 'viewReminder',
        monthReminder: 'viewMonthReminder',
        success: 'viewSuccess',
        fine: 'viewFine',
        deactivate: 'viewDeactivate',
        hold: 'viewHold',
        welcome: 'viewWelcome',
        templates: 'viewTemplates',

      const allowedSmsTypes = React.useMemo(
        () => smsTypes.filter((s) => whatsappAccess?.[whatsappTabPermissionByType[s.key]] !== false),

      const hasMessagingTabs = React.useMemo(
        () => allowedSmsTypes.some((s) => s.key !== 'templates'),

      const firstMessagingType = React.useMemo(

      React.useEffect(() => {
        if (!allowedSmsTypes.length) return;
        if (!allowedSmsTypes.some((s) => s.key === activeType)) {
          setActiveType(allowedSmsTypes[0].key);
        }
      }, [allowedSmsTypes, activeType]);
      const todayKey = iso(new Date());
      const todayUtc = asUTC(todayKey);
      const activeMembers = members.filter(m => m.status === 'Active');
      const isOwnerForSmsTab = currentUser?.id === 'owner';
      const fineRuleConfig = React.useMemo(() => fineRuleConfigFromSettings(settings), [settings]);
      const primaryTemplateKeyForTab = (m) => primaryMessageActionForMember(m, isOwnerForSmsTab, fineRuleConfig).key;
      const billingD5 = activeMembers.filter(m => {
        const due = retentionPaymentDeadline(m);
        if (!due || !todayUtc) return false;
        const diff = Math.ceil((due.getTime() - todayUtc.getTime()) / (1000 * 60 * 60 * 24));
        return diff === 5;
      }).length;
      const billingD3 = activeMembers.filter(m => {
        const due = retentionPaymentDeadline(m);
        if (!due || !todayUtc) return false;
        const diff = Math.ceil((due.getTime() - todayUtc.getTime()) / (1000 * 60 * 60 * 24));
        return diff === 3;
      }).length;
      const fineEligible = activeMembers.filter(m => primaryTemplateKeyForTab(m) === 'fine').length;
      const holdCount = members.filter(m => m.status === 'Hold').length;
      const deactiveCount = members.filter(m => m.status === 'Deactivated').length;
      const monthlyCount = activeMembers.filter(m => {
        const bd = asUTC(m.billingDate);
        return bd && todayUtc && bd.getUTCMonth() === todayUtc.getUTCMonth() && bd.getUTCFullYear() === todayUtc.getUTCFullYear();
      }).length;
      const membersByType = React.useMemo(() => ({
        reminder: activeMembers.filter((m) => primaryMessageActionForMember(m, isOwnerForSmsTab, fineRuleConfig).key === 'reminder'),
        monthReminder: activeMembers.filter(m => {
          const bd = asUTC(m.billingDate);
          return bd && todayUtc && bd.getUTCMonth() === todayUtc.getUTCMonth() && bd.getUTCFullYear() === todayUtc.getUTCFullYear();
        }),
        fine: activeMembers.filter((m) => primaryMessageActionForMember(m, isOwnerForSmsTab, fineRuleConfig).key === 'fine'),
        success: members
          .filter((m) => Boolean(getLastWhatsAppSendMeta(m, 'success')?.sentAt))
          .sort((a, b) => {
            const aTs = new Date(getLastWhatsAppSendMeta(a, 'success')?.sentAt || 0).getTime();
            const bTs = new Date(getLastWhatsAppSendMeta(b, 'success')?.sentAt || 0).getTime();
            return bTs - aTs;
          }),
        deactivate: members.filter(m => m.status === 'Deactivated'),
        hold: members.filter(m => m.status === 'Hold'),
        welcome: activeMembers.filter(m => {
          const jd = asUTC(m.joiningDate);
          const bd = asUTC(m.billingDate);
          return Boolean(jd && bd && todayUtc && iso(jd) === iso(bd) && bd <= todayUtc);
        }),
      }), [activeMembers, members, todayKey, currentUser?.id, fineRuleConfig]);
      const rows = React.useMemo(() => {
        const q = search.toLowerCase().trim();
        const base = membersByType[activeType] || [];
        return base.filter(m => {
          if (!q) return true;
          const hay = `${m.name || ''} ${m.mobile || ''} ${m.memberId || ''}`.toLowerCase();
          return hay.includes(q);
        });
      }, [membersByType, activeType, search]);
      React.useEffect(() => {
        setMessagePage(1);

      const MESSAGE_PAGE_SIZE = 10;
      const messageTotalPages = Math.max(1, Math.ceil(rows.length / MESSAGE_PAGE_SIZE));
      const safeMessagePage = messagePage > messageTotalPages ? 1 : messagePage;
      const messagePageRows = rows.slice((safeMessagePage - 1) * MESSAGE_PAGE_SIZE, safeMessagePage * MESSAGE_PAGE_SIZE);
      const isSuccessAuditTab = activeType === 'success';
      const isOwnerUser = currentUser?.id === 'owner';
      const canActInSuccessTab = !isSuccessAuditTab || isOwnerUser;
      const smsTypeCounts = React.useMemo(() => ({
        reminder: membersByType.reminder.length,
        monthReminder: membersByType.monthReminder.length,
        success: membersByType.success.length,
        fine: membersByType.fine.length,
        deactivate: membersByType.deactivate.length,
        hold: membersByType.hold.length,
        welcome: membersByType.welcome.length,
        templates: templateCards.length,
      }), [membersByType, templateCards.length]);
      const rules = [
        { name: 'Billing D-5', status: 'Active', recipients: billingD5, type: 'billing' },
        { name: 'Billing D-3', status: 'Active', recipients: billingD3, type: 'billing' },
        { name: 'Monthly Reminder', status: 'Active', recipients: monthlyCount, type: 'billing' },
        { name: 'Fine SMS', status: fineEligible ? 'Active' : 'Paused', recipients: fineEligible, type: 'billing' },
        { name: 'Hold Status Trigger', status: 'Active', recipients: holdCount, type: 'status' },
        { name: 'Deactivate Status Trigger', status: 'Active', recipients: deactiveCount, type: 'status' },
      ];
      const shownRules = rules.filter(r => ruleTab === 'all' ? true : ruleTab === 'status' ? r.type === 'status' : r.type === 'billing');
      const AUTO_SYNC_PAGE_SIZE = 10;
      const autoSyncRows = React.useMemo(() => {
        return [...(smsEvents || [])]
          .sort((a, b) => {
            const at = new Date(a?.ts || 0).getTime();
            const bt = new Date(b?.ts || 0).getTime();
            return bt - at;
          });
      }, [smsEvents]);
      React.useEffect(() => {
        setAutoSyncPage(1);
      }, [autoSyncRows.length]);
      const autoSyncTotalPages = Math.max(1, Math.ceil(autoSyncRows.length / AUTO_SYNC_PAGE_SIZE));
      const safeAutoSyncPage = autoSyncPage > autoSyncTotalPages ? 1 : autoSyncPage;
      const autoSyncPageRows = autoSyncRows.slice((safeAutoSyncPage - 1) * AUTO_SYNC_PAGE_SIZE, safeAutoSyncPage * AUTO_SYNC_PAGE_SIZE);
      const editTemplate = (key) => {
        const curr = templates[key] || '';
        setTemplateEditor({ open: true, key, value: curr });
      };
      const renderSms = (template, m) => {
        if (!m) return '';
        const billing = asUTC(m.billingDate);
        const paymentBy = retentionPaymentDeadline(m);
        const totalAmountWithFine = Number(m.amount || 0) + 100;
        const replacements = {
          '[Name]': m.name || '',
          '[CustomerName]': m.name || '',
          '[PLAN]': m.plan || '',
          '[CurrentPlan]': m.plan || '',
          '[Amount]': `${Number(m.amount || 0)}`,
          '[BillingDate]': billing ? fmt(billing) : '',
          '[DATE]': billing ? fmt(billing) : '',
          '[GymStartdate]': m.joiningDate ? fmt(m.joiningDate) : '',
          '[LastDate]': paymentBy ? fmt(paymentBy) : '',
          '[PaymentBy]': paymentBy ? fmt(paymentBy) : '',
          '[Total Amount]': `${totalAmountWithFine}`,
          '[HoldDate]': fmt(new Date()),
          '[HoldMonth]': m.holdDuration || '1 Month',
          '[TodaysDate]': fmt(new Date()),
          '[NextBillingDate]': billing ? fmt(addMonths(billing, 1)) : '',
          '[NextPaymentDate]': fmt(m.nextPaymentDate || nextPaymentDateFromBillingDate(m)) || '',
          '[ModeOfPayment]': m.paymentMethod || '',
        };
        let out = template || '';
        Object.keys(replacements).forEach(key => {
          out = out.split(key).join(replacements[key]);
        });
        return out;
      };
      const sendNow = (member, templateKey, prebuiltMessage) => {
        if (!member) {
          window.alert('Member not found for this event.');
          return;
        }
        const message = prebuiltMessage || renderSms(templates[templateKey] || '', member);
        const cleanPhone = String(member.mobile || '').replace(/\D/g, '');
        if (!cleanPhone) {

          return;

        const finalPhone = cleanPhone.length === 10 ? `91${cleanPhone}` : cleanPhone;
        const url = `https://api.whatsapp.com/send?phone=${finalPhone}&text=${encodeURIComponent(message)}`;

        const sentBy = currentUser?.name || currentUser?.id || 'Staff';
        if (setMembers) {

            messageHistory: [{ id: crypto.randomUUID(), channel: 'whatsapp', templateKey, status: 'opened', ts: sentAt, sentAt, sentBy }, ...(m.messageHistory || [])].slice(0, 50),

    // ---- Finance Page ----
    function FinancePage({ members, settings, logs, financeTransactions = [], setFinanceTransactions, updateSetting, access, openExpenseSignal = 0, displayTimeZone = 'IST' }) {
      const [query, setQuery] = React.useState('');
      const [appliedQuery, setAppliedQuery] = React.useState('');
      const [showFilter, setShowFilter] = React.useState(false);
      const [planFilter, setPlanFilter] = React.useState('');
      const [methodFilter, setMethodFilter] = React.useState('');
      const [statusFilter, setStatusFilter] = React.useState('');
      const [typeFilter, setTypeFilter] = React.useState('');
      const [fromDate, setFromDate] = React.useState('');
      const [toDate, setToDate] = React.useState('');
      const [page, setPage] = React.useState(1);
      const [expandedId, setExpandedId] = React.useState('');
      const [showExpenseForm, setShowExpenseForm] = React.useState(false);
      const [showExpenseLedger, setShowExpenseLedger] = React.useState(false);
      const [expenseMonthFilter, setExpenseMonthFilter] = React.useState('');
      const [sortField, setSortField] = React.useState('date');
      const [sortDirection, setSortDirection] = React.useState('desc');
      const expenseCategories = Array.isArray(settings?.expenseCategories) && settings.expenseCategories.length
        ? settings.expenseCategories
        : ['General'];
      const [expenseDraft, setExpenseDraft] = React.useState({ date: iso(new Date()), amount: '', category: expenseCategories[0] || 'General', note: '' });
      const useEstimatedExpense = settings?.financeUseEstimatedExpense !== false;
      const today = new Date();

      const autoIncomeTransactions = React.useMemo(() => {
        return (members || [])
          .filter(m => m.billingDate)
          .map(m => {
            const due = retentionPaymentDeadline(m);
            const pending = m.status === 'Active' && due && due < today;
            return {
              id: `auto-${m.memberId || crypto.randomUUID()}`,
              type: 'income',
              source: 'members',
              memberId: m.memberId || '',
              memberName: m.name || '',
              date: iso(m.billingDate),
              plan: m.plan || '',
              method: m.paymentMethod || '',
              amount: Number(m.amount || 0),
              status: pending ? 'pending' : 'paid',
              memberStatus: m.status || '',
            };
          })
          .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
      }, [members, today]);
      const manualFinanceRows = React.useMemo(() => {
        return (Array.isArray(financeTransactions) ? financeTransactions : []).map((t) => ({
          id: t.id || `manual-${crypto.randomUUID()}`,
          type: t.type === 'expense' ? 'expense' : 'income',
          source: t.source || 'manual',
          memberId: t.memberId || '',
          memberName: t.memberName || (t.type === 'expense' ? (t.category || 'Expense') : ''),
          date: t.date || iso(new Date()),
          plan: t.plan || (t.type === 'expense' ? 'Expense' : ''),
          method: t.method || 'Cash',
          amount: Number(t.amount || 0),
          status: t.status || (t.type === 'expense' ? 'posted' : 'paid'),
          memberStatus: t.memberStatus || '',
          note: t.note || '',
          category: t.category || '',
        }));
      }, [financeTransactions]);
      const transactions = React.useMemo(() => {
        return [...autoIncomeTransactions, ...manualFinanceRows]
          .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
      }, [autoIncomeTransactions, manualFinanceRows]);

      const queryNeedle = React.useMemo(() => appliedQuery.toLowerCase().trim(), [appliedQuery]);

      const filteredTransactions = React.useMemo(() => {
        return transactions.filter(t => {
          if (planFilter && t.plan !== planFilter) return false;
          if (methodFilter && t.method !== methodFilter) return false;
          if (statusFilter && t.status !== statusFilter) return false;
          if (typeFilter && t.type !== typeFilter) return false;
          if (fromDate && String(t.date || '') < fromDate) return false;
          if (toDate && String(t.date || '') > toDate) return false;
          if (queryNeedle) {
            const hay = [t.memberName, t.memberId, t.plan, t.method, t.memberStatus, t.status].join(' ').toLowerCase();
            if (!hay.includes(queryNeedle)) return false;
          }
          return true;
        });
      }, [transactions, planFilter, methodFilter, statusFilter, typeFilter, fromDate, toDate, queryNeedle]);

      React.useEffect(() => {
        setPage(1);
      }, [appliedQuery, planFilter, methodFilter, statusFilter, typeFilter, fromDate, toDate, members.length, financeTransactions.length]);
      React.useEffect(() => {
        setExpenseDraft((prev) => {
          if (expenseCategories.includes(prev.category)) return prev;
          return { ...prev, category: expenseCategories[0] || 'General' };
        });
      }, [expenseCategories]);
      React.useEffect(() => {
        if (!openExpenseSignal) return;
        setShowExpenseForm(true);
      }, [openExpenseSignal]);

      const incomeRows = filteredTransactions.filter((t) => t.type !== 'expense');
      const revenue = incomeRows.reduce((sum, t) => sum + Number(t.amount || 0), 0);
      const pendingRows = incomeRows.filter(t => t.status === 'pending');
      const pendingAmount = pendingRows.reduce((sum, t) => sum + Number(t.amount || 0), 0);
      const actualExpense = filteredTransactions
        .filter((t) => t.type === 'expense')
        .reduce((sum, t) => sum + Number(t.amount || 0), 0);
      const estimatedExpense = Math.round(revenue * 0.26);
      const expense = useEstimatedExpense ? estimatedExpense : actualExpense;
      const profit = revenue - expense;
      const addExpenseRow = () => {
        if (!canFinanceManageExpenses) return;
        const amount = Number(expenseDraft.amount || 0);
        if (!amount || amount <= 0) return;
        if (!String(expenseDraft.note || '').trim()) return;
        const nextRow = {
          id: crypto.randomUUID(),
          type: 'expense',
          source: 'manual',
          date: expenseDraft.date || iso(new Date()),
          amount,
          category: expenseDraft.category || 'General',
          note: expenseDraft.note || '',
          status: 'posted',
          method: 'Cash',
          memberName: expenseDraft.category || 'Expense',
          plan: 'Expense',
        };
        const current = Array.isArray(financeTransactions) ? financeTransactions : [];
        if (typeof setFinanceTransactions === 'function') setFinanceTransactions([nextRow, ...current]);
        setExpenseDraft({ date: iso(new Date()), amount: '', category: expenseCategories[0] || 'General', note: '' });
        setShowExpenseForm(false);
      };
      const exportFinanceCsv = () => {
        const rows = filteredTransactions || [];
        const esc = (v) => {
          const text = String(v ?? '');
          if (text.includes('"') || text.includes(',') || text.includes('\n')) return `"${text.replaceAll('"', '""')}"`;
          return text;
        };
        const header = ['Date','Type','Member Name','Member ID','Plan/Category','Method','Status','Amount','Note'];
        const lines = [
          header.join(','),
          ...rows.map((r) => [
            r.date || '',
            r.type || '',
            r.memberName || '',
            r.memberId || '',
            (r.type === 'expense' ? (r.category || r.plan || '') : (r.plan || '')),
            r.method || '',
            r.status || '',
            Number(r.amount || 0),
            r.note || '',
          ].map(esc).join(',')),
        ];
        const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `finance-ledger-${iso(new Date())}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const monthTotals = React.useMemo(() => {
        const months = [];
        const now = new Date();
        for (let i = 3; i >= 0; i -= 1) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const label = MONTHS[d.getMonth()];
          const total = filteredTransactions.reduce((sum, t) => {
            const td = asUTC(t.date);
            if (!td || td.getFullYear() !== d.getFullYear() || td.getMonth() !== d.getMonth()) return sum;
            return sum + Number(t.amount || 0);
          }, 0);
          months.push({ label, total });
        }
        return months;
      }, [filteredTransactions]);
      const highestMonth = Math.max(1, ...monthTotals.map(x => x.total));

      const planBreakup = React.useMemo(() => {
        const counts = {};
        filteredTransactions.forEach(t => {
          const key = t.plan || 'Unassigned';
          counts[key] = (counts[key] || 0) + 1;
        });
        const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        const total = entries.reduce((sum, [, c]) => sum + c, 0);
        return entries.slice(0, 4).map(([name, count], idx) => ({
          name,
          pct: total ? Math.round((count / total) * 100) : 0,
          color: ['#2563eb', '#16a34a', '#eab308', '#7c3aed'][idx % 4],
        }));
      }, [filteredTransactions]);

      const pieBackground = React.useMemo(() => {
        if (!planBreakup.length) return '#e2e8f0';
        let start = 0;
        const segments = planBreakup.map(seg => {
          const from = start;
          const to = start + seg.pct;
          start = to;
          return `${seg.color} ${from}% ${to}%`;
        });
        if (start < 100) segments.push(`#cbd5e1 ${start}% 100%`);
        return `conic-gradient(${segments.join(', ')})`;
      }, [planBreakup]);

      const pageSize = 10;
      const sortedTransactions = React.useMemo(() => {
        const rows = [...filteredTransactions];
        const dir = sortDirection === 'asc' ? 1 : -1;
        rows.sort((a, b) => {
          if (sortField === 'date') {
            const at = new Date(a.date || 0).getTime();
            const bt = new Date(b.date || 0).getTime();
            return (at - bt) * dir;
          }
          if (sortField === 'amount') {
            return (Number(a.amount || 0) - Number(b.amount || 0)) * dir;
          }
          const av = String(a[sortField] || '').toLowerCase();
          const bv = String(b[sortField] || '').toLowerCase();
          if (av === bv) return 0;
          return (av > bv ? 1 : -1) * dir;
        });
        return rows;
      }, [filteredTransactions, sortField, sortDirection]);
      const toggleSort = (field) => {
        setSortField((prev) => {
          if (prev === field) {
            setSortDirection((d) => (d === 'asc' ? 'desc' : 'asc'));
            return prev;
          }
          setSortDirection('asc');
          return field;
        });
      };
      const sortIndicator = (field) => {
        if (sortField !== field) return '↕';
        return sortDirection === 'asc' ? '↑' : '↓';
      };
      const expenseLedgerRows = React.useMemo(() => {
        return manualFinanceRows
          .filter((r) => r.type === 'expense')
          .filter((r) => {
            if (!expenseMonthFilter) return true;
            return String(r.date || '').slice(0, 7) === expenseMonthFilter;
          })
          .map((r) => {
            const noteText = String(r.note || '');
            const match = noteText.match(/Added by:\s*([^•]+)/i);
            const actor = String(r.addedBy || match?.[1] || '').trim() || '-';
            return { ...r, actor };
          })
          .sort((a, b) => new Date(b.date || 0).getTime() - new Date(a.date || 0).getTime());
      }, [manualFinanceRows, expenseMonthFilter]);
      const totalPages = Math.max(1, Math.ceil(sortedTransactions.length / pageSize));
      const safePage = page > totalPages ? 1 : page;
      const pageRows = sortedTransactions.slice((safePage - 1) * pageSize, safePage * pageSize);

      const resetFilters = () => {
        setPlanFilter('');
        setMethodFilter('');
        setStatusFilter('');
        setFromDate('');
        setToDate('');
      };

      const getMemberLogs = (memberId) => {
        return (logs || [])
          .filter(l => l.entityType === 'member' && l.entityId === memberId)
          .slice(0, 10);
      };

      const amountFromLog = (entry) => {
        if (entry && entry.after && entry.after.amount !== undefined) return entry.after.amount;
        if (entry && entry.before && entry.before.amount !== undefined) return entry.before.amount;
        return '-';
      };

      const cardBase = 'rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-700 dark:bg-slate-900';

      const canFinanceTrend = access?.finance?.viewRevenueTrend4Months !== false;
      const canFinancePlan = access?.finance?.viewPlanPopularity !== false;
      const canFinanceTransactions = access?.finance?.viewTransactionsAutoMembers !== false;
      const canFinanceManageExpenses = access?.finance?.manageExpenses !== false;
      const isMobile = useIsMobile();
      if (isMobile) {
        const upcoming = incomeRows.filter((t) => t.status !== 'pending').slice(0, 5);
        const overdue = incomeRows.filter((t) => t.status === 'pending').slice(0, 5);
        return (
          <div className="p-4 space-y-4 bg-[#F8FAFC]">
            <div className="text-xl font-semibold text-slate-900">Billing & Payments</div>
            <div className="grid grid-cols-2 gap-3">
              <div className="rounded-2xl border border-blue-200 bg-blue-50 p-4">
                <div className="text-xs font-semibold text-blue-700">Total Revenue</div>
                <div className="mt-2 text-2xl font-bold text-blue-900">₹{revenue.toLocaleString()}</div>
                <div className="text-xs text-blue-700">This Month</div>
              </div>
              <div className="rounded-2xl border border-rose-200 bg-rose-50 p-4">
                <div className="text-xs font-semibold text-rose-700">Pending Amount</div>
                <div className="mt-2 text-2xl font-bold text-rose-900">₹{pendingAmount.toLocaleString()}</div>
                <div className="text-xs text-rose-700">From {pendingRows.length} Members</div>
              </div>
            </div>
            <div className="flex gap-2 overflow-x-auto pb-1">
              {['All', 'Paid', 'Pending', 'Overdue'].map((x, idx) => (
                <button key={x} className={cx('shrink-0 rounded-full px-4 py-2 text-xs font-semibold border', idx === 0 ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200')}>{x}</button>
              ))}
            </div>
            <div className="rounded-2xl border border-blue-100 bg-white p-3">
              <div className="mb-2 flex items-center justify-between">
                <div className="text-sm font-semibold text-slate-800">Upcoming Payments</div>
              </div>
              <div className="space-y-2">
                {upcoming.map((t) => (
                  <div key={`u-${t.id}`} className="flex items-center justify-between rounded-xl border border-slate-100 bg-slate-50 px-3 py-2">

                      <div className="truncate text-sm font-semibold text-slate-900">{t.memberName}</div>
                      <div className="text-[11px] text-slate-500">{t.plan}</div>
                    </div>
                    <div className="text-sm font-semibold text-slate-900">₹{Number(t.amount || 0).toLocaleString()}</div>
                  </div>

              </div>
            </div>
            <div className="rounded-2xl border border-rose-100 bg-white p-3">

              <div className="space-y-2">
                {overdue.map((t) => (

              <button onClick={exportFinanceCsv} className="rounded-full border border-emerald-300 bg-emerald-50 px-4 py-2 min-h-[44px] text-sm font-medium text-emerald-700">Export CSV</button>

            {[
              { key: '', label: 'All' },

              { key: 'expense', label: 'Expense only' },

              <button

                className={cx(
                  'rounded-full border px-3 py-1.5 text-xs font-semibold',
                  typeFilter === opt.key
                    ? 'border-blue-500 bg-blue-50 text-blue-700'
                    : 'border-slate-300 bg-white text-slate-600 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200'
                )}

                {opt.label}
              </button>

            <button

            <button

            >
              Estimated 26% fallback
            </button>
          </div>
          {showExpenseForm && canFinanceManageExpenses && (
            <div className="rounded-2xl border border-rose-200 bg-white p-4 shadow-sm grid grid-cols-1 md:grid-cols-5 gap-3 dark:border-rose-700 dark:bg-slate-900">
              <div><label className="text-xs text-slate-500">Date</label><input type="date" value={expenseDraft.date} onChange={(e) => setExpenseDraft(v => ({ ...v, date: e.target.value }))} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" /></div>
              <div>
                <label className="text-xs text-slate-500">Category</label>
                <select value={expenseDraft.category} onChange={(e) => setExpenseDraft(v => ({ ...v, category: e.target.value }))} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900">
                  {expenseCategories.map((cat) => <option key={cat} value={cat}>{cat}</option>)}
                </select>
              </div>
              <div><label className="text-xs text-slate-500">Amount</label><input type="number" min="0" value={expenseDraft.amount} onChange={(e) => setExpenseDraft(v => ({ ...v, amount: e.target.value }))} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900" /></div>
              <div className="md:col-span-2"><label className="text-xs text-slate-500">Note *</label><input value={expenseDraft.note} onChange={(e) => setExpenseDraft(v => ({ ...v, note: e.target.value }))} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-500" placeholder="Expense note is mandatory" /></div>
              <div className="md:col-span-5 flex justify-end"><button onClick={addExpenseRow} className="rounded-full bg-rose-600 px-4 py-2 text-sm font-medium text-white hover:bg-rose-700">Save Expense</button></div>
            </div>

          {showFilter && (
            <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm grid grid-cols-1 md:grid-cols-3 xl:grid-cols-5 gap-3 dark:border-slate-700 dark:bg-slate-900">
              <select value={planFilter} onChange={(e) => setPlanFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900">
                <option value="">All Plans</option>
                {(settings?.plans || []).map(p => <option key={p} value={p}>{p}</option>)}
              </select>
              <select value={methodFilter} onChange={(e) => setMethodFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900">
                <option value="">All Methods</option>
                {(settings?.paymentMethods || []).map(m => <option key={m} value={m}>{m}</option>)}
              </select>
              <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900">
                <option value="">All Payment Status</option>
                <option value="paid">Paid</option>
                <option value="pending">Pending</option>
                <option value="posted">Posted (Expense)</option>
              </select>
              <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" />
              <div className="flex gap-2">
                <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" />
                <button onClick={resetFilters} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100">Reset</button>
              </div>

          )}

          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
            {canFinanceRevenue && (
            <div className={cardBase}>
              <div className="text-sm text-slate-500">Revenue</div>
              <div className="mt-1 text-3xl font-bold text-emerald-700">${revenue.toLocaleString()}</div>
              <div className="text-sm text-emerald-700">Auto from Members</div>
            </div>
            )}
            <div className={cardBase}>
              <div className="text-sm text-slate-500">Pending Payments</div>
              <div className="mt-1 text-3xl font-bold text-amber-700">${pendingAmount.toLocaleString()}</div>
              <div className="text-sm text-amber-700">({pendingRows.length} pending)</div>
            </div>
            <button
              type="button"
              onClick={() => setShowExpenseLedger(true)}
              className={cx(cardBase, 'text-left hover:bg-rose-50/50 transition-colors dark:hover:bg-slate-800')}
            >
              <div className="text-sm text-slate-500">Expenses</div>
              <div className="mt-1 text-3xl font-bold text-rose-700">${expense.toLocaleString()}</div>

            <div className={cardBase}>

            </div>

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
            {canFinanceTrend && (

              <div className="h-48 flex items-end gap-3">
                {monthTotals.map(x => {
