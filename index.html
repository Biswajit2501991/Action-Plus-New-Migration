  <script type="text/babel" data-presets="react">
    {/**
     * Action Plus Gym Management Application (MVP)
     *
     * This single file defines the entire client‑side application. It uses
     * React to build a modular, stateful UI and Tailwind CSS for styling.
     * The app stores data in localStorage so it persists across sessions.
     *
     * Major features:
     *  - Authentication for demo users (Bis/b123 and Raja/r123)
     *  - Sidebar navigation with icons
     *  - Dashboard summary tiles with search and status filters
     *  - Members lists grouped by status, expandable rows with quick actions
     *  - Edit Member modal with derived date fields
     *  - Add Member wizard (3 steps) including photo upload
     *  - Settings page for editing dropdown values (plans, statuses, payment methods, hold durations, genders, staff)
     *  - Logs page with audit trail of actions
     *  - Theme toggle (light/dark/system) persisted in localStorage
     *
     * Date handling follows the spec: UTC storage, local formatting. Derived
     * fields include next payment date and payment by date. IDs and pay month
     * labels are generated from the form number and billing date.
     */}

    // ---- Utility Functions ----
    // Compose class names (ignoring falsey values). Similar to clsx but minimal.
    const cx = (...cls) => cls.filter(Boolean).join(' ');
    // Month names for formatted dates (Jan, Feb, ...)
    const MONTHS = [
      'Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'
    ];
    // Ensure a value is a Date in UTC and normalise to midnight UTC.
    const asUTC = (val) => {
      const d = val instanceof Date ? val : new Date(val);
      if (isNaN(d.getTime())) return null;
      return new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
    };
    // Convert a date to ISO string (YYYY‑MM‑DD). Returns empty string for invalid.
    const iso = (d) => {
      const dt = asUTC(d);
      return dt ? dt.toISOString().slice(0, 10) : '';
    };
    // Add n days to a date (returns a Date or null).
    const addDays = (d, n) => {
      const base = asUTC(d);
      if (!base) return null;
      base.setUTCDate(base.getUTCDate() + (Number(n) || 0));
      return base;
    };
    // Add n months to a date (returns a Date or null).
    const addMonths = (d, n) => {
      const base = asUTC(d);
      if (!base) return null;
      base.setUTCMonth(base.getUTCMonth() + (Number(n) || 0));
      return base;
    };
    // Format a date as DD/Mon/YYYY. If invalid returns empty string.
    const fmt = (d) => {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return String(d);
      const dd = String(dt.getUTCDate()).padStart(2, '0');
      const mm = MONTHS[dt.getUTCMonth()];
      const yy = dt.getUTCFullYear();
      return `${dd}/${mm}/${yy}`;
    };
    // Derive pay month label (Mon‑YYYY) from a date.
    const payMonthLabel = (d) => {
      const dt = asUTC(d);
      return dt ? `${MONTHS[dt.getUTCMonth()]}-${dt.getUTCFullYear()}` : '';
    };
    // Shorten status text for fixed width badges
    const shortStatus = (s) => {
      if (!s) return '';
      return s.length > 10 ? s.slice(0, 4) + '....' : s;
    };
    // Determine tone (colour) for a status
    const toneForStatus = (s) => {
      return s === 'Active' ? 'green'
        : s === 'Hold' ? 'amber'
        : s === 'Deactivated' ? 'pink'
        : 'slate';
    };

    // List of all application sections/tabs. This array is used for role
    // assignments and to filter the navigation bar depending on a user's
    // allowed sections. If you add new tabs you should also update this
    // list accordingly.
    const ALL_SECTIONS = ['Dashboard','Members','WhatsApp SMS','Finance','Staff','Settings','Logs','Support'];
    const DEFAULT_ROLE_TEMPLATES = [
      {
        id: 'admin',
        title: 'Administrator',
        subtitle: 'Full System Access',
        sections: [...ALL_SECTIONS],
        color: 'bg-emerald-50 border-emerald-200',
      },
      {
        id: 'frontdesk',
        title: 'Front Desk Manager',
        subtitle: 'Member and Front Desk Ops',
        sections: ['Dashboard', 'Members', 'WhatsApp SMS', 'Finance', 'Settings'],
        color: 'bg-amber-50 border-amber-200',

      {

    ];
    const SMS_TEMPLATE_DEFAULTS = {

    };
    const STORAGE_KEYS = {
      users: 'apg.users',
      members: 'apg.members',
      settings: 'apg.settings',
      logs: 'apg.logs',
      finance: 'apg.finance',
      smsEvents: 'apg.sms.events',
      filters: 'apg.filters',
      theme: 'apg.theme',
    };
    const STORAGE_SOFT_LIMIT_BYTES = 4.5 * 1024 * 1024; // ~4.5MB budget
    const MAX_IMAGE_FILE_BYTES = 1024 * 1024; // 1MB input guard
    const MAX_IMAGE_EDGE_PX = 720;
    const IMAGE_JPEG_QUALITY = 0.78;

    const getStorageUsageBytes = () => {
      try {
        let total = 0;
        for (let i = 0; i < localStorage.length; i += 1) {
          const k = localStorage.key(i) || '';
          const v = localStorage.getItem(k) || '';
          total += (k.length + v.length) * 2;
        }
        return total;
      } catch {
        return 0;
      }
    };

    const loadImageDataUrl = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ''));
      reader.onerror = () => reject(new Error('image-read-failed'));
      reader.readAsDataURL(file);
    });

    const downscaleImageDataUrl = (dataUrl, maxEdge = MAX_IMAGE_EDGE_PX, quality = IMAGE_JPEG_QUALITY) => new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        try {
          const maxSide = Math.max(img.width, img.height);
          const ratio = maxSide > maxEdge ? maxEdge / maxSide : 1;
          const width = Math.max(1, Math.round(img.width * ratio));
          const height = Math.max(1, Math.round(img.height * ratio));
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          if (!ctx) return resolve(dataUrl);
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        } catch {
          resolve(dataUrl);
        }
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });

    // ---- Predefined demo users ----
    const DEMO_USERS = {
      // Default staff roles with matching passwords
      owner: { password: 'owner', email: 'owner@example.com', name: 'Owner', role: 'Owner' },
      manager: { password: 'manager', email: 'manager@example.com', name: 'Manager', role: 'Manager' },
      trainer: { password: 'trainer', email: 'trainer@example.com', name: 'Trainer', role: 'Trainer' },
      reception: { password: 'reception', email: 'reception@example.com', name: 'Reception', role: 'Reception' },
      // Legacy demo accounts
      Bis: { password: 'b123', email: 'bis@example.com', name: 'Bis', role: 'Owner' },
      Raja: { password: 'r123', email: 'raja@example.com', name: 'Raja', role: 'Owner' }
    };

    // ---- App Component ----
    function GymApp() {
      const [user, setUser] = React.useState(null);

      // Users state: stores login credentials and the list of sections each user can access.
      // On first run it initialises with default accounts. Subsequent modifications are
      // persisted in localStorage under the `apg.users` key.
      const [users, setUsers] = React.useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEYS.users);
          if (saved) return JSON.parse(saved);
        } catch {}
        return [
          { id: 'owner', password: 'owner', name: 'Owner', email: 'owner@example.com', sections: [...ALL_SECTIONS], blocked: false, blockedReason: '', blockedAt: '', updatedBy: '', photo: null },
          { id: 'manager', password: 'manager', name: 'Manager', email: 'manager@example.com', sections: ['Dashboard','Members','Finance','Settings','Logs'], blocked: false, blockedReason: '', blockedAt: '', updatedBy: '', photo: null },
          { id: 'trainer', password: 'trainer', name: 'Trainer', email: 'trainer@example.com', sections: ['Dashboard','Members'], blocked: false, blockedReason: '', blockedAt: '', updatedBy: '', photo: null },
          { id: 'reception', password: 'reception', name: 'Reception', email: 'reception@example.com', sections: ['Members'], blocked: false, blockedReason: '', blockedAt: '', updatedBy: '', photo: null },
        ];
      });
      // Theme: we enforce a single light theme across the app. Previously the app
      // supported light/dark/system themes. To simplify and meet the
      // requirement for a clean light theme, we default to 'light' and do not
      // expose any UI to change it. The effect below will never add the
      // 'dark' class on the html element.
      const [theme, setTheme] = React.useState('light');
      // Members, settings and logs are stored in localStorage; load on mount.
      const [members, setMembers] = React.useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEYS.members);
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });
      const [settings, setSettings] = React.useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEYS.settings);
          if (saved) return JSON.parse(saved);
        } catch {}
        return {
          plans: ['Basic','PT-Raja','1 Week','PT-Kaushik'],
          statuses: ['Active','Hold','Deactivated','Cancelled'],
          paymentMethods: ['Google Pay','Cash','Phone Pay','Cash + Google Pay','Cash + Phone Pay','Paytm','Cash + Paytm'],
          holdDurations: ['1 Month','2 Months','3 Months','4 Months','5 Months','6 Months'],
          genders: ['Male','Female','Cannot disclose'],
          staff: [ { id:'Bis', name:'Bis', email:'bis@example.com', avatar:null }, { id:'Raja', name:'Raja', email:'raja@example.com', avatar:null } ],
          roleTemplates: [...DEFAULT_ROLE_TEMPLATES],
          smsTemplates: { ...SMS_TEMPLATE_DEFAULTS },
        };
      });
      const [logs, setLogs] = React.useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEYS.logs);
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });
      const [financeTransactions, setFinanceTransactions] = React.useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEYS.finance);
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });
      const [financeSeeded, setFinanceSeeded] = React.useState(() => {
        try {
          return Boolean(localStorage.getItem(STORAGE_KEYS.finance));
        } catch {
          return false;
        }
      });
      const [smsEvents, setSmsEvents] = React.useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEYS.smsEvents);
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });

      // ----- Filtering state -----
      // Filters for the members page. Keys: plan, status, billingMonth,
      // paymentMethod, staff, joinFrom, joinTo, billFrom, billTo. We load
      // previously applied filters from localStorage and persist changes back.
      const initialFilters = {
        plan: '',
        status: '',
        billingMonth: '',
        paymentMethod: '',
        staff: '',
        joinFrom: '',
        joinTo: '',
        billFrom: '',
        billTo: ''
      };
      const [filters, setFilters] = React.useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEYS.filters);
          return saved ? JSON.parse(saved) : initialFilters;
        } catch {
          return initialFilters;
        }
      });
      const storageWarningAtRef = React.useRef(0);
      const [storageInfo, setStorageInfo] = React.useState({ usageBytes: getStorageUsageBytes(), lastError: '', lastKey: '', lastAt: '' });
      const showStorageWarning = () => {
        const now = Date.now();
        // Rate limit warning to avoid repeated toasts during batched writes.
        if (now - storageWarningAtRef.current < 3000) return;
        storageWarningAtRef.current = now;
        setToast('Storage is full. Some changes may not be saved. Please clear browser storage.');
        setTimeout(() => setToast(''), 3500);
      };
      const recordStorageError = (key, message) => {
        setStorageInfo(prev => ({
          ...prev,
          usageBytes: getStorageUsageBytes(),
          lastError: message || 'Storage write failed',
          lastKey: key,
          lastAt: new Date().toISOString(),
        }));
        showStorageWarning();
      };
      const safeSetItemJSON = (key, value) => {
        try {
          const serialized = JSON.stringify(value);
          const nextBytes = serialized.length * 2;
          if (nextBytes > STORAGE_SOFT_LIMIT_BYTES) {
            recordStorageError(key, `Payload too large for ${key}.`);
            return false;
          }
          const usage = getStorageUsageBytes();
          const existing = (localStorage.getItem(key) || '').length * 2;
          if (usage - existing + nextBytes > STORAGE_SOFT_LIMIT_BYTES) {
            recordStorageError(key, `Storage budget exceeded while saving ${key}.`);
            return false;
          }
          localStorage.setItem(key, serialized);
          setStorageInfo(prev => ({ ...prev, usageBytes: getStorageUsageBytes() }));
          return true;
        } catch {
          recordStorageError(key, `Failed to persist ${key}.`);
          return false;
        }
      };
      React.useEffect(() => {
        safeSetItemJSON(STORAGE_KEYS.filters, filters);
      }, [filters]);
      const anyFilterActive = React.useMemo(() => {
        return Object.values(filters).some(v => v);
      }, [filters]);
      const clearFilters = () => setFilters(initialFilters);
      const [filterOpen, setFilterOpen] = React.useState(false);

      // Options for billing month filter: compute unique month‑year values from members
      const billingMonthOptions = React.useMemo(() => {
        const setm = new Set();
        members.forEach(m => {
          if (m.billingDate) {
            const dt = asUTC(m.billingDate);
            if (dt) {
              const label = `${MONTHS[dt.getUTCMonth()]}-${dt.getUTCFullYear()}`;
              setm.add(label);
            }
          }
        });
        return Array.from(setm);
      }, [members]);
      // Persist theme/members/settings/logs on change
      React.useEffect(() => {
        // Persist the theme for completeness, though the UI will always load as light.
        try {
          localStorage.setItem(STORAGE_KEYS.theme, theme);
          setStorageInfo(prev => ({ ...prev, usageBytes: getStorageUsageBytes() }));
        } catch {
          recordStorageError(STORAGE_KEYS.theme, `Failed to persist ${STORAGE_KEYS.theme}.`);
        }
      }, [theme]);
      React.useEffect(() => {
        safeSetItemJSON(STORAGE_KEYS.members, members);
      }, [members]);
      React.useEffect(() => {
        safeSetItemJSON(STORAGE_KEYS.settings, settings);
      }, [settings]);
      React.useEffect(() => {
        safeSetItemJSON(STORAGE_KEYS.logs, logs);
      }, [logs]);
      React.useEffect(() => {
        safeSetItemJSON(STORAGE_KEYS.finance, financeTransactions);
      }, [financeTransactions]);
      React.useEffect(() => {
        safeSetItemJSON(STORAGE_KEYS.smsEvents, smsEvents);
      }, [smsEvents]);

      // Persist users to localStorage whenever they change. This ensures that newly added
      // staff or updated roles survive page reloads.
      React.useEffect(() => {
        safeSetItemJSON(STORAGE_KEYS.users, users);
      }, [users]);
      React.useEffect(() => {
        if (financeSeeded || financeTransactions.length > 0 || members.length === 0) return;
        const seeded = members
          .filter(m => m.billingDate && Number(m.amount || 0) > 0)
          .slice(0, 250)
          .map(m => ({
            id: crypto.randomUUID(),
            date: iso(m.billingDate),
            memberId: m.memberId || '',
            memberName: m.name || '',
            plan: m.plan || '',
            method: m.paymentMethod || '',
            amount: Number(m.amount || 0),
            type: 'income',
            status: 'paid',
            note: 'Imported from member billing record',
            createdAt: new Date().toISOString(),
          }));
        setFinanceTransactions(seeded);
        setFinanceSeeded(true);
      }, [members, financeSeeded, financeTransactions.length]);
      // Apply theme to document root
      React.useEffect(() => {
        const html = document.documentElement;
        const preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        // We intentionally never add the 'dark' class here because the
        // application now uses a single light theme. If you wish to re‑enable
        // dark mode in the future, you can restore the conditional below.
        html.classList.remove('dark');
      }, [theme]);

      // Active view state: 'Dashboard', 'Members', 'WhatsApp SMS', 'Finance', 'Staff', 'Settings', 'Logs', 'Support'
      const [activeTab, setActiveTab] = React.useState('Dashboard');
      // Dashboard view mode: summary or list
      const [dashMode, setDashMode] = React.useState('summary');
      const [dashFilter, setDashFilter] = React.useState('Active');
      const [dashSearch, setDashSearch] = React.useState('');
      const [dashField, setDashField] = React.useState('all');
      const HISTORY_LIMIT = 5;
      const skipHistoryCaptureRef = React.useRef(false);
      const historyRef = React.useRef({ past: [], current: null, currentSig: '', future: [] });
      const [historyState, setHistoryState] = React.useState({ canUndo: false, canRedo: false });
      const snapshotState = React.useCallback(() => ({
        members,
        users,
        settings,
        filters,
        financeTransactions,
      }), [members, users, settings, filters, financeTransactions]);
      const applySnapshot = React.useCallback((snap) => {
        if (!snap) return;
        skipHistoryCaptureRef.current = true;
        setMembers(Array.isArray(snap.members) ? snap.members : []);
        setUsers(Array.isArray(snap.users) ? snap.users : []);
        setSettings(snap.settings && typeof snap.settings === 'object' ? snap.settings : settings);
        setFilters(snap.filters && typeof snap.filters === 'object' ? snap.filters : initialFilters);
        setFinanceTransactions(Array.isArray(snap.financeTransactions) ? snap.financeTransactions : []);
        setTimeout(() => { skipHistoryCaptureRef.current = false; }, 0);
      }, [initialFilters, settings]);
      // Edit member modal state
      const [editMember, setEditMember] = React.useState(null);
      const [addOpen, setAddOpen] = React.useState(false);
      const [toast, setToast] = React.useState('');

      // Candidate member for deletion. When non‑null, a confirmation
      // dialog will be presented to the user. Only owners can delete
      // members (see canDelete prop passed to QuickActions below).
      const [deleteCandidate, setDeleteCandidate] = React.useState(null);

      // Log event helper
      // To keep logs safe and small, redact sensitive/large fields and clamp long strings.
      const sanitizeForLog = (obj) => {
        if (!obj) return null;
        try {
          return JSON.parse(JSON.stringify(obj, (key, value) => {
            if (key === 'password') return '[redacted]';
            if (key === 'photo') return value ? '[image]' : null;
            if (typeof value === 'string' && value.length > 300) return value.slice(0, 300) + '...';
            return value;
          }));
        } catch {
          return null;
        }
      };
      const logEvent = (action, entityType, entityId, beforeObj, afterObj) => {
        const entry = {
          id: crypto.randomUUID(),
          actor: user?.name || 'Unknown',
          action,
          entityType,
          entityId,
          before: sanitizeForLog(beforeObj),
          after: sanitizeForLog(afterObj),
          ts: new Date().toISOString(),
        };
        setLogs(prev => [entry, ...prev.slice(0, 199)]); // limit to 200
      };
      const renderSmsTemplate = (template, member) => {
        if (!template) return '';
        const billing = asUTC(member.billingDate);
        const paymentBy = asUTC(member.paymentBy || member.billingDate);
        const replacements = {
          '[Name]': member.name || '',
          '[CustomerName]': member.name || '',
          '[PLAN]': member.plan || '',
          '[Amount]': `${Number(member.amount || 0)}/-`,
          '[BillingDate]': billing ? fmt(billing) : '',
          '[DATE]': billing ? fmt(billing) : '',
          '[LastDate]': paymentBy ? fmt(paymentBy) : '',
          '[PaymentBy]': paymentBy ? fmt(paymentBy) : '',
        };
        let out = template;
        Object.keys(replacements).forEach(key => {
          out = out.split(key).join(replacements[key]);
        });
        return out;
      };
      const buildWhatsAppUrl = (member, message) => {
        const cleanPhone = String(member.mobile || '').replace(/\D/g, '');
        if (!cleanPhone) return null;
        const finalPhone = cleanPhone.length === 10 ? `91${cleanPhone}` : cleanPhone;
        return `https://api.whatsapp.com/send?phone=${finalPhone}&text=${encodeURIComponent(message || '')}`;
      };
      const triggerStatusSms = (member, fromStatus, toStatus) => {
        if (!member || fromStatus === toStatus) return;
        const templates = { ...SMS_TEMPLATE_DEFAULTS, ...(settings.smsTemplates || {}) };
        const key = toStatus === 'Hold'
          ? 'hold'
          : toStatus === 'Deactivated'
            ? 'deactivate'
            : toStatus === 'Active'
              ? 'success'
              : '';
        if (!key || !templates[key]) return;
        const message = renderSmsTemplate(templates[key], member);
        const waUrl = buildWhatsAppUrl(member, message);
        const event = {
          id: crypto.randomUUID(),
          memberId: member.memberId,
          memberName: member.name,
          fromStatus,
          toStatus,
          templateKey: key,
          message,
          waUrl,
          ts: new Date().toISOString(),
        };
        setSmsEvents(prev => [event, ...prev].slice(0, 300));
        logEvent('sms.status_triggered', 'member', member.memberId, { fromStatus, toStatus, templateKey: key }, { message });
      };
      React.useEffect(() => {
        if (skipHistoryCaptureRef.current) return;
        const snap = snapshotState();
        const sig = JSON.stringify(snap);
        if (!historyRef.current.current) {
          historyRef.current = { past: [], current: snap, currentSig: sig, future: [] };
          setHistoryState({ canUndo: false, canRedo: false });
          return;
        }
        if (historyRef.current.currentSig === sig) return;
        const nextPast = [...historyRef.current.past, historyRef.current.current].slice(-HISTORY_LIMIT);
        historyRef.current = {
          past: nextPast,
          current: snap,
          currentSig: sig,
          future: [],
        };
        setHistoryState({ canUndo: nextPast.length > 0, canRedo: false });
      }, [snapshotState]);
      const undoHistory = () => {
        const h = historyRef.current;
        if (!h.past.length) return;
        const target = h.past[h.past.length - 1];
        const nextPast = h.past.slice(0, -1);
        const nextFuture = [h.current, ...h.future].slice(0, HISTORY_LIMIT);
        historyRef.current = {
          past: nextPast,
          current: target,
          currentSig: JSON.stringify(target),
          future: nextFuture,
        };
        applySnapshot(target);
        setHistoryState({ canUndo: nextPast.length > 0, canRedo: nextFuture.length > 0 });
        logEvent('history.undo', 'history', 'global', null, { step: 1, remainingUndo: nextPast.length, availableRedo: nextFuture.length });
        setToast('Undo applied.');
        setTimeout(() => setToast(''), 1500);
      };
      const redoHistory = () => {
        const h = historyRef.current;
        if (!h.future.length) return;
        const target = h.future[0];
        const nextFuture = h.future.slice(1);
        const nextPast = [...h.past, h.current].slice(-HISTORY_LIMIT);
        historyRef.current = {
          past: nextPast,
          current: target,
          currentSig: JSON.stringify(target),
          future: nextFuture,
        };
        applySnapshot(target);
        setHistoryState({ canUndo: nextPast.length > 0, canRedo: nextFuture.length > 0 });
        logEvent('history.redo', 'history', 'global', null, { step: 1, remainingRedo: nextFuture.length, availableUndo: nextPast.length });
        setToast('Redo applied.');
        setTimeout(() => setToast(''), 1500);
      };

      // Authentication handler
      const login = (id, pw) => {
        // Attempt to authenticate against our persisted users list. Match by id (case sensitive).
        const rec = users.find(u => u.id === id);
        if (rec && rec.password === pw) {
          if (rec.blocked) {
            logEvent('auth.login.blocked', 'user', id, null, { id, blocked: true });
            setToast('This staff account is blocked. Contact owner.');
            setTimeout(() => setToast(''), 2500);
            return false;
          }
          // Login success. Use the user record as is (id, name, email, sections).
          setUser({ ...rec });
          setActiveTab('Dashboard');
          setDashMode('summary');
          logEvent('auth.login', 'user', id, null, { id });
          return true;
        }
        // Fallback to legacy demo users for backward compatibility
        const legacyAllowed = id === 'Bis' || id === 'Raja';
        const legacy = legacyAllowed ? DEMO_USERS[id] : null;
        if (legacy && legacy.password === pw) {
          const newUser = { id, name: legacy.name, email: legacy.email, sections: [...ALL_SECTIONS], blocked: false, blockedReason: '', blockedAt: '', updatedBy: '', photo: null };
          setUser(newUser);
          // Persist this user so they can log in again
          setUsers(prev => {
            if (!prev.find(u => u.id === id)) return [...prev, newUser];
            return prev;
          });
          setActiveTab('Dashboard');
          setDashMode('summary');
          logEvent('auth.login', 'user', id, null, { id });
          return true;
        }
        return false;
      };

      // Status change handler (quick actions)
      const quickStatus = (memberId, nextStatus, opts = {}) => {
        setMembers(prev => prev.map(m => {
          if (m.memberId === memberId) {
            const before = { ...m };
            const updated = { ...m, status: nextStatus };
            if (nextStatus === 'Hold') {
              updated.holdDuration = opts.holdDuration || m.holdDuration || settings.holdDurations[0];
            } else {
              updated.holdDuration = '';
            }
            // Log
            logEvent('status.changed', 'member', memberId, before, updated);
            triggerStatusSms(updated, before.status, updated.status);
            return updated;
          }
          return m;
        }));
      };

      // Build WhatsApp URL from member details.
      const getWhatsAppLink = (m) => {
        if (!m.mobile) return null;
        if (!m.billingDate) return null;

        const billingDt = asUTC(m.billingDate);
        const lastDt = addDays(billingDt, 7);
        const formattedBillingDate = fmt(billingDt);
        const formattedLastDate = fmt(lastDt);

        const message = `Hi ${m.name}, your bill for ${formattedBillingDate} is ${m.amount}/-.

*You can make your payment using any of the following options:*

*Please find the Google Pay QR link here*: 
https://drive.google.com/file/d/1S0-tuxlHdtqYKYyY2K1e0sN7fmqpf5XL/view?usp=sharing

*Google Pay UPI*: gymactionplus-1@okicici

*Please find the Phone Pay QR link here*: 
https://drive.google.com/file/d/1LjiQ3N6L-JfTfkW5a11oEduiDpCQq0I8/view?usp=drive_link

*Phone Pay UPI ID*: 7047157510@axl

*You can also pay using the gym's mobile number:* +917047157510

Please pay by: ${formattedLastDate}`;

        const cleanPhone = String(m.mobile).replace(/\D/g, '');
        const finalPhone = cleanPhone.length === 10 ? '91' + cleanPhone : cleanPhone;
        return `https://wa.me/${finalPhone}?text=${encodeURIComponent(message)}`;
      };

      // Open WhatsApp with prefilled welcome/payment reminder message.
      const sendWelcomeEmail = (member) => {
        if (!member) return;
        const url = getWhatsAppLink(member);
        if (!url) {
          setToast('Mobile number or billing date is missing.');
          setTimeout(() => setToast(''), 2500);
          return;
        }
        window.open(url, '_blank');
        logEvent('welcome.whatsapp.opened', 'member', member.memberId, null, null);
        setToast('WhatsApp message opened.');
        setTimeout(() => setToast(''), 2500);
      };
      // Save edits from edit modal
      // Accept the updated member as argument to avoid stale state issues. This fixes
      // the bug where plan changes were not persisted because the editMember
      // state had not yet updated when onSave() was called.
      const saveEdit = (updated) => {
        // Determine which member object we should save. If a member is passed
        // explicitly from the EditMemberModal then use it; otherwise fall back
        // to the current editMember state for backwards compatibility.
        let toSave = updated || editMember;
        if (!toSave) return;
        // Validate required fields
        if (!toSave.name || !toSave.mobile || !toSave.plan || !toSave.status || !toSave.billingDate) {
          return;
        }
        // Enforce status/hold-duration consistency.
        // If hold duration is set, status must be Hold.
        if (toSave.holdDuration && toSave.status !== 'Hold') {
          toSave = { ...toSave, status: 'Hold' };
        }
        // If status is Hold, hold duration is mandatory.
        if (toSave.status === 'Hold' && !String(toSave.holdDuration || '').trim()) {
          window.alert('Hold Duration is required when Status is Hold.');
          return;
        }
        setMembers(prev => prev.map(m => {
          if (m.memberId === toSave.memberId) {
            logEvent('member.updated', 'member', m.memberId, m, toSave);
            triggerStatusSms(toSave, m.status, toSave.status);
            return { ...toSave };
          }
          return m;
        }));
        setToast(`${toSave.name} has been updated successfully`);
        setTimeout(() => setToast(''), 2500);
        // Close the modal
        setEditMember(null);
      };

      // Permanently remove a member from the system. This function is
      // invoked after the user confirms deletion in the modal. It logs
      // the deletion and updates local state/storage accordingly.
      const deleteMember = (memberId) => {
        setMembers(prev => prev.filter(m => m.memberId !== memberId));
        // Remove any open details rows or pages referencing this member
        // No need to adjust pagination here; DashboardView recalculates
        // pages on members change. Log the deletion for audit purposes.
        logEvent('member.deleted', 'member', memberId, null, null);
      };

      // Save new member from wizard
      const addMember = (m) => {
        setMembers(prev => [m, ...prev]);
        logEvent('member.created', 'member', m.memberId, null, m);
        setToast(`${m.name} has been saved successfully`);
        setTimeout(() => setToast(''), 2500);
      };

      // Add or update setting option (in Settings page)
      const updateSettingValue = (key, values) => {
        const before = { ...settings[key] };
        setSettings(prev => ({ ...prev, [key]: values }));
        // Log settings updated
        logEvent('settings.updated', 'settings', key, before, values);
      };
      const exportData = () => {
        try {
          const payload = {
            version: '1.0',
            exportedAt: new Date().toISOString(),
            members,
            users,
            settings,
            logs,
            financeTransactions,
            filters,
          };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `action-plus-backup-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(url);
          logEvent('backup.exported', 'backup', 'local', null, { ok: true });
          setToast('Backup exported successfully');
          setTimeout(() => setToast(''), 2500);
        } catch {
          setToast('Failed to export backup');
          setTimeout(() => setToast(''), 2500);
        }
      };
      const importData = async (file) => {
        if (!file) return;
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          if (!parsed || typeof parsed !== 'object') throw new Error('invalid-backup');
          if (!Array.isArray(parsed.members) || !Array.isArray(parsed.users) || !Array.isArray(parsed.logs) || !parsed.settings || typeof parsed.settings !== 'object') {
            throw new Error('invalid-schema');
          }
          setMembers(parsed.members);
          setUsers(parsed.users);
          setLogs(parsed.logs);
          setSettings(parsed.settings);
          setFinanceTransactions(Array.isArray(parsed.financeTransactions) ? parsed.financeTransactions : []);
          setFilters(parsed.filters && typeof parsed.filters === 'object' ? parsed.filters : initialFilters);
          logEvent('backup.imported', 'backup', 'local', null, { members: parsed.members.length, users: parsed.users.length });
          setToast('Backup imported successfully');
          setTimeout(() => setToast(''), 2500);
        } catch {
          setToast('Invalid backup file. Import failed.');
          setTimeout(() => setToast(''), 3000);
        }
      };

      // Derived lists and search
      const filteredMembers = React.useMemo(() => {
        if (dashMode === 'summary') return [];
        if (dashSearch.trim()) {
          const tokens = dashSearch
            .toLowerCase()
            .trim()
            .split(/\s+/)
            .filter(Boolean);
          const includesAllTokens = (value) => {
            const text = String(value || '').toLowerCase();
            return tokens.every(t => text.includes(t));
          };
          const anyFieldMatch = (m) => {
            const haystack = [
              m.memberId,
              m.formNo,
              m.name,
              m.mobile,
              m.email,
              m.plan,
              m.status,
              m.staff,
              m.payMonth,
              fmt(m.billingDate),
              fmt(m.joiningDate),
            ].join(' | ').toLowerCase();
            return tokens.every(t => haystack.includes(t));
          };
          return members.filter(m => {
            const match = (val) => includesAllTokens(val);
            switch (dashField) {
              case 'name': return match(m.name);
              case 'mobile': return match(m.mobile);
              case 'plan': return match(m.plan);
              case 'status': return match(m.status);
              case 'memberId': return match(m.memberId) || match(m.formNo);
              case 'email': return match(m.email);
              case 'staff': return match(m.staff);
              default: return anyFieldMatch(m);
            }
          });
        }
        return members.filter(m => m.status === dashFilter);
      }, [members, dashMode, dashFilter, dashSearch, dashField]);

      // Theme toggle helper
      const toggleTheme = () => {
        setTheme(prev => prev === 'light' ? 'dark' : prev === 'dark' ? 'system' : 'light');
      };

      // If no user, show login screen
      if (!user) {
        return (
          <LoginPage onSubmit={(id, pw) => {
            if (!login(id, pw)) {
              setToast('Invalid credentials. Try Bis/b123 or Raja/r123.');
              setTimeout(() => setToast(''), 2500);
            }
          }} />
        );
      }

      // Logout handler clears the current user and resets navigation state.
      const logout = () => {
        logEvent('auth.logout', 'user', user?.id || '', { id: user?.id }, null);
        setUser(null);
        setActiveTab('Dashboard');
        setDashMode('summary');
      };
      return (
        <div className="min-h-screen flex">
          <Sidebar
            user={user}
            active={activeTab}
            onSelect={(tab) => {
              setActiveTab(tab);
              if (tab === 'Dashboard') setDashMode('summary');
            }}
            theme={theme}
            setTheme={setTheme}
            onLogout={logout}
            onUndo={undoHistory}
            onRedo={redoHistory}
            canUndo={historyState.canUndo}
            canRedo={historyState.canRedo}
          />
          <main className="flex-1 overflow-y-auto">
            {activeTab === 'Dashboard' && (
              dashMode === 'summary' ? (
                <DashboardSummary
                  members={members}
                  onSelectStatus={(s) => {
                    setDashFilter(s);
                    setDashMode('list');
                    setDashSearch('');
                  }}
                  onAddNew={() => setAddOpen(true)}
                  onSearch={(q, f) => {
                    setDashSearch(q.trim());
                    setDashField(f);
                    setDashMode('list');
                  }}
                  onOpenMember={(memberId) => {
                    setDashSearch(memberId);
                    setDashField('memberId');
                    setDashMode('list');
                  }}
                  onWelcome={sendWelcomeEmail}
                />
              ) : (
                <MembersList
                  title={`${dashFilter} Members`}
                  list={filteredMembers}
                  onBack={() => setDashMode('summary')}
                  onEdit={(m) => setEditMember(m)}
                  onStatusChange={quickStatus}
                  holdOptions={settings.holdDurations}
                  logs={logs}
                />
              )
            )}
            {activeTab === 'Members' && (
              <DashboardView
                members={members}
                onEdit={(m) => setEditMember(m)}
                onStatusChange={quickStatus}
                holdOptions={settings.holdDurations}
                logs={logs}
                filters={filters}
                billingMonthOptions={billingMonthOptions}
                filterOpen={filterOpen}
                setFilterOpen={setFilterOpen}
                anyFilterActive={anyFilterActive}
                canDelete={user && user.id === 'owner'}
                onDelete={(m) => setDeleteCandidate(m)}
                onWelcome={sendWelcomeEmail}
              />
            )}
            {activeTab === 'Settings' && (
              <SettingsPage
                settings={settings}
                updateSetting={updateSettingValue}
                members={members}
                storageInfo={storageInfo}
                onExport={exportData}
                onImport={importData}
              />
            )}
            {activeTab === 'Logs' && (
              <LogsPage logs={logs} currentUser={user} onClearLogs={() => {
                if (!(user && user.id === 'owner')) return;
                const ok = window.confirm('Clear all logs? This cannot be undone.');
                if (!ok) return;
                setLogs([]);
                setToast('All logs cleared.');
                setTimeout(() => setToast(''), 2000);
              }} />
            )}
            {/* Placeholders for future sections */}
            {activeTab === 'WhatsApp SMS' && (
              <WhatsAppSmsPage
                members={members}
                settings={settings}
                updateSetting={updateSettingValue}
                smsEvents={smsEvents}
                logEvent={logEvent}
              />
            )}
            {activeTab === 'Finance' && (
              <FinancePage
                members={members}
                settings={settings}
                logs={logs}
              />
            )}
            {activeTab === 'Staff' && (
              <UserManagementPage
                users={users}
                setUsers={setUsers}
                settings={settings}
                setSettings={setSettings}
                currentUser={user}
                logEvent={logEvent}
              />
            )}
            {activeTab === 'Support' && (<PlaceholderPage title="Support" />)}
          </main>
          {/* Edit Member Modal */}
          {editMember && (
            <EditMemberModal
              member={editMember}
              onClose={() => setEditMember(null)}
              onSave={saveEdit}
              planOptions={settings.plans}
              statusOptions={settings.statuses}
              holdOptions={settings.holdDurations}
              paymentOptions={settings.paymentMethods}
              canEditFormNo={user && user.id === 'owner'}
            />
          )}
          {/* Add Member Wizard */}
          {addOpen && (
            <AddMemberWizard
              open={addOpen}
              onClose={() => setAddOpen(false)}
              onSave={addMember}
              settings={settings}
              staffName={user.name}
              members={members}
              canEditFormNo={user && user.id === 'owner'}
            />
          )}
          {/* Toast Notification */}
          {toast && (<div className="fixed bottom-6 right-6 rounded-2xl bg-emerald-600 text-white px-4 py-2 shadow-lg z-50">{toast}</div>)}

          {/* Global Add Member Floating Button */}
          {user && user.sections && user.sections.includes('Members') && !addOpen && !editMember && (
            <button
              onClick={() => setAddOpen(true)}
              className="fixed bottom-6 right-6 flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-full shadow-lg z-40"
            >
              <span className="text-xl">＋</span>
              <span className="hidden sm:inline">Add Member</span>
            </button>
          )}

          {/* Filter Panel for advanced filtering on members */}
          {filterOpen && (
            <FilterPanel
              open={filterOpen}
              onClose={() => setFilterOpen(false)}
              filters={filters}
              setFilters={setFilters}
              clearFilters={clearFilters}
              settings={settings}
              billingMonthOptions={billingMonthOptions}
            />
          )}

          {/* Delete Confirmation Modal */}
          {deleteCandidate && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
              <div className="max-w-md w-full rounded-3xl bg-white shadow-xl p-6">
                <h3 className="text-lg font-semibold mb-4">Delete Member</h3>
                <p className="mb-6">Are you sure you want to permanently delete this member? This action cannot be undone.</p>
                <div className="flex justify-end gap-3">
                  <button
                    onClick={() => setDeleteCandidate(null)}
                    className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium"
                  >
                    Cancel
                  </button>
                  <button
                    onClick={() => {
                      deleteMember(deleteCandidate.memberId);
                      setDeleteCandidate(null);
                      setToast(`${deleteCandidate.name} has been deleted successfully`);
                    }}
                    className="rounded-xl px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium"
                  >
                    Delete
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ---- Login Page ----
    function LoginPage({ onSubmit }) {
      const [id, setId] = React.useState('');
      const [pw, setPw] = React.useState('');
      return (
        <div className="min-h-screen flex items-center justify-center bg-slate-100">
          <div className="w-full max-w-md bg-white rounded-3xl p-8 shadow-xl">
            <h1 className="text-2xl font-semibold mb-6">Sign in to Action Plus Gym</h1>
            <label className="text-sm font-medium">Login ID</label>
            <input
              value={id}
              onChange={(e) => setId(e.target.value)}
              placeholder="owner, manager, trainer or reception"
              className="mb-4 mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
            />
            <label className="text-sm font-medium">Password</label>
            <input
              type="password"
              value={pw}
              onChange={(e) => setPw(e.target.value)}
              placeholder="••••"
              className="mb-4 mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
            />
            <button
              onClick={() => onSubmit(id.trim(), pw)}
              className="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-2xl py-2 font-semibold"
            >Login</button>
            <p className="mt-3 text-xs text-slate-500">
              Demo accounts:&nbsp;
              <b>owner / owner</b>,
              &nbsp;<b>manager / manager</b>,
              &nbsp;<b>trainer / trainer</b>,
              &nbsp;<b>reception / reception</b>
            </p>
          </div>
        </div>
      );
    }

    // ---- Sidebar Component ----
function Sidebar({ user, active, onSelect, theme, setTheme, onLogout, onUndo, onRedo, canUndo, canRedo }) {
      // Nav items with icon mapping (emoji). Could be replaced with SVG icons.
      const NAV = [
        { key: 'Dashboard', label: 'Dashboard', icon: '🏠' },
        { key: 'Members', label: 'Members', icon: '👥' },
        { key: 'WhatsApp SMS', label: 'WhatsApp SMS', icon: '✉️' },
        { key: 'Finance', label: 'Finance', icon: '💰' },
        { key: 'Staff', label: 'Staff', icon: '👤' },
        { key: 'Settings', label: 'Settings', icon: '⚙️' },
        { key: 'Logs', label: 'Logs', icon: '📜' },
        { key: 'Support', label: 'Support', icon: '❓' },
      ];
      // Filter navigation items based on the logged in user's allowed sections. Always
      // include the Support page. If no user or sections are provided, show all pages.
      const allowedSections = user && user.sections ? user.sections : ALL_SECTIONS;
      const navItems = NAV.filter(item => allowedSections.includes(item.key) || item.key === 'Support');
      return (
        <aside className="w-72 shrink-0 bg-gradient-to-b from-blue-600 to-blue-500 text-white flex flex-col h-screen overflow-hidden">
          {/* Brand logo at top */}
          <div className="flex flex-col items-center pt-6 pb-4">
            <div className="h-14 w-14 rounded-full bg-white flex items-center justify-center shadow-lg">
              <span className="text-blue-600 font-bold text-xl">AP</span>
            </div>
            <div className="mt-2 text-sm font-semibold">Action Plus Gym</div>
          </div>
          <div className="mx-4 mb-6 p-4 rounded-2xl bg-white/10 flex flex-col items-center">
            {/* User avatar using initials */}
            <Avatar name={user.name} photo={user.photo || null} className="h-16 w-16 mb-2" />
            <div className="font-semibold text-base">{user.name}</div>
            <div className="text-white/80 text-sm">{user.email}</div>
          </div>
          <nav className="flex-1 px-2 space-y-1 overflow-y-auto">
            {navItems.map(item => (
              <button
                key={item.key}
                onClick={() => onSelect(item.key)}
                className={cx(
                  'w-full flex items-center gap-3 rounded-xl px-4 py-2 font-medium',
                  active === item.key ? 'bg-white/20' : 'hover:bg-white/10'
                )}
              >
                <span>{item.icon}</span>
                <span>{item.label}</span>
              </button>
            ))}
          </nav>
          <div className="p-4 mt-auto space-y-3">
            <div className="rounded-2xl bg-white/10 p-3">
              <div className="text-xs text-white/80 mb-2">History</div>
              <div className="grid grid-cols-2 gap-2">
                <button
                  onClick={onUndo}
                  disabled={!canUndo}
                  className={cx('rounded-xl px-3 py-2 text-xs font-medium border', canUndo ? 'bg-white text-blue-700 border-white/60 hover:bg-blue-50' : 'bg-white/20 text-white/50 border-white/20 cursor-not-allowed')}
                  title="Undo (up to 5 steps)"
                >
                  ↶ Back
                </button>
                <button
                  onClick={onRedo}
                  disabled={!canRedo}
                  className={cx('rounded-xl px-3 py-2 text-xs font-medium border', canRedo ? 'bg-white text-blue-700 border-white/60 hover:bg-blue-50' : 'bg-white/20 text-white/50 border-white/20 cursor-not-allowed')}
                  title="Redo (up to 5 steps)"
                >
                  ↷ Forward
                </button>
              </div>
            </div>
            <div className="rounded-2xl bg-white/10 p-3 space-y-2">
            {/* Logout button with professional styling */}
            <button
              onClick={onLogout}
              className="w-full flex items-center justify-center gap-2 rounded-xl px-4 py-2 text-sm font-medium bg-red-600 hover:bg-red-700 text-white"
            >
              <span>⎋</span>
              <span>Logout</span>
            </button>
            <div className="text-xs text-white/70">v1.0</div>
            </div>
          </div>
        </aside>
      );
    }

    // ---- Dashboard Summary Component ----
    function DashboardSummary({ members, onSelectStatus, onAddNew, onSearch, onOpenMember, onWelcome }) {
      const counts = React.useMemo(() => {
        return {
          Active: members.filter(m => m.status === 'Active').length,
          Hold: members.filter(m => m.status === 'Hold').length,
          Deactivated: members.filter(m => m.status === 'Deactivated').length,
          Cancelled: members.filter(m => m.status === 'Cancelled').length,
        };
      }, [members]);
      const [q, setQ] = React.useState('');
      const [field, setField] = React.useState('all');
      const today = new Date();
      const monthlyRevenue = members
        .filter(m => {
          const bd = asUTC(m.billingDate);
          return bd && bd.getFullYear() === today.getFullYear() && bd.getMonth() === today.getMonth();
        })
        .reduce((sum, m) => sum + Number(m.amount || 0), 0);
      const growthRate = React.useMemo(() => {
        const current = members
          .filter(m => {
            const bd = asUTC(m.billingDate);
            return bd && bd.getFullYear() === today.getFullYear() && bd.getMonth() === today.getMonth();
          })
          .reduce((sum, m) => sum + Number(m.amount || 0), 0);
        const prevDt = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        const prev = members
          .filter(m => {
            const bd = asUTC(m.billingDate);
            return bd && bd.getFullYear() === prevDt.getFullYear() && bd.getMonth() === prevDt.getMonth();
          })
          .reduce((sum, m) => sum + Number(m.amount || 0), 0);
        if (!prev) return current ? 100 : 0;
        return Math.round(((current - prev) / prev) * 100);
      }, [members, today]);
      const overdueList = React.useMemo(() => {
        return members
          .filter(m => {
            if (m.status !== 'Active') return false;
            const due = asUTC(m.paymentBy || m.billingDate);
            if (!due || Number.isNaN(due.getTime())) return false;
            return due < today;
          })
          .map(m => {
            const due = asUTC(m.paymentBy || m.billingDate);
            const days = due ? Math.max(1, Math.floor((today - due) / (1000 * 60 * 60 * 24))) : 0;
            return { ...m, overdueDays: days };
          })
          .sort((a, b) => b.overdueDays - a.overdueDays);
      }, [members, today]);
      const monthTrend = React.useMemo(() => {
        const labels = [];
        for (let i = 5; i >= 0; i -= 1) {
          const dt = new Date(today.getFullYear(), today.getMonth() - i, 1);
          labels.push({
            label: MONTHS[dt.getMonth()],
            year: dt.getFullYear(),
            month: dt.getMonth(),
          });
        }
        return labels.map(x => ({
          label: x.label,
          total: members.reduce((sum, m) => {
            const bd = asUTC(m.billingDate);
            if (!bd) return sum;
            if (bd.getFullYear() !== x.year || bd.getMonth() !== x.month) return sum;
            return sum + Number(m.amount || 0);
          }, 0),
        }));
      }, [members, today]);
      const maxTrend = Math.max(1, ...monthTrend.map(x => x.total));
      const planDistribution = React.useMemo(() => {
        const countsByPlan = {};
        members.forEach(m => {
          const key = m.plan || 'Unknown';
          countsByPlan[key] = (countsByPlan[key] || 0) + 1;
        });
        const entries = Object.entries(countsByPlan).sort((a, b) => b[1] - a[1]);
        const total = entries.reduce((sum, [, c]) => sum + c, 0);
        return entries.slice(0, 6).map(([name, count], idx) => ({
          name,
          count,
          pct: total ? Math.round((count / total) * 100) : 0,
          color: ['#93c5fd','#86efac','#fde68a','#fca5a5','#c4b5fd','#67e8f9'][idx % 6],
        }));
      }, [members]);
      const planPie = React.useMemo(() => {
        if (!planDistribution.length) return '#e2e8f0';
        let start = 0;
        const parts = planDistribution.map(p => {
          const from = start;
          const to = start + p.pct;
          start = to;
          return `${p.color} ${from}% ${to}%`;
        });
        if (start < 100) parts.push(`#cbd5e1 ${start}% 100%`);
        return `conic-gradient(${parts.join(', ')})`;
      }, [planDistribution]);
      const tiles = [
        { key: 'Active', color: 'emerald' },
        { key: 'Hold', color: 'amber' },
        { key: 'Deactivated', color: 'pink' },
        { key: 'Cancelled', color: 'slate' }
      ];
      return (
        <div className="p-8 space-y-6">
          <div className="flex items-center justify-between gap-4 flex-wrap">
            <h1 className="text-2xl font-semibold">Dashboard</h1>
            <div className="flex flex-1 max-w-2xl items-center gap-2">
              <input
                value={q}
                onChange={(e) => { const val = e.target.value; setQ(val); }}
                placeholder="Search members (name, ID, mobile, email, staff)..."
                className="flex-1 rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
              />
              <select
                value={field}
                onChange={(e) => { const f = e.target.value; setField(f); }}
                className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm"
              >
                <option value="all">All</option>
                <option value="name">Name</option>
                <option value="mobile">Mobile</option>
                <option value="memberId">Member ID</option>
                <option value="email">Email</option>
                <option value="staff">Staff</option>
                <option value="plan">Plan</option>
                <option value="status">Status</option>
              </select>
              <button onClick={() => onSearch(q, field)} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium">Search</button>
            </div>
            <button onClick={onAddNew} className="rounded-2xl px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold flex items-center gap-2"><span className="text-lg">＋</span> Add New Member</button>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-5 gap-4">
            {tiles.map(tile => (
              <button
                key={tile.key}
                onClick={() => onSelectStatus(tile.key)}
                className={cx(
                  'rounded-2xl p-5 text-left shadow hover:shadow-md transition border',
                  tile.color === 'emerald' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' :
                  tile.color === 'amber' ? 'bg-amber-50 border-amber-200 text-amber-700' :
                  tile.color === 'pink' ? 'bg-pink-50 border-pink-200 text-pink-700' :
                  'bg-slate-100 border-slate-200 text-slate-700'
                )}
              >
                <div className="text-sm">{tile.key}</div>
                <div className="mt-2 text-3xl font-bold">{counts[tile.key]}</div>
                <div className="mt-1 text-xs underline">View {tile.key} members</div>
              </button>
            ))}
            <div className="rounded-2xl p-5 text-left shadow border bg-emerald-50 border-emerald-200 text-emerald-800">
              <div className="text-sm">Total Revenue (Monthly)</div>
              <div className="mt-2 text-3xl font-bold">${monthlyRevenue.toLocaleString()}</div>
              <div className="mt-1 text-xs">Auto from member billing data</div>
            </div>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
            <div className="xl:col-span-2 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
              <div className="flex items-center justify-between mb-3">
                <div className="text-lg font-semibold text-slate-800">Revenue and Membership Trends</div>
                <div className={cx('text-sm font-semibold', growthRate >= 0 ? 'text-emerald-700' : 'text-rose-700')}>
                  Growth Rate {growthRate >= 0 ? '+' : ''}{growthRate}%
                </div>
              </div>
              <div className="h-44 flex items-end gap-3">
                {monthTrend.map(x => {
                  const h = Math.max(12, Math.round((x.total / maxTrend) * 150));
                  return (
                    <div key={x.label} className="flex-1 flex flex-col items-center gap-1">
                      <div className="text-[11px] text-slate-500">${x.total.toLocaleString()}</div>
                      <div className="w-full rounded-t-lg bg-blue-400/80" style={{ height: `${h}px` }} />
                      <div className="text-xs text-slate-700">{x.label}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
              <div className="text-lg font-semibold text-slate-800 mb-3">Membership by Plan Type</div>
              <div className="flex items-center gap-4">
                <div className="h-36 w-36 rounded-full border border-slate-200 shrink-0" style={{ background: planPie }} />
                <div className="space-y-1 text-xs">
                  {planDistribution.map(p => (
                    <div key={p.name} className="flex items-center gap-2">
                      <span className="inline-block h-2.5 w-2.5 rounded-full" style={{ background: p.color }} />
                      <span className="text-slate-700">{p.name}</span>
                      <span className="text-slate-500">{p.pct}%</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
            <div className="text-lg font-semibold text-slate-800 mb-3">Overdue Payments and Retention Alerts</div>
            <div className="overflow-x-auto">
              <table className="min-w-full text-sm">
                <thead>
                  <tr className="bg-blue-50 text-blue-700">
                    <th className="px-3 py-2 text-left">Member</th>
                    <th className="px-3 py-2 text-left">ID</th>
                    <th className="px-3 py-2 text-left">Overdue Plan</th>
                    <th className="px-3 py-2 text-left">Overdue Amount</th>
                    <th className="px-3 py-2 text-left">Overdue Since [Days]</th>
                    <th className="px-3 py-2 text-left">Action</th>
                  </tr>
                </thead>
                <tbody>
                  {overdueList.slice(0, 10).map(m => (
                    <tr key={m.memberId} className="border-b border-slate-200 hover:bg-slate-50">
                      <td className="px-3 py-2 whitespace-nowrap">{m.name}</td>
                      <td className="px-3 py-2 whitespace-nowrap">{m.memberId}</td>
                      <td className="px-3 py-2 whitespace-nowrap">{m.plan || '-'}</td>
                      <td className="px-3 py-2 whitespace-nowrap">${Number(m.amount || 0).toLocaleString()}</td>
                      <td className="px-3 py-2 whitespace-nowrap">{m.overdueDays}</td>
                      <td className="px-3 py-2 whitespace-nowrap">
                        <div className="flex items-center gap-2">
                          <button
                            onClick={() => onWelcome && onWelcome(m)}
                            className="rounded-lg px-3 py-1 text-xs font-medium border border-emerald-200 bg-emerald-50 text-emerald-700 hover:bg-emerald-100"
                          >
                            Send WhatsApp Reminder
                          </button>
                          <button
                            onClick={() => onOpenMember && onOpenMember(m.memberId)}
                            className="rounded-lg px-3 py-1 text-xs font-medium border border-slate-300 bg-white text-slate-700 hover:bg-slate-100"
                          >
                            View Details
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))}
                  {overdueList.length === 0 && (
                    <tr>
                      <td colSpan={6} className="px-3 py-4 text-center text-slate-500">
                        No overdue members. This list auto-updates when payment dates change.
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ---- Members List (Dashboard list mode) ----
    function MembersList({ title, list, onBack, onEdit, onStatusChange, holdOptions, logs }) {
      const [openId, setOpenId] = React.useState(null);
      const [page, setPage] = React.useState(1);
      const pageSize = 10;
      const totalPages = Math.max(1, Math.ceil((list || []).length / pageSize));
      const safePage = page > totalPages ? 1 : page;
      const start = (safePage - 1) * pageSize;
      const pageList = (list || []).slice(start, start + pageSize);
      React.useEffect(() => {
        setPage(1);
      }, [list]);
      return (
        <div className="p-8 space-y-4">
          <div className="flex items-center gap-3 mb-4">
            <button onClick={onBack} className="p-2 rounded-xl hover:bg-slate-200"><span className="text-xl">←</span></button>
            <h1 className="text-2xl font-semibold">{title} ({list.length})</h1>
          </div>
          <div className="rounded-3xl bg-white border border-slate-200 p-4 shadow-sm">
            <div className="grid grid-cols-12 gap-4 px-3 py-2 text-sm font-semibold bg-blue-50 text-blue-700 border border-blue-100 rounded-2xl">
              <div className="col-span-2">ID</div>
              <div className="col-span-3">Name</div>
              <div className="col-span-2">Plan</div>
              <div className="col-span-2">Billing Date</div>
              <div className="col-span-3">Status / Action / Welcome</div>
            </div>
            {pageList.map(m => (
              <MemberRow
                key={m.memberId}
                m={m}
                expanded={openId === m.memberId}
                onToggle={() => setOpenId(openId === m.memberId ? null : m.memberId)}
                onEdit={() => onEdit(m)}
                onStatusChange={onStatusChange}
                holdOptions={holdOptions}
                canDelete={false}
                onDelete={() => {}}
                logs={logs}
                selectable={false}
              />
            ))}
            {(list || []).length > pageSize && (
              <div className="flex items-center justify-between mt-2 text-sm">
                <div>Page {safePage} of {totalPages}</div>
                <div className="flex gap-2">
                  <button
                    onClick={() => setPage(p => Math.max(1, p - 1))}
                    disabled={safePage === 1}
                    className={cx('px-3 py-1 rounded-lg border', safePage === 1 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white text-blue-700 hover:bg-blue-50 border-blue-300')}
                  >
                    Prev
                  </button>
                  <button
                    onClick={() => setPage(p => Math.min(totalPages, p + 1))}
                    disabled={safePage === totalPages}
                    className={cx('px-3 py-1 rounded-lg border', safePage === totalPages ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white text-blue-700 hover:bg-blue-50 border-blue-300')}
                  >
                    Next
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ---- Member Row ----
function MemberRow({ m, expanded, onToggle, onEdit, onStatusChange, holdOptions, onDelete, canDelete, onWelcome, logs, selected, onSelectToggle, selectable }) {
      const todayHighlight = fmt(m.billingDate) === fmt(new Date());
      // Determine if we can open WhatsApp welcome/payment reminder.
      // Active members with mobile number and billing date qualify.
      const canWelcome = m.status === 'Active' && m.mobile && String(m.mobile).trim() && m.billingDate;
      return (
        <div className="border-b border-slate-200 last:border-none odd:bg-slate-50 even:bg-white">
          <button onClick={onToggle} className="grid w-full grid-cols-12 items-center gap-4 px-2 py-3 text-left text-slate-700 hover:bg-slate-100">
            {/* ID */}
            <div className="col-span-2 font-medium flex items-center gap-2">
              {selectable && (
                <input
                  type="checkbox"
                  checked={Boolean(selected)}
                  onChange={(e) => {
                    e.stopPropagation();
                    onSelectToggle && onSelectToggle(m.memberId);
                  }}
                  onClick={(e) => e.stopPropagation()}
                />
              )}
              <span>{m.memberId}</span>
            </div>
            {/* Name with avatar */}
            <div className={cx('col-span-3 flex items-center gap-2', todayHighlight && 'bg-amber-50 text-amber-800 font-semibold rounded-md px-2 py-1')}>
              <Avatar name={m.name} photo={m.photo} className="h-7 w-7" />
              <span className="truncate">{m.name}</span>
            </div>
            {/* Plan */}
            <div className="col-span-2 truncate">{m.plan}</div>
            {/* Billing date */}
            <div className="col-span-2">{fmt(m.billingDate)}</div>
            {/* Status, Action and Welcome buttons */}
            <div className="col-span-3 flex items-center gap-2">
              <Badge tone={toneForStatus(m.status)} className="w-24 text-center flex-shrink-0">{shortStatus(m.status)}</Badge>
              {/* Edit/Action button */}
              <button
                onClick={(e) => { e.stopPropagation(); onEdit(m); }}
                className="flex-shrink-0 flex items-center gap-1 rounded-lg px-3 py-2 text-xs font-medium bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-100"
              >
                <span>✎</span>
                <span>Action</span>
              </button>
              {/* Welcome WhatsApp button (Active members only) */}
              {m.status === 'Active' && (
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    onWelcome && onWelcome(m);
                  }}
                  disabled={!canWelcome}
                  title={canWelcome ? 'Open WhatsApp Welcome Message' : 'Cannot open (missing mobile or billing date)'}
                  className={cx(
                    'flex-shrink-0 flex items-center gap-1 rounded-lg px-3 py-2 text-xs font-medium border',
                    canWelcome
                      ? 'bg-blue-50 text-blue-700 border-blue-200 hover:bg-blue-100'
                      : 'bg-slate-200 text-slate-500 border-slate-300 cursor-not-allowed'
                  )}
                >
                  <span>💬</span>
                  <span>Welcome</span>
                </button>
              )}
            </div>
          </button>
          {expanded && (
            <div className="px-2 pb-4 space-y-3">
              <MemberDetails m={m} logs={logs} />
              <QuickActions m={m} onStatusChange={onStatusChange} holdOptions={holdOptions} canDelete={canDelete} onDelete={onDelete} />
            </div>
          )}
        </div>
      );
    }

    // ---- Avatar Component ----
    function Avatar({ name, photo, className }) {
      const initials = (name || '').split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
      if (photo) {
        return <img src={photo} alt={name} className={cx('rounded-full object-cover', className)} />;
      }
      return (
        <div className={cx('rounded-full bg-slate-200 text-slate-700 grid place-items-center text-xs font-semibold', className)}>{initials || '?'}</div>
      );
    }

    // ---- Badge Component ----
    function Badge({ tone, children, className }) {
      const tones = {
        green: 'bg-emerald-50 text-emerald-700 border-emerald-200',
        amber: 'bg-amber-50 text-amber-700 border-amber-200',
        pink: 'bg-pink-50 text-pink-700 border-pink-200',
        slate: 'bg-slate-100 text-slate-700 border-slate-200',
      };
      return (
        <span className={cx('inline-flex items-center justify-center border rounded-lg px-2.5 py-1 text-xs font-medium', tones[tone], className)}>{children}</span>
      );
    }

    // ---- Member Details (expanded row) ----
    function MemberDetails({ m, logs }) {
      // Normalise undefined/empty values to a dash to avoid displaying
      // "undefined" or other undesired text in the details panel.
      const normal = (val) => {
        if (val === undefined || val === null || val === '') return '—';
        return val;
      };
      const rows = [
        ['Form #', normal(m.formNo)],
        ['ID', normal(m.memberId)],
        ['Name', normal(m.name)],
        ['DOB', fmt(m.dob) || '—'],
        ['Gender', normal(m.gender)],
        ['Mobile', normal(m.mobile)],
        ['Email', normal(m.email)],
        ['Address', normal(m.address)],
        ['Staff', normal(m.staff)],
        ['Amount', m.amount !== undefined && m.amount !== null ? m.amount : '—'],
        ['Plan', normal(m.plan)],
        ['Joining Date', fmt(m.joiningDate) || '—'],
        ['Billing Date', fmt(m.billingDate) || '—'],
        ['Payment By', fmt(m.paymentBy) || '—'],
        ['Status', normal(m.status)],
        ['Hold Duration', normal(m.holdDuration)],
        ['Payment Method', normal(m.paymentMethod)],
        ['Pay Month', normal(m.payMonth)],
      ];
      return (
        <div className="rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm space-y-3">
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
            {rows.map(([k, v]) => (
              <div key={k} className="flex justify-between gap-2">
                <span className="text-slate-500">{k}</span>
                <span className="font-medium text-right">{String(v)}</span>
              </div>
            ))}
          </div>
          <div className="pt-2 border-t border-slate-200">
            <div className="text-xs font-semibold text-slate-600 mb-2">Recent Activity</div>
            <div className="space-y-1">
              {(logs || [])
                .filter(l => l.entityId === m.memberId)
                .slice(0, 2)
                .map(l => (
                  <div key={l.id} className="text-xs text-slate-600 flex items-center justify-between">
                    <span>{l.action}</span>
                    <span className="text-slate-500">{fmt(l.ts)}</span>
                  </div>
                ))}
              {(!(logs || []).some(l => l.entityId === m.memberId)) && (
                <div className="text-xs text-slate-400">No activity yet.</div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ---- Quick Actions (Activate / Hold / Deactivate) ----
function QuickActions({ m, onStatusChange, holdOptions, canDelete, onDelete }) {
      const [sel, setSel] = React.useState(holdOptions[0] || '1 Month');
      return (
        <div className="flex flex-wrap items-center gap-2">
          {/* Activate button shown when member is not already active */}
          {m.status !== 'Active' && (
            <button
              onClick={() => onStatusChange(m.memberId, 'Active')}
              className="inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium border border-emerald-200 bg-emerald-50 text-emerald-700 hover:bg-emerald-100"
            >
              Activate
            </button>
          )}
          {/* Hold selection and button */}
          <div className="flex items-center gap-2">
            <select
              value={sel}
              onChange={(e) => setSel(e.target.value)}
              className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm"
            >
              {holdOptions.map(x => <option key={x} value={x}>{x}</option>)}
            </select>
            <button
              onClick={() => onStatusChange(m.memberId, 'Hold', { holdDuration: sel })}
              className="inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium border border-amber-200 bg-amber-50 text-amber-700 hover:bg-amber-100"
            >
              Hold
            </button>
          </div>
          {/* Deactivate button */}
          {m.status !== 'Deactivated' && (
            <button
              onClick={() => onStatusChange(m.memberId, 'Deactivated')}
              className="inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium border border-pink-200 bg-pink-50 text-pink-700 hover:bg-pink-100"
            >
              Deactivate
            </button>
          )}
          {/* Delete button (owner only) */}
          {canDelete && (
            <button
              onClick={() => onDelete(m)}
              className="inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium border border-red-200 bg-red-50 text-red-700 hover:bg-red-100"
            >
              Delete
            </button>
          )}
        </div>
      );
    }

    // ---- Dashboard View (Members grouped by status) ----
function DashboardView({ members, onEdit, onStatusChange, holdOptions, logs, filters, filterOpen, setFilterOpen, anyFilterActive, canDelete, onDelete, billingMonthOptions, onWelcome }) {
      // Single expanded row across all statuses. Only one memberId may be expanded at a time.
      const [expandedId, setExpandedId] = React.useState(null);
      const [selectedIds, setSelectedIds] = React.useState([]);
      // Pagination state per status tab. Each status has its own current page.
      const [pages, setPages] = React.useState({ Active: 1, Hold: 1, Deactivated: 1, Cancelled: 1 });
      // When members or filters change, reset pagination to page 1 for each status.
      React.useEffect(() => {
        setPages({ Active: 1, Hold: 1, Deactivated: 1, Cancelled: 1 });
        setSelectedIds([]);
      }, [members, filters]);
      const toggleSelect = (id) => {
        setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      };
      const applyBulkStatus = (status, opts = {}) => {
        selectedIds.forEach(id => onStatusChange(id, status, opts));
        setSelectedIds([]);
      };
      // Apply filters to the full member list. All filters are AND'ed.
      const applyFilters = React.useCallback((list) => {
        return list.filter(m => {
          if (filters.plan && m.plan !== filters.plan) return false;
          if (filters.status && m.status !== filters.status) return false;
          if (filters.paymentMethod && m.paymentMethod !== filters.paymentMethod) return false;
          if (filters.staff && m.staff !== filters.staff) return false;
          // Billing month filter: compare Month-YYYY string derived from billing date.
          if (filters.billingMonth) {
            const dt = asUTC(m.billingDate);
            const bm = dt ? `${MONTHS[dt.getUTCMonth()]}-${dt.getUTCFullYear()}` : '';
            if (bm !== filters.billingMonth) return false;
          }
          // Joining date range
          if (filters.joinFrom) {
            const jf = asUTC(filters.joinFrom);
            const md = asUTC(m.joiningDate);
            if (jf && md && md < jf) return false;
          }
          if (filters.joinTo) {
            const jt = asUTC(filters.joinTo);
            const md = asUTC(m.joiningDate);
            if (jt && md && md > jt) return false;
          }
          // Billing date range
          if (filters.billFrom) {
            const bf = asUTC(filters.billFrom);
            const bd = asUTC(m.billingDate);
            if (bf && bd && bd < bf) return false;
          }
          if (filters.billTo) {
            const bt = asUTC(filters.billTo);
            const bd = asUTC(m.billingDate);
            if (bt && bd && bd > bt) return false;
          }
          return true;
        });
      }, [filters]);
      // Filter members and group by status
      const grouped = React.useMemo(() => {
        const list = applyFilters(members);
        return {
          Active: list.filter(m => m.status === 'Active'),
          Hold: list.filter(m => m.status === 'Hold'),
          Deactivated: list.filter(m => m.status === 'Deactivated'),
          Cancelled: list.filter(m => m.status === 'Cancelled'),
        };
      }, [members, applyFilters]);
      // Page size determines how many members to show per page in each
      // status group. Show maximum 10 rows per page.
      const pageSize = 10;
