  <!-- Application Code. Babel will compile this JSX on the fly. -->
  <script type="text/babel" data-presets="react">
    {/**
     * Action Plus Gym Management Application (MVP)
     *
     * This single file defines the entire client‑side application. It uses
     * React to build a modular, stateful UI and Tailwind CSS for styling.
     * The app stores data in localStorage so it persists across sessions.
     *
     * Major features:
     *  - Authentication for demo users (Bis/b123 and Raja/r123)
     *  - Sidebar navigation with icons
     *  - Dashboard summary tiles with search and status filters
     *  - Members lists grouped by status, expandable rows with quick actions
     *  - Edit Member modal with derived date fields
     *  - Add Member wizard (3 steps) including photo upload
     *  - Settings page for editing dropdown values (plans, statuses, payment methods, hold durations, genders, staff)
     *  - Logs page with audit trail of actions
     *  - Theme toggle (light/dark/system) persisted in localStorage
     *
     * Date handling follows the spec: UTC storage, local formatting. Derived
     * fields include next payment date and payment by date. IDs and pay month
     * labels are generated from the form number and billing date.
     */}

    // ---- Utility Functions ----
    // Compose class names (ignoring falsey values). Similar to clsx but minimal.
    const cx = (...cls) => cls.filter(Boolean).join(' ');
    // Month names for formatted dates (Jan, Feb, ...)
    const MONTHS = [
      'Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'
    ];
    const DISPLAY_TIME_ZONES = {
      IST: 'Asia/Kolkata',
      AEST: 'Australia/Sydney',
    };
    // Ensure a value is a Date in UTC and normalise to midnight UTC.
    const asUTC = (val) => {
      const d = val instanceof Date ? val : new Date(val);
      if (isNaN(d.getTime())) return null;
      return new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
    };
    // Convert a date to ISO string (YYYY‑MM‑DD). Returns empty string for invalid.
    const iso = (d) => {
      const dt = asUTC(d);
      return dt ? dt.toISOString().slice(0, 10) : '';
    };
    // Add n days to a date (returns a Date or null).
    const addDays = (d, n) => {
      const base = asUTC(d);
      if (!base) return null;
      base.setUTCDate(base.getUTCDate() + (Number(n) || 0));
      return base;
    };
    // Add n months to a date (returns a Date or null).
    const addMonths = (d, n) => {
      const base = asUTC(d);
      if (!base) return null;
      base.setUTCMonth(base.getUTCMonth() + (Number(n) || 0));
      return base;
    };
    // Format a date as DD/Mon/YYYY. If invalid returns empty string.
    const fmt = (d) => {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return String(d);
      const dd = String(dt.getUTCDate()).padStart(2, '0');
      const mm = MONTHS[dt.getUTCMonth()];
      const yy = dt.getUTCFullYear();
      return `${dd}/${mm}/${yy}`;
    };
    /** YYYY-MM-DD in the user's local calendar (matches native date inputs and "today"). */
    const localCalendarDateKey = (value) => {
      if (value === null || value === undefined || value === '') return '';
      const s = String(value).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      if (/^\d{4}-\d{2}-\d{2}T/.test(s)) return s.slice(0, 10);
      const dt = value instanceof Date ? value : new Date(value);
      if (Number.isNaN(dt.getTime())) return '';
      const y = dt.getFullYear();
      const m = String(dt.getMonth() + 1).padStart(2, '0');
      const d = String(dt.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    };
    const localTodayCalendarKey = () => localCalendarDateKey(new Date());
    const formatDateTz = (value, tz = 'IST') => {
      if (!value) return '';
      const dt = new Date(value);
      if (Number.isNaN(dt.getTime())) return '';
      const zone = DISPLAY_TIME_ZONES[tz] || DISPLAY_TIME_ZONES.IST;
      return new Intl.DateTimeFormat('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        timeZone: zone,
      }).format(dt).replace(/ /g, '/');
    };
    const formatDateTimeTz = (value, tz = 'IST') => {
      if (!value) return '';
      const dt = new Date(value);
      if (Number.isNaN(dt.getTime())) return '';
      const zone = DISPLAY_TIME_ZONES[tz] || DISPLAY_TIME_ZONES.IST;
      return new Intl.DateTimeFormat('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        hour12: true,
        timeZone: zone,
      }).format(dt);
    };
    // Derive pay month label (Mon‑YYYY) from a date.
    const payMonthLabel = (d) => {
      const dt = asUTC(d);
      return dt ? `${MONTHS[dt.getUTCMonth()]}-${dt.getUTCFullYear()}` : '';
    };
    const nextPaymentDateFromBillingDate = (memberOrBillingDate) => {
      const billingSource = (memberOrBillingDate && typeof memberOrBillingDate === 'object')
        ? (memberOrBillingDate.billingDate || '')
        : memberOrBillingDate;
      const billing = asUTC(billingSource);
      return billing ? iso(addMonths(billing, 1)) : '';
    };
    const paymentByFromBillingDate = (billingDateValue) => {
      const billing = asUTC(billingDateValue);
      return billing ? iso(addDays(billing, 7)) : '';
    };
    const fineRuleConfigFromSettings = (settingsLike) => {
      const rawGrace = Number(settingsLike?.fineSmsGraceDays ?? 0);
      return {
        enabled: settingsLike?.fineSmsEnabled !== false,
        graceDays: Number.isFinite(rawGrace) && rawGrace > 0 ? Math.floor(rawGrace) : 0,
      };
    };
    const elapsedHoldMonthsFromBillingDate = (memberLike, todayValue = new Date()) => {
      const statusNorm = String(memberLike?.status || '').trim().toLowerCase();
      if (!memberLike || statusNorm !== 'hold') return 0;
      const billing = asUTC(memberLike.billingDate);
      const today = asUTC(todayValue);
      if (!billing || !today) return 0;
      let months = (today.getUTCFullYear() - billing.getUTCFullYear()) * 12 + (today.getUTCMonth() - billing.getUTCMonth());
      if (today.getUTCDate() < billing.getUTCDate()) months -= 1;
      return Math.max(0, months);
    };
    const holdPolicyNote = (holdMonths) => {
      if (holdMonths > 12) return 'Full Admission is mandatory';
      if (holdMonths > 6) return 'Readmission fee mandatory';
      return '';
    };
    // Final payment deadline for retention / overdue checks (Billing Date + 7 days),
    // falling back to stored paymentBy then billing date for legacy rows.
    const retentionPaymentDeadline = (m) => {
      if (!m) return null;
      const billingIso = m.billingDate || '';
      const byIso = paymentByFromBillingDate(billingIso);
      const d = asUTC(byIso);
      if (d) return d;
      return asUTC(m.paymentBy) || asUTC(m.billingDate);
    };
    const normalizePhone = (v) => String(v || '').replace(/\D/g, '');
    const isValidEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(v || '').trim());
    const isValidPhone = (v) => {
      const p = normalizePhone(v);
      return p.length >= 10 && p.length <= 15;
    };
    const normalizeCsvHeader = (v) => String(v || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    const readCsvCells = (line) => {
      const out = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i += 1) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            cur += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }
        if (ch === ',' && !inQuotes) {
          out.push(cur.trim());
          cur = '';
          continue;
        }
        cur += ch;
      }
      out.push(cur.trim());
      return out;
    };
    const parseCsvText = (text) => {
      const lines = String(text || '').replace(/\r/g, '').split('\n').map((l) => l.trim()).filter(Boolean);
      if (!lines.length) return { headers: [], rows: [] };
      const headers = readCsvCells(lines[0]);
      const rows = lines.slice(1).map((line) => {
        const cells = readCsvCells(line);
        const row = {};
        headers.forEach((h, idx) => { row[h] = cells[idx] ?? ''; });
        return row;
      });
      return { headers, rows };
    };
    const parseFlexibleDateToIso = (raw) => {
      const value = String(raw || '').trim();
      if (!value) return '';
      if (/^(nil|na|n\/a|-|null|undefined)$/i.test(value)) return '';
      const monthMap = { jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5, jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11 };
      let m = value.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
      if (m) return iso(new Date(Date.UTC(Number(m[1]), Number(m[2]) - 1, Number(m[3]))));
      m = value.match(/^(\d{1,2})[\/-]([A-Za-z]{3,})[\/-](\d{2,4})$/);
      if (m) {
        const day = Number(m[1]);
        const mon = monthMap[String(m[2]).slice(0, 3).toLowerCase()];
        const yearRaw = Number(m[3]);
        const year = yearRaw < 100 ? (2000 + yearRaw) : yearRaw;
        if (Number.isFinite(mon)) return iso(new Date(Date.UTC(year, mon, day)));
      }
      m = value.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})$/);
      if (m) {
        const day = Number(m[1]);
        const mon = Number(m[2]) - 1;
        const yearRaw = Number(m[3]);
        const year = yearRaw < 100 ? (2000 + yearRaw) : yearRaw;
        return iso(new Date(Date.UTC(year, mon, day)));
      }
      return iso(value);
    };
    // Shorten status text for fixed width badges
    const shortStatus = (s) => {
      if (!s) return '';
      return s.length > 10 ? s.slice(0, 4) + '....' : s;
    };
    // Determine the primary WhatsApp action button for a member in real time.
    // For Active members:
    // - canonical payment deadline (billing + 7, else stored dates) < today => Fine SMS
    // - billingDate <= today => Reminder (becomes "Reminder Sent" once used)
    // - otherwise => Welcome SMS
    // For other statuses, keep status-based mapping.
    const primaryMessageActionForMember = (member, isOwner = false, fineRule = { enabled: true, graceDays: 0 }) => {
      if (!member) return { key: 'none', label: '', disabled: true };
      const today = asUTC(new Date());
      const joiningDate = asUTC(member.joiningDate);
      const billingDate = asUTC(member.billingDate);
      // Use same canonical deadline as dashboard "retention overdue" (billing + 7), then fallbacks.
      const paymentBy = retentionPaymentDeadline(member);
      const graceDays = Number(fineRule?.graceDays || 0);
      const fineCheckDate = paymentBy ? addDays(paymentBy, graceDays) : null;
      const overdueDays = paymentBy && today ? Math.max(0, Math.floor((today.getTime() - paymentBy.getTime()) / (1000 * 60 * 60 * 24))) : 0;
      const sameJoinAndBillingDay = Boolean(
        joiningDate && billingDate && iso(joiningDate) === iso(billingDate)
      );
      if (member.status === 'Active') {
        if (fineRule?.enabled !== false && fineCheckDate && today && fineCheckDate < today) {
          return {
            key: 'fine',
            label: 'Fine SMS',
            disabled: false,
            overdueDays,
            reason: `Payment By ${fmt(paymentBy)} crossed${graceDays > 0 ? ` (+${graceDays} day grace)` : ''}.`,
          };
        }
        if (sameJoinAndBillingDay && billingDate && today && billingDate <= today) {
          return { key: 'welcome', label: 'Welcome SMS', disabled: false };
        }
        if (billingDate && today && billingDate <= today) {
          const reminderSent = Boolean(member.reminderSentAt);
          return {
            key: 'reminder',
            label: reminderSent ? 'Reminder Sent' : 'Reminder',
            disabled: reminderSent && !isOwner,
          };
        }
        if (joiningDate && today && iso(joiningDate) === iso(today)) {
          return { key: 'welcome', label: 'Welcome SMS', disabled: false };
        }
        return { key: 'none', label: '', disabled: true };
      }
      if (member.status === 'Hold') return { key: 'hold', label: 'Hold SMS', disabled: false };
      if (member.status === 'Deactivated') return { key: 'deactivate', label: 'Deactivate SMS', disabled: false };
      if (member.status === 'Cancelled') return { key: 'fine', label: 'Fine SMS', disabled: false };
      return { key: 'none', label: '', disabled: true };
    };
    const formatSmsSentAt = (value, tz = 'IST') => {
      if (!value) return '';
      return formatDateTimeTz(value, tz);
    };
    const getLastWhatsAppSendMeta = (member, templateKey) => {
      if (!member) return null;
      const direct = member.lastSmsSent && typeof member.lastSmsSent === 'object'
        ? (templateKey ? member.lastSmsSent[templateKey] : null)
        : null;
      if (direct && (direct.sentAt || direct.ts)) {
        return {
          sentAt: direct.sentAt || direct.ts || '',
          sentBy: direct.sentBy || direct.by || '',
        };
      }
      const history = Array.isArray(member.messageHistory) ? member.messageHistory : [];
      const entry = history.find((ev) => {
        if (!ev || ev.channel !== 'whatsapp' || ev.status !== 'opened') return false;
        if (!templateKey) return true;
        return ev.templateKey === templateKey;
      });
      if (!entry) return null;
      return {
        sentAt: entry.sentAt || entry.ts || '',
        sentBy: entry.sentBy || entry.by || '',
      };
    };
    const getSmsSentInfoText = (member, templateKey, tz = 'IST') => {
      const meta = getLastWhatsAppSendMeta(member, templateKey);
      if (!meta || !meta.sentAt) return '';
      const when = formatSmsSentAt(meta.sentAt, tz);
      if (!when) return '';
      return meta.sentBy ? `Sent ${when} (${tz}) by ${meta.sentBy}` : `Sent ${when} (${tz})`;
    };
    const getLastWhatsAppCallText = (member, tz = 'IST') => {
      if (!member) return '';
      const direct = member.lastWhatsAppCall || null;
      const history = Array.isArray(member.messageHistory) ? member.messageHistory : [];
      const h = history.find((ev) => ev && ev.channel === 'whatsapp_call' && ev.status === 'opened');
      const calledAt = direct?.calledAt || h?.calledAt || h?.ts || '';
      if (!calledAt) return '';
      const calledBy = direct?.calledBy || h?.calledBy || h?.by || '';
      const whenText = formatDateTimeTz(calledAt, tz);
      if (!whenText) return '';
      return calledBy ? `Last Call: ${whenText} (${tz}) by ${calledBy}` : `Last Call: ${whenText} (${tz})`;
    };
    function SmsSendInfoChip({ text }) {
      if (!text) return null;
      return (
        <div className="max-w-[230px] truncate rounded-md border border-amber-200 bg-amber-50 px-2 py-1 text-[10px] text-amber-800" title={text}>
          {text}
        </div>
      );
    }
    function CallInfoChip({ text }) {

        if (!h.past.length) return;
        const target = h.past[h.past.length - 1];
        const nextPast = h.past.slice(0, -1);
        const nextFuture = [h.current, ...h.future].slice(0, HISTORY_LIMIT);
        historyRef.current = {
          past: nextPast,
          current: target,
          currentSig: JSON.stringify(target),
          future: nextFuture,
        };
        applySnapshot(target);
        setHistoryState({ canUndo: nextPast.length > 0, canRedo: nextFuture.length > 0 });
        logEvent('history.undo', 'history', 'global', null, { step: 1, remainingUndo: nextPast.length, availableRedo: nextFuture.length });

        historyRef.current = {
          past: nextPast,
          current: target,
          currentSig: JSON.stringify(target),
          future: nextFuture,
        };
        applySnapshot(target);
        setHistoryState({ canUndo: nextPast.length > 0, canRedo: nextFuture.length > 0 });

          email: String(payload.email || '').trim(),

          mobile: String(payload.mobile || '').trim(),

          return [next, ...prev];

      const deleteVisitor = (visitorId) => {

      const csvHeaderAliases = React.useMemo(() => ({

      const toImportedMember = React.useCallback((row, idx) => {

            memberId,
            name,
            gender: extractCsvField(row, 'gender') || '',
            dob: parseFlexibleDateToIso(extractCsvField(row, 'dob')) || '',

            setToast('CSV is empty or invalid.');

            return;

          const seen = new Set();
          const preparedRows = parsed.rows.map((raw, idx) => {
            const built = toImportedMember(raw, idx);
            if (!built.ok) return { rowNo: idx + 2, action: 'skip', reason: built.reason, member: null };
            const member = built.member;
            const key = String(member.memberId || '').trim() || normalizePhone(member.mobile);
            if (seen.has(key)) return { rowNo: idx + 2, action: 'skip', reason: 'Duplicate row key in CSV', member };
            seen.add(key);
            const existing = members.find((m) => String(m.memberId || '').trim() === String(member.memberId || '').trim())
              || members.find((m) => normalizePhone(m.mobile) === normalizePhone(member.mobile));
            const action = existing ? 'update' : 'add';
            return { rowNo: idx + 2, action, reason: '', member, matchMemberId: existing?.memberId || '' };
          });
          const summary = preparedRows.reduce((acc, r) => {
            if (r.action === 'add') acc.added += 1;
            else if (r.action === 'update') acc.updated += 1;
            else acc.skipped += 1;
            return acc;
          }, { added: 0, updated: 0, skipped: 0 });
          setCsvImportState({ open: true, fileName: file.name || 'import.csv', rows: preparedRows, summary });

          setToast('Failed to read CSV file.');
          setTimeout(() => setToast(''), 2200);
        }

      const applyCsvImport = () => {

      const importData = async (file) => {

          const text = await file.text();
          const parsedRaw = JSON.parse(text);
          const parsed = sanitizeImportValue(parsedRaw);
          if (!parsed || typeof parsed !== 'object') throw new Error('invalid-backup');
          if (!Array.isArray(parsed.members) || !Array.isArray(parsed.users) || !Array.isArray(parsed.logs) || !parsed.settings || typeof parsed.settings !== 'object') {
            throw new Error('invalid-schema');
          }
          setMembers(parsed.members);
          setVisitors(Array.isArray(parsed.visitors) ? parsed.visitors : []);
          setUsers(parsed.users);
          setLogs(parsed.logs);
          setSettings(parsed.settings);
          setFinanceTransactions(Array.isArray(parsed.financeTransactions) ? parsed.financeTransactions : []);
          setFilters(parsed.filters && typeof parsed.filters === 'object' ? parsed.filters : initialFilters);
          logEvent('backup.imported', 'backup', 'local', null, { members: parsed.members.length, users: parsed.users.length });
          setToast('Backup imported successfully');
          setTimeout(() => setToast(''), 2500);
        } catch {
          setToast('Invalid backup file. Import failed.');
          setTimeout(() => setToast(''), 3000);
        }
      };

      // Derived lists and search
      const filteredMembers = React.useMemo(() => {
        if (dashMode === 'summary') return [];
        if (dashSearch.trim()) {
          const tokens = dashSearch
            .toLowerCase()
            .trim()
            .split(/\s+/)
            .filter(Boolean);
          const includesAllTokens = (value) => {
            const text = String(value || '').toLowerCase();
            return tokens.every(t => text.includes(t));
          };
          const anyFieldMatch = (m) => {
            const haystack = [
              m.memberId,
              m.formNo,
              m.name,
              m.mobile,
              m.email,
              m.plan,
              m.status,
              m.staff,
              m.payMonth,
              fmt(m.billingDate),

            ].join(' | ').toLowerCase();
            return tokens.every(t => haystack.includes(t));

          return members.filter(m => {

            switch (dashField) {

              case 'mobile': return match(m.mobile);
              case 'plan': return match(m.plan);
              case 'status': return match(m.status);
              case 'memberId': return match(m.memberId) || match(m.formNo);

              case 'staff': return match(m.staff);

      }, [members, dashMode, dashFilter, dashSearch, dashField]);

    function LoginPage({ onSubmit }) {
      const [id, setId] = React.useState('');
      const [pw, setPw] = React.useState('');
      const [err, setErr] = React.useState('');
      const handleSubmit = (e) => {
        if (e && e.preventDefault) e.preventDefault();
        const ok = onSubmit(id.trim(), pw);
        setErr(ok ? '' : 'Invalid credential');
      };
      return (
        <div className="min-h-screen flex items-center justify-center px-4 py-8 bg-[radial-gradient(circle_at_center,_#57b8be_0%,_#2f8f98_45%,_#256f79_100%)]">

            <div className="border border-[#4b98a0] bg-gradient-to-br from-[#234e5f] via-[#113e52] to-[#0a3545] px-8 py-10 text-[#7ea0aa]">
              <div className="mx-auto mb-4 h-16 w-16 rounded-full border-2 border-[#557f88] bg-white/10 p-1.5 shadow-sm">
                <img src="./assets/action-plus-logo.png" alt="Action Plus Gym logo" className="h-full w-full rounded-full object-cover" />
              </div>
              <h1 className="text-center text-3xl tracking-[0.16em] text-[#6b8e97] mb-6">USER LOGIN</h1>

              <form className="space-y-6" onSubmit={handleSubmit}>
                <div>
                  <label className="block text-lg text-[#6f949d] mb-1.5">✉&nbsp;&nbsp;Email ID</label>
                  <input
                    value={id}
                    onChange={(e) => {
                      setId(e.target.value);
                      if (err) setErr('');
                    }}
                    placeholder="Enter your username"
                    className="w-full bg-transparent border-0 border-b border-[#57858f] px-0 py-2 text-base text-[#9bb5bc] placeholder:text-[#6f949d] focus:outline-none"
                  />
                </div>

                <div>
                  <label className="block text-lg text-[#6f949d] mb-1.5">🔒&nbsp;&nbsp;Password</label>
                  <input
                    type="password"
                    value={pw}
                    onChange={(e) => {
                      setPw(e.target.value);
                      if (err) setErr('');
                    }}
                    placeholder="••••"
                    className="w-full bg-transparent border-0 border-b border-[#57858f] px-0 py-2 text-base text-[#9bb5bc] placeholder:text-[#6f949d] focus:outline-none"
                  />
                </div>
                {err && (
                  <div className="text-sm text-rose-300">{err}</div>
                )}
                <div className="mt-1 flex items-center justify-between text-sm text-[#7397a0]">
                  <label className="flex items-center gap-2 select-none">
                    <input type="checkbox" className="accent-slate-800 h-4 w-4" />
                    <span>Remember me</span>
                  </label>
                  <button
                    type="button"
                    onClick={() => window.alert('Please call or check with Admin to reset your password.')}
                    className="hover:text-[#9eb8be]"
                  >
                    Forgot Password?
                  </button>
                </div>

                <button
                  type="submit"
                  className="mt-2 w-full bg-[#052734] hover:bg-[#073142] text-[#d7dfe3] py-3 text-lg font-semibold tracking-[0.14em]"
                >
                  LOGIN
                </button>
              </form>

              <p className="mt-6 text-sm text-[#7e9ca3] leading-relaxed">
                Please use your assigned staff credentials.
              </p>
            </div>
          </div>
        </div>
      );
    }

        { key: 'Settings', label: 'Settings', icon: 'settings', group: 'SYSTEM' },
        { key: 'Logs', label: 'Logs', icon: 'logs', group: 'SYSTEM' },
        { key: 'Backend', label: 'Backend', icon: 'server', group: 'SYSTEM' },
        { key: 'Support', label: 'Support', icon: 'help', group: 'SYSTEM' },

      const allowedSections = user && user.sections ? user.sections : ALL_SECTIONS;
      const canViewSectionByAccess = (sectionKey) => {

        if (sectionKey === 'Logs') return access?.logs?.viewLogs !== false;
        if (sectionKey === 'Support') return access?.support?.viewSupportTemplates !== false;

      const navItems = NAV.filter(item => (allowedSections.includes(item.key) || item.key === 'Support') && canViewSectionByAccess(item.key));
      const [membersExpanded, setMembersExpanded] = React.useState(true);
      const canViewVisitors = normalizeAccess(user?.access).members?.viewVisitors !== false;
      const sectionOrder = ['', 'MEMBERS & CLIENTS', 'COMMUNICATION', 'OPERATIONS', 'FINANCE', 'STAFF & MANAGEMENT', 'SYSTEM'];
      const groupedNav = React.useMemo(() => {

                  <div className="space-y-1">

                                <button

                                  className={cx(

                                    className={cx(

                                      active === 'Members' && membersView === 'visitors'
                                        ? 'bg-blue-50 text-blue-700 dark:bg-blue-900/35 dark:text-blue-200'

                      return (

                          onClick={() => {

                            onCloseMobile && onCloseMobile();

                          className={navButtonClass(active === item.key)}

                          <span>{item.label}</span>

    }

    // ---- Dashboard Summary Component ----
    function DashboardSummary({ members, access, isOwner = false, fineRuleConfig, onSelectStatus, onAddNew, onAddExpense, onSearch, onOpenMember, onWelcome, onOpenFilters }) {
      const counts = React.useMemo(() => {
        return {
          Active: members.filter(m => m.status === 'Active').length,
          Hold: members.filter(m => m.status === 'Hold').length,
          Deactivated: members.filter(m => m.status === 'Deactivated').length,
          Cancelled: members.filter(m => m.status === 'Cancelled').length,
        };
      }, [members]);
      const [q, setQ] = React.useState('');
      const [field, setField] = React.useState('all');
      const [showTrendHistory, setShowTrendHistory] = React.useState(false);
      const [expandedOverdueId, setExpandedOverdueId] = React.useState('');
      const today = new Date();
      const todayKey = iso(new Date());
      const monthlyRevenue = members
        .filter(m => {
          const bd = asUTC(m.billingDate);
          return bd && bd.getFullYear() === today.getFullYear() && bd.getMonth() === today.getMonth();
        })
        .reduce((sum, m) => sum + Number(m.amount || 0), 0);
      const growthRate = React.useMemo(() => {
        const current = members
          .filter(m => {
            const bd = asUTC(m.billingDate);
            return bd && bd.getFullYear() === today.getFullYear() && bd.getMonth() === today.getMonth();
          })
          .reduce((sum, m) => sum + Number(m.amount || 0), 0);
        const prevDt = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        const prev = members
          .filter(m => {
            const bd = asUTC(m.billingDate);
            return bd && bd.getFullYear() === prevDt.getFullYear() && bd.getMonth() === prevDt.getMonth();
          })
          .reduce((sum, m) => sum + Number(m.amount || 0), 0);
        if (!prev) return current ? 100 : 0;
        return Math.round(((current - prev) / prev) * 100);
      }, [members, today]);
      const overdueList = React.useMemo(() => {
        const todayUtc = asUTC(todayKey);
        return members
          .filter(m => {
            if (m.status !== 'Active') return false;
            const deadline = retentionPaymentDeadline(m);
            if (!deadline || Number.isNaN(deadline.getTime()) || !todayUtc) return false;
            return deadline < todayUtc;
          })
          .map(m => {
            const deadline = retentionPaymentDeadline(m);
            const days = deadline && todayUtc
              ? Math.max(1, Math.floor((todayUtc.getTime() - deadline.getTime()) / (1000 * 60 * 60 * 24)))
              : 0;
            return { ...m, overdueDays: days };
          })
          .sort((a, b) => b.overdueDays - a.overdueDays);
      }, [members, todayKey]);
      const allMonthTrend = React.useMemo(() => {
        const dates = members.map(m => asUTC(m.billingDate)).filter(Boolean);
        const start = dates.length
          ? new Date(Math.min(...dates.map(d => d.getTime())))
          : new Date(today.getFullYear(), today.getMonth() - 5, 1);
        const end = new Date(today.getFullYear(), today.getMonth(), 1);
        const labels = [];
        let cursor = new Date(start.getFullYear(), start.getMonth(), 1);
        while (cursor <= end) {
          labels.push({
            label: MONTHS[cursor.getMonth()],
            year: cursor.getFullYear(),
            month: cursor.getMonth(),
          });
          cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
        }
        return labels.map(x => ({
          label: `${x.label}-${String(x.year).slice(-2)}`,
          total: members.reduce((sum, m) => {
            const bd = asUTC(m.billingDate);
            if (!bd) return sum;
            if (bd.getFullYear() !== x.year || bd.getMonth() !== x.month) return sum;
            return sum + Number(m.amount || 0);
          }, 0),
        }));
      }, [members, today]);
      const monthTrend = React.useMemo(() => allMonthTrend.slice(-6), [allMonthTrend]);
      const historicalTrend = React.useMemo(() => allMonthTrend.slice(0, -6), [allMonthTrend]);
      const maxTrend = Math.max(1, ...monthTrend.map(x => x.total));
      const maxHistoricalTrend = Math.max(1, ...historicalTrend.map(x => x.total));
      const planDistribution = React.useMemo(() => {
        const countsByPlan = {};
        members.forEach(m => {
          const key = m.plan || 'Unknown';
          countsByPlan[key] = (countsByPlan[key] || 0) + 1;
        });
        const entries = Object.entries(countsByPlan).sort((a, b) => b[1] - a[1]);
        const total = entries.reduce((sum, [, c]) => sum + c, 0);
        return entries.slice(0, 6).map(([name, count], idx) => ({
          name,
          count,
          pct: total ? Math.round((count / total) * 100) : 0,
          color: ['#93c5fd','#86efac','#fde68a','#fca5a5','#c4b5fd','#67e8f9'][idx % 6],
        }));
      }, [members]);
      const planPie = React.useMemo(() => {
        if (!planDistribution.length) return '#e2e8f0';
        let start = 0;
        const parts = planDistribution.map(p => {
          const from = start;
          const to = start + p.pct;
          start = to;
          return `${p.color} ${from}% ${to}%`;
        });
        if (start < 100) parts.push(`#cbd5e1 ${start}% 100%`);
        return `conic-gradient(${parts.join(', ')})`;
      }, [planDistribution]);
      const tiles = [
        { key: 'Active', color: 'emerald' },
        { key: 'Hold', color: 'amber' },
        { key: 'Deactivated', color: 'pink' },
        { key: 'Cancelled', color: 'slate' }
      ];
      const canViewRevenueMonthly = access?.dashboard?.viewRevenueMonthly !== false;
      const canViewRevenueTrend = access?.dashboard?.viewRevenueTrend !== false;
      const canViewMembershipTrends = access?.dashboard?.viewMembershipTrends !== false;
      const canViewDashboardCore = access?.dashboard?.viewDashboardCore !== false;
      const canViewOverdueRetentionAlerts = access?.dashboard?.viewOverdueRetentionAlerts !== false;
      const isMobile = useIsMobile();
      if (isMobile) {
        const recentMembers = members.slice(0, 6);
        const insightExpiring = members.filter((m) => {
          const due = retentionPaymentDeadline(m);
          if (!due) return false;
          const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
          return diff === 1;
        }).length;
        const insightOverdue = overdueList.length;
        const insightJoinedToday = members.filter((m) => iso(m.joiningDate) === iso(today)).length;
        return (
          <div className="p-4 space-y-4">
            {canViewDashboardCore && (
              <>
                <div className="flex items-center gap-2 overflow-x-auto pb-1">
                  {[
                    { key: 'All', onClick: () => onSearch('', 'all') },
                    { key: 'Active', onClick: () => onSelectStatus('Active') },
                    { key: 'Hold', onClick: () => onSelectStatus('Hold') },
                    { key: 'Risk', onClick: () => onSelectStatus('Active') },
                    { key: 'Win-back', onClick: () => onSelectStatus('Deactivated') },
                  ].map((x, idx) => (
                    <button key={x.key} onClick={x.onClick} className={cx('shrink-0 rounded-full px-4 py-2 text-xs font-semibold border', idx === 0 ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200')}>
                      {x.key}
                    </button>
                  ))}
                </div>
                <div className="flex items-center justify-between">
                  <div className="text-base font-semibold text-slate-900">Quick Actions</div>
                  <button onClick={() => onOpenFilters && onOpenFilters()} className="text-xs font-semibold text-blue-600">View All</button>
                </div>
                <div className="grid grid-cols-3 gap-2">
                  {onAddNew && <button onClick={onAddNew} className="rounded-2xl border border-blue-200 bg-blue-50 p-3 text-xs font-semibold text-blue-700">Add Member</button>}
                  <button className="rounded-2xl border border-emerald-200 bg-emerald-50 p-3 text-xs font-semibold text-emerald-700">Scan QR</button>
                  <button
                    type="button"
                    onClick={() => {
                      const target = overdueList[0];
                      if (!target || !onWelcome) return;
                      const a = primaryMessageActionForMember(target, isOwner, fineRuleConfig);
                      onWelcome(target, a.key);
                    }}
                    className="rounded-2xl border border-violet-200 bg-violet-50 p-3 text-xs font-semibold text-violet-700"
                  >
                    Quick WhatsApp
                  </button>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={() => onSelectStatus('Active')} className="rounded-2xl border border-emerald-200 bg-emerald-50 p-4 text-left"><div className="text-xs font-semibold text-emerald-700">Active Members</div><div className="mt-2 text-3xl font-bold text-emerald-800">{counts.Active}</div></button>
                  <button onClick={() => onSelectStatus('Hold')} className="rounded-2xl border border-amber-200 bg-amber-50 p-4 text-left"><div className="text-xs font-semibold text-amber-700">Hold Members</div><div className="mt-2 text-3xl font-bold text-amber-800">{counts.Hold}</div></button>
                  <button onClick={() => onSelectStatus('Active')} className="rounded-2xl border border-rose-200 bg-rose-50 p-4 text-left"><div className="text-xs font-semibold text-rose-700">Risk Alert</div><div className="mt-2 text-3xl font-bold text-rose-800">{overdueList.length}</div></button>
                  <button onClick={() => onSelectStatus('Deactivated')} className="rounded-2xl border border-pink-200 bg-pink-50 p-4 text-left"><div className="text-xs font-semibold text-pink-700">Win-back Opportunity</div><div className="mt-2 text-3xl font-bold text-pink-800">{counts.Deactivated}</div></button>
                </div>
              </>
            )}
            <div className="rounded-2xl border border-blue-100 bg-blue-50 p-4">
              <div className="text-sm font-semibold text-blue-700">Today&apos;s Insights</div>
              <ul className="mt-2 space-y-1 text-xs text-slate-700">
                <li>{insightExpiring} memberships expiring tomorrow</li>
                <li>{insightOverdue} payments overdue</li>
                <li>{insightJoinedToday} new members joined today</li>
              </ul>
            </div>
            <div>
              <div className="mb-2 flex items-center justify-between">
                <div className="text-base font-semibold text-slate-900">Recent Members</div>
                <button onClick={() => onSelectStatus('Active')} className="text-xs font-semibold text-blue-600">View All</button>
              </div>
              <div className="space-y-2">
                {recentMembers.map((m) => (
                  <button key={m.memberId} onClick={() => onOpenMember && onOpenMember(m.memberId)} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2.5 text-left shadow-sm">
                    <div className="flex items-center justify-between gap-2">
                      <div className="flex items-center gap-2 min-w-0">
                        <Avatar name={m.name} photo={m.photo} className="h-9 w-9 rounded-xl" />

                          <div className="truncate text-sm font-semibold text-slate-900">{m.name}</div>
                          <div className="truncate text-[11px] text-slate-500">{m.mobile || '-'}</div>
                        </div>

                      <Badge tone={toneForStatus(m.status)}>{m.status || '-'}</Badge>
                    </div>
                  </button>

              </div>
            </div>
            {!canViewDashboardCore && !canViewRevenueMonthly && !canViewRevenueTrend && !canViewMembershipTrends && !canViewOverdueRetentionAlerts && (
              <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600">
                No dashboard widgets are enabled for this staff profile.
              </div>
            )}
          </div>
        );
      }
      return (
        <div className="p-3 md:p-8 space-y-5">

            <div className="flex items-center justify-between gap-3">

              {canViewDashboardCore && (
                <div className="flex items-center gap-2">

                    Filter

                    <button onClick={onAddExpense} className="rounded-full px-4 md:px-5 py-2 border border-rose-300 bg-rose-50 text-rose-700 hover:bg-rose-100 text-xs md:text-sm font-semibold flex items-center justify-center gap-2">
                      <span className="text-base">₹</span> Add Expense
                    </button>
                  )}
                  {onAddNew && <button onClick={onAddNew} className="rounded-full px-4 md:px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs md:text-sm font-semibold flex items-center justify-center gap-2"><span className="text-base">＋</span> Add New Member</button>}
                </div>
              )}
            </div>
            {canViewDashboardCore && (
              <div className="flex flex-col md:flex-row items-stretch md:items-center gap-2">
                <input
                  value={q}
                  onChange={(e) => { const val = e.target.value; setQ(val); }}
                  placeholder="Search members (name, ID, mobile, email, staff)..."
                  className="flex-1 rounded-xl border border-slate-300 bg-white px-3 py-2 text-xs md:text-sm text-slate-900 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-300 min-w-0"
                />
                <select
                  value={field}
                  onChange={(e) => { const f = e.target.value; setField(f); }}

                >
                  <option value="all">All</option>
                  <option value="name">Name</option>
                  <option value="mobile">Mobile</option>
                  <option value="memberId">Member ID</option>

                  <option value="staff">Staff</option>
                  <option value="plan">Plan</option>
                  <option value="status">Status</option>
                </select>
                <button onClick={() => onSearch(q, field)} className="rounded-full px-4 py-2 border border-slate-300 bg-white text-slate-900 text-xs md:text-sm font-medium w-full md:w-auto">Search</button>
              </div>
            )}
          </div>
          {canViewDashboardCore && (
            <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-5 gap-4">
              {tiles.map(tile => (
                <button
                  key={tile.key}
                  onClick={() => onSelectStatus(tile.key)}
                  className={cx(
                    'rounded-2xl p-5 text-left shadow hover:shadow-md transition border',
                    tile.color === 'emerald' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' :
                    tile.color === 'amber' ? 'bg-amber-50 border-amber-200 text-amber-700' :
                    tile.color === 'pink' ? 'bg-pink-50 border-pink-200 text-pink-700' :
                    'bg-slate-100 border-slate-200 text-slate-700'
                  )}
                >
                  <div className="text-sm">{tile.key}</div>
                  <div className="mt-2 text-3xl font-bold">{counts[tile.key]}</div>
                  <div className="mt-1 text-xs underline">View {tile.key} members</div>
                </button>
              ))}
              {canViewRevenueMonthly && (
                <div className="rounded-2xl p-5 text-left shadow border bg-emerald-50 border-emerald-200 text-emerald-800">
                  <div className="text-sm">Total Revenue (Monthly)</div>
                  <div className="mt-2 text-3xl font-bold">${monthlyRevenue.toLocaleString()}</div>
                  <div className="mt-1 text-xs">Auto from member billing data</div>
                </div>
              )}
            </div>
          )}

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
            {canViewRevenueTrend && (
            <div className="xl:col-span-2 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
              <div className="flex items-center justify-between mb-3">
                <div className="text-lg font-semibold text-slate-800">Revenue and Membership Trends</div>
                <div className="flex items-center gap-3">

    // ---- Members List (Dashboard list mode) ----
function MembersList({ title, list, onBack, onEdit, onStatusChange, holdOptions, logs, onWelcome, onWhatsAppCall, onWelcomeMail, onAddAttachment, onQuickFieldEdit, editOptions, isOwner, fineRuleConfig, canEdit = true, displayTimeZone = 'IST' }) {

      const pageList = (list || []).slice(start, start + pageSize);
      const mobileDetailMember = React.useMemo(
        () => (list || []).find((m) => m.memberId === mobileDetailMemberId) || null,

          <div className="flex items-center gap-3 mb-4">

              <div className="col-span-1">ID</div>
              <div className="col-span-2">Name</div>
              <div className="col-span-2">Plan</div>
              <div className="col-span-2">Billing Date</div>
              <div className="col-span-2">Next Payment Date</div>
              <div className="col-span-3">Status / Action / Welcome</div>
            </div>
            <div className="lg:hidden px-1 pb-2 text-xs text-slate-500 dark:text-slate-300">Tap a member card to view full details and actions.</div>
            {pageList.map(m => (
              <MemberRow
                key={m.memberId}
                m={m}
                expanded={openId === m.memberId}
                onToggle={() => setOpenId(openId === m.memberId ? null : m.memberId)}
                onEdit={() => onEdit && onEdit(m)}
                onStatusChange={canEdit ? onStatusChange : null}
                holdOptions={holdOptions}
                canDelete={false}
                onDelete={() => {}}
                onWelcome={onWelcome}
                onWhatsAppCall={onWhatsAppCall}
                onWelcomeMail={onWelcomeMail}
                onAddAttachment={onAddAttachment}
                logs={logs}
                selectable={false}
                onQuickFieldEdit={onQuickFieldEdit}
                editOptions={editOptions}
                isOwner={isOwner}
                fineRuleConfig={fineRuleConfig}
                onOpenMobileDetail={(member) => setMobileDetailMemberId(member?.memberId || '')}
                canEdit={canEdit}
                displayTimeZone={displayTimeZone}
              />
            ))}
            {(list || []).length > pageSize && (
              <div className="flex items-center justify-between mt-2 text-sm text-slate-700 dark:text-slate-200">
                <div>Page {safePage} of {totalPages}</div>
                <div className="flex gap-2">
                  <button
                    onClick={() => setPage(p => Math.max(1, p - 1))}
                    disabled={safePage === 1}
                    className={cx('px-3 py-2 min-h-[44px] rounded-xl border', safePage === 1 ? 'bg-slate-200 text-slate-400 cursor-not-allowed dark:bg-slate-800 dark:text-slate-500 dark:border-slate-700' : 'bg-white text-blue-700 hover:bg-blue-50 border-blue-300 dark:bg-slate-800 dark:text-blue-200 dark:border-slate-700 dark:hover:bg-slate-700')}
                  >
                    Prev
                  </button>
                  <button
                    onClick={() => setPage(p => Math.min(totalPages, p + 1))}
                    disabled={safePage === totalPages}
                    className={cx('px-3 py-2 min-h-[44px] rounded-xl border', safePage === totalPages ? 'bg-slate-200 text-slate-400 cursor-not-allowed dark:bg-slate-800 dark:text-slate-500 dark:border-slate-700' : 'bg-white text-blue-700 hover:bg-blue-50 border-blue-300 dark:bg-slate-800 dark:text-blue-200 dark:border-slate-700 dark:hover:bg-slate-700')}
                  >
                    Next
                  </button>
                </div>
              </div>
            )}
          </div>
          {mobileDetailMember && (
            <MobileMemberDetailView
              m={mobileDetailMember}
              onBack={() => setMobileDetailMemberId('')}
              onEdit={(member) => {
                setMobileDetailMemberId('');
                onEdit && onEdit(member);
              }}
              onWelcome={onWelcome}
              onWhatsAppCall={onWhatsAppCall}
              onStatusChange={canEdit ? onStatusChange : null}
              holdOptions={holdOptions}
              canDelete={false}
              onDelete={() => {}}

              fineRuleConfig={fineRuleConfig}

              editOptions={editOptions}
              canEdit={canEdit}

    // ---- Member Row ----
function MemberRow({ m, expanded, onToggle, onEdit, onStatusChange, holdOptions, onDelete, canDelete, onWelcome, onWhatsAppCall, onWelcomeMail, onAddAttachment, logs, selected, onSelectToggle, selectable, onQuickFieldEdit, editOptions, isOwner, fineRuleConfig, onOpenMobileDetail, canEdit = true, displayTimeZone = 'IST' }) {
      const todayHighlight = fmt(m.billingDate) === fmt(new Date());
      // Determine if we can open WhatsApp welcome/payment reminder.
      // Active members with mobile number and billing date qualify.
      const canWelcome = m.mobile && String(m.mobile).trim();
      const statusTemplate = primaryMessageActionForMember(m, isOwner, fineRuleConfig);
      const hasPrimaryMessageAction = statusTemplate.key !== 'none';
      const statusSentText = hasPrimaryMessageAction ? getSmsSentInfoText(m, statusTemplate.key, displayTimeZone) : '';
      const callInfoText = getLastWhatsAppCallText(m, displayTimeZone);
      const uploadDoc = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > MAX_IMAGE_FILE_BYTES) {
          window.alert('File too large. Please upload up to 10MB.');
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          onAddAttachment && onAddAttachment(m.memberId, {
            id: crypto.randomUUID(),
            name: file.name,
            mime: file.type || 'application/octet-stream',
            size: file.size,
            dataUrl: String(reader.result || ''),
            uploadedAt: new Date().toISOString(),
          });
        };
        reader.readAsDataURL(file);
      };
      return (
        <div className="apg-member-row-wrap border-b border-slate-200 last:border-none md:odd:bg-slate-50 md:even:bg-white py-1 md:py-0">
          <MemberRowDesktopView
            m={m}
            selectable={selectable}
            selected={selected}
            onSelectToggle={onSelectToggle}
            onToggle={onToggle}
            onEdit={onEdit}
            onWelcome={onWelcome}
            onWhatsAppCall={onWhatsAppCall}
            canWelcome={canWelcome}
            statusTemplate={statusTemplate}
            todayHighlight={todayHighlight}
            statusSentText={statusSentText}
            callInfoText={callInfoText}
            canEdit={canEdit}
          />
          <MemberRowMobileView
            m={m}
            selectable={selectable}
            selected={selected}
            onSelectToggle={onSelectToggle}
            onToggle={onToggle}
            expanded={expanded}
            onOpenMobileDetail={onOpenMobileDetail}
          />
          {expanded && (
            <div className="px-0 lg:px-2 pt-2 pb-4">
              <div className="rounded-2xl border border-slate-200 bg-white/95 shadow-sm p-3 sm:p-4 space-y-3">
                <ExpandedActionsMobileView
                  m={m}
                  onEdit={onEdit}
                  onWelcome={onWelcome}
                  onWhatsAppCall={onWhatsAppCall}
                  canWelcome={canWelcome}
                  statusTemplate={statusTemplate}
                  isOwner={isOwner}
                  statusSentText={statusSentText}
                  canEdit={canEdit}
                />
                <ExpandedActionsDesktopView
                  m={m}
                  onEdit={onEdit}
                  onWelcome={onWelcome}
                  onWhatsAppCall={onWhatsAppCall}
                  canWelcome={canWelcome}
                  statusTemplate={statusTemplate}
                  isOwner={isOwner}
                  statusSentText={statusSentText}
                  canEdit={canEdit}
                />
              <MemberDetails m={m} logs={logs} onQuickFieldEdit={canEdit ? onQuickFieldEdit : null} editOptions={editOptions} isOwner={isOwner} displayTimeZone={displayTimeZone} />
              <WhatsAppMessageTypesBlock
                m={m}
                onWelcome={onWelcome}
                canWelcome={canWelcome}
                statusTemplate={statusTemplate}
              />
              <GmailUploadActionsBlock
                m={m}
                onWelcomeMail={onWelcomeMail}
                uploadDoc={uploadDoc}
              />
              <QuickActions m={m} onStatusChange={onStatusChange} holdOptions={holdOptions} canDelete={canDelete} onDelete={onDelete} canEdit={canEdit} />
              </div>
            </div>
          )}
        </div>
      );
    }

function MemberRowDesktopView({ m, selectable, selected, onSelectToggle, onToggle, onEdit, onWelcome, onWhatsAppCall, canWelcome, statusTemplate, todayHighlight, statusSentText, callInfoText, canEdit = true }) {

            )}

              <div className="flex items-center gap-2 min-w-0">

              onOpenMobileDetail(m);

        >
          <div className="flex items-start justify-between gap-2">
            <div className="min-w-0">
              <div className="flex items-center gap-2">

                  <input

                    checked={Boolean(selected)}
                    onChange={(e) => {
                      e.stopPropagation();
                      onSelectToggle && onSelectToggle(m.memberId);
                    }}

                )}

    function MobileMemberDetailView({ m, onBack, onEdit, onWelcome, onWhatsAppCall, onStatusChange, holdOptions, canDelete, onDelete, isOwner, fineRuleConfig, onQuickFieldEdit, editOptions, canEdit = true }) {
      const statusTemplate = primaryMessageActionForMember(m, isOwner, fineRuleConfig);
      const canWelcome = Boolean(String(m.mobile || '').trim()) && !statusTemplate.disabled;
      const dueAmount = Number(m.amount || 0);
      const holdMonths = elapsedHoldMonthsFromBillingDate(m);
      const holdNote = holdPolicyNote(holdMonths);
      const isHoldMember = String(m.status || '').trim().toLowerCase() === 'hold';
      const triggerQuickFieldEdit = (fieldKey, label, type = 'text', options = [], rawValue) => {
        if (!onQuickFieldEdit) return;
        // Close mobile detail overlay first so quick-edit modal is visible.
        onBack && onBack();
        onQuickFieldEdit({
          memberId: m.memberId,
          fieldKey,

    // ---- Avatar Component ----
    function Avatar({ name, photo, className }) {
      const initials = (name || '').split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();

        return <img src={photo} alt={name} className={cx('rounded-full object-cover', className)} />;

      return (
        <div className={cx('rounded-full bg-slate-200 text-slate-700 grid place-items-center text-xs font-semibold', className)}>{initials || '?'}</div>
      );
