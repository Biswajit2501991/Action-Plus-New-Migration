      const overdueCount = React.useMemo(() => {
        const today = new Date();
        return applyFilters(members).filter(m => {
          if (m.status !== 'Active') return false;
          const due = asUTC(m.paymentBy || m.billingDate);
          return due && due < today;
        }).length;
      }, [members, applyFilters]);
      const winbackCount = grouped.Deactivated.length;
      return (
        <div className="p-8 space-y-6">
          {/* Header row with Filter button */}
          <div className="flex items-center justify-between mb-4">
            <h1 className="text-2xl font-semibold">Members</h1>
            <div className="flex items-center gap-2">
              <span className="rounded-xl px-3 py-1.5 text-xs font-semibold bg-blue-50 text-blue-700 border border-blue-200">All Members</span>
              <span className="rounded-xl px-3 py-1.5 text-xs font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200">Active ({grouped.Active.length})</span>
              <span className="rounded-xl px-3 py-1.5 text-xs font-semibold bg-amber-50 text-amber-700 border border-amber-200">Hold ({grouped.Hold.length})</span>
              <span className="rounded-xl px-3 py-1.5 text-xs font-semibold bg-pink-50 text-pink-700 border border-pink-200">Deactivated ({grouped.Deactivated.length})</span>
              <span className="rounded-xl px-3 py-1.5 text-xs font-semibold bg-slate-100 text-slate-700 border border-slate-200">Cancelled ({grouped.Cancelled.length})</span>
              {selectedIds.length > 0 && (
                <>
                  <span className="text-sm text-slate-600">{selectedIds.length} selected</span>
                  <button onClick={() => applyBulkStatus('Active')} className="rounded-xl px-3 py-2 border border-emerald-300 bg-emerald-50 text-emerald-700 text-xs font-medium">Bulk Activate</button>
                  <button onClick={() => applyBulkStatus('Hold', { holdDuration: holdOptions[0] || '1 Month' })} className="rounded-xl px-3 py-2 border border-amber-300 bg-amber-50 text-amber-700 text-xs font-medium">Bulk Hold</button>
                  <button onClick={() => applyBulkStatus('Deactivated')} className="rounded-xl px-3 py-2 border border-pink-300 bg-pink-50 text-pink-700 text-xs font-medium">Bulk Deactivate</button>
                </>
              )}
              <button
                onClick={() => setFilterOpen(true)}
                className="flex items-center gap-2 rounded-xl px-4 py-2 border border-blue-300 bg-blue-50 text-blue-700 hover:bg-blue-100"
              >
                <span>🔍</span>
                <span>Filter</span>
                {anyFilterActive && (
                  <span className="ml-2 inline-block bg-blue-600 text-white text-xs font-semibold px-2 py-0.5 rounded-full">•</span>
                )}
              </button>
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
            <div className="rounded-2xl border border-emerald-200 bg-emerald-50 p-4">
              <div className="text-xs font-semibold text-emerald-700">ACTIVE MEMBERS</div>
              <div className="mt-2 text-2xl font-bold text-emerald-800">{grouped.Active.length}</div>
              <div className="text-xs text-emerald-700">View Active Members</div>
            </div>
            <div className="rounded-2xl border border-amber-200 bg-amber-50 p-4">
              <div className="text-xs font-semibold text-amber-700">HOLD MEMBERS</div>
              <div className="mt-2 text-2xl font-bold text-amber-800">{grouped.Hold.length}</div>
              <div className="text-xs text-amber-700">View Hold Members</div>
            </div>
            <div className="rounded-2xl border border-orange-200 bg-orange-50 p-4">
              <div className="text-xs font-semibold text-orange-700">RISK ALERT</div>
              <div className="mt-2 text-2xl font-bold text-orange-800">{overdueCount}</div>
              <div className="text-xs text-orange-700">Billing Overdue</div>
            </div>
            <div className="rounded-2xl border border-rose-200 bg-rose-50 p-4">
              <div className="text-xs font-semibold text-rose-700">WIN-BACK OPPORTUNITY</div>
              <div className="mt-2 text-2xl font-bold text-rose-800">{winbackCount}</div>
              <div className="text-xs text-rose-700">Deactivated Members</div>
            </div>
          </div>
          {['Active','Hold','Deactivated','Cancelled'].map(key => {
            const list = grouped[key];
            const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
            const page = pages[key] > totalPages ? 1 : pages[key];
            const start = (page - 1) * pageSize;
            const end = start + pageSize;
            const pageList = list.slice(start, end);
            return (
              <div key={key} className="space-y-3">
                <h2 className="text-xl font-semibold">{key} Members ({list.length})</h2>
                <div className="rounded-3xl bg-white p-4 shadow-sm">
                  <div className="grid grid-cols-12 gap-4 px-3 py-2 text-sm font-semibold bg-blue-50 text-blue-700 border border-blue-100 rounded-2xl">
                    <div className="col-span-2">ID</div>
                    <div className="col-span-3">Name</div>
                    <div className="col-span-2">Plan</div>
                    <div className="col-span-2">Billing Date</div>
                    <div className="col-span-3">Status / Action / Welcome</div>
                  </div>
                  {pageList.map(m => (
                    <MemberRow
                      key={m.memberId}
                      m={m}
                      expanded={expandedId === m.memberId}
                      onToggle={() => setExpandedId(prev => (prev === m.memberId ? null : m.memberId))}
                      onEdit={() => onEdit(m)}
                      onStatusChange={onStatusChange}
                      holdOptions={holdOptions}
                      canDelete={canDelete}
                      onDelete={onDelete}
                      onWelcome={onWelcome}
                      logs={logs}
                      selectable={true}
                      selected={selectedIds.includes(m.memberId)}
                      onSelectToggle={toggleSelect}
                    />
                  ))}
                  {pageList.length === 0 && (
                    <div className="px-3 py-4 text-slate-500 text-sm">No results found.</div>
                  )}
                  {/* Pagination controls */}
                  {list.length > pageSize && (
                    <div className="flex items-center justify-between mt-2 text-sm">
                      <div className="">Page {page} of {totalPages}</div>
                      <div className="flex gap-2">
                        <button
                          onClick={() => setPages(p => ({ ...p, [key]: Math.max(1, p[key] - 1) }))}
                          disabled={page === 1}
                          className={cx(
                            'px-3 py-1 rounded-lg border',
                            page === 1 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white text-blue-700 hover:bg-blue-50 border-blue-300'
                          )}
                        >Prev</button>
                        <button
                          onClick={() => setPages(p => ({ ...p, [key]: Math.min(totalPages, p[key] + 1) }))}
                          disabled={page === totalPages}
                          className={cx(
                            'px-3 py-1 rounded-lg border',
                            page === totalPages ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white text-blue-700 hover:bg-blue-50 border-blue-300'
                          )}
                        >Next</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ---- Edit Member Modal ----
function EditMemberModal({ member, onClose, onSave, planOptions, statusOptions, holdOptions, paymentOptions, canEditFormNo }) {
      const [edit, setEdit] = React.useState(() => ({ ...member }));
      // Derived nextPaymentDate and paymentBy update when billingDate changes
      React.useEffect(() => {
        if (edit.billingDate) {
          const nextPay = addMonths(edit.billingDate, 1);
          const payBy = addDays(nextPay, 7);
          setEdit(e => ({ ...e, nextPaymentDate: iso(nextPay), paymentBy: iso(payBy) }));
        }
      }, [edit.billingDate]);
      // Validate required and numeric fields. Name, mobile, plan, status,
      // billingDate and amount are mandatory. Amount must be a positive integer.
      const req = {
        name: !String(edit.name || '').trim(),
        mobile: !String(edit.mobile || '').trim(),
        plan: !edit.plan,
        status: !edit.status,
        billingDate: !iso(edit.billingDate),
        amount: !String(edit.amount || '').trim() || !(/^\d+$/.test(String(edit.amount).trim())) || Number(edit.amount) <= 0,
        holdDuration: edit.status === 'Hold' && !String(edit.holdDuration || '').trim(),
      };
      // Determine if any field has been modified compared to the original member. We
      // allow Save only when at least one field differs (dirty) and all
      // required fields are valid. Without this, the Save button might remain
      // disabled unless the plan changes. See bug description.
      // Determine if any user‑editable field has changed. Only compare a
      // whitelist of fields that the user can modify through the modal.
      const onMemberPhoto = async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        if (file.size > MAX_IMAGE_FILE_BYTES) {
          setToast('Image too large. Please upload a file up to 1MB.');
          setTimeout(() => setToast(''), 2500);
          return;
        }
        try {
          const raw = await loadImageDataUrl(file);
          const compressed = await downscaleImageDataUrl(raw);
          setEdit(prev => ({ ...prev, photo: compressed }));
        } catch {
          setToast('Unable to process image. Please try another file.');
          setTimeout(() => setToast(''), 2500);
        }
      };
      const dirty = React.useMemo(() => {
        // Compare editable fields to determine if anything changed. Include
        // formNo, amount and paymentMethod in addition to existing fields.
        const keysToCheck = ['formNo','memberId','name','mobile','plan','status','holdDuration','billingDate','amount','paymentMethod','photo'];
        return keysToCheck.some(k => {
          const a = edit[k] ?? '';
          const b = member[k] ?? '';
          return String(a) !== String(b);
        });
      }, [edit, member]);
      const isInvalid = Object.values(req).some(Boolean);
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
          <div className="w-full max-w-3xl rounded-3xl bg-white shadow-xl">
            <div className="flex items-center justify-between px-6 py-4">
              <h3 className="text-lg font-semibold">Edit Member — {member.name}</h3>
              <button onClick={onClose} className="rounded-xl p-2 hover:bg-slate-200"><span>✕</span></button>
            </div>
            <div className="px-6 pb-4 max-h-[70vh] overflow-auto">
              <div className="mb-4 flex items-center gap-3">
                <Avatar name={edit.name || member.name} photo={edit.photo} className="h-14 w-14" />
                <label className="cursor-pointer rounded-xl border border-slate-300 px-3 py-2 text-sm hover:bg-slate-100">
                  <input type="file" accept="image/*" className="hidden" onChange={onMemberPhoto} />
                  Change Photo
                </label>
                {edit.photo && (
                  <button
                    type="button"
                    onClick={() => setEdit(prev => ({ ...prev, photo: '' }))}
                    className="rounded-xl border border-slate-300 px-3 py-2 text-sm hover:bg-slate-100"
                  >
                    Remove
                  </button>
                )}
              </div>
              <div className="grid grid-cols-2 gap-4">
                {/* Row 1: Form Number and Member ID */}
                <div>
                  <label className="text-sm font-medium">Form Number</label>
                  <input value={edit.formNo ?? ''} onChange={(e) => setEdit({ ...edit, formNo: e.target.value })} readOnly={!canEditFormNo} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
                </div>
                <div>
                  <label className="text-sm font-medium">Member Id</label>
                  <input value={edit.memberId} onChange={(e) => setEdit({ ...edit, memberId: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
                </div>
                {/* Row 2: Name and Mobile */}
                <div>
                  <label className="text-sm font-medium">Name</label>
                  <input value={edit.name} onChange={(e) => setEdit({ ...edit, name: e.target.value })} className={cx('w-full rounded-xl border px-3 py-2 text-sm', req.name ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-slate-300 bg-white')} />
                </div>
                <div>
                  <label className="text-sm font-medium">Mobile Number</label>
                  <input value={edit.mobile} onChange={(e) => setEdit({ ...edit, mobile: e.target.value })} className={cx('w-full rounded-xl border px-3 py-2 text-sm', req.mobile ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-slate-300 bg-white')} />
                </div>
                {/* Row 3: Plan and Status */}
                <div>
                  <label className="text-sm font-medium">Plan</label>
                  <select value={edit.plan} onChange={(e) => setEdit({ ...edit, plan: e.target.value })} className={cx('w-full rounded-xl border px-3 py-2 text-sm', req.plan ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-slate-300 bg-white')}>
                    {planOptions.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-sm font-medium">Status</label>
                  <select
                    value={edit.status}
                    onChange={(e) => {
                      const nextStatus = e.target.value;
                      setEdit(prev => ({
                        ...prev,
                        status: nextStatus,
                        // Keep data consistent: holdDuration only applies to Hold status.
                        holdDuration: nextStatus === 'Hold' ? prev.holdDuration : '',
                      }));
                    }}
                    className={cx('w-full rounded-xl border px-3 py-2 text-sm', req.status ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-slate-300 bg-white')}
                  >
                    {statusOptions.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                  <p className="mt-1 text-xs text-slate-500">
                    Selecting a Hold Duration will automatically set Status to Hold.
                  </p>
                </div>
                {/* Row 4: Hold Duration and Billing Date */}
                <div>
                  <label className="text-sm font-medium">Hold Duration</label>
                  <select
                    value={edit.holdDuration || ''}
                    onChange={(e) => {
                      const val = e.target.value;
                      setEdit(prev => ({
                        ...prev,
                        holdDuration: val,
                        // If user picks a hold duration, status must be Hold.
                        status: val ? 'Hold' : prev.status,
                      }));
                    }}
                    className={cx('w-full rounded-xl border bg-white px-3 py-2 text-sm', req.holdDuration ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-slate-300')}
                  >
                    <option value="">—</option>
                    {holdOptions.map(h => <option key={h} value={h}>{h}</option>)}
                  </select>
                  {req.holdDuration && (
                    <p className="mt-1 text-xs text-rose-600">Hold Duration is required when status is Hold.</p>
                  )}
                </div>
                <div>
                  <label className="text-sm font-medium">Billing Date</label>
                  <input type="date" value={iso(edit.billingDate)} onChange={(e) => setEdit({ ...edit, billingDate: e.target.value })} className={cx('w-full rounded-xl border px-3 py-2 text-sm', req.billingDate ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-slate-300 bg-white')} />
                </div>
                {/* Row 5: Amount and Payment Method */}
                <div>
                  <label className="text-sm font-medium">Amount (INR)</label>
                  <input value={edit.amount ?? ''} onChange={(e) => {
                    const val = e.target.value;
                    if (/^\d*$/.test(val)) setEdit({ ...edit, amount: val });
                  }} className={cx('w-full rounded-xl border px-3 py-2 text-sm', req.amount ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-slate-300 bg-white')} />
                </div>
                <div>
                  <label className="text-sm font-medium">Payment Method</label>
                  <select value={edit.paymentMethod || ''} onChange={(e) => setEdit({ ...edit, paymentMethod: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                    {paymentOptions.map(pm => <option key={pm} value={pm}>{pm}</option>)}
                  </select>
                </div>
                {/* Row 6: Next Payment Date and Payment By */}
                <div>
                  <label className="text-sm font-medium">Next Payment Date</label>
                  <input readOnly value={fmt(edit.nextPaymentDate)} className="w-full rounded-xl border border-blue-200 bg-blue-50 px-3 py-2 text-sm text-blue-700" />
                </div>
                <div>
                  <label className="text-sm font-medium">Payment By</label>
                  <input readOnly value={fmt(edit.paymentBy)} className="w-full rounded-xl border border-blue-200 bg-blue-50 px-3 py-2 text-sm text-blue-700" />
                </div>
                {/* Row 7: Staff */}
                <div>
                  <label className="text-sm font-medium">Staff</label>
                  <input readOnly value={edit.staff || ''} className="w-full rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm" />
                </div>
              </div>
            </div>
            <div className="flex justify-end gap-3 px-6 py-4">
              <button onClick={onClose} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium">Cancel</button>
                <button
                onClick={() => {
                  // Pass the current edit object back to the parent save handler. Do not
                  // update editMember state here; the parent will handle closing the modal.
                  onSave(edit);
                }}
                disabled={isInvalid || !dirty}
                className={cx(
                  'rounded-xl px-4 py-2 text-sm font-medium',
                  (isInvalid || !dirty)
                    ? 'bg-slate-300 text-slate-500 cursor-not-allowed'
                    : 'bg-blue-600 hover:bg-blue-700 text-white'
                )}
              >
                Save
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ---- Add Member Wizard ----
    function AddMemberWizard({ open, onClose, onSave, settings, staffName, members, canEditFormNo }) {
      const [step, setStep] = React.useState(1);
      const [form, setForm] = React.useState({
        formNo: '',
        name: '',
        dob: '',
        gender: '',
        mobile: '',
        address: '',
        staff: staffName || '',
        amount: '',
        plan: '',
        joiningDate: iso(new Date()),
        billingDate: iso(addMonths(new Date(), 1)),
        paymentBy: iso(addDays(addMonths(new Date(), 1), 7)),
        status: 'Active',
        paymentMethod: settings.paymentMethods[0],
        remark: '',
        photo: '',
      });
      const [warn, setWarn] = React.useState('');
      // Update staff when prop changes
      React.useEffect(() => { setForm(f => ({ ...f, staff: staffName || '' })); }, [staffName]);

      // Auto generate the next form number when the wizard opens. We look at all
      // existing members' form numbers, interpret them as integers and pick the
      // next number. This value will be assigned to form.formNo when the modal
      // opens. If there are no members yet, start from 1.
      React.useEffect(() => {
        if (!open) return;
        try {
          const nums = (members || []).map(m => {
            const fn = m.formNo;
            return typeof fn === 'number' ? fn : Number(fn);
          }).filter(n => Number.isFinite(n) && n > 0);
          const max = nums.length ? Math.max(...nums) : 0;
          const next = max + 1;
          setForm(f => ({ ...f, formNo: String(next) }));
        } catch {
          setForm(f => ({ ...f, formNo: '1' }));
        }
      }, [open, members]);
      // Auto update billing and payment dates when joiningDate changes
      React.useEffect(() => {
        if (form.joiningDate) {
          const bd = addMonths(form.joiningDate, 1);
          const pb = addDays(bd, 7);
          setForm(f => ({ ...f, billingDate: iso(bd), paymentBy: iso(pb) }));
        }
      }, [form.joiningDate]);
      // Auto update paymentBy when billingDate changes
      React.useEffect(() => {
        if (form.billingDate) {
          const pb = addDays(form.billingDate, 7);
          setForm(f => ({ ...f, paymentBy: iso(pb) }));
        }
      }, [form.billingDate]);
      // Define which fields are mandatory for each step. We'll validate these before allowing the user
      // to proceed to the next step. All fields are required per the new requirements.
      const req1 = { formNo: !form.formNo, name: !form.name.trim(), dob: !form.dob, gender: !form.gender, mobile: !form.mobile.trim(), address: !form.address.trim() };
      // Validate that amount is a positive integer (no decimals, not zero or negative)
      const isPositiveInt = (val) => /^\d+$/.test(String(val).trim()) && Number(val) > 0;
      const req2 = {
        staff: !form.staff.trim(),
        amount: !form.amount || !isPositiveInt(form.amount),
        plan: !form.plan,
        joiningDate: !form.joiningDate,
        billingDate: !form.billingDate,
        paymentBy: !form.paymentBy,
        status: !form.status
      };
      const req3 = { paymentMethod: !form.paymentMethod };
      const next = () => {
        setWarn('');
        if (step === 1) {
          // Ensure all required fields in step 1 are provided
          if (Object.values(req1).some(Boolean)) {
            setWarn('Please fill all required fields in Step 1.');
            return;
          }
        } else if (step === 2) {
          if (Object.values(req2).some(Boolean)) {
            setWarn('Please fill all required fields in Step 2.');
            return;
          }
        }
        setStep(s => Math.min(3, s + 1));
      };
      const back = () => setStep(s => Math.max(1, s - 1));
      const onPhoto = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > MAX_IMAGE_FILE_BYTES) {
          setWarn('Image too large. Please upload a file up to 1MB.');
          return;
        }
        try {
          const raw = await loadImageDataUrl(file);
          const compressed = await downscaleImageDataUrl(raw);
          setForm(f => ({ ...f, photo: compressed }));
        } catch {
          setWarn('Unable to process photo. Please try another image.');
        }
      };
      const save = () => {
        setWarn('');
        // Validate all fields on final step
        if (Object.values(req1).some(Boolean) || Object.values(req2).some(Boolean) || Object.values(req3).some(Boolean)) {
          setWarn('Please fill all required fields.');
          return;
        }
        // Duplicate mobile check
        const trimmedMobile = form.mobile.trim();
        const duplicate = (members || []).some(m => String(m.mobile).trim() === trimmedMobile);
        if (duplicate) {
          setWarn('A member with this mobile number already exists. Please use a different mobile number.');
          return;
        }
        // Generate member ID and payMonth label
        const yearSuffix = String(new Date().getFullYear()).slice(-2);
        const memberId = `APG-${form.formNo}/${yearSuffix}`;
        const payMonth = payMonthLabel(addMonths(form.billingDate, 1));
        const newMember = {
          ...form,
          memberId,
          formNo: Number(form.formNo),
          amount: Number(form.amount || 0),
          nextPaymentDate: undefined,
          payMonth
        };
        onSave(newMember);
        onClose();
        setStep(1);
        setForm({
          formNo: '',
          name: '',
          dob: '',
          gender: '',
          mobile: '',
          address: '',
          staff: staffName || '',
          amount: '',
          plan: '',
          joiningDate: iso(new Date()),
          billingDate: iso(addMonths(new Date(), 1)),
          paymentBy: iso(addDays(addMonths(new Date(), 1), 7)),
          status: 'Active',
          paymentMethod: settings.paymentMethods[0],
          remark: '',
          photo: ''
        });
      };
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
          <div className="w-full max-w-3xl rounded-3xl bg-white shadow-xl">
            <div className="flex items-center justify-between px-6 py-4">
              <h3 className="text-lg font-semibold">Add New Member — Step {step}</h3>
              <button onClick={onClose} className="rounded-xl p-2 hover:bg-slate-200"><span>✕</span></button>
            </div>
            <div className="px-6 pb-4 max-h-[70vh] overflow-auto">
              {warn && <div className="mb-3 rounded-xl bg-amber-50 text-amber-800 border border-amber-200 px-3 py-2 text-sm">{warn}</div>}
              {step === 1 && (
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="text-sm font-medium">Form Number</label>
                    <input
                      value={form.formNo}
                      onChange={(e) => setForm({ ...form, formNo: e.target.value })}
                      readOnly={!canEditFormNo}
                      className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm"
                    />
                  </div>
                  <div><label className="text-sm font-medium">Full Name</label><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Date of Birth</label><input type="date" value={form.dob} onChange={(e) => setForm({ ...form, dob: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Gender</label><select value={form.gender} onChange={(e) => setForm({ ...form, gender: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                    <option value="">Select gender</option>
                    {settings.genders.map(g => <option key={g} value={g}>{g}</option>)}
                  </select></div>
                  <div><label className="text-sm font-medium">Mobile Number</label><input value={form.mobile} onChange={(e) => setForm({ ...form, mobile: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div className="col-span-2"><label className="text-sm font-medium">Address</label><input value={form.address} onChange={(e) => setForm({ ...form, address: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                </div>
              )}
              {step === 2 && (
                <div className="grid grid-cols-2 gap-4">
                  <div><label className="text-sm font-medium">Staff (logged in)</label><input value={form.staff} readOnly className="w-full rounded-xl border border-blue-200 bg-blue-50 px-3 py-2 text-sm font-medium text-blue-700" /></div>
                  <div>
                    <label className="text-sm font-medium">Amount (INR)</label>
                    <input
                      type="text"
                      value={form.amount}
                      onChange={(e) => {
                        // Only allow digits. Prevent negative, zero and decimal input.
                        const val = e.target.value;
                        if (/^\d*$/.test(val)) {
                          setForm({ ...form, amount: val });
                        }
                      }}
                      placeholder="Enter amount"
                      className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm"
                    />
                  </div>
                  <div><label className="text-sm font-medium">Plan</label><select value={form.plan} onChange={(e) => setForm({ ...form, plan: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                    <option value="">Select plan</option>
                    {settings.plans.map(p => <option key={p} value={p}>{p}</option>)}
                  </select></div>
                  <div><label className="text-sm font-medium">Joining Date</label><input type="date" value={form.joiningDate} onChange={(e) => setForm({ ...form, joiningDate: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Billing Date</label><input type="date" value={form.billingDate} onChange={(e) => setForm({ ...form, billingDate: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Payment By</label><input type="date" value={form.paymentBy} readOnly className="w-full rounded-xl border border-blue-200 bg-blue-50 px-3 py-2 text-sm font-medium text-blue-700" /></div>
                  <div><label className="text-sm font-medium">Status</label><select value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                    {settings.statuses.map(s => <option key={s} value={s}>{s}</option>)}
                  </select></div>
                </div>
              )}
              {step === 3 && (
                <div className="grid grid-cols-2 gap-4">
                  <div><label className="text-sm font-medium">Payment Mode</label><select value={form.paymentMethod} onChange={(e) => setForm({ ...form, paymentMethod: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                    {settings.paymentMethods.map(p => <option key={p} value={p}>{p}</option>)}
                  </select></div>
                  <div>
                    <label className="text-sm font-medium">Member Photo</label>
                    <div className="flex items-center gap-3">
                      <Avatar name={form.name} photo={form.photo} className="h-12 w-12" />
                      <label className="cursor-pointer rounded-xl border border-slate-300 px-3 py-2 text-sm hover:bg-slate-100">
                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={onPhoto} />
                        Take / Upload Photo
                      </label>
                    </div>
                  </div>
                  <div className="col-span-2"><label className="text-sm font-medium">Remark</label><textarea value={form.remark} onChange={(e) => setForm({ ...form, remark: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" rows={3} placeholder="Enter a short note" /></div>
                </div>
              )}
            </div>
            <div className="flex justify-end gap-3 px-6 py-4">
              {step === 3 ? (
                <>
                  <button onClick={back} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium">Back</button>
                  <button onClick={save} className="rounded-xl px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Save New Member</button>
                </>
              ) : step === 2 ? (
                <>
                  <button onClick={back} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium">Back</button>
                  <button onClick={next} className="rounded-xl px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Next</button>
                </>
              ) : (
                <>
                  <button onClick={onClose} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium">Cancel</button>
                  <button onClick={next} className="rounded-xl px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Next</button>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ---- Settings Page ----
function SettingsPage({ settings, updateSetting, members, storageInfo, onExport, onImport }) {
      const [newValues, setNewValues] = React.useState({ plans: '', statuses: '', paymentMethods: '', holdDurations: '', genders: '' });
      const importRef = React.useRef(null);
      const handleAdd = (key) => {
        const val = newValues[key].trim();
        if (!val) return;
        if (settings[key].includes(val)) {
          setNewValues(v => ({ ...v, [key]: '' }));
          return;
        }
        updateSetting(key, [...settings[key], val]);
        setNewValues(v => ({ ...v, [key]: '' }));
      };
      const removeOpt = (key, val) => {
        // Prevent deletion if any member uses this value
        if (key === 'plans' && members.some(m => m.plan === val)) return;
        if (key === 'statuses' && members.some(m => m.status === val)) return;
        if (key === 'holdDurations' && members.some(m => m.holdDuration === val)) return;
        if (key === 'paymentMethods' && members.some(m => m.paymentMethod === val)) return;
        updateSetting(key, settings[key].filter(x => x !== val));
      };
      return (
        <div className="p-8 space-y-6">
          <h1 className="text-2xl font-semibold mb-4">Settings</h1>
          <div className="rounded-3xl bg-white border border-slate-200 p-4 shadow-sm space-y-2">
            <h3 className="text-lg font-semibold">Storage Diagnostics</h3>
            <div className="text-sm text-slate-700">
              Approx usage: <span className="font-medium">{(Number(storageInfo?.usageBytes || 0) / (1024 * 1024)).toFixed(2)} MB</span> / 4.50 MB
            </div>
            <div className="text-xs text-slate-500">
              Last error: {storageInfo?.lastError ? `${storageInfo.lastError} (${storageInfo.lastKey || 'unknown key'})` : 'None'}
            </div>
            <div className="pt-2 flex items-center gap-2">
              <button onClick={onExport} className="rounded-xl px-3 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Export Data</button>
              <button onClick={() => importRef.current && importRef.current.click()} className="rounded-xl px-3 py-2 text-sm font-medium border border-slate-300 bg-white hover:bg-slate-100">Import Data</button>
              <input
                ref={importRef}
                type="file"
                accept="application/json"
                className="hidden"
                onChange={(e) => {
                  const file = e.target.files && e.target.files[0];
                  onImport && onImport(file);
                  e.target.value = '';
                }}
              />
            </div>
          </div>
          {['plans','statuses','paymentMethods','holdDurations','genders'].map(key => (
            <div key={key} className="rounded-3xl bg-white p-4 shadow-sm space-y-3">
              <h3 className="text-lg font-semibold capitalize">{key.replace(/([A-Z])/g, ' $1')}</h3>
              <div className="flex flex-wrap gap-2">
                {settings[key].map(val => (
                  <span key={val} className="inline-flex items-center gap-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-full px-3 py-1 text-sm">
                    {val}
                    <button onClick={() => removeOpt(key, val)} className="text-xs text-red-500 ml-1">✕</button>
                  </span>
                ))}
              </div>
              <div className="flex items-center gap-2">
                <input value={newValues[key]} onChange={(e) => setNewValues(nv => ({ ...nv, [key]: e.target.value }))} placeholder={`Enter new ${key.slice(0,-1)}`} className="flex-1 rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
                <button onClick={() => handleAdd(key)} className="rounded-xl px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Add</button>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ---- Staff Management Page ----
    function StaffPage({ settings, updateSetting, logEvent }) {
      const staff = settings.staff || [];
      const [modalOpen, setModalOpen] = React.useState(false);
      const [editStaff, setEditStaff] = React.useState(null);
      const [form, setForm] = React.useState({ id: '', name: '', email: '', role: 'staff-basic', phone: '' });
      const openAdd = () => {
        setEditStaff(null);
        setForm({ id: '', name: '', email: '', role: 'staff-basic', phone: '' });
        setModalOpen(true);
      };
      const openEdit = (s) => {
        setEditStaff(s);
        setForm({ ...s });
        setModalOpen(true);
      };
      const saveStaff = () => {
        if (!form.id.trim() || !form.name.trim()) return;
        let updated;
        if (editStaff) {
          updated = staff.map(st => st.id === editStaff.id ? form : st);
          logEvent('settings.updated', 'settings', 'staff', editStaff, form);
        } else {
          updated = [...staff, form];
          logEvent('settings.updated', 'settings', 'staff', null, form);
        }
        updateSetting('staff', updated);
        setModalOpen(false);
      };
      const removeStaff = (s) => {
        // prevent deletion of initial users
        if (s.id === 'Bis' || s.id === 'Raja') return;
        updateSetting('staff', staff.filter(st => st.id !== s.id));
        logEvent('settings.updated', 'settings', 'staff', s, null);
      };
      return (
        <div className="p-8 space-y-6">
          <div className="flex justify-between items-center">
            <h1 className="text-2xl font-semibold mb-4">Staff</h1>
            <button onClick={openAdd} className="rounded-xl px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Add Staff</button>
          </div>
          <div className="rounded-3xl bg-white p-4 shadow-sm">
            <div className="grid grid-cols-5 gap-4 px-3 py-2 text-sm md:text-base font-semibold bg-blue-50 text-blue-700 border border-blue-100 rounded-2xl">
              <div>ID</div><div>Name</div><div>Email</div><div>Role</div><div>Actions</div>
            </div>
            {staff.map(s => (
              <div key={s.id} className="grid grid-cols-5 gap-4 items-center px-3 py-2 border-b">
                <div>{s.id}</div>
                <div>{s.name}</div>
                <div>{s.email || '-'}</div>
                <div>{s.role || '-'}</div>
                <div className="flex gap-2">
                  <button onClick={() => openEdit(s)} className="text-indigo-600 hover:underline text-sm">Edit</button>
                  {!(s.id === 'Bis' || s.id === 'Raja') && (
                    <button onClick={() => removeStaff(s)} className="text-rose-600 hover:underline text-sm">Delete</button>
                  )}
                </div>
              </div>
            ))}
            {staff.length === 0 && (
              <div className="px-3 py-4 text-slate-500 text-sm">No staff members yet.</div>
            )}
          </div>
          {modalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
              <div className="w-full max-w-lg rounded-3xl bg-white shadow-xl">
                <div className="flex justify-between items-center px-6 py-4">
                  <h3 className="text-lg font-semibold">{editStaff ? 'Edit Staff' : 'Add Staff'}</h3>
                  <button onClick={() => setModalOpen(false)} className="rounded-xl p-2 hover:bg-slate-200"><span>✕</span></button>
                </div>
                <div className="px-6 pb-4 space-y-3">
                  <div><label className="text-sm font-medium">Username</label><input value={form.id} onChange={(e) => setForm({ ...form, id: e.target.value })} disabled={!!editStaff} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Name</label><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Email</label><input value={form.email || ''} onChange={(e) => setForm({ ...form, email: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Role</label><select value={form.role || ''} onChange={(e) => setForm({ ...form, role: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                    <option value="admin">admin</option>
                    <option value="staff-basic">staff-basic</option>
                    <option value="staff-extended">staff-extended</option>
                  </select></div>
                  <div><label className="text-sm font-medium">Phone</label><input value={form.phone || ''} onChange={(e) => setForm({ ...form, phone: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                </div>
                <div className="flex justify-end gap-3 px-6 py-4">
                  <button onClick={() => setModalOpen(false)} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium">Cancel</button>
                  <button onClick={saveStaff} className="rounded-xl px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Save</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ---- Logs Page ----
    function LogsPage({ logs, currentUser, onClearLogs }) {
      const [filter, setFilter] = React.useState('');
      const [actorFilter, setActorFilter] = React.useState('');
      const [actionFilter, setActionFilter] = React.useState('');
      const [entityFilter, setEntityFilter] = React.useState('');
      const [timeRange, setTimeRange] = React.useState('24h');
      const [expandedId, setExpandedId] = React.useState('');
      const [page, setPage] = React.useState(1);
      const pageSize = 25;
      const sinceTs = React.useMemo(() => {
        if (timeRange === '24h') return Date.now() - (24 * 60 * 60 * 1000);
        if (timeRange === '7d') return Date.now() - (7 * 24 * 60 * 60 * 1000);
        if (timeRange === '30d') return Date.now() - (30 * 24 * 60 * 60 * 1000);
        return 0;
      }, [timeRange]);
      const actors = React.useMemo(() => Array.from(new Set((logs || []).map(l => l.actor).filter(Boolean))), [logs]);
      const actions = React.useMemo(() => Array.from(new Set((logs || []).map(l => l.action).filter(Boolean))), [logs]);
      const entities = React.useMemo(() => Array.from(new Set((logs || []).map(l => l.entityType).filter(Boolean))), [logs]);
      const filtered = React.useMemo(() => {
        const q = filter.toLowerCase();
        return (logs || []).filter(l => {
          if (sinceTs && new Date(l.ts).getTime() < sinceTs) return false;
          if (actorFilter && l.actor !== actorFilter) return false;
          if (actionFilter && l.action !== actionFilter) return false;
          if (entityFilter && l.entityType !== entityFilter) return false;
          if (!q) return true;
          return (l.entityId || '').toLowerCase().includes(q) || (l.action || '').toLowerCase().includes(q) || (l.actor || '').toLowerCase().includes(q);
        });
      }, [logs, filter, actorFilter, actionFilter, entityFilter, sinceTs]);
      React.useEffect(() => {
        setPage(1);
      }, [filter, logs, actorFilter, actionFilter, entityFilter, timeRange]);
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      const safePage = page > totalPages ? 1 : page;
      const start = (safePage - 1) * pageSize;
      const pageRows = filtered.slice(start, start + pageSize);
      const alertCount = React.useMemo(() => {
        return filtered.filter(l => String(l.action || '').includes('deleted') || String(l.action || '').includes('blocked')).length;
      }, [filtered]);
      const exportCsv = () => {
        const rows = filtered.map(l => [
          l.ts || '',
          l.actor || '',
          l.action || '',
          l.entityType || '',
          l.entityId || '',
          JSON.stringify(l.before || {}),
          JSON.stringify(l.after || {}),
        ]);
        const header = ['Time', 'Actor', 'Action', 'Entity Type', 'Entity ID', 'Before', 'After'];
        const csv = [header, ...rows]
          .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
          .join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `audit-logs-${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };
      return (
        <div className="p-8">
          <div className="mb-4 flex items-center justify-between gap-3 flex-wrap">
            <div>
              <h1 className="text-2xl font-semibold">Audit Command Center</h1>
              <div className="text-sm text-slate-600 mt-1">
                Log Health: <span className="text-emerald-700 font-medium">Operational</span> |
                {' '}Total Logs ({timeRange === '24h' ? '24h' : timeRange}): <span className="font-medium">{filtered.length}</span> |
                {' '}Security Alerts: <span className="font-medium text-amber-700">{alertCount}</span>
              </div>
            </div>
            <div className="flex items-center gap-2">
              {currentUser && currentUser.id === 'owner' && (
                <button
                  onClick={() => onClearLogs && onClearLogs()}
                  className="rounded-xl px-3 py-2 text-sm font-medium border border-rose-300 bg-rose-50 text-rose-700 hover:bg-rose-100"
                >
                  Clear Logs
                </button>
              )}
              <button onClick={exportCsv} className="rounded-xl px-3 py-2 text-sm font-medium bg-blue-600 text-white hover:bg-blue-700">Export to CSV</button>
            </div>
          </div>
          <div className="mb-4 grid grid-cols-1 md:grid-cols-5 gap-2">
            <select value={actorFilter} onChange={(e) => setActorFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="">Select Users</option>
              {actors.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <select value={actionFilter} onChange={(e) => setActionFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="">Select Actions</option>
              {actions.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <select value={entityFilter} onChange={(e) => setEntityFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="">Select Entity</option>
              {entities.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <select value={timeRange} onChange={(e) => setTimeRange(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="24h">Time Range: Last 24 Hours</option>
