    {/**
     * Action Plus Gym Management Application (MVP)
     *
     * This single file defines the entire client‑side application. It uses
     * React to build a modular, stateful UI and Tailwind CSS for styling.
     * The app stores data in localStorage so it persists across sessions.
     *
     * Major features:
     *  - Authentication for demo users (Bis/b123 and Raja/r123)

     *  - Dashboard summary tiles with search and status filters
     *  - Members lists grouped by status, expandable rows with quick actions

     *  - Logs page with audit trail of actions

     *
     * Date handling follows the spec: UTC storage, local formatting. Derived
     * fields include next payment date and payment by date. IDs and pay month
     * labels are generated from the form number and billing date.
     */}

    // ---- Utility Functions ----
    // Compose class names (ignoring falsey values). Similar to clsx but minimal.
    const cx = (...cls) => cls.filter(Boolean).join(' ');
    // Month names for formatted dates (Jan, Feb, ...)
    const MONTHS = [
      'Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'
    ];
    // Ensure a value is a Date in UTC and normalise to midnight UTC.
    const asUTC = (val) => {
      const d = val instanceof Date ? val : new Date(val);
      if (isNaN(d.getTime())) return null;
      return new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
    };
    // Convert a date to ISO string (YYYY‑MM‑DD). Returns empty string for invalid.
    const iso = (d) => {
      const dt = asUTC(d);
      return dt ? dt.toISOString().slice(0, 10) : '';
    };
    // Add n days to a date (returns a Date or null).
    const addDays = (d, n) => {
      const base = asUTC(d);
      if (!base) return null;
      base.setUTCDate(base.getUTCDate() + (Number(n) || 0));
      return base;
    };
    // Add n months to a date (returns a Date or null).
    const addMonths = (d, n) => {
      const base = asUTC(d);
      if (!base) return null;
      base.setUTCMonth(base.getUTCMonth() + (Number(n) || 0));
      return base;
    };
    // Format a date as DD/Mon/YYYY. If invalid returns empty string.
    const fmt = (d) => {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return String(d);
      const dd = String(dt.getUTCDate()).padStart(2, '0');
      const mm = MONTHS[dt.getUTCMonth()];
      const yy = dt.getUTCFullYear();
      return `${dd}/${mm}/${yy}`;
    };
    // Derive pay month label (Mon‑YYYY) from a date.
    const payMonthLabel = (d) => {
      const dt = asUTC(d);
      return dt ? `${MONTHS[dt.getUTCMonth()]}-${dt.getUTCFullYear()}` : '';
    };
    const nextPaymentDateFromBillingDate = (memberOrBillingDate) => {
      const billingSource = (memberOrBillingDate && typeof memberOrBillingDate === 'object')
        ? (memberOrBillingDate.billingDate || '')
        : memberOrBillingDate;
      const billing = asUTC(billingSource);
      return billing ? iso(addMonths(billing, 1)) : '';
    };
    const paymentByFromNextPaymentDate = (nextPaymentDateValue) => {
      const nextPay = asUTC(nextPaymentDateValue);
      return nextPay ? iso(addDays(nextPay, 7)) : '';
    };
    const normalizePhone = (v) => String(v || '').replace(/\D/g, '');
    const isValidEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(v || '').trim());
    const isValidPhone = (v) => {
      const p = normalizePhone(v);
      return p.length >= 10 && p.length <= 15;
    };
    // Shorten status text for fixed width badges
    const shortStatus = (s) => {
      if (!s) return '';
      return s.length > 10 ? s.slice(0, 4) + '....' : s;
    };
    // Determine the primary WhatsApp action button for a member in real time.
    // For Active members:
    // - paymentBy < today => Fine SMS
    // - billingDate <= today => Reminder (becomes "Reminder Sent" once used)
    // - otherwise => Welcome SMS
    // For other statuses, keep status-based mapping.
    const primaryMessageActionForMember = (member, isOwner = false) => {
      if (!member) return { key: 'welcome', label: 'Welcome SMS', disabled: false };
      const today = asUTC(new Date());
      const joiningDate = asUTC(member.joiningDate);
      const billingDate = asUTC(member.billingDate);
      const paymentBy = asUTC(member.paymentBy || member.billingDate);
      const sameJoinAndBillingDay = Boolean(
        joiningDate && billingDate && iso(joiningDate) === iso(billingDate)
      );
      if (member.status === 'Active') {
        if (paymentBy && today && paymentBy < today) return { key: 'fine', label: 'Fine SMS', disabled: false };
        if (sameJoinAndBillingDay && billingDate && today && billingDate <= today) {
          return { key: 'welcome', label: 'Welcome SMS', disabled: false };
        }
        if (billingDate && today && billingDate <= today) {
          const reminderSent = Boolean(member.reminderSentAt);
          return {
            key: 'reminder',
            label: reminderSent ? 'Reminder Sent' : 'Reminder',
            disabled: reminderSent && !isOwner,
          };
        }
        if (joiningDate && today && joiningDate <= today) {
          return { key: 'welcome', label: 'Welcome SMS', disabled: false };
        }
        return { key: 'welcome', label: 'Welcome SMS', disabled: false };
      }
      if (member.status === 'Hold') return { key: 'hold', label: 'Hold SMS', disabled: false };
      if (member.status === 'Deactivated') return { key: 'deactivate', label: 'Deactivate SMS', disabled: false };
      if (member.status === 'Cancelled') return { key: 'fine', label: 'Fine SMS', disabled: false };
      return { key: 'welcome', label: 'Welcome SMS', disabled: false };
    };
    const formatSmsSentAt = (value) => {
      if (!value) return '';
      const dt = new Date(value);
      if (Number.isNaN(dt.getTime())) return '';
      return `${fmt(dt)} ${dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
    };
    const getLastWhatsAppSendMeta = (member, templateKey) => {
      if (!member) return null;
      const direct = member.lastSmsSent && typeof member.lastSmsSent === 'object'
        ? (templateKey ? member.lastSmsSent[templateKey] : null)
        : null;
      if (direct && (direct.sentAt || direct.ts)) {
        return {
          sentAt: direct.sentAt || direct.ts || '',
          sentBy: direct.sentBy || direct.by || '',
        };
      }
      const history = Array.isArray(member.messageHistory) ? member.messageHistory : [];
      const entry = history.find((ev) => {
        if (!ev || ev.channel !== 'whatsapp' || ev.status !== 'opened') return false;
        if (!templateKey) return true;
        return ev.templateKey === templateKey;
      });
      if (!entry) return null;
      return {
        sentAt: entry.sentAt || entry.ts || '',
        sentBy: entry.sentBy || entry.by || '',

    const getSmsSentInfoText = (member, templateKey) => {
      const meta = getLastWhatsAppSendMeta(member, templateKey);

    const STORAGE_KEYS = {
      users: 'apg.users',
      members: 'apg.members',
      settings: 'apg.settings',
      logs: 'apg.logs',
      finance: 'apg.finance',

    };
    const STORAGE_SOFT_LIMIT_BYTES = 4.5 * 1024 * 1024; // ~4.5MB budget
    const MAX_IMPORT_FILE_BYTES = 5 * 1024 * 1024; // 5MB guardrail for backup imports
    const MAX_IMAGE_FILE_BYTES = 10 * 1024 * 1024; // 10MB input guard
    const MAX_IMAGE_EDGE_PX = 720;
    const IMAGE_JPEG_QUALITY = 0.78;

    const getStorageUsageBytes = () => {
      try {
        let total = 0;
        for (let i = 0; i < localStorage.length; i += 1) {
          const k = localStorage.key(i) || '';
          const v = localStorage.getItem(k) || '';
          total += (k.length + v.length) * 2;
        }
        return total;
      } catch {
        return 0;
      }
    };

    const loadImageDataUrl = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ''));
      reader.onerror = () => reject(new Error('image-read-failed'));
      reader.readAsDataURL(file);
    });

    const downscaleImageDataUrl = (dataUrl, maxEdge = MAX_IMAGE_EDGE_PX, quality = IMAGE_JPEG_QUALITY) => new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        try {
          const maxSide = Math.max(img.width, img.height);
          const ratio = maxSide > maxEdge ? maxEdge / maxSide : 1;
          const width = Math.max(1, Math.round(img.width * ratio));
          const height = Math.max(1, Math.round(img.height * ratio));
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          if (!ctx) return resolve(dataUrl);
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        } catch {
          resolve(dataUrl);
        }
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });

          setActiveTab('Dashboard');
          setDashMode('summary');
          logEvent('auth.login', 'user', id, null, { id });
          return true;
        }
        // Fallback to legacy demo users for backward compatibility
        const legacyAllowed = id === 'Bis' || id === 'Raja';
        const legacy = legacyAllowed ? DEMO_USERS[id] : null;
        if (legacy && legacy.password === pw) {
          const newUser = { id, name: legacy.name, email: legacy.email, sections: [...ALL_SECTIONS], access: { ...DEFAULT_ACCESS }, blocked: false, blockedReason: '', blockedAt: '', updatedBy: '', photo: null };
          setUser(newUser);
          // Persist this user so they can log in again
          setUsers(prev => {
            if (!prev.find(u => u.id === id)) return [...prev, newUser];
            return prev;
          });
          setActiveTab('Dashboard');
          setDashMode('summary');
          logEvent('auth.login', 'user', id, null, { id });
          return true;
        }
        return false;
      };

      // Keep live user details (like photo) in sync after Settings updates.
      React.useEffect(() => {
        if (!user?.id) return;
        const latest = users.find(u => u.id === user.id);
        if (!latest) return;
        setUser(prev => (prev ? { ...prev, ...latest } : prev));
      }, [users]);

      // Status change handler (quick actions)
      const quickStatus = (memberId, nextStatus, opts = {}) => {
        setMembers(prev => prev.map(m => {
          if (m.memberId === memberId) {
            const before = { ...m };
            const updated = {
              ...m,
              status: nextStatus,
              staff: user?.name || m.staff || '',
              updatedBy: user?.name || user?.id || '',
            };
            if (nextStatus === 'Hold') {
              updated.holdDuration = opts.holdDuration || m.holdDuration || settings.holdDurations[0];
            } else {
              updated.holdDuration = '';
            }
            // Log
            logEvent('status.changed', 'member', memberId, before, updated);
            triggerStatusSms(updated, before.status, updated.status);
            return updated;
          }
          return m;
        }));
      };

      // Build WhatsApp URL from member details.
      const getWhatsAppLink = (m) => {
        if (!m.mobile) return null;
        if (!m.billingDate) return null;

        const billingDt = asUTC(m.billingDate);
        const lastDt = addDays(billingDt, 7);
        const formattedBillingDate = fmt(billingDt);
        const formattedLastDate = fmt(lastDt);

        const message = `Hi ${m.name}, your bill for ${formattedBillingDate} is ${m.amount}/-.

*You can make your payment using any of the following options:*

*Please find the Google Pay QR link here*: 
https://drive.google.com/file/d/1S0-tuxlHdtqYKYyY2K1e0sN7fmqpf5XL/view?usp=sharing

*Google Pay UPI*: gymactionplus-1@okicici

*Please find the Phone Pay QR link here*: 
https://drive.google.com/file/d/1LjiQ3N6L-JfTfkW5a11oEduiDpCQq0I8/view?usp=drive_link

*Phone Pay UPI ID*: 7047157510@axl

*You can also pay using the gym's mobile number:* +917047157510

Please pay by: ${formattedLastDate}`;

        const cleanPhone = String(m.mobile).replace(/\D/g, '');
        const finalPhone = cleanPhone.length === 10 ? '91' + cleanPhone : cleanPhone;
        return `https://wa.me/${finalPhone}?text=${encodeURIComponent(message)}`;
      };

      // Open WhatsApp with prefilled welcome/payment reminder message.
      const sendWelcomeEmail = (member, templateKey) => {
        if (!member) return;
        const keyByStatus = {
          Active: 'welcome',
          Hold: 'hold',
          Deactivated: 'deactivate',
          Cancelled: 'fine',
        };
        const resolvedKey = templateKey || keyByStatus[member.status] || 'reminder';
        const smsTemplates = {
          ...SMS_TEMPLATE_DEFAULTS,
          ...(settings.smsTemplates || {}),
        };
        const billing = asUTC(member.billingDate);
        const paymentBy = asUTC(member.paymentBy || member.billingDate);
        const replacements = {
          '[Name]': member.name || '',
          '[CustomerName]': member.name || '',
          '[PLAN]': member.plan || '',
          '[CurrentPlan]': member.plan || '',
          '[Amount]': `${Number(member.amount || 0)}`,
          '[BillingDate]': billing ? fmt(billing) : '',
          '[DATE]': billing ? fmt(billing) : '',
          '[GymStartdate]': member.joiningDate ? fmt(member.joiningDate) : '',
          '[LastDate]': paymentBy ? fmt(paymentBy) : '',
          '[PaymentBy]': paymentBy ? fmt(paymentBy) : '',
          '[HoldDate]': fmt(new Date()),
          '[HoldMonth]': member.holdDuration || '1 Month',
          '[TodaysDate]': fmt(new Date()),
          '[NextBillingDate]': billing ? fmt(addMonths(billing, 1)) : '',
          '[NextPaymentDate]': fmt(member.nextPaymentDate || nextPaymentDateFromBillingDate(member)) || '',
          '[ModeOfPayment]': member.paymentMethod || '',
          '[PaymentMethod]': member.paymentMethod || '',
        };
        let message = smsTemplates[resolvedKey] || smsTemplates.reminder || '';
        Object.keys(replacements).forEach((k) => {
          message = message.split(k).join(replacements[k]);
        });
        const cleanPhone = String(member.mobile || '').replace(/\D/g, '');
        if (!cleanPhone) {
          setMembers(prev => prev.map(m => m.memberId === member.memberId ? {
            ...m,
            messageHistory: [{ id: crypto.randomUUID(), channel: 'whatsapp', templateKey: resolvedKey, status: 'failed', reason: 'missing_phone', ts: new Date().toISOString() }, ...(m.messageHistory || [])].slice(0, 50),
          } : m));
          setToast('Mobile number is missing.');
          setTimeout(() => setToast(''), 2500);
          return;
        }
        const finalPhone = cleanPhone.length === 10 ? `91${cleanPhone}` : cleanPhone;
        const url = `https://api.whatsapp.com/send?phone=${finalPhone}&text=${encodeURIComponent(message)}`;
        safeOpenExternal(url);
        const sentAt = new Date().toISOString();
        const sentBy = user?.name || user?.id || 'Staff';
        setMembers(prev => prev.map(m => m.memberId === member.memberId ? {
          ...m,
          reminderSentAt: resolvedKey === 'reminder' ? sentAt : m.reminderSentAt,
          lastSmsSent: {
            ...(m.lastSmsSent || {}),
            [resolvedKey]: { sentAt, sentBy },
          },
          messageHistory: [{ id: crypto.randomUUID(), channel: 'whatsapp', templateKey: resolvedKey, status: 'opened', ts: sentAt, sentAt, sentBy }, ...(m.messageHistory || [])].slice(0, 50),
        } : m));
        logEvent('welcome.whatsapp.opened', 'member', member.memberId, null, { templateKey: resolvedKey });
        setToast('WhatsApp message opened.');
        setTimeout(() => setToast(''), 2500);
      };
      const sendWelcomeGmail = (member) => {
        if (!member) return;
        if (!member.email || !isValidEmail(member.email)) {
          setMembers(prev => prev.map(m => m.memberId === member.memberId ? {
            ...m,
            messageHistory: [{ id: crypto.randomUUID(), channel: 'gmail', templateKey: 'welcome', status: 'failed', reason: 'invalid_email', ts: new Date().toISOString() }, ...(m.messageHistory || [])].slice(0, 50),
          } : m));
          setToast('Member email is missing.');
          setTimeout(() => setToast(''), 2500);
          return;
        }
        const tpl = settings.gmailWelcomeTemplate || GMAIL_WELCOME_TEMPLATE_DEFAULT;
        const rep = {
          '[CustomerName]': member.name || '',
          '[CurrentPlan]': member.plan || '',
          '[GymStartdate]': fmt(member.joiningDate) || '',
          '[NextPaymentDate]': fmt(member.nextPaymentDate || nextPaymentDateFromBillingDate(member)) || '',
        };
        // Keep older saved templates aligned with current wording.
        let body = String(tpl || '').replace(/Next Payment Due:/g, 'Next Payment Date:');
        Object.keys(rep).forEach((k) => { body = body.split(k).join(rep[k]); });
        const url = `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(member.email)}&cc=${encodeURIComponent('gymactionplus@gmail.com')}&su=${encodeURIComponent('Action Plus Gym - Registration Confirmation Mail.')}&body=${encodeURIComponent(body)}`;
        safeOpenExternal(url);
        setMembers(prev => prev.map(m => m.memberId === member.memberId ? {
          ...m,
          messageHistory: [{ id: crypto.randomUUID(), channel: 'gmail', templateKey: 'welcome', status: 'opened', ts: new Date().toISOString() }, ...(m.messageHistory || [])].slice(0, 50),
        } : m));
      };
      const addMemberAttachment = (memberId, attachment) => {
        if (!memberId || !attachment) return;
        setMembers(prev => prev.map(m => {
          if (m.memberId !== memberId) return m;
          const nextAttachments = [...(m.attachments || []), attachment];
          return {
            ...m,
            attachments: nextAttachments,
            staff: user?.name || m.staff || '',
            updatedBy: user?.name || user?.id || '',
          };
        }));
        setToast('Attachment uploaded.');
        setTimeout(() => setToast(''), 2000);
      };
      // Save edits from edit modal
      // Accept the updated member as argument to avoid stale state issues. This fixes
      // the bug where plan changes were not persisted because the editMember
      // state had not yet updated when onSave() was called.
      const saveEdit = (updated) => {
        // Determine which member object we should save. If a member is passed
        // explicitly from the EditMemberModal then use it; otherwise fall back
        // to the current editMember state for backwards compatibility.
        let toSave = updated || editMember;
        if (!toSave) return;
        toSave = {
          ...toSave,
          staff: user?.name || toSave.staff || '',
          updatedBy: user?.name || user?.id || '',
        };
        if (toSave.billingDate) {
          const nextPay = nextPaymentDateFromBillingDate(toSave.billingDate);
          toSave.nextPaymentDate = nextPay;
          toSave.paymentBy = paymentByFromNextPaymentDate(nextPay);
        }
        const beforeMember = members.find(m => m.memberId === toSave.memberId) || null;
        const changed = (key) => String((beforeMember?.[key] ?? '')) !== String((toSave?.[key] ?? ''));
        // Validate required fields
        if ((!toSave.name && changed('name')) || (!toSave.mobile && changed('mobile')) || (!toSave.plan && changed('plan')) || (!toSave.status && changed('status')) || (!toSave.billingDate && changed('billingDate'))) {
          return false;
        }
        if (changed('mobile') && !isValidPhone(toSave.mobile)) {
          setToast('Please enter a valid mobile number.');
          setTimeout(() => setToast(''), 2500);
          return false;
        }
        if (changed('email') && String(toSave.email || '').trim() && !isValidEmail(toSave.email)) {
          setToast('Please enter a valid Gmail ID.');
          setTimeout(() => setToast(''), 2500);
          return false;
        }
        const duplicateMobileMember = changed('mobile')
          ? members.find(m => m.memberId !== toSave.memberId && normalizePhone(m.mobile) === normalizePhone(toSave.mobile))
          : null;
        if (duplicateMobileMember) {
          setDuplicateMobileConflict({
            editedMemberName: toSave.name || '',
            editedMemberPhone: toSave.mobile || '',
            existingMemberName: duplicateMobileMember.name || '',
            existingMemberPhone: duplicateMobileMember.mobile || '',
            existingMemberStatus: duplicateMobileMember.status || '',
          });
          setToast('Duplicate mobile number found.');
          setTimeout(() => setToast(''), 2500);
          return false;
        }
        const duplicateEmail = changed('email') && String(toSave.email || '').trim()
          ? members.some(m => m.memberId !== toSave.memberId && String(m.email || '').trim().toLowerCase() === String(toSave.email || '').trim().toLowerCase())
          : false;
        if (duplicateEmail) {
          setToast('Another member already uses this Gmail ID.');
          setTimeout(() => setToast(''), 2500);
          return false;
        }
        const originalMemberId = editMember?.memberId || toSave.memberId;
        const duplicateMemberId = changed('memberId') && members.some(m => m.memberId !== originalMemberId && String(m.memberId || '').trim() === String(toSave.memberId || '').trim());
        if (duplicateMemberId) {
          setToast('Member ID already exists. Please use a unique ID.');
          setTimeout(() => setToast(''), 2500);
          return false;
        }
        // Enforce status/hold-duration consistency.
        // If hold duration is set, status must be Hold.
        if (toSave.holdDuration && toSave.status !== 'Hold') {
          toSave = { ...toSave, status: 'Hold' };
        }
        // If status is Hold, hold duration is mandatory.
        if (toSave.status === 'Hold' && !String(toSave.holdDuration || '').trim() && (changed('status') || changed('holdDuration'))) {
          window.alert('Hold Duration is required when Status is Hold.');
          return false;
        }
        setMembers(prev => prev.map(m => {
          if (m.memberId === toSave.memberId) {
            logEvent('member.updated', 'member', m.memberId, m, toSave);
            triggerStatusSms(toSave, m.status, toSave.status);
            return { ...toSave };
          }
          return m;
        }));
        // Keep status-trigger history aligned with latest member name/mobile for future sends.
        if (beforeMember && (String(beforeMember.mobile || '') !== String(toSave.mobile || '') || String(beforeMember.name || '') !== String(toSave.name || ''))) {
          setSmsEvents(prev => prev.map(ev => {
            if (ev.memberId !== toSave.memberId) return ev;
            const cleanPhone = String(toSave.mobile || '').replace(/\D/g, '');
            const finalPhone = cleanPhone.length === 10 ? `91${cleanPhone}` : cleanPhone;
            const waUrl = cleanPhone ? `https://api.whatsapp.com/send?phone=${finalPhone}&text=${encodeURIComponent(ev.message || '')}` : null;
            return {
              ...ev,
              memberName: toSave.name || ev.memberName,
              waUrl,
            };
          }));
        }
        const mobileChanged = Boolean(beforeMember) && String(beforeMember.mobile || '') !== String(toSave.mobile || '');
        setToast(mobileChanged ? 'Mobile number updated and messaging links synced.' : `${toSave.name} has been updated successfully`);
        setTimeout(() => setToast(''), 2500);
        // Close the modal
        setEditMember(null);
        return true;
      };
      const saveQuickFieldEdit = (nextValue) => {
        if (!quickFieldEdit) return;
        const target = members.find((m) => m.memberId === quickFieldEdit.memberId);
        if (!target) return;
        let updated = { ...target, [quickFieldEdit.fieldKey]: nextValue };
        if (quickFieldEdit.fieldKey === 'amount') {
          updated.amount = String(nextValue || '').trim();
        }
        if (quickFieldEdit.fieldKey === 'status') {
          if (String(nextValue || '') !== 'Hold') updated.holdDuration = '';
          if (String(nextValue || '') === 'Hold' && !String(updated.holdDuration || '').trim()) {
            updated.holdDuration = settings.holdDurations?.[0] || '1 Month';
          }
        }
        if (quickFieldEdit.fieldKey === 'holdDuration' && String(nextValue || '').trim()) {
          updated.status = 'Hold';
        }
        if (quickFieldEdit.fieldKey === 'billingDate' && nextValue) {
          const nextPay = addMonths(nextValue, 1);
          updated.nextPaymentDate = iso(nextPay);
          updated.paymentBy = iso(addDays(nextPay, 7));
        }
        const ok = saveEdit(updated);
        if (ok) setQuickFieldEdit(null);
      };

      // Permanently remove a member from the system. This function is
      // invoked after the user confirms deletion in the modal. It logs
      // the deletion and updates local state/storage accordingly.
      const deleteMember = (memberId) => {
        setMembers(prev => prev.filter(m => m.memberId !== memberId));
        // Remove any open details rows or pages referencing this member
        // No need to adjust pagination here; DashboardView recalculates
        // pages on members change. Log the deletion for audit purposes.
        logEvent('member.deleted', 'member', memberId, null, null);
      };

      // Save new member from wizard
      const addMember = (m) => {
        const memberWithAudit = {
          ...m,
          staff: user?.name || m.staff || '',
          updatedBy: user?.name || user?.id || '',
        };
        setMembers(prev => [memberWithAudit, ...prev]);
        logEvent('member.created', 'member', memberWithAudit.memberId, null, memberWithAudit);
        setToast(`${memberWithAudit.name} has been saved successfully`);
        setTimeout(() => setToast(''), 2500);
      };

      // Add or update setting option (in Settings page)
      const updateSettingValue = (key, values) => {
        const before = { ...settings[key] };
        setSettings(prev => ({ ...prev, [key]: values }));
        // Log settings updated
        logEvent('settings.updated', 'settings', key, before, values);
      };
      const approveLeaveRequestFromNotification = (requestId) => {
        if (!(user && user.id === 'owner')) return;
        const reqs = Array.isArray(settings?.leaveRequests) ? settings.leaveRequests : [];
        const target = reqs.find(r => r.id === requestId);
        if (!target || target.status !== 'Pending') return;
        const next = reqs.map(r => (
          r.id === requestId
            ? { ...r, status: 'Approved', actionAt: new Date().toISOString(), actionBy: user?.name || user?.id || 'owner' }
            : r
        ));
        updateSettingValue('leaveRequests', next);
        setNotificationOpen(false);
        setToast('Leave request approved.');
        setTimeout(() => setToast(''), 1800);
      };
      const exportData = () => {
        try {
          const payload = {
            version: '1.0',
            exportedAt: new Date().toISOString(),
            members,
            users,
            settings,
            logs,
            financeTransactions,
            filters,
          };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `action-plus-backup-${new Date().toISOString().slice(0, 10)}.json`;
          a.click();
          URL.revokeObjectURL(url);
          logEvent('backup.exported', 'backup', 'local', null, { ok: true });
          setToast('Backup exported successfully');
          setTimeout(() => setToast(''), 2500);
        } catch {
          setToast('Failed to export backup');
          setTimeout(() => setToast(''), 2500);
        }
      };
      const importData = async (file) => {
        if (!file) return;
        try {
          if (file.size > MAX_IMPORT_FILE_BYTES) throw new Error('import-too-large');
          const text = await file.text();
          const parsedRaw = JSON.parse(text);
          const parsed = sanitizeImportValue(parsedRaw);
          if (!parsed || typeof parsed !== 'object') throw new Error('invalid-backup');
          if (!Array.isArray(parsed.members) || !Array.isArray(parsed.users) || !Array.isArray(parsed.logs) || !parsed.settings || typeof parsed.settings !== 'object') {
            throw new Error('invalid-schema');
          }
          setMembers(parsed.members);
          setUsers(parsed.users);
          setLogs(parsed.logs);
          setSettings(parsed.settings);
          setFinanceTransactions(Array.isArray(parsed.financeTransactions) ? parsed.financeTransactions : []);
          setFilters(parsed.filters && typeof parsed.filters === 'object' ? parsed.filters : initialFilters);
          logEvent('backup.imported', 'backup', 'local', null, { members: parsed.members.length, users: parsed.users.length });
          setToast('Backup imported successfully');
          setTimeout(() => setToast(''), 2500);
        } catch {
          setToast('Invalid backup file. Import failed.');
          setTimeout(() => setToast(''), 3000);
        }
      };

      // Derived lists and search
      const filteredMembers = React.useMemo(() => {
        if (dashMode === 'summary') return [];
        if (dashSearch.trim()) {
          const tokens = dashSearch
            .toLowerCase()
            .trim()
            .split(/\s+/)
            .filter(Boolean);
          const includesAllTokens = (value) => {
            const text = String(value || '').toLowerCase();
            return tokens.every(t => text.includes(t));
          };
          const anyFieldMatch = (m) => {
            const haystack = [
              m.memberId,
              m.formNo,
              m.name,
              m.mobile,
              m.email,
              m.plan,
              m.status,
              m.staff,
              m.payMonth,
              fmt(m.billingDate),
              fmt(m.joiningDate),
            ].join(' | ').toLowerCase();
            return tokens.every(t => haystack.includes(t));
          };
          return members.filter(m => {
            const match = (val) => includesAllTokens(val);
            switch (dashField) {
              case 'name': return match(m.name);
              case 'mobile': return match(m.mobile);
              case 'plan': return match(m.plan);
              case 'status': return match(m.status);
              case 'memberId': return match(m.memberId) || match(m.formNo);
              case 'email': return match(m.email);
              case 'staff': return match(m.staff);
              default: return anyFieldMatch(m);
            }
          });
        }
        return members.filter(m => m.status === dashFilter);
      }, [members, dashMode, dashFilter, dashSearch, dashField]);

      // Theme toggle helper
      const toggleTheme = () => {
        setTheme(prev => prev === 'light' ? 'dark' : prev === 'dark' ? 'system' : 'light');
      };

      // If no user, show login screen
      if (!user) {
        return (
          <LoginPage onSubmit={(id, pw) => {
            return login(id, pw);
          }} />
        );
      }

      // Logout handler clears the current user and resets navigation state.
      const logout = () => {
        logEvent('auth.logout', 'user', user?.id || '', { id: user?.id }, null);
        setUser(null);
        setNotificationOpen(false);
        setActiveTab('Dashboard');
        setDashMode('summary');
      };
      const mobilePrimaryTabs = [
        { key: 'Dashboard', label: 'Dashboard', icon: '🏠' },
        { key: 'Members', label: 'Members', icon: '👥' },
        { key: 'Finance', label: 'Billing', icon: '💳' },
        { key: 'Attendance', label: 'Attendance', icon: '🗓️' },
        { key: 'More', label: 'More', icon: '⋯' },
      ];
      return (
        <div className="h-screen overflow-hidden flex bg-slate-100 md:bg-slate-100">
          {mobileMenuOpen && (
            <button
              onClick={() => setMobileMenuOpen(false)}
              className="fixed inset-0 z-30 bg-slate-900/40 md:hidden"
              aria-label="Close navigation overlay"
            />
          )}
          <div className="fixed top-0 inset-x-0 w-full z-20 md:hidden bg-white/95 backdrop-blur border-b border-slate-200 px-4 py-3 flex items-center justify-between">
            <div className="flex items-center gap-2 min-w-0 pr-2">
              <button
                onClick={() => setMobileMenuOpen(true)}
                className="rounded-xl border border-slate-300 bg-white px-2.5 py-1.5 text-xs font-semibold text-slate-700"
                aria-label="Open navigation menu"
              >
                ☰
              </button>
              <div className="text-[15px] leading-tight font-bold text-slate-900 truncate">{activeTab}</div>
              <div className="hidden text-[10px] font-semibold uppercase tracking-[0.14em] text-slate-400 sm:block">Action Plus Gym</div>
            </div>
            <div className="flex items-center gap-1.5">
              {user?.id === 'owner' && (
                <div className="relative">
                  <button
                    onClick={(e) => {
                      e.stopPropagation();
                      setNotificationOpen(v => !v);
                    }}
                    className="relative rounded-xl border border-slate-300 bg-white px-2.5 py-1.5 text-xs font-semibold text-slate-700"
                    aria-label="Notifications"
                  >
                    🔔
                    {pendingLeaveCount > 0 && (
                      <span className="absolute -top-1 -right-1 rounded-full bg-rose-600 px-1.5 py-0.5 text-[9px] font-semibold text-white">{pendingLeaveCount}</span>
                    )}
                  </button>
                  {notificationOpen && (
                    <div onClick={(e) => e.stopPropagation()} className="absolute right-0 mt-1 w-72 rounded-xl border border-slate-200 bg-white shadow-xl p-2 z-50">
                      <div className="px-2 py-1 text-xs font-semibold text-slate-600">Leave Notifications</div>
                      {leaveNotifications.length === 0 ? (
                        <div className="px-2 py-2 text-xs text-slate-500">No pending leave approvals.</div>
                      ) : (
                        <div className="max-h-64 overflow-auto space-y-1">
                          {leaveNotifications.map(n => (
                            <button
                              key={n.id}
                              onClick={() => {
                                setNotificationOpen(false);
                                setLeaveTrackerFocus({ requestId: n.id, userId: n.userId || '' });
                                setActiveTab('Leave Tracker');
                              }}
                              className="w-full rounded-lg border border-slate-200 bg-slate-50 px-2 py-2 text-left hover:bg-slate-100"
                            >
                              <div className="text-xs font-semibold text-slate-800">{n.type} leave request</div>
                              <div className="text-[11px] text-slate-600 mb-1">{n.userId} • {fmt(n.startDate)} - {fmt(n.endDate)}</div>
                              <button
                                onClick={(e) => {
                                  e.stopPropagation();
                                  e.preventDefault();
                                  approveLeaveRequestFromNotification(n.id);
                                }}
                                className="rounded-full border border-emerald-300 bg-emerald-50 px-2.5 py-1 text-[11px] font-semibold text-emerald-700 hover:bg-emerald-100"
                              >
                                Approve
                              </button>
                            </button>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>

      const [filtersOpen, setFiltersOpen] = React.useState(false);
      const [showTrendHistory, setShowTrendHistory] = React.useState(false);
      const [expandedOverdueId, setExpandedOverdueId] = React.useState('');
      const today = new Date();
      const monthlyRevenue = members
        .filter(m => {
          const bd = asUTC(m.billingDate);
          return bd && bd.getFullYear() === today.getFullYear() && bd.getMonth() === today.getMonth();
        })
        .reduce((sum, m) => sum + Number(m.amount || 0), 0);
      const growthRate = React.useMemo(() => {
        const current = members
          .filter(m => {
            const bd = asUTC(m.billingDate);
            return bd && bd.getFullYear() === today.getFullYear() && bd.getMonth() === today.getMonth();
          })
          .reduce((sum, m) => sum + Number(m.amount || 0), 0);
        const prevDt = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        const prev = members
          .filter(m => {
            const bd = asUTC(m.billingDate);
            return bd && bd.getFullYear() === prevDt.getFullYear() && bd.getMonth() === prevDt.getMonth();
          })
          .reduce((sum, m) => sum + Number(m.amount || 0), 0);
        if (!prev) return current ? 100 : 0;
        return Math.round(((current - prev) / prev) * 100);
      }, [members, today]);
      const overdueList = React.useMemo(() => {
        return members
          .filter(m => {
            if (m.status !== 'Active') return false;
            const due = asUTC(m.paymentBy || m.billingDate);
            if (!due || Number.isNaN(due.getTime())) return false;
            return due < today;
          })
          .map(m => {
            const due = asUTC(m.paymentBy || m.billingDate);
            const days = due ? Math.max(1, Math.floor((today - due) / (1000 * 60 * 60 * 24))) : 0;
            return { ...m, overdueDays: days };
          })
          .sort((a, b) => b.overdueDays - a.overdueDays);
      }, [members, today]);
      const allMonthTrend = React.useMemo(() => {
        const dates = members.map(m => asUTC(m.billingDate)).filter(Boolean);
        const start = dates.length
          ? new Date(Math.min(...dates.map(d => d.getTime())))
          : new Date(today.getFullYear(), today.getMonth() - 5, 1);
        const end = new Date(today.getFullYear(), today.getMonth(), 1);
        const labels = [];
        let cursor = new Date(start.getFullYear(), start.getMonth(), 1);
        while (cursor <= end) {
          labels.push({
            label: MONTHS[cursor.getMonth()],
            year: cursor.getFullYear(),
            month: cursor.getMonth(),
          });
          cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
        }
        return labels.map(x => ({
          label: `${x.label}-${String(x.year).slice(-2)}`,
          total: members.reduce((sum, m) => {
            const bd = asUTC(m.billingDate);
            if (!bd) return sum;
            if (bd.getFullYear() !== x.year || bd.getMonth() !== x.month) return sum;
            return sum + Number(m.amount || 0);
          }, 0),
        }));
      }, [members, today]);
      const monthTrend = React.useMemo(() => allMonthTrend.slice(-6), [allMonthTrend]);
      const historicalTrend = React.useMemo(() => allMonthTrend.slice(0, -6), [allMonthTrend]);
      const maxTrend = Math.max(1, ...monthTrend.map(x => x.total));
      const maxHistoricalTrend = Math.max(1, ...historicalTrend.map(x => x.total));
      const planDistribution = React.useMemo(() => {
        const countsByPlan = {};
        members.forEach(m => {
          const key = m.plan || 'Unknown';
          countsByPlan[key] = (countsByPlan[key] || 0) + 1;
        });
        const entries = Object.entries(countsByPlan).sort((a, b) => b[1] - a[1]);
        const total = entries.reduce((sum, [, c]) => sum + c, 0);
        return entries.slice(0, 6).map(([name, count], idx) => ({
          name,
          count,
          pct: total ? Math.round((count / total) * 100) : 0,
          color: ['#93c5fd','#86efac','#fde68a','#fca5a5','#c4b5fd','#67e8f9'][idx % 6],
        }));
      }, [members]);
      const planPie = React.useMemo(() => {
        if (!planDistribution.length) return '#e2e8f0';
        let start = 0;
        const parts = planDistribution.map(p => {
          const from = start;
          const to = start + p.pct;
          start = to;
          return `${p.color} ${from}% ${to}%`;
        });
        if (start < 100) parts.push(`#cbd5e1 ${start}% 100%`);
        return `conic-gradient(${parts.join(', ')})`;
      }, [planDistribution]);
      const tiles = [
        { key: 'Active', color: 'emerald' },
        { key: 'Hold', color: 'amber' },
        { key: 'Deactivated', color: 'pink' },
        { key: 'Cancelled', color: 'slate' }
      ];
      const canViewRevenueMonthly = access?.dashboard?.viewRevenueMonthly !== false;
      const canViewRevenueTrend = access?.dashboard?.viewRevenueTrend !== false;
      const isMobile = useIsMobile();
      if (isMobile) {
        const recentMembers = members.slice(0, 6);
        const insightExpiring = members.filter((m) => {
          const due = asUTC(m.paymentBy || m.billingDate);
          if (!due) return false;
          const diff = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
          return diff === 1;
        }).length;
        const insightOverdue = overdueList.length;
        const insightJoinedToday = members.filter((m) => iso(m.joiningDate) === iso(today)).length;
        return (
          <div className="p-4 space-y-4">
            <div className="flex items-center gap-2 overflow-x-auto pb-1">
              {[
                { key: 'All', onClick: () => onSearch('', 'all') },
                { key: 'Active', onClick: () => onSelectStatus('Active') },
                { key: 'Hold', onClick: () => onSelectStatus('Hold') },
                { key: 'Risk', onClick: () => onSelectStatus('Active') },
                { key: 'Win-back', onClick: () => onSelectStatus('Deactivated') },
              ].map((x, idx) => (
                <button key={x.key} onClick={x.onClick} className={cx('shrink-0 rounded-full px-4 py-2 text-xs font-semibold border', idx === 0 ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200')}>
                  {x.key}
                </button>
              ))}
            </div>
            <div className="flex items-center justify-between">
              <div className="text-base font-semibold text-slate-900">Quick Actions</div>
              <button onClick={() => setFiltersOpen(v => !v)} className="text-xs font-semibold text-blue-600">View All</button>
            </div>
            <div className="grid grid-cols-3 gap-2">
              <button onClick={onAddNew} className="rounded-2xl border border-blue-200 bg-blue-50 p-3 text-xs font-semibold text-blue-700">Add Member</button>
              <button className="rounded-2xl border border-emerald-200 bg-emerald-50 p-3 text-xs font-semibold text-emerald-700">Scan QR</button>
              <button onClick={() => { const target = overdueList[0]; if (target) onWelcome && onWelcome(target, 'reminder'); }} className="rounded-2xl border border-violet-200 bg-violet-50 p-3 text-xs font-semibold text-violet-700">Send Reminder</button>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <button onClick={() => onSelectStatus('Active')} className="rounded-2xl border border-emerald-200 bg-emerald-50 p-4 text-left"><div className="text-xs font-semibold text-emerald-700">Active Members</div><div className="mt-2 text-3xl font-bold text-emerald-800">{counts.Active}</div></button>
              <button onClick={() => onSelectStatus('Hold')} className="rounded-2xl border border-amber-200 bg-amber-50 p-4 text-left"><div className="text-xs font-semibold text-amber-700">Hold Members</div><div className="mt-2 text-3xl font-bold text-amber-800">{counts.Hold}</div></button>
              <button onClick={() => onSelectStatus('Active')} className="rounded-2xl border border-rose-200 bg-rose-50 p-4 text-left"><div className="text-xs font-semibold text-rose-700">Risk Alert</div><div className="mt-2 text-3xl font-bold text-rose-800">{overdueList.length}</div></button>
              <button onClick={() => onSelectStatus('Deactivated')} className="rounded-2xl border border-pink-200 bg-pink-50 p-4 text-left"><div className="text-xs font-semibold text-pink-700">Win-back Opportunity</div><div className="mt-2 text-3xl font-bold text-pink-800">{counts.Deactivated}</div></button>
            </div>
            <div className="rounded-2xl border border-blue-100 bg-blue-50 p-4">
              <div className="text-sm font-semibold text-blue-700">Today&apos;s Insights</div>
              <ul className="mt-2 space-y-1 text-xs text-slate-700">
                <li>{insightExpiring} memberships expiring tomorrow</li>
                <li>{insightOverdue} payments overdue</li>
                <li>{insightJoinedToday} new members joined today</li>
              </ul>
            </div>
            <div>
              <div className="mb-2 flex items-center justify-between">
                <div className="text-base font-semibold text-slate-900">Recent Members</div>
                <button onClick={() => onSelectStatus('Active')} className="text-xs font-semibold text-blue-600">View All</button>
              </div>
              <div className="space-y-2">
                {recentMembers.map((m) => (
                  <button key={m.memberId} onClick={() => onOpenMember && onOpenMember(m.memberId)} className="w-full rounded-2xl border border-slate-200 bg-white px-3 py-2.5 text-left shadow-sm">
                    <div className="flex items-center justify-between gap-2">
                      <div className="flex items-center gap-2 min-w-0">
                        <Avatar name={m.name} photo={m.photo} className="h-9 w-9 rounded-xl" />
                        <div className="min-w-0">
                          <div className="truncate text-sm font-semibold text-slate-900">{m.name}</div>
                          <div className="truncate text-[11px] text-slate-500">{m.mobile || '-'}</div>
                        </div>
                      </div>
                      <Badge tone={toneForStatus(m.status)}>{m.status || '-'}</Badge>
                    </div>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }
      return (
        <div className="p-3 md:p-8 space-y-5">
          <div className="space-y-3">
            <div className="flex items-center justify-between gap-3">
              <h1 className="text-xl md:text-2xl font-semibold text-slate-900">Dashboard</h1>
              <div className="flex items-center gap-2">
                <button
                  onClick={() => setFiltersOpen(prev => !prev)}
                  className="rounded-full px-3 py-1.5 border border-blue-300 bg-blue-50 text-blue-700 text-xs md:text-sm font-medium"
                >
                  {filtersOpen ? 'Hide Filters' : 'Filter'}
                </button>
                <button onClick={onAddNew} className="rounded-full px-4 md:px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs md:text-sm font-semibold flex items-center justify-center gap-2"><span className="text-base">＋</span> Add New Member</button>
              </div>
            </div>
            {filtersOpen && (
              <div className="flex flex-col md:flex-row items-stretch md:items-center gap-2">
                <input
                  value={q}
                  onChange={(e) => { const val = e.target.value; setQ(val); }}
                  placeholder="Search members (name, ID, mobile, email, staff)..."
                  className="flex-1 rounded-xl border border-slate-300 bg-white px-3 py-2 text-xs md:text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 min-w-0"
                />
                <select
                  value={field}
                  onChange={(e) => { const f = e.target.value; setField(f); }}
                  className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-xs md:text-sm md:w-auto"
                >
                  <option value="all">All</option>
                  <option value="name">Name</option>
                  <option value="mobile">Mobile</option>
                  <option value="memberId">Member ID</option>
                  <option value="email">Email</option>
                  <option value="staff">Staff</option>
                  <option value="plan">Plan</option>
                  <option value="status">Status</option>
                </select>
                <button onClick={() => onSearch(q, field)} className="rounded-full px-4 py-2 border border-slate-300 bg-white text-xs md:text-sm font-medium w-full md:w-auto">Search</button>
              </div>
            )}
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-5 gap-4">
            {tiles.map(tile => (
              <button
                key={tile.key}
                onClick={() => onSelectStatus(tile.key)}
                className={cx(
                  'rounded-2xl p-5 text-left shadow hover:shadow-md transition border',
                  tile.color === 'emerald' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' :
                  tile.color === 'amber' ? 'bg-amber-50 border-amber-200 text-amber-700' :
                  tile.color === 'pink' ? 'bg-pink-50 border-pink-200 text-pink-700' :
                  'bg-slate-100 border-slate-200 text-slate-700'
                )}
              >
                <div className="text-sm">{tile.key}</div>
                <div className="mt-2 text-3xl font-bold">{counts[tile.key]}</div>
                <div className="mt-1 text-xs underline">View {tile.key} members</div>
              </button>
            ))}
            {canViewRevenueMonthly && (
              <div className="rounded-2xl p-5 text-left shadow border bg-emerald-50 border-emerald-200 text-emerald-800">
                <div className="text-sm">Total Revenue (Monthly)</div>
                <div className="mt-2 text-3xl font-bold">${monthlyRevenue.toLocaleString()}</div>
                <div className="mt-1 text-xs">Auto from member billing data</div>
              </div>
            )}
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
            {canViewRevenueTrend && (
            <div className="xl:col-span-2 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
              <div className="flex items-center justify-between mb-3">
                <div className="text-lg font-semibold text-slate-800">Revenue and Membership Trends</div>
                <div className="flex items-center gap-3">
                  {historicalTrend.length > 0 && (
                    <button
                      onClick={() => setShowTrendHistory(v => !v)}
                      className="rounded-full px-3 py-1 text-xs font-semibold border border-slate-300 bg-white text-slate-700 hover:bg-slate-100"
                    >
                      {showTrendHistory ? 'Hide Expanded Trend' : `Expand (${historicalTrend.length} more)`}
                    </button>
                  )}
                  <div className={cx('text-sm font-semibold', growthRate >= 0 ? 'text-emerald-700' : 'text-rose-700')}>
                    Growth Rate {growthRate >= 0 ? '+' : ''}{growthRate}%
                  </div>
                </div>
              </div>
              <div className="h-52 overflow-hidden">
                <div className="h-full flex items-end gap-3">
                {monthTrend.map(x => {
                  // Keep headroom for amount/month labels so bars never overlap header text.
                  const h = Math.max(10, Math.round((x.total / maxTrend) * 112));
                  return (
                    <div key={x.label} className="flex-1 h-full flex flex-col justify-end items-center gap-1 min-w-0">
                      <div className="text-[11px] text-slate-500">${x.total.toLocaleString()}</div>
                      <div className="w-full rounded-t-lg bg-blue-400/80" style={{ height: `${h}px` }} />
                      <div className="text-xs text-slate-700">{x.label}</div>
                    </div>
                  );
                })}
                </div>
              </div>
            </div>
            )}
            <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
              <div className="text-lg font-semibold text-slate-800 mb-3">Membership by Plan Type</div>
              <div className="flex items-center gap-4">
                <div className="h-36 w-36 rounded-full border border-slate-200 shrink-0" style={{ background: planPie }} />
                <div className="space-y-1 text-xs">
                  {planDistribution.map(p => (
                    <div key={p.name} className="flex items-center gap-2">
                      <span className="inline-block h-2.5 w-2.5 rounded-full" style={{ background: p.color }} />
                      <span className="text-slate-700">{p.name}</span>
                      <span className="text-slate-500">{p.pct}%</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
          {canViewRevenueTrend && showTrendHistory && historicalTrend.length > 0 && (
            <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
              <div className="text-base font-semibold text-slate-800 mb-3">Expanded Revenue Trend (Older Months)</div>
              <div className="h-44 flex items-end gap-2 overflow-x-auto overflow-y-hidden">
                {historicalTrend.map(x => {
                  const h = Math.max(8, Math.round((x.total / maxHistoricalTrend) * 96));
                  return (
                    <div key={x.label} className="w-16 h-full shrink-0 flex flex-col justify-end items-center gap-1">
                      <div className="text-[10px] text-slate-500">${x.total.toLocaleString()}</div>
                      <div className="w-full rounded-t-lg bg-blue-300/80" style={{ height: `${h}px` }} />
                      <div className="text-[11px] text-slate-700">{x.label}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
            <div className="text-lg font-semibold text-slate-800 mb-3">Overdue Payments and Retention Alerts</div>
            <div className="overflow-x-auto">
              <table className="min-w-full text-sm hidden md:table">
                <thead>
                  <tr className="bg-blue-50 text-blue-700">
                    <th className="px-3 py-2 text-left">Member</th>
                    <th className="px-3 py-2 text-left">ID</th>
                    <th className="px-3 py-2 text-left">Overdue Plan</th>
                    <th className="px-3 py-2 text-left">Overdue Amount</th>
                    <th className="px-3 py-2 text-left">Overdue Since [Days]</th>
                    <th className="px-3 py-2 text-left">Action</th>
                  </tr>
                </thead>
                <tbody>
                  {overdueList.slice(0, 10).map(m => (
                    <React.Fragment key={m.memberId}>
                      <tr className="border-b border-slate-200 hover:bg-slate-50">
                        <td className="px-3 py-2 whitespace-nowrap">{m.name}</td>
                        <td className="px-3 py-2 whitespace-nowrap">{m.memberId}</td>
                        <td className="px-3 py-2 whitespace-nowrap">{m.plan || '-'}</td>
                        <td className="px-3 py-2 whitespace-nowrap">${Number(m.amount || 0).toLocaleString()}</td>
                        <td className="px-3 py-2 whitespace-nowrap">{m.overdueDays}</td>
                        <td className="px-3 py-2 whitespace-nowrap">
                          <div className="flex items-center gap-2">
                            <button
                              onClick={() => onWelcome && onWelcome(m, 'reminder')}
                              className="rounded-full px-3 py-1 text-xs font-medium border border-emerald-200 bg-emerald-50 text-emerald-700 hover:bg-emerald-100"
                            >
                              Send WhatsApp Reminder
                            </button>
                            <SmsSendInfoChip text={getSmsSentInfoText(m, 'reminder')} />
                            <button
                              onClick={() => setExpandedOverdueId(prev => prev === m.memberId ? '' : m.memberId)}
                              className="rounded-full px-3 py-1 text-xs font-medium border border-slate-300 bg-white text-slate-700 hover:bg-slate-100"
                            >
                              {expandedOverdueId === m.memberId ? 'Hide Details' : 'View Details'}
                            </button>
                          </div>
                        </td>
                      </tr>
                      {expandedOverdueId === m.memberId && (
                        <tr className="bg-slate-50 border-b border-slate-200">
                          <td colSpan={6} className="p-3">
                            <MemberDetails m={m} logs={[]} />
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                  {overdueList.length === 0 && (
                    <tr>
                      <td colSpan={6} className="px-3 py-4 text-center text-slate-500">
                        No overdue members. This list auto-updates when payment dates change.
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
              <div className="md:hidden space-y-3">
                {overdueList.slice(0, 10).map(m => (
                  <div key={`mob-${m.memberId}`} className="rounded-xl border border-slate-200 bg-white p-3">
                    <div className="font-semibold text-slate-900">{m.name}</div>
                    <div className="text-xs text-slate-500">ID: {m.memberId}</div>
                    <div className="text-xs text-slate-600 mt-1">Plan: {m.plan || '-'} | Amount: ${Number(m.amount || 0).toLocaleString()}</div>
                    <div className="text-xs text-slate-600">Overdue: {m.overdueDays} days</div>
                    <div className="mt-2 flex gap-2 flex-wrap items-center">
                      <button onClick={() => onWelcome && onWelcome(m, 'reminder')} className="rounded-full px-3 py-2 min-h-[44px] text-xs font-medium border border-emerald-200 bg-emerald-50 text-emerald-700">Send WhatsApp</button>
                      <SmsSendInfoChip text={getSmsSentInfoText(m, 'reminder')} />
                      <button onClick={() => setExpandedOverdueId(prev => prev === m.memberId ? '' : m.memberId)} className="rounded-full px-3 py-2 min-h-[44px] text-xs font-medium border border-slate-300 bg-white text-slate-700">{expandedOverdueId === m.memberId ? 'Hide' : 'Details'}</button>
                    </div>
                    {expandedOverdueId === m.memberId && <div className="mt-2"><MemberDetails m={m} logs={[]} /></div>}
                  </div>
                ))}
                {overdueList.length === 0 && (
                  <div className="px-3 py-4 text-center text-slate-500 text-sm">
                    No overdue members. This list auto-updates when payment dates change.
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ---- Members List (Dashboard list mode) ----
function MembersList({ title, list, onBack, onEdit, onStatusChange, holdOptions, logs, onWelcome, onWelcomeMail, onAddAttachment, onQuickFieldEdit, editOptions, isOwner }) {
      const [openId, setOpenId] = React.useState(null);
      const [mobileDetailMemberId, setMobileDetailMemberId] = React.useState('');
      const [page, setPage] = React.useState(1);
      const pageSize = 10;
      const totalPages = Math.max(1, Math.ceil((list || []).length / pageSize));
      const safePage = page > totalPages ? 1 : page;
      const start = (safePage - 1) * pageSize;
      const pageList = (list || []).slice(start, start + pageSize);
      const mobileDetailMember = React.useMemo(
        () => (list || []).find((m) => m.memberId === mobileDetailMemberId) || null,
        [list, mobileDetailMemberId]
      );
      React.useEffect(() => {
        setPage(1);
      }, [list]);
      return (
        <div className="p-2 md:p-8 space-y-4">
          <div className="flex items-center gap-3 mb-4">
            <button onClick={onBack} className="p-2 rounded-xl hover:bg-slate-200"><span className="text-xl">←</span></button>
            <h1 className="text-xl md:text-2xl font-semibold text-slate-900">{title} ({list.length})</h1>
          </div>
          <div className="rounded-3xl bg-white border border-slate-200 p-2 md:p-4 shadow-sm overflow-hidden">
            <div className="hidden lg:grid grid-cols-12 gap-4 px-3 py-2 text-sm font-semibold bg-blue-50 text-blue-700 border border-blue-100 rounded-2xl">
              <div className="col-span-1">ID</div>
              <div className="col-span-2">Name</div>
              <div className="col-span-2">Plan</div>
              <div className="col-span-2">Billing Date</div>
              <div className="col-span-2">Next Payment Date</div>
              <div className="col-span-3">Status / Action / Welcome</div>
            </div>
            <div className="lg:hidden px-1 pb-2 text-xs text-slate-500">Tap a member card to view full details and actions.</div>
            {pageList.map(m => (
              <MemberRow
                key={m.memberId}
                m={m}
                expanded={openId === m.memberId}
                onToggle={() => setOpenId(openId === m.memberId ? null : m.memberId)}
                onEdit={() => onEdit(m)}
                onStatusChange={onStatusChange}
                holdOptions={holdOptions}
                canDelete={false}
                onDelete={() => {}}
                onWelcome={onWelcome}
                onWelcomeMail={onWelcomeMail}
                onAddAttachment={onAddAttachment}
                logs={logs}
                selectable={false}
                onQuickFieldEdit={onQuickFieldEdit}
                editOptions={editOptions}

function MemberRow({ m, expanded, onToggle, onEdit, onStatusChange, holdOptions, onDelete, canDelete, onWelcome, onWelcomeMail, onAddAttachment, logs, selected, onSelectToggle, selectable, onQuickFieldEdit, editOptions, isOwner, onOpenMobileDetail }) {

      const canWelcome = m.mobile && String(m.mobile).trim();

      const uploadDoc = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > MAX_IMAGE_FILE_BYTES) {
          window.alert('File too large. Please upload up to 10MB.');
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          onAddAttachment && onAddAttachment(m.memberId, {
            id: crypto.randomUUID(),
            name: file.name,
            mime: file.type || 'application/octet-stream',
            size: file.size,
            dataUrl: String(reader.result || ''),
            uploadedAt: new Date().toISOString(),
          });
        };
        reader.readAsDataURL(file);
      };
      return (
        <div className="border-b border-slate-200 last:border-none md:odd:bg-slate-50 md:even:bg-white py-1 md:py-0">
