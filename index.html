    function MemberDetails({ m, logs, onQuickFieldEdit, editOptions }) {
      // Normalise undefined/empty values to a dash to avoid displaying
      // "undefined" or other undesired text in the details panel.
      const normal = (val) => {
        if (val === undefined || val === null || val === '') return '—';
        return val;
      };
      const quickEditableKeys = new Set(['name', 'mobile', 'amount', 'plan', 'status', 'billingDate', 'paymentMethod']);
      const rows = [
        { label: 'Form #', key: 'formNo', value: normal(m.formNo), editable: false },
        { label: 'ID', key: 'memberId', value: normal(m.memberId), editable: false },
        { label: 'Name', key: 'name', value: normal(m.name), editable: quickEditableKeys.has('name'), type: 'text' },
        { label: 'DOB', key: 'dob', value: fmt(m.dob) || '—', editable: false, type: 'date', rawValue: iso(m.dob) || '' },
        { label: 'Gender', key: 'gender', value: normal(m.gender), editable: false, type: 'select', options: editOptions?.genders || [] },
        { label: 'Mobile', key: 'mobile', value: normal(m.mobile), editable: quickEditableKeys.has('mobile'), type: 'tel' },
        { label: 'Email', key: 'email', value: normal(m.email), editable: false, type: 'email' },
        { label: 'Address', key: 'address', value: normal(m.address), editable: false, type: 'text' },
        { label: 'Staff', key: 'staff', value: normal(m.staff), editable: false },
        { label: 'Amount', key: 'amount', value: m.amount !== undefined && m.amount !== null ? m.amount : '—', editable: quickEditableKeys.has('amount'), type: 'number' },
        { label: 'Plan', key: 'plan', value: normal(m.plan), editable: quickEditableKeys.has('plan'), type: 'select', options: editOptions?.plans || [] },
        { label: 'Joining Date', key: 'joiningDate', value: fmt(m.joiningDate) || '—', editable: false, type: 'date', rawValue: iso(m.joiningDate) || '' },
        { label: 'Billing Date', key: 'billingDate', value: fmt(m.billingDate) || '—', editable: quickEditableKeys.has('billingDate'), type: 'date', rawValue: iso(m.billingDate) || '' },
        { label: 'Next Payment Date', key: 'nextPaymentDate', value: fmt(m.nextPaymentDate || nextPaymentDateFromBillingDate(m)) || '—', editable: false },
        { label: 'Payment By', key: 'paymentBy', value: fmt(m.paymentBy) || '—', editable: false },
        { label: 'Status', key: 'status', value: normal(m.status), editable: quickEditableKeys.has('status'), type: 'select', options: editOptions?.statuses || [] },
        { label: 'Hold Duration', key: 'holdDuration', value: normal(m.holdDuration), editable: false, type: 'select', options: ['', ...(editOptions?.holdDurations || [])] },
        { label: 'Payment Method', key: 'paymentMethod', value: normal(m.paymentMethod), editable: quickEditableKeys.has('paymentMethod'), type: 'select', options: editOptions?.paymentMethods || [] },
        { label: 'Pay Month', key: 'payMonth', value: normal(m.payMonth), editable: false },
      ];
      const requiredLabels = new Set([
        'Form #',
        'ID',
        'Name',
        'DOB',
        'Gender',
        'Mobile',
        'Address',
        'Staff',
        'Amount',
        'Plan',
        'Joining Date',
        'Billing Date',
        'Next Payment Date',
        'Payment By',
        'Status',
        'Payment Method'
      ]);
      const memberLogs = (logs || []).filter(l => l.entityId === m.memberId).slice(0, 2);
      const attachmentsBlock = Array.isArray(m.attachments) && m.attachments.length > 0 ? (
        <div className="pb-2 border-b border-slate-200 space-y-1">
          <div className="text-xs font-semibold text-slate-600">Uploaded Documents</div>
          <div className="flex flex-wrap gap-2">
            {m.attachments.map((a) => (
              <button
                key={a.id}
                onClick={() => {
                  const link = document.createElement('a');
                  link.href = a.dataUrl;
                  link.download = a.name || 'attachment';
                  link.click();
                }}
                className="rounded-full border border-slate-300 bg-white px-3 py-1 text-xs font-medium text-slate-700 hover:bg-slate-100"
              >
                {a.name}
              </button>
            ))}
          </div>
        </div>
      ) : null;
      const activityBlock = (
        <div className="pt-2 border-t border-slate-200">
          <div className="text-xs font-semibold text-slate-600 mb-2">Recent Activity</div>
          <div className="space-y-1">
            {memberLogs.map(l => (
              <div key={l.id} className="text-xs text-slate-600 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1">
                <span>{l.action}</span>
                <span className="text-slate-500">{fmt(l.ts)}</span>
              </div>
            ))}
            {memberLogs.length === 0 && (
              <div className="text-xs text-slate-400">No activity yet.</div>
            )}
          </div>
        </div>
      );
      const rowCards = rows.map((row) => (
        <div
          key={row.label}
          onClick={() => {
            if (!row.editable || !onQuickFieldEdit) return;
            onQuickFieldEdit({
              memberId: m.memberId,
              fieldKey: row.key,
              label: row.label,
              type: row.type || 'text',
              value: row.rawValue !== undefined ? row.rawValue : (m[row.key] ?? ''),
              options: row.options || [],
            });
          }}
          className={cx(
            'rounded-lg border px-2.5 py-2 min-w-0',
            requiredLabels.has(row.label) ? 'border-amber-200 bg-amber-50/40' : 'border-slate-200 bg-white',
            row.editable ? 'cursor-pointer hover:border-blue-300 hover:bg-blue-50/40 transition-colors' : ''
          )}
        >
          <div className="flex items-center gap-1.5">
            <div className={cx('text-[11px] uppercase tracking-wide', requiredLabels.has(row.label) ? 'text-amber-700 font-semibold' : 'text-slate-500')}>
              {row.label}
            </div>
            {requiredLabels.has(row.label) && (
              <span className="rounded-full border border-amber-300 bg-amber-100 px-1.5 py-0.5 text-[9px] font-semibold text-amber-700">
                REQUIRED
              </span>
            )}
            {row.editable && (
              <span className="rounded-full border border-blue-200 bg-blue-50 px-1.5 py-0.5 text-[9px] font-semibold text-blue-700">
                EDIT
              </span>
            )}
          </div>
          <div className="mt-0.5 font-semibold text-slate-900 break-words">{String(row.value)}</div>
        </div>
      ));
      return (
        <div className="rounded-xl border border-slate-200 bg-slate-50 p-3 sm:p-4 text-sm space-y-3">
          <MemberDetailsMobileView rowCards={rowCards} attachmentsBlock={attachmentsBlock} activityBlock={activityBlock} />
          <MemberDetailsDesktopView rowCards={rowCards} attachmentsBlock={attachmentsBlock} activityBlock={activityBlock} />
        </div>
      );
    }

    function MemberDetailsMobileView({ rowCards, attachmentsBlock, activityBlock }) {
      return (
        <div className="md:hidden space-y-3">
          {attachmentsBlock}
          <div className="grid grid-cols-1 gap-2.5">
            {rowCards}
          </div>
          {activityBlock}
        </div>
      );
    }

    function MemberDetailsDesktopView({ rowCards, attachmentsBlock, activityBlock }) {
      return (
        <div className="hidden md:block space-y-3">
          {attachmentsBlock}
          <div className="grid grid-cols-2 lg:grid-cols-3 gap-2.5 sm:gap-3">
            {rowCards}
          </div>
          {activityBlock}
        </div>
      );
    }

    // ---- Quick Actions (Activate / Hold / Deactivate) ----
function QuickActions({ m, onStatusChange, holdOptions, canDelete, onDelete }) {
      const [sel, setSel] = React.useState(holdOptions[0] || '1 Month');
      return (
        <div className="flex flex-wrap items-center gap-2">
          {/* Activate button shown when member is not already active */}
          {m.status !== 'Active' && (
            <button
              onClick={() => onStatusChange(m.memberId, 'Active')}
              className="inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium border border-emerald-200 bg-emerald-50 text-emerald-700 hover:bg-emerald-100"
            >
              Activate
            </button>
          )}
          {/* Hold selection and button */}
          <div className="flex items-center gap-2">
            <select
              value={sel}
              onChange={(e) => setSel(e.target.value)}
              className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm"
            >
              {holdOptions.map(x => <option key={x} value={x}>{x}</option>)}
            </select>
            <button
              onClick={() => onStatusChange(m.memberId, 'Hold', { holdDuration: sel })}
              className="inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium border border-amber-200 bg-amber-50 text-amber-700 hover:bg-amber-100"
            >
              Hold
            </button>
          </div>
          {/* Deactivate button */}
          {m.status !== 'Deactivated' && (
            <button
              onClick={() => onStatusChange(m.memberId, 'Deactivated')}
              className="inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium border border-pink-200 bg-pink-50 text-pink-700 hover:bg-pink-100"
            >
              Deactivate
            </button>
          )}
          {/* Delete button (owner only) */}
          {canDelete && (
            <button
              onClick={() => onDelete(m)}
              className="inline-flex items-center gap-2 rounded-xl px-3 py-2 text-sm font-medium border border-red-200 bg-red-50 text-red-700 hover:bg-red-100"
            >
              Delete
            </button>
          )}
        </div>
      );
    }

    // ---- Dashboard View (Members grouped by status) ----
function DashboardView({ members, onEdit, onStatusChange, holdOptions, logs, filters, filterOpen, setFilterOpen, anyFilterActive, canDelete, onDelete, billingMonthOptions, onWelcome, onWelcomeMail, onAddAttachment, onQuickFieldEdit, editOptions, isOwner }) {
      // Single expanded row across all statuses. Only one memberId may be expanded at a time.
      const [expandedId, setExpandedId] = React.useState(null);
      const [mobileDetailMemberId, setMobileDetailMemberId] = React.useState('');
      const [focusStatus, setFocusStatus] = React.useState('');
      const [selectedIds, setSelectedIds] = React.useState([]);
      const [visibleByStatus, setVisibleByStatus] = React.useState({ Active: 20, Hold: 20, Deactivated: 20, Cancelled: 20 });
      const sectionRefs = React.useRef({});
      // Pagination state per status tab. Each status has its own current page.
      const [pages, setPages] = React.useState({ Active: 1, Hold: 1, Deactivated: 1, Cancelled: 1 });
      // When members or filters change, reset pagination to page 1 for each status.
      React.useEffect(() => {
        setPages({ Active: 1, Hold: 1, Deactivated: 1, Cancelled: 1 });
        setSelectedIds([]);
        setVisibleByStatus({ Active: 20, Hold: 20, Deactivated: 20, Cancelled: 20 });
      }, [members, filters]);
      React.useEffect(() => {
        if (!focusStatus) return;
        const node = sectionRefs.current[focusStatus];
        if (node && typeof node.scrollIntoView === 'function') {
          node.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, [focusStatus]);
      const toggleSelect = (id) => {
        setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
      };
      const applyBulkStatus = (status, opts = {}) => {
        selectedIds.forEach(id => onStatusChange(id, status, opts));
        setSelectedIds([]);
      };
      // Apply filters to the full member list. All filters are AND'ed.
      const applyFilters = React.useCallback((list) => {
        return list.filter(m => {
          if (filters.plan && m.plan !== filters.plan) return false;
          if (filters.status && m.status !== filters.status) return false;
          if (filters.paymentMethod && m.paymentMethod !== filters.paymentMethod) return false;
          if (filters.staff && m.staff !== filters.staff) return false;
          // Billing month filter: compare Month-YYYY string derived from billing date.
          if (filters.billingMonth) {
            const dt = asUTC(m.billingDate);
            const bm = dt ? `${MONTHS[dt.getUTCMonth()]}-${dt.getUTCFullYear()}` : '';
            if (bm !== filters.billingMonth) return false;
          }
          // Joining date range
          if (filters.joinFrom) {
            const jf = asUTC(filters.joinFrom);
            const md = asUTC(m.joiningDate);
            if (jf && md && md < jf) return false;
          }
          if (filters.joinTo) {
            const jt = asUTC(filters.joinTo);
            const md = asUTC(m.joiningDate);
            if (jt && md && md > jt) return false;
          }
          // Billing date range
          if (filters.billFrom) {
            const bf = asUTC(filters.billFrom);
            const bd = asUTC(m.billingDate);
            if (bf && bd && bd < bf) return false;
          }
          if (filters.billTo) {
            const bt = asUTC(filters.billTo);
            const bd = asUTC(m.billingDate);
            if (bt && bd && bd > bt) return false;
          }
          return true;
        });
      }, [filters]);
      // Filter members and group by status
      const grouped = React.useMemo(() => {
        const list = applyFilters(members);
        return {
          Active: list.filter(m => m.status === 'Active'),
          Hold: list.filter(m => m.status === 'Hold'),
          Deactivated: list.filter(m => m.status === 'Deactivated'),
          Cancelled: list.filter(m => m.status === 'Cancelled'),
        };
      }, [members, applyFilters]);
      // Page size determines how many members to show per page in each
      // status group. Show maximum 10 rows per page.
      const pageSize = 10;
      const chipClass = (isActive, activeCls, idleCls) => cx(
        'rounded-xl px-2.5 py-1.5 text-[11px] md:text-xs font-semibold border transition-all duration-150',
        isActive ? `${activeCls} ring-2 ring-offset-1 shadow-sm` : `${idleCls} hover:shadow-sm`
      );
      const overdueCount = React.useMemo(() => {
        const today = new Date();
        return applyFilters(members).filter(m => {
          if (m.status !== 'Active') return false;
          const due = asUTC(m.paymentBy || m.billingDate);
          return due && due < today;
        }).length;
      }, [members, applyFilters]);
      const winbackCount = grouped.Deactivated.length;
      const isMobile = useIsMobile();
      const mobileDetailMember = React.useMemo(
        () => members.find((m) => m.memberId === mobileDetailMemberId) || null,
        [members, mobileDetailMemberId]
      );
      if (isMobile) {
        const mobileList = applyFilters(members);
        return (
          <div className="p-4 space-y-3">
            <div className="flex items-center justify-between">
              <h1 className="text-xl font-semibold text-slate-900">Members</h1>
              <button onClick={() => setFilterOpen(true)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700">⌕</button>
            </div>
            <div className="flex gap-2 overflow-x-auto pb-1">
              {[
                { key: '', label: 'All' },
                { key: 'Active', label: 'Active' },
                { key: 'Hold', label: 'Hold' },
                { key: 'Risk', label: 'Risk' },
                { key: 'Deactivated', label: 'Win-back' },
              ].map((x) => (
                <button
                  key={x.label}
                  onClick={() => setFocusStatus(x.key === 'Risk' ? 'Active' : x.key)}
                  className={cx('shrink-0 rounded-full px-4 py-2 text-xs font-semibold border', (focusStatus || '') === (x.key === 'Risk' ? 'Active' : x.key) ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200')}
                >
                  {x.label}
                </button>
              ))}
            </div>
            <div className="space-y-2">
              {mobileList.filter((m) => {
                if (!focusStatus) return true;
                if (focusStatus === 'Active') return m.status === 'Active';
                return m.status === focusStatus;
              }).map((m) => (
                <MemberRow
                  key={m.memberId}
                  m={m}
                  expanded={false}
                  onToggle={() => {}}
                  onEdit={() => onEdit(m)}
                  onStatusChange={onStatusChange}
                  holdOptions={holdOptions}
                  canDelete={canDelete}
                  onDelete={onDelete}
                  onWelcome={onWelcome}
                  onWelcomeMail={onWelcomeMail}
                  onAddAttachment={onAddAttachment}
                  logs={logs}
                  selectable={false}
                  onQuickFieldEdit={onQuickFieldEdit}
                  editOptions={editOptions}
                  isOwner={isOwner}
                  onOpenMobileDetail={(member) => setMobileDetailMemberId(member?.memberId || '')}
                />
              ))}
            </div>
            {mobileDetailMember && (
              <MobileMemberDetailView
                m={mobileDetailMember}
                onBack={() => setMobileDetailMemberId('')}
                onEdit={(member) => {
                  setMobileDetailMemberId('');
                  onEdit && onEdit(member);
                }}
                onWelcome={onWelcome}
                onStatusChange={onStatusChange}
                holdOptions={holdOptions}
                canDelete={canDelete}
                onDelete={onDelete}
                isOwner={isOwner}
                onQuickFieldEdit={onQuickFieldEdit}
                editOptions={editOptions}
              />
            )}
          </div>
        );
      }
      return (
        <div className="p-3 md:p-8 space-y-5">
          {/* Header row with Filter button */}
          <div className="flex items-center justify-between mb-4 gap-2 flex-wrap">
            <h1 className="text-xl md:text-2xl font-semibold text-slate-900">Members</h1>
            <div className="flex items-center gap-2 flex-wrap">
              <button aria-pressed={!focusStatus} onClick={() => setFocusStatus('')} className={chipClass(!focusStatus, 'bg-blue-600 text-white border-blue-600 ring-blue-200', 'bg-blue-50 text-blue-700 border-blue-200')}>All Members</button>
              <button aria-pressed={focusStatus === 'Active'} onClick={() => setFocusStatus('Active')} className={chipClass(focusStatus === 'Active', 'bg-emerald-600 text-white border-emerald-600 ring-emerald-200', 'bg-emerald-50 text-emerald-700 border-emerald-200')}>Active ({grouped.Active.length})</button>
              <button aria-pressed={focusStatus === 'Hold'} onClick={() => setFocusStatus('Hold')} className={chipClass(focusStatus === 'Hold', 'bg-amber-500 text-white border-amber-500 ring-amber-200', 'bg-amber-50 text-amber-700 border-amber-200')}>Hold ({grouped.Hold.length})</button>
              <button aria-pressed={focusStatus === 'Deactivated'} onClick={() => setFocusStatus('Deactivated')} className={chipClass(focusStatus === 'Deactivated', 'bg-pink-600 text-white border-pink-600 ring-pink-200', 'bg-pink-50 text-pink-700 border-pink-200')}>Deactivated ({grouped.Deactivated.length})</button>
              <button aria-pressed={focusStatus === 'Cancelled'} onClick={() => setFocusStatus('Cancelled')} className={chipClass(focusStatus === 'Cancelled', 'bg-slate-700 text-white border-slate-700 ring-slate-200', 'bg-slate-100 text-slate-700 border-slate-200')}>Cancelled ({grouped.Cancelled.length})</button>
              {selectedIds.length > 0 && (
                <>
                  <span className="text-sm text-slate-600">{selectedIds.length} selected</span>
                  <button onClick={() => applyBulkStatus('Active')} className="rounded-xl px-3 py-2 border border-emerald-300 bg-emerald-50 text-emerald-700 text-xs font-medium">Bulk Activate</button>
                  <button onClick={() => applyBulkStatus('Hold', { holdDuration: holdOptions[0] || '1 Month' })} className="rounded-xl px-3 py-2 border border-amber-300 bg-amber-50 text-amber-700 text-xs font-medium">Bulk Hold</button>
                  <button onClick={() => applyBulkStatus('Deactivated')} className="rounded-xl px-3 py-2 border border-pink-300 bg-pink-50 text-pink-700 text-xs font-medium">Bulk Deactivate</button>
                </>
              )}
              <button
                onClick={() => setFilterOpen(true)}
                className="flex items-center gap-2 rounded-xl px-4 py-2 border border-blue-300 bg-blue-50 text-blue-700 hover:bg-blue-100"
              >
                <span>🔍</span>
                <span>Filter</span>
                {anyFilterActive && (
                  <span className="ml-2 inline-block bg-blue-600 text-white text-xs font-semibold px-2 py-0.5 rounded-full">•</span>
                )}
              </button>
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
            <div className="rounded-2xl border border-emerald-200 bg-emerald-50 p-4">
              <div className="text-xs font-semibold text-emerald-700">ACTIVE MEMBERS</div>
              <div className="mt-2 text-2xl font-bold text-emerald-800">{grouped.Active.length}</div>
              <div className="text-xs text-emerald-700">View Active Members</div>
            </div>
            <div className="rounded-2xl border border-amber-200 bg-amber-50 p-4">
              <div className="text-xs font-semibold text-amber-700">HOLD MEMBERS</div>
              <div className="mt-2 text-2xl font-bold text-amber-800">{grouped.Hold.length}</div>
              <div className="text-xs text-amber-700">View Hold Members</div>
            </div>
            <div className="rounded-2xl border border-orange-200 bg-orange-50 p-4">
              <div className="text-xs font-semibold text-orange-700">RISK ALERT</div>
              <div className="mt-2 text-2xl font-bold text-orange-800">{overdueCount}</div>
              <div className="text-xs text-orange-700">Billing Overdue</div>
            </div>
            <div className="rounded-2xl border border-rose-200 bg-rose-50 p-4">
              <div className="text-xs font-semibold text-rose-700">WIN-BACK OPPORTUNITY</div>
              <div className="mt-2 text-2xl font-bold text-rose-800">{winbackCount}</div>
              <div className="text-xs text-rose-700">Deactivated Members</div>
            </div>
          </div>
          {(focusStatus ? [focusStatus] : ['Active','Hold','Deactivated','Cancelled']).map(key => {
            const list = grouped[key];
            const totalPages = Math.max(1, Math.ceil(list.length / pageSize));
            const page = pages[key] > totalPages ? 1 : pages[key];
            const start = (page - 1) * pageSize;
            const end = start + pageSize;
            const pageList = list.slice(start, end).slice(0, visibleByStatus[key] || 20);
            return (
              <div key={key} className="space-y-3" ref={(el) => { sectionRefs.current[key] = el; }}>
                <h2 className="text-xl font-semibold">{key} Members ({list.length})</h2>
                <div className="rounded-3xl bg-white p-4 shadow-sm">
                  <div className="hidden md:grid grid-cols-12 gap-4 px-3 py-2 text-sm font-semibold bg-blue-50 text-blue-700 border border-blue-100 rounded-2xl">
                    <div className="col-span-1">ID</div>
                    <div className="col-span-2">Name</div>
                    <div className="col-span-2">Plan</div>
                    <div className="col-span-2">Billing Date</div>
                    <div className="col-span-2">Next Payment Date</div>
                    <div className="col-span-3">Status / Action / Welcome</div>
                  </div>
                  {pageList.map(m => (
                    <MemberRow
                      key={m.memberId}
                      m={m}
                      expanded={expandedId === m.memberId}
                      onToggle={() => setExpandedId(prev => (prev === m.memberId ? null : m.memberId))}
                      onEdit={() => onEdit(m)}
                      onStatusChange={onStatusChange}
                      holdOptions={holdOptions}
                      canDelete={canDelete}
                      onDelete={onDelete}
                      onWelcome={onWelcome}
                      onWelcomeMail={onWelcomeMail}
                      onAddAttachment={onAddAttachment}
                      logs={logs}
                      selectable={true}
                      selected={selectedIds.includes(m.memberId)}
                      onSelectToggle={toggleSelect}
                      onQuickFieldEdit={onQuickFieldEdit}
                      editOptions={editOptions}
                      isOwner={isOwner}
                      onOpenMobileDetail={(member) => setMobileDetailMemberId(member?.memberId || '')}
                    />
                  ))}
                  {pageList.length === 0 && (
                    <div className="px-3 py-4 text-slate-500 text-sm">No results found.</div>
                  )}
                  {list.slice(start, end).length > pageList.length && (
                    <div className="px-3 py-3">
                      <button onClick={() => setVisibleByStatus(v => ({ ...v, [key]: (v[key] || 20) + 20 }))} className="rounded-full border border-slate-300 bg-white px-3 py-1 text-xs font-medium text-slate-700 hover:bg-slate-100">Load 20 more</button>
                    </div>
                  )}
                  {/* Pagination controls */}
                  {list.length > pageSize && (
                    <div className="flex items-center justify-between mt-2 text-sm">
                      <div className="">Page {page} of {totalPages}</div>
                      <div className="flex gap-2">
                        <button
                          onClick={() => setPages(p => ({ ...p, [key]: Math.max(1, p[key] - 1) }))}
                          disabled={page === 1}
                          className={cx(
                            'px-3 py-1 rounded-lg border',
                            page === 1 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white text-blue-700 hover:bg-blue-50 border-blue-300'
                          )}
                        >Prev</button>
                        <button
                          onClick={() => setPages(p => ({ ...p, [key]: Math.min(totalPages, p[key] + 1) }))}
                          disabled={page === totalPages}
                          className={cx(
                            'px-3 py-1 rounded-lg border',
                            page === totalPages ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white text-blue-700 hover:bg-blue-50 border-blue-300'
                          )}
                        >Next</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
          {mobileDetailMember && (
            <MobileMemberDetailView
              m={mobileDetailMember}
              onBack={() => setMobileDetailMemberId('')}
              onEdit={(member) => {
                setMobileDetailMemberId('');
                onEdit && onEdit(member);
              }}
              onWelcome={onWelcome}
              onStatusChange={onStatusChange}
              holdOptions={holdOptions}
              canDelete={canDelete}
              onDelete={onDelete}
              isOwner={isOwner}
              onQuickFieldEdit={onQuickFieldEdit}
              editOptions={editOptions}
            />
          )}
        </div>
      );
    }

    // ---- Edit Member Modal ----
function EditMemberModal({ member, onClose, onSave, planOptions, statusOptions, holdOptions, paymentOptions, canEditFormNo }) {
      const [edit, setEdit] = React.useState(() => ({ ...member }));
      // Derived nextPaymentDate and paymentBy update when billingDate changes
      React.useEffect(() => {
        if (edit.billingDate) {
          const nextPay = addMonths(edit.billingDate, 1);
          const payBy = addDays(nextPay, 7);
          setEdit(e => ({ ...e, nextPaymentDate: iso(nextPay), paymentBy: iso(payBy) }));
        }
      }, [edit.billingDate]);
      // Validate required and numeric fields. Name, mobile, plan, status,
      // billingDate and amount are mandatory. Amount must be a positive integer.
      const req = {
        name: !String(edit.name || '').trim(),
        mobile: !String(edit.mobile || '').trim() || !isValidPhone(edit.mobile),
        plan: !edit.plan,
        status: !edit.status,
        billingDate: !iso(edit.billingDate),
        amount: !String(edit.amount || '').trim() || !(/^\d+$/.test(String(edit.amount).trim())) || Number(edit.amount) <= 0,
        email: String(edit.email || '').trim() ? !isValidEmail(edit.email) : false,
        paymentMethod: !String(edit.paymentMethod || '').trim(),
        holdDuration: edit.status === 'Hold' && !String(edit.holdDuration || '').trim(),
      };
      // Determine if any field has been modified compared to the original member. We
      // allow Save only when at least one field differs (dirty) and all
      // required fields are valid. Without this, the Save button might remain
      // disabled unless the plan changes. See bug description.
      // Determine if any user‑editable field has changed. Only compare a
      // whitelist of fields that the user can modify through the modal.
      const onMemberPhoto = async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        if (file.size > MAX_IMAGE_FILE_BYTES) {
          setToast('Image too large. Please upload a file up to 10MB.');
          setTimeout(() => setToast(''), 2500);
          return;
        }
        try {
          const raw = await loadImageDataUrl(file);
          const compressed = await downscaleImageDataUrl(raw);
          setEdit(prev => ({ ...prev, photo: compressed }));
        } catch {
          setToast('Unable to process image. Please try another file.');
          setTimeout(() => setToast(''), 2500);
        }
      };
      const dirty = React.useMemo(() => {
        // Compare editable fields to determine if anything changed. Include
        // formNo, amount and paymentMethod in addition to existing fields.
        const keysToCheck = ['formNo','memberId','name','email','mobile','plan','status','holdDuration','billingDate','amount','paymentMethod','photo'];
        return keysToCheck.some(k => {
          const a = edit[k] ?? '';
          const b = member[k] ?? '';
          return String(a) !== String(b);
        });
      }, [edit, member]);
      const changed = React.useMemo(() => ({
        name: String(edit.name ?? '') !== String(member.name ?? ''),
        mobile: String(edit.mobile ?? '') !== String(member.mobile ?? ''),
        plan: String(edit.plan ?? '') !== String(member.plan ?? ''),
        status: String(edit.status ?? '') !== String(member.status ?? ''),
        billingDate: String(iso(edit.billingDate) ?? '') !== String(iso(member.billingDate) ?? ''),
        amount: String(edit.amount ?? '') !== String(member.amount ?? ''),
        email: String(edit.email ?? '') !== String(member.email ?? ''),
        paymentMethod: String(edit.paymentMethod ?? '') !== String(member.paymentMethod ?? ''),
        holdDuration: String(edit.holdDuration ?? '') !== String(member.holdDuration ?? ''),
      }), [edit, member]);
      const blockingReq = {
        name: req.name && changed.name,
        mobile: req.mobile && changed.mobile,
        plan: req.plan && changed.plan,
        status: req.status && changed.status,
        billingDate: req.billingDate && changed.billingDate,
        amount: req.amount && changed.amount,
        email: req.email && changed.email,
        paymentMethod: req.paymentMethod && changed.paymentMethod,
        holdDuration: req.holdDuration && (changed.status || changed.holdDuration),
      };
      const legacyInvalidFields = React.useMemo(() => {
        const labels = [];
        if (req.mobile && !changed.mobile) labels.push('Mobile Number');
        if (req.email && !changed.email) labels.push('Gmail');
        if (req.amount && !changed.amount) labels.push('Amount');
        if (req.paymentMethod && !changed.paymentMethod) labels.push('Payment Method');
        if (req.name && !changed.name) labels.push('Name');
        if (req.plan && !changed.plan) labels.push('Plan');
        if (req.status && !changed.status) labels.push('Status');
        if (req.billingDate && !changed.billingDate) labels.push('Billing Date');
        return labels;
      }, [req, changed]);
      const fieldClass = (key) => cx(
        'w-full rounded-xl border px-3 py-2 text-sm',
        blockingReq[key] ? 'border-rose-300 bg-rose-50 text-rose-700' : req[key] ? 'border-amber-300 bg-amber-50 text-amber-800' : 'border-slate-300 bg-white'
      );
      const showLegacyFail = (key) => Boolean(req[key] && !blockingReq[key]);
      const ValidationHint = ({ fieldKey }) => (
        showLegacyFail(fieldKey) ? <p className="mt-1 text-[11px] text-amber-700">Validation Fail</p> : null
      );
      const isInvalid = Object.values(blockingReq).some(Boolean);
      const labelBase = 'text-sm font-medium';
      const ReqLabel = ({ children }) => (
        <span className="inline-flex items-center gap-1.5">
          <span className="text-amber-700 font-semibold">{children}</span>
          <span className="rounded-full border border-amber-300 bg-amber-100 px-1.5 py-0.5 text-[9px] font-semibold text-amber-700">REQUIRED</span>
        </span>
      );
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
          <div className="w-full max-w-3xl rounded-3xl bg-white shadow-xl max-h-[92vh] overflow-hidden">
            <div className="flex items-center justify-between px-6 py-4">
              <h3 className="text-lg font-semibold">Edit Member — {member.name}</h3>
              <button onClick={onClose} className="rounded-xl p-2 hover:bg-slate-200"><span>✕</span></button>
            </div>
            <div className="px-4 md:px-6 pb-4 max-h-[70vh] overflow-auto">
              {legacyInvalidFields.length > 0 && (
                <div className="mb-3 rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-xs text-amber-800">
                  <span className="font-semibold">Validation Fail:</span> {legacyInvalidFields.join(', ')}. Correct the value when possible. You can still update other fields.
                </div>
              )}
              <div className="mb-4 flex items-center gap-3">
                <Avatar name={edit.name || member.name} photo={edit.photo} className="h-14 w-14" />
                <label className="cursor-pointer rounded-xl border border-slate-300 px-3 py-2 text-sm hover:bg-slate-100">
                  <input type="file" accept="image/*" className="hidden" onChange={onMemberPhoto} />
                  Change Photo
                </label>
                {edit.photo && (
                  <button
                    type="button"
                    onClick={() => setEdit(prev => ({ ...prev, photo: '' }))}
                    className="rounded-xl border border-slate-300 px-3 py-2 text-sm hover:bg-slate-100"
                  >
                    Remove
                  </button>
                )}
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {/* Row 1: Form Number and Member ID */}
                <div>
                  <label className="text-xs md:text-sm font-medium">Form Number</label>
                  <input value={edit.formNo ?? ''} onChange={(e) => setEdit({ ...edit, formNo: e.target.value })} readOnly={!canEditFormNo} className={cx('w-full rounded-xl border px-3 py-2 text-sm', canEditFormNo ? 'border-slate-300 bg-white' : 'border-slate-200 bg-slate-100 text-slate-500')} />
                </div>
                <div>
                  <label className="text-sm font-medium">Member Id</label>
                  <input value={edit.memberId} onChange={(e) => setEdit({ ...edit, memberId: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
                </div>
                {/* Row 2: Name and Mobile */}
                <div>
                  <label className={labelBase}><ReqLabel>Name</ReqLabel></label>
                  <input value={edit.name} onChange={(e) => setEdit({ ...edit, name: e.target.value })} className={fieldClass('name')} />
                  <ValidationHint fieldKey="name" />
                </div>
                <div>
                  <label className={labelBase}><ReqLabel>Mobile Number</ReqLabel></label>
                  <input value={edit.mobile} onChange={(e) => setEdit({ ...edit, mobile: e.target.value })} className={fieldClass('mobile')} />
                  <ValidationHint fieldKey="mobile" />
                </div>
                <div>
                  <label className="text-sm font-medium">Gmail</label>
                  <input
                    type="email"
                    value={edit.email || ''}
                    onChange={(e) => setEdit({ ...edit, email: e.target.value })}
                    placeholder="example@gmail.com"
                    className={fieldClass('email')}
                  />
                  <ValidationHint fieldKey="email" />
                </div>
                {/* Row 3: Plan and Status */}
                <div>
                  <label className={labelBase}><ReqLabel>Plan</ReqLabel></label>
                  <select value={edit.plan} onChange={(e) => setEdit({ ...edit, plan: e.target.value })} className={fieldClass('plan')}>
                    {planOptions.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                  <ValidationHint fieldKey="plan" />
                </div>
                <div>
                  <label className={labelBase}><ReqLabel>Status</ReqLabel></label>
                  <select
                    value={edit.status}
                    onChange={(e) => {
                      const nextStatus = e.target.value;
                      setEdit(prev => ({
                        ...prev,
                        status: nextStatus,
                        // Keep data consistent: holdDuration only applies to Hold status.
                        holdDuration: nextStatus === 'Hold' ? prev.holdDuration : '',
                      }));
                    }}
                    className={fieldClass('status')}
                  >
                    {statusOptions.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                  <ValidationHint fieldKey="status" />
                  <p className="mt-1 text-xs text-slate-500">
                    Selecting a Hold Duration will automatically set Status to Hold.
                  </p>
                </div>
                {/* Row 4: Hold Duration and Billing Date */}
                <div>
                  <label className="text-sm font-medium">Hold Duration</label>
                  <select
                    value={edit.holdDuration || ''}
                    onChange={(e) => {
                      const val = e.target.value;
                      setEdit(prev => ({
                        ...prev,
                        holdDuration: val,
                        // If user picks a hold duration, status must be Hold.
                        status: val ? 'Hold' : prev.status,
                      }));
                    }}
                    className={fieldClass('holdDuration')}
                  >
                    <option value="">—</option>
                    {holdOptions.map(h => <option key={h} value={h}>{h}</option>)}
                  </select>
                  <ValidationHint fieldKey="holdDuration" />
                  {req.holdDuration && (
                    <p className="mt-1 text-xs text-rose-600">Hold Duration is required when status is Hold.</p>
                  )}
                </div>
                <div>
                  <label className={labelBase}><ReqLabel>Billing Date</ReqLabel></label>
                  <input type="date" value={iso(edit.billingDate)} onChange={(e) => setEdit({ ...edit, billingDate: e.target.value })} className={fieldClass('billingDate')} />
                  <ValidationHint fieldKey="billingDate" />
                </div>
                {/* Row 5: Amount and Payment Method */}
                <div>
                  <label className={labelBase}><ReqLabel>Amount (INR)</ReqLabel></label>
                  <input value={edit.amount ?? ''} onChange={(e) => {
                    const val = e.target.value;
                    if (/^\d*$/.test(val)) setEdit({ ...edit, amount: val });
                  }} className={fieldClass('amount')} />
                  <ValidationHint fieldKey="amount" />
                </div>
                <div>
                  <label className={labelBase}><ReqLabel>Payment Method</ReqLabel></label>
                  <select value={edit.paymentMethod || ''} onChange={(e) => setEdit({ ...edit, paymentMethod: e.target.value })} className={fieldClass('paymentMethod')}>
                    {paymentOptions.map(pm => <option key={pm} value={pm}>{pm}</option>)}
                  </select>
                  <ValidationHint fieldKey="paymentMethod" />
                </div>
                {/* Row 6: Next Payment Date and Payment By */}
                <div>
                  <label className="text-sm font-medium">Next Payment Date</label>
                  <input readOnly value={fmt(edit.nextPaymentDate)} className="w-full rounded-xl border border-slate-200 bg-slate-100 px-3 py-2 text-sm text-slate-500" />
                </div>
                <div>
                  <label className="text-sm font-medium">Payment By</label>
                  <input readOnly value={fmt(edit.paymentBy)} className="w-full rounded-xl border border-slate-200 bg-slate-100 px-3 py-2 text-sm text-slate-500" />
                </div>
                {/* Row 7: Staff */}
                <div>
                  <label className="text-sm font-medium">Staff</label>
                  <input readOnly value={edit.staff || ''} className="w-full rounded-xl border border-slate-200 bg-slate-100 px-3 py-2 text-sm text-slate-500" />
                </div>
              </div>
            </div>
            <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 px-4 sm:px-6 py-4">
              <button onClick={onClose} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium w-full sm:w-auto">Cancel</button>
                <button
                onClick={() => {
                  // Pass the current edit object back to the parent save handler. Do not
                  // update editMember state here; the parent will handle closing the modal.
                  const ok = onSave(edit);
                  if (ok) onClose();
                }}
                disabled={isInvalid || !dirty}
                className={cx(
                  'rounded-xl px-4 py-2 text-sm font-medium w-full sm:w-auto',
                  (isInvalid || !dirty)
                    ? 'bg-slate-300 text-slate-500 cursor-not-allowed'
                    : 'bg-blue-600 hover:bg-blue-700 text-white'
                )}
              >
                Save
              </button>
            </div>
          </div>
        </div>
      );
    }

    function QuickFieldEditModal({ quickFieldEdit, onClose, onSave }) {
      const [value, setValue] = React.useState(quickFieldEdit?.value ?? '');
      React.useEffect(() => {
        setValue(quickFieldEdit?.value ?? '');
      }, [quickFieldEdit]);
      if (!quickFieldEdit) return null;
      const isSelect = quickFieldEdit.type === 'select';
      const isDate = quickFieldEdit.type === 'date';
      const isNumber = quickFieldEdit.type === 'number';
      const isEmail = quickFieldEdit.type === 'email';
      const isTel = quickFieldEdit.type === 'tel';

        <div className="fixed inset-0 z-[90] flex items-end sm:items-center justify-center bg-slate-900/50 p-2 sm:p-4">

                  {(quickFieldEdit.options || []).map((opt) => (

                  inputMode={isNumber || isTel ? 'numeric' : undefined}
                  value={String(value ?? '')}
                  onChange={(e) => setValue(e.target.value)}
                  className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm"
                />

              <div className="text-xs text-slate-500">This will update only this field for the selected member.</div>
            </div>
            <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 px-4 sm:px-5 py-4 border-t border-slate-200">
              <button onClick={onClose} className="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-medium w-full sm:w-auto">Cancel</button>
              <button onClick={() => onSave(value)} className="rounded-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 text-sm font-medium w-full sm:w-auto">Update</button>
            </div>
          </div>
        </div>
      );
    }

    // ---- Add Member Wizard ----
    function AddMemberWizard({ open, onClose, onSave, settings, staffName, members, canEditFormNo }) {
      const [step, setStep] = React.useState(1);
      const [hideFooterOnMobile, setHideFooterOnMobile] = React.useState(false);
      const [form, setForm] = React.useState({
        formNo: '',
        name: '',
        email: '',
        dob: '',
        gender: '',
        mobile: '',
        address: '',
        staff: staffName || '',
        amount: '',
        plan: '',
        joiningDate: iso(new Date()),
        billingDate: iso(new Date()),
        nextPaymentDate: iso(addMonths(new Date(), 1)),
        paymentBy: paymentByFromNextPaymentDate(addMonths(new Date(), 1)),
        status: 'Active',
        paymentMethod: settings.paymentMethods[0],
        remark: '',
        photo: '',
        attachments: [],
        medicalSkipped: false,
        medicalAnswers: {
          heartDisease: '', cardiovascularCondition: '', bloodPressure: '', arthritis: '', goutFamilyHistory: '', otherCondition: '',
          injuries: { knees: false, lowerBack: false, neckShoulders: false, hipsPelvis: false, flexibility: false, other: '' },
          pregnant: 'No', pregnantWeeks: '', physicalActivity: '', surgeryHistory: '', smoking: '', medication: '', extraInfo: '',
        },
        ackAccepted: false,
        ackSignature: '',
        ackDate: iso(new Date()),
        parentGuardianName: '',
        parentGuardianDob: '',
        parentGuardianSignature: '',
      });
      const [warn, setWarn] = React.useState('');
      const DRAFT_KEY = STORAGE_KEYS.addMemberDraft;
      // Update staff when prop changes
      React.useEffect(() => { setForm(f => ({ ...f, staff: staffName || '' })); }, [staffName]);
      React.useEffect(() => {
        if (!open) return;
        try {
          const raw = localStorage.getItem(DRAFT_KEY);
          if (!raw) return;
          const parsed = JSON.parse(raw);
          if (parsed && parsed.form && parsed.step) {
            setForm(f => ({ ...f, ...parsed.form, staff: staffName || parsed.form.staff || '' }));
            setStep(Math.max(1, Math.min(5, Number(parsed.step) || 1)));
          }
        } catch {}
      }, [open, staffName]);
      React.useEffect(() => {
        if (!open) return;
        try {
          localStorage.setItem(DRAFT_KEY, JSON.stringify({ step, form }));
        } catch {}
      }, [open, step, form]);
      React.useEffect(() => {
        if (!open) {
          setHideFooterOnMobile(false);
          return;
        }
        const isSmallScreen = () => window.matchMedia('(max-width: 640px)').matches;
        const isEditableField = (el) => {
          if (!el) return false;
          const tag = String(el.tagName || '').toLowerCase();
          return tag === 'input' || tag === 'textarea' || tag === 'select';
        };
        const onFocusIn = (e) => {
          if (!isSmallScreen()) return;
          if (isEditableField(e.target)) setHideFooterOnMobile(true);
        };
        const onFocusOut = () => {
          if (!isSmallScreen()) return;
          window.requestAnimationFrame(() => {
            const active = document.activeElement;
            setHideFooterOnMobile(isEditableField(active));
          });
        };
        document.addEventListener('focusin', onFocusIn);
        document.addEventListener('focusout', onFocusOut);
        return () => {
          document.removeEventListener('focusin', onFocusIn);
          document.removeEventListener('focusout', onFocusOut);
          setHideFooterOnMobile(false);
        };
      }, [open]);

      // Auto generate the next form number when the wizard opens. We look at all
      // existing members' form numbers, interpret them as integers and pick the
      // next number. This value will be assigned to form.formNo when the modal
      // opens. If there are no members yet, start from 1.
      React.useEffect(() => {
        if (!open) return;
        try {
          const nums = (members || []).map(m => {
            const fn = m.formNo;
            return typeof fn === 'number' ? fn : Number(fn);
          }).filter(n => Number.isFinite(n) && n > 0);
          const max = nums.length ? Math.max(...nums) : 0;
          const next = max + 1;
          setForm(f => ({ ...f, formNo: String(next) }));
        } catch {
          setForm(f => ({ ...f, formNo: '1' }));
        }
      }, [open, members]);
      // Auto update billing and payment dates when joiningDate changes
      React.useEffect(() => {
        if (form.joiningDate) {
          const joinIso = iso(form.joiningDate);
          const todayIso = iso(new Date());
          const bd = joinIso === todayIso ? asUTC(new Date()) : addMonths(form.joiningDate, 1);
          const nextPay = addMonths(bd, 1);
          const pb = addDays(nextPay, 7);
          setForm(f => ({ ...f, billingDate: iso(bd), nextPaymentDate: iso(nextPay), paymentBy: iso(pb) }));
        }
      }, [form.joiningDate]);
      // Auto update paymentBy when billingDate changes
      React.useEffect(() => {
        if (form.billingDate) {
          const nextPay = addMonths(form.billingDate, 1);
          const pb = addDays(nextPay, 7);
          setForm(f => ({ ...f, nextPaymentDate: iso(nextPay), paymentBy: iso(pb) }));
        }
      }, [form.billingDate]);
      // Define which fields are mandatory for each step. We'll validate these before allowing the user
      // to proceed to the next step. All fields are required per the new requirements.
      const req1 = {
        formNo: !form.formNo,
        name: !form.name.trim(),
        email: !form.email.trim() || !isValidEmail(form.email),
        dob: !form.dob || !asUTC(form.dob) || asUTC(form.dob) > asUTC(new Date()),
        gender: !form.gender,
        mobile: !form.mobile.trim() || !isValidPhone(form.mobile),
        address: !form.address.trim()
      };
      // Validate that amount is a positive integer (no decimals, not zero or negative)
      const isPositiveInt = (val) => /^\d+$/.test(String(val).trim()) && Number(val) > 0;
      const req2 = {
        staff: !form.staff.trim(),
        amount: !form.amount || !isPositiveInt(form.amount),
        plan: !form.plan,
        joiningDate: !form.joiningDate,
        billingDate: !form.billingDate,
        paymentBy: !form.paymentBy,
        status: !form.status
      };
      const req3 = { paymentMethod: !form.paymentMethod };
      const isMinor = ageFromDob(form.dob) !== null && ageFromDob(form.dob) < 18;
      const req5 = {
        ackAccepted: !form.ackAccepted,
        ackSignature: !String(form.ackSignature || '').trim(),
        parentGuardianName: isMinor && !String(form.parentGuardianName || '').trim(),
        parentGuardianSignature: isMinor && !String(form.parentGuardianSignature || '').trim(),
      };
      const missingSummary = React.useMemo(() => {
        const lines = [];
        if (req1.formNo) lines.push('Form Number');
        if (req1.name) lines.push('Full Name');
        if (req1.email) lines.push('Valid Gmail');
        if (req1.dob) lines.push('Valid DOB');
        if (req1.gender) lines.push('Gender');
        if (req1.mobile) lines.push('Valid Mobile Number');
        if (req1.address) lines.push('Address');
        if (req2.amount) lines.push('Amount');
        if (req2.plan) lines.push('Plan');
        if (req2.joiningDate) lines.push('Joining Date');
        if (req2.billingDate) lines.push('Billing Date');
        if (req2.paymentBy) lines.push('Payment By');
        if (req2.status) lines.push('Status');
        if (req3.paymentMethod) lines.push('Payment Method');
        if (req5.ackAccepted) lines.push('Acknowledgement Accepted');
        if (req5.ackSignature) lines.push('Acknowledgement Signature');
        if (req5.parentGuardianName) lines.push('Parent/Guardian Name');
        if (req5.parentGuardianSignature) lines.push('Parent/Guardian Signature');
        return lines;
      }, [req1, req2, req3, req5]);
      const reqCls = (invalid) => cx('w-full rounded-xl border bg-white px-3 py-2 text-sm', invalid ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-slate-300');
      const reqClsXs = (invalid) => cx('w-full rounded-xl border bg-white px-3 py-2 text-xs md:text-sm', invalid ? 'border-rose-300 bg-rose-50 text-rose-700' : 'border-slate-300');
      const readOnlyCls = 'w-full rounded-xl border border-slate-200 bg-slate-100 px-3 py-2 text-sm text-slate-500';
      const reqMark = <span className="ml-1 text-rose-600 font-semibold">*</span>;
      const focusField = (fieldId) => {
        if (!fieldId) return;
        window.requestAnimationFrame(() => {
          const el = document.getElementById(fieldId);
          if (!el) return;
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          try { el.focus(); } catch {}
        });
      };
      const firstInvalidStepField = (stepNo) => {
        if (stepNo === 1) {
          if (req1.formNo) return 'add-member-formNo';
          if (req1.name) return 'add-member-name';
          if (req1.email) return 'add-member-email';
          if (req1.dob) return 'add-member-dob';
          if (req1.gender) return 'add-member-gender';
          if (req1.mobile) return 'add-member-mobile';
          if (req1.address) return 'add-member-address';
        }
        if (stepNo === 2) {
          if (req2.amount) return 'add-member-amount';
          if (req2.plan) return 'add-member-plan';
          if (req2.joiningDate) return 'add-member-joiningDate';
          if (req2.billingDate) return 'add-member-billingDate';
          if (req2.status) return 'add-member-status';
        }
        if (stepNo === 3 && req3.paymentMethod) return 'add-member-paymentMethod';
        if (stepNo === 5) {
          if (req5.ackAccepted) return 'add-member-ackAccepted';
          if (req5.ackSignature) return 'add-member-ackSignature';
          if (req5.parentGuardianName) return 'add-member-parentGuardianName';
          if (req5.parentGuardianSignature) return 'add-member-parentGuardianSignature';
        }
        return null;
      };
      const next = () => {
        setWarn('');
        if (step === 1) {
          // Ensure all required fields in step 1 are provided
          if (Object.values(req1).some(Boolean)) {
            setWarn('Please fill all required fields in Step 1.');
            focusField(firstInvalidStepField(1));
            return;
          }
        } else if (step === 2) {
          if (Object.values(req2).some(Boolean)) {
            setWarn('Please fill all required fields in Step 2.');
            focusField(firstInvalidStepField(2));
            return;
          }
        }
        if (step === 3 && Object.values(req3).some(Boolean)) {
          setWarn('Please fill all required fields in Step 3.');
          focusField(firstInvalidStepField(3));
          return;
        }
        if (step === 5 && Object.values(req5).some(Boolean)) {
          setWarn('Please complete the acknowledgement details in Step 5.');
          focusField(firstInvalidStepField(5));
          return;
        }
        setStep(s => Math.min(5, s + 1));
      };
      const back = () => setStep(s => Math.max(1, s - 1));
      const onPhoto = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        if (file.size > MAX_IMAGE_FILE_BYTES) {
          setWarn('Image too large. Please upload a file up to 10MB.');
          return;
        }
        try {
          const raw = await loadImageDataUrl(file);
          const compressed = await downscaleImageDataUrl(raw);
          setForm(f => ({ ...f, photo: compressed }));
        } catch {
          setWarn('Unable to process photo. Please try another image.');
        }
      };
      const onAttachment = async (e) => {
        const files = Array.from(e.target.files || []);
        if (!files.length) return;
        const valid = files.filter(f => f.size <= MAX_IMAGE_FILE_BYTES);
        if (valid.length !== files.length) setWarn('Some files were skipped (over 10MB).');
        const entries = await Promise.all(valid.map((file) => new Promise((resolve) => {
          const r = new FileReader();
          r.onload = () => resolve({
            id: crypto.randomUUID(),
            name: file.name,
            mime: file.type || 'application/octet-stream',
            size: file.size,
            dataUrl: String(r.result || ''),
            uploadedAt: new Date().toISOString(),
          });
          r.onerror = () => resolve(null);
          r.readAsDataURL(file);
        })));
        setForm(f => ({ ...f, attachments: [...(f.attachments || []), ...entries.filter(Boolean)] }));
      };
      const save = () => {
        setWarn('');
        // Validate all fields on final step
        if (Object.values(req1).some(Boolean) || Object.values(req2).some(Boolean) || Object.values(req3).some(Boolean) || Object.values(req5).some(Boolean)) {
          setWarn('Please fill all required fields.');
          if (Object.values(req1).some(Boolean)) {
            setStep(1);
            focusField(firstInvalidStepField(1));
          } else if (Object.values(req2).some(Boolean)) {
            setStep(2);
            focusField(firstInvalidStepField(2));
          } else if (Object.values(req3).some(Boolean)) {
            setStep(3);
            focusField(firstInvalidStepField(3));
          } else if (Object.values(req5).some(Boolean)) {
            setStep(5);
            focusField(firstInvalidStepField(5));
          }
          return;
        }
        // Duplicate mobile check
        const trimmedMobile = form.mobile.trim();
        const duplicate = (members || []).some(m => String(m.mobile).trim() === trimmedMobile);
        if (duplicate) {
          setWarn('A member with this mobile number already exists. Please use a different mobile number.');
          return;
        }
        const trimmedEmail = String(form.email || '').trim().toLowerCase();
        const duplicateEmail = (members || []).some(m => String(m.email || '').trim().toLowerCase() === trimmedEmail);
        if (duplicateEmail) {
          setWarn('A member with this email already exists. Please use a different Gmail.');
          return;
        }
        // Generate member ID and payMonth label
        const yearSuffix = String(new Date().getFullYear()).slice(-2);
        const memberId = `APG-${form.formNo}/${yearSuffix}`;
        const duplicateMemberId = (members || []).some(m => String(m.memberId || '').trim() === memberId);
        if (duplicateMemberId) {
          setWarn('Generated member ID already exists. Please change Form Number.');
          return;
        }
        const payMonth = payMonthLabel(addMonths(form.billingDate, 1));
        const newMember = {
          ...form,
          memberId,
          formNo: Number(form.formNo),
          amount: Number(form.amount || 0),
          nextPaymentDate: form.nextPaymentDate || nextPaymentDateFromBillingDate(form.billingDate),
          payMonth
        };
        onSave(newMember);
        try { localStorage.removeItem(DRAFT_KEY); } catch {}
        onClose();
        setStep(1);
        setForm({
          formNo: '',
          name: '',
          email: '',
          dob: '',
          gender: '',
          mobile: '',
          address: '',
          staff: staffName || '',
          amount: '',
          plan: '',
          joiningDate: iso(new Date()),
          billingDate: iso(new Date()),
          nextPaymentDate: iso(addMonths(new Date(), 1)),
          paymentBy: paymentByFromNextPaymentDate(addMonths(new Date(), 1)),
          status: 'Active',
          paymentMethod: settings.paymentMethods[0],
          remark: '',
          photo: '',
          attachments: [],
          medicalSkipped: false,
          medicalAnswers: {
            heartDisease: '', cardiovascularCondition: '', bloodPressure: '', arthritis: '', goutFamilyHistory: '', otherCondition: '',
            injuries: { knees: false, lowerBack: false, neckShoulders: false, hipsPelvis: false, flexibility: false, other: '' },
            pregnant: 'No', pregnantWeeks: '', physicalActivity: '', surgeryHistory: '', smoking: '', medication: '', extraInfo: '',
          },
          ackAccepted: false,
          ackSignature: '',
          ackDate: iso(new Date()),
          parentGuardianName: '',
          parentGuardianDob: '',
          parentGuardianSignature: '',
        });
      };
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-slate-900/50 p-2 sm:p-4 overflow-y-auto">
          <div className="w-full max-w-3xl rounded-t-3xl sm:rounded-3xl bg-white shadow-xl max-h-[95dvh] sm:max-h-[92vh] overflow-hidden">
            <div className="flex items-center justify-between px-4 sm:px-6 py-4">
              <h3 className="text-lg font-semibold">Add New Member — Step {step}</h3>
              <button onClick={onClose} className="rounded-xl p-2 hover:bg-slate-200"><span>✕</span></button>
            </div>
            <div className="px-4 sm:px-6 pb-3">
              <div className="h-2 rounded-full bg-slate-200 overflow-hidden">
                <div className="h-full bg-blue-600 transition-all" style={{ width: `${(step / 5) * 100}%` }} />
              </div>
              <div className="mt-2 text-xs text-slate-500"><span className="text-rose-600 font-semibold">*</span> Required fields</div>
            </div>
            <div className="px-4 sm:px-6 pb-36 sm:pb-6 max-h-[calc(95dvh-170px)] sm:max-h-[70vh] overflow-auto">
              {warn && <div className="mb-3 rounded-xl bg-amber-50 text-amber-800 border border-amber-200 px-3 py-2 text-sm">{warn}</div>}
              {step === 5 && missingSummary.length > 0 && (
                <div className="mb-3 rounded-xl bg-rose-50 text-rose-800 border border-rose-200 px-3 py-2 text-sm">
                  Missing required fields: {missingSummary.join(', ')}
                </div>

              {step === 1 && (
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                  <div>
                    <label className="text-sm font-medium">Form Number{reqMark}</label>
                    <input
                      id="add-member-formNo"
                      value={form.formNo}
                      onChange={(e) => setForm({ ...form, formNo: e.target.value })}
                      inputMode="numeric"
                      readOnly={!canEditFormNo}
                      className={canEditFormNo ? reqClsXs(req1.formNo) : readOnlyCls}
                    />
                  </div>
                  <div><label className="text-xs md:text-sm font-medium">Full Name{reqMark}</label><input id="add-member-name" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className={reqClsXs(req1.name)} /></div>
                  <div><label className="text-sm font-medium">Gmail{reqMark}</label><input id="add-member-email" type="email" value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} placeholder="example@gmail.com" className={reqCls(req1.email)} /></div>
                  <div><label className="text-sm font-medium">Date of Birth{reqMark}</label><input id="add-member-dob" type="date" value={form.dob} onChange={(e) => setForm({ ...form, dob: e.target.value })} className={reqCls(req1.dob)} /></div>
                  <div><label className="text-sm font-medium">Gender{reqMark}</label><select id="add-member-gender" value={form.gender} onChange={(e) => setForm({ ...form, gender: e.target.value })} className={reqCls(req1.gender)}>

                  <div><label className="text-sm font-medium">Mobile Number{reqMark}</label><input id="add-member-mobile" inputMode="numeric" value={form.mobile} onChange={(e) => setForm({ ...form, mobile: e.target.value })} className={reqCls(req1.mobile)} /></div>
                  <div className="sm:col-span-2"><label className="text-sm font-medium">Address{reqMark}</label><input id="add-member-address" value={form.address} onChange={(e) => setForm({ ...form, address: e.target.value })} className={reqCls(req1.address)} /></div>
                </div>

              {step === 2 && (

                  <div>

                    <input

                        }
                      }}
                      placeholder="Enter amount"
                      className={reqCls(req2.amount)}
                    />
                  </div>
                  <div><label className="text-sm font-medium">Plan{reqMark}</label><select id="add-member-plan" value={form.plan} onChange={(e) => setForm({ ...form, plan: e.target.value })} className={reqCls(req2.plan)}>
                    <option value="">Select plan</option>
                    {settings.plans.map(p => <option key={p} value={p}>{p}</option>)}
                  </select></div>
                  <div><label className="text-sm font-medium">Joining Date{reqMark}</label><input id="add-member-joiningDate" type="date" value={form.joiningDate} onChange={(e) => setForm({ ...form, joiningDate: e.target.value })} className={reqCls(req2.joiningDate)} /></div>
                  <div><label className="text-sm font-medium">Billing Date{reqMark}</label><input id="add-member-billingDate" type="date" value={form.billingDate} onChange={(e) => setForm({ ...form, billingDate: e.target.value })} className={reqCls(req2.billingDate)} /></div>
                  <div><label className="text-sm font-medium">Next Payment Date</label><input type="date" value={form.nextPaymentDate || nextPaymentDateFromBillingDate(form.billingDate)} readOnly className={readOnlyCls} /></div>
                  <div><label className="text-sm font-medium">Payment By</label><input type="date" value={form.paymentBy} readOnly className={readOnlyCls} /></div>
                  <div><label className="text-sm font-medium">Status{reqMark}</label><select id="add-member-status" value={form.status} onChange={(e) => setForm({ ...form, status: e.target.value })} className={reqCls(req2.status)}>
                    {settings.statuses.map(s => <option key={s} value={s}>{s}</option>)}
                  </select></div>
                </div>
              )}
              {step === 3 && (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div><label className="text-sm font-medium">Payment Mode{reqMark}</label><select id="add-member-paymentMethod" value={form.paymentMethod} onChange={(e) => setForm({ ...form, paymentMethod: e.target.value })} className={reqCls(req3.paymentMethod)}>
                    {settings.paymentMethods.map(p => <option key={p} value={p}>{p}</option>)}
                  </select></div>
                  <div>
                    <label className="text-sm font-medium">Member Photo</label>
                    <div className="flex items-center gap-3">
                      <Avatar name={form.name} photo={form.photo} className="h-12 w-12" />
                      <label className="cursor-pointer rounded-xl border border-slate-300 px-3 py-2 text-sm hover:bg-slate-100">
                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={onPhoto} />
                        Take / Upload Photo
                      </label>
                    </div>
                  </div>
                  <div>
                    <label className="text-sm font-medium">Upload Documents (up to 10MB each)</label>
                    <label className="mt-1 inline-block cursor-pointer rounded-xl border border-slate-300 px-3 py-2 text-sm hover:bg-slate-100">
                      <input type="file" multiple className="hidden" onChange={onAttachment} />
                      Add Document
                    </label>
                    {(form.attachments || []).length > 0 && (
                      <div className="mt-2 flex flex-wrap gap-2">
                        {form.attachments.map((a) => (
                          <button key={a.id} type="button" onClick={() => setForm(f => ({ ...f, attachments: (f.attachments || []).filter(x => x.id !== a.id) }))} className="rounded-full border border-slate-300 bg-white px-3 py-1 text-xs text-slate-700 hover:bg-slate-100">{a.name} ✕</button>
                        ))}
                      </div>
                    )}
                  </div>
                  <div className="col-span-2"><label className="text-sm font-medium">Remark</label><textarea value={form.remark} onChange={(e) => setForm({ ...form, remark: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" rows={3} placeholder="Enter a short note" /></div>
                </div>
              )}
              {step === 4 && (
                <div className="space-y-4 pb-6">
                  <div className="text-sm text-slate-600">{settings.medicalQuestionnaireTemplate || MEDICAL_QUESTIONNAIRE_TEMPLATE_DEFAULT}</div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {[
                      ['heartDisease','Heart Disease'],
                      ['cardiovascularCondition','Cardiovascular Condition'],
                      ['bloodPressure','High/Low Blood Pressure'],
                      ['arthritis','Arthritis'],
                      ['goutFamilyHistory','Gout Family Hx of Heart Disease'],
                      ['otherCondition','Other Condition'],
                    ].map(([key,label]) => (
                      <div key={key} className="rounded-xl border border-slate-200 p-3">
                        <div className="text-sm font-medium mb-1">{label}</div>
                        <div className="flex gap-3 text-sm">
                          <label><input type="radio" name={key} checked={form.medicalAnswers[key] === 'Y'} onChange={() => setForm({ ...form, medicalAnswers: { ...form.medicalAnswers, [key]: 'Y' } })} /> Yes</label>
                          <label><input type="radio" name={key} checked={form.medicalAnswers[key] === 'N'} onChange={() => setForm({ ...form, medicalAnswers: { ...form.medicalAnswers, [key]: 'N' } })} /> No</label>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div><label className="text-sm font-medium">Injuries / Notes</label><textarea value={form.medicalAnswers.extraInfo} onChange={(e) => setForm({ ...form, medicalAnswers: { ...form.medicalAnswers, extraInfo: e.target.value } })} rows={3} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Pregnant (Yes/No) and weeks</label><input value={`${form.medicalAnswers.pregnant || 'No'} ${form.medicalAnswers.pregnantWeeks || ''}`.trim()} onChange={(e) => setForm({ ...form, medicalAnswers: { ...form.medicalAnswers, pregnant: e.target.value.includes('Yes') ? 'Yes' : 'No', pregnantWeeks: e.target.value } })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Physical activity</label><input value={form.medicalAnswers.physicalActivity} onChange={(e) => setForm({ ...form, medicalAnswers: { ...form.medicalAnswers, physicalActivity: e.target.value } })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Surgery history</label><input value={form.medicalAnswers.surgeryHistory} onChange={(e) => setForm({ ...form, medicalAnswers: { ...form.medicalAnswers, surgeryHistory: e.target.value } })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Smoking details</label><input value={form.medicalAnswers.smoking} onChange={(e) => setForm({ ...form, medicalAnswers: { ...form.medicalAnswers, smoking: e.target.value } })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  <div><label className="text-sm font-medium">Medication details</label><input value={form.medicalAnswers.medication} onChange={(e) => setForm({ ...form, medicalAnswers: { ...form.medicalAnswers, medication: e.target.value } })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                </div>
              )}
              {step === 5 && (
                <div className="space-y-4 pb-6">
                  <div className="rounded-xl border border-slate-200 bg-slate-50 p-3 text-xs whitespace-pre-wrap">{settings.acknowledgementTemplate || ACKNOWLEDGEMENT_TEMPLATE_DEFAULT}</div>
                  <label className="flex items-center gap-2 text-sm"><input id="add-member-ackAccepted" type="checkbox" checked={form.ackAccepted} onChange={(e) => setForm({ ...form, ackAccepted: e.target.checked })} /> I acknowledge and accept{reqMark}</label>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div><label className="text-sm font-medium">Signature (Type Full Name){reqMark}</label><input id="add-member-ackSignature" value={form.ackSignature} onChange={(e) => setForm({ ...form, ackSignature: e.target.value })} className={reqCls(req5.ackSignature)} /></div>
                    <div><label className="text-sm font-medium">Date</label><input type="date" value={form.ackDate} onChange={(e) => setForm({ ...form, ackDate: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                  </div>
                  {isMinor && (
                    <div className="space-y-3">
                      <div className="rounded-xl border border-amber-200 bg-amber-50 p-3 text-xs whitespace-pre-wrap">{settings.acknowledgementUnder18Template || ACKNOWLEDGEMENT_UNDER18_TEMPLATE_DEFAULT}</div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div><label className="text-sm font-medium">Parent/Guardian Full Name{reqMark}</label><input id="add-member-parentGuardianName" value={form.parentGuardianName} onChange={(e) => setForm({ ...form, parentGuardianName: e.target.value })} className={reqCls(req5.parentGuardianName)} /></div>
                        <div><label className="text-sm font-medium">Parent/Guardian DOB</label><input type="date" value={form.parentGuardianDob} onChange={(e) => setForm({ ...form, parentGuardianDob: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>
                        <div><label className="text-sm font-medium">Parent/Guardian Signature{reqMark}</label><input id="add-member-parentGuardianSignature" value={form.parentGuardianSignature} onChange={(e) => setForm({ ...form, parentGuardianSignature: e.target.value })} className={reqCls(req5.parentGuardianSignature)} /></div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
            <div className={cx(
              'sticky bottom-0 z-10 bg-white border-t border-slate-200 flex flex-col-reverse sm:flex-row justify-end gap-3 px-4 sm:px-6 py-4 pb-[max(1rem,env(safe-area-inset-bottom))]',
              (hideFooterOnMobile && step !== 5) ? 'hidden sm:flex' : ''
            )}>
              {step === 5 ? (
                <>
                  <button onClick={back} className="rounded-xl px-4 py-3 border border-slate-300 bg-white text-sm font-medium min-h-[44px] w-full sm:w-auto">Back</button>
                  <button onClick={save} className="rounded-full px-4 py-3 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white min-h-[44px] w-full sm:w-auto">Save New Member</button>
                </>
              ) : step === 4 ? (
                <>
                  <button onClick={back} className="rounded-xl px-4 py-3 border border-slate-300 bg-white text-sm font-medium min-h-[44px] w-full sm:w-auto">Back</button>
                  <button onClick={() => { setForm({ ...form, medicalSkipped: true }); setStep(5); }} className="rounded-xl px-4 py-3 border border-slate-300 bg-white text-sm font-medium min-h-[44px] w-full sm:w-auto">Skip For Now</button>
                  <button onClick={next} className="rounded-full px-4 py-3 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white min-h-[44px] w-full sm:w-auto">Next</button>
                </>
              ) : step >= 2 ? (
                <>
                  <button onClick={back} className="rounded-xl px-4 py-3 border border-slate-300 bg-white text-sm font-medium min-h-[44px] w-full sm:w-auto">Back</button>
                  <button onClick={next} className="rounded-full px-4 py-3 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white min-h-[44px] w-full sm:w-auto">Next</button>

                <>
                  <button onClick={onClose} className="rounded-xl px-4 py-3 border border-slate-300 bg-white text-sm font-medium min-h-[44px] w-full sm:w-auto">Cancel</button>
                  <button onClick={next} className="rounded-full px-4 py-3 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white min-h-[44px] w-full sm:w-auto">Next</button>
                </>
              )}
            </div>
          </div>
        </div>
      );

    // ---- PT Clients Page ----
function PTClientsPage({ members, users, settings, updateSetting, currentUser }) {
      const PT_TABS = ['PT Workout', 'Workout Plan', 'Diet Plan', 'Chat Trainer', 'Today Sessions', 'Weight Progress'];
      const [activeSubTab, setActiveSubTab] = React.useState('PT Workout');

                    <div className="space-y-2">
