    // ---- Finance Page ----
    function FinancePage({ members, settings, logs }) {
      const [query, setQuery] = React.useState('');
      const [appliedQuery, setAppliedQuery] = React.useState('');
      const [showFilter, setShowFilter] = React.useState(false);
      const [planFilter, setPlanFilter] = React.useState('');
      const [methodFilter, setMethodFilter] = React.useState('');
      const [statusFilter, setStatusFilter] = React.useState('');
      const [fromDate, setFromDate] = React.useState('');
      const [toDate, setToDate] = React.useState('');
      const [page, setPage] = React.useState(1);
      const [expandedId, setExpandedId] = React.useState('');
      const today = new Date();

      const transactions = React.useMemo(() => {
        return members
          .filter(m => m.billingDate)
          .map(m => {
            const due = asUTC(m.paymentBy || m.billingDate);
            const pending = m.status === 'Active' && due && due < today;
            return {
              id: m.memberId || crypto.randomUUID(),
              memberId: m.memberId || '',
              memberName: m.name || '',
              date: iso(m.billingDate),
              plan: m.plan || '',
              method: m.paymentMethod || '',
              amount: Number(m.amount || 0),
              status: pending ? 'pending' : 'paid',
              memberStatus: m.status || '',
            };
          })
          .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
      }, [members, today]);

      const searchTokens = React.useMemo(() => {
        return appliedQuery.toLowerCase().trim().split(/\s+/).filter(Boolean);
      }, [appliedQuery]);

      const filteredTransactions = React.useMemo(() => {
        return transactions.filter(t => {
          if (planFilter && t.plan !== planFilter) return false;
          if (methodFilter && t.method !== methodFilter) return false;
          if (statusFilter && t.status !== statusFilter) return false;
          if (fromDate && String(t.date || '') < fromDate) return false;
          if (toDate && String(t.date || '') > toDate) return false;
          if (searchTokens.length) {
            const hay = [t.memberName, t.memberId, t.plan, t.method, t.memberStatus, t.status].join(' ').toLowerCase();
            if (!searchTokens.every(tok => hay.includes(tok))) return false;
          }
          return true;
        });
      }, [transactions, planFilter, methodFilter, statusFilter, fromDate, toDate, searchTokens]);

      React.useEffect(() => {
        setPage(1);
      }, [appliedQuery, planFilter, methodFilter, statusFilter, fromDate, toDate, members.length]);

      const revenue = filteredTransactions.reduce((sum, t) => sum + Number(t.amount || 0), 0);
      const pendingRows = filteredTransactions.filter(t => t.status === 'pending');
      const pendingAmount = pendingRows.reduce((sum, t) => sum + Number(t.amount || 0), 0);
      const expense = Math.round(revenue * 0.26);
      const profit = revenue - expense;

      const monthTotals = React.useMemo(() => {
        const months = [];
        const now = new Date();
        for (let i = 3; i >= 0; i -= 1) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const label = MONTHS[d.getMonth()];
          const total = filteredTransactions.reduce((sum, t) => {
            const td = asUTC(t.date);
            if (!td || td.getFullYear() !== d.getFullYear() || td.getMonth() !== d.getMonth()) return sum;
            return sum + Number(t.amount || 0);
          }, 0);
          months.push({ label, total });
        }
        return months;
      }, [filteredTransactions]);
      const highestMonth = Math.max(1, ...monthTotals.map(x => x.total));

      const planBreakup = React.useMemo(() => {
        const counts = {};
        filteredTransactions.forEach(t => {
          const key = t.plan || 'Unassigned';
          counts[key] = (counts[key] || 0) + 1;
        });
        const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        const total = entries.reduce((sum, [, c]) => sum + c, 0);
        return entries.slice(0, 4).map(([name, count], idx) => ({
          name,
          pct: total ? Math.round((count / total) * 100) : 0,
          color: ['#2563eb', '#16a34a', '#eab308', '#7c3aed'][idx % 4],
        }));
      }, [filteredTransactions]);

      const pieBackground = React.useMemo(() => {
        if (!planBreakup.length) return '#e2e8f0';
        let start = 0;
        const segments = planBreakup.map(seg => {
          const from = start;
          const to = start + seg.pct;
          start = to;
          return `${seg.color} ${from}% ${to}%`;
        });
        if (start < 100) segments.push(`#cbd5e1 ${start}% 100%`);
        return `conic-gradient(${segments.join(', ')})`;
      }, [planBreakup]);

      const pageSize = 10;
      const totalPages = Math.max(1, Math.ceil(filteredTransactions.length / pageSize));
      const safePage = page > totalPages ? 1 : page;
      const pageRows = filteredTransactions.slice((safePage - 1) * pageSize, safePage * pageSize);

      const resetFilters = () => {
        setPlanFilter('');
        setMethodFilter('');
        setStatusFilter('');
        setFromDate('');
        setToDate('');
      };

      const getMemberLogs = (memberId) => {
        return (logs || [])
          .filter(l => l.entityType === 'member' && l.entityId === memberId)
          .slice(0, 10);
      };

      const amountFromLog = (entry) => {
        if (entry && entry.after && entry.after.amount !== undefined) return entry.after.amount;
        if (entry && entry.before && entry.before.amount !== undefined) return entry.before.amount;
        return '-';
      };

      const cardBase = 'rounded-2xl border border-slate-200 bg-white p-4 shadow-sm';
      return (
        <div className="p-6 md:p-8 space-y-5 bg-slate-100 min-h-screen">
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <h1 className="text-2xl font-semibold text-slate-900">Finance</h1>
            <div className="flex gap-2">
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="Search member, plan, method"
                className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm"
              />
              <button onClick={() => setAppliedQuery(query)} className="rounded-xl bg-blue-600 text-white px-3 py-2 text-sm font-medium hover:bg-blue-700">Search</button>
              <button onClick={() => setShowFilter(v => !v)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700">Filter</button>
            </div>
          </div>

          {showFilter && (
            <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm grid grid-cols-1 md:grid-cols-3 xl:grid-cols-5 gap-3">
              <select value={planFilter} onChange={(e) => setPlanFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                <option value="">All Plans</option>
                {(settings?.plans || []).map(p => <option key={p} value={p}>{p}</option>)}
              </select>
              <select value={methodFilter} onChange={(e) => setMethodFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                <option value="">All Methods</option>
                {(settings?.paymentMethods || []).map(m => <option key={m} value={m}>{m}</option>)}
              </select>
              <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                <option value="">All Payment Status</option>
                <option value="paid">Paid</option>
                <option value="pending">Pending</option>
              </select>
              <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
              <div className="flex gap-2">
                <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
                <button onClick={resetFilters} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">Reset</button>
              </div>
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
            <div className={cardBase}>
              <div className="text-sm text-slate-500">Revenue</div>
              <div className="mt-1 text-3xl font-bold text-emerald-700">${revenue.toLocaleString()}</div>
              <div className="text-sm text-emerald-700">Auto from Members</div>
            </div>
            <div className={cardBase}>
              <div className="text-sm text-slate-500">Pending Payments</div>
              <div className="mt-1 text-3xl font-bold text-amber-700">${pendingAmount.toLocaleString()}</div>
              <div className="text-sm text-amber-700">({pendingRows.length} pending)</div>
            </div>
            <div className={cardBase}>
              <div className="text-sm text-slate-500">Expenses</div>
              <div className="mt-1 text-3xl font-bold text-rose-700">${expense.toLocaleString()}</div>
              <div className="text-sm text-rose-700">Estimated (26%)</div>
            </div>
            <div className={cardBase}>
              <div className="text-sm text-slate-500">Profit</div>
              <div className={cx('mt-1 text-3xl font-bold', profit >= 0 ? 'text-emerald-700' : 'text-rose-700')}>${profit.toLocaleString()}</div>
              <div className="text-sm text-slate-600">Revenue - expense</div>
            </div>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
            <div className={cx(cardBase, 'xl:col-span-2')}>
              <div className="text-lg font-semibold text-slate-900 mb-4">Revenue Trend (Last 4 Months)</div>
              <div className="h-48 flex items-end gap-3">
                {monthTotals.map(x => {
                  const h = Math.max(16, Math.round((x.total / highestMonth) * 160));
                  return (
                    <div key={x.label} className="flex-1 flex flex-col items-center gap-2">
                      <div className="text-xs text-slate-500">${x.total.toLocaleString()}</div>
                      <div className="w-full rounded-t-lg bg-blue-500/80" style={{ height: `${h}px` }} />
                      <div className="text-xs text-slate-700">{x.label}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className={cardBase}>
              <div className="text-lg font-semibold text-slate-900 mb-4">Plan Popularity</div>
              <div className="flex items-center gap-4">
                <div className="h-36 w-36 rounded-full border border-slate-200 shrink-0" style={{ background: pieBackground }} />
                <div className="space-y-2 text-sm">
                  {planBreakup.map(seg => (
                    <div key={seg.name} className="flex items-center gap-2">
                      <span className="inline-block h-2.5 w-2.5 rounded-full" style={{ background: seg.color }} />
                      <span className="text-slate-700">{seg.name}</span>
                      <span className="text-slate-500">{seg.pct}%</span>
                    </div>
                  ))}
                  {planBreakup.length === 0 && <div className="text-slate-500">No data for selected filters.</div>}
                </div>
              </div>
            </div>
          </div>

          <div className={cardBase}>
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-lg font-semibold text-slate-900">Transactions (Auto from Members)</h2>
              <div className="text-xs text-slate-500">Expand a row to see latest 10 logs</div>
            </div>
            <div className="overflow-x-auto">
              <table className="min-w-full text-sm">
                <thead>
                  <tr className="bg-blue-50 text-blue-700">
                    <th className="px-3 py-2 text-left">Date</th>
                    <th className="px-3 py-2 text-left">Member</th>
                    <th className="px-3 py-2 text-left">Plan</th>
                    <th className="px-3 py-2 text-left">Method</th>
                    <th className="px-3 py-2 text-left">Payment Status</th>
                    <th className="px-3 py-2 text-left">Amount</th>
                  </tr>
                </thead>
                <tbody>
                  {pageRows.map(t => (
                    <React.Fragment key={t.id}>
                      <tr
                        onClick={() => setExpandedId(prev => prev === t.id ? '' : t.id)}
                        className="border-b border-slate-200 hover:bg-slate-50 cursor-pointer"
                      >
                        <td className="px-3 py-2 whitespace-nowrap">{fmt(t.date)}</td>
                        <td className="px-3 py-2 whitespace-nowrap">{t.memberName || '-'}</td>
                        <td className="px-3 py-2 whitespace-nowrap">{t.plan || '-'}</td>
                        <td className="px-3 py-2 whitespace-nowrap">{t.method || '-'}</td>
                        <td className="px-3 py-2 whitespace-nowrap capitalize">{t.status}</td>
                        <td className="px-3 py-2 whitespace-nowrap font-semibold text-slate-800">${Number(t.amount || 0).toLocaleString()}</td>
                      </tr>
                      {expandedId === t.id && (
                        <tr className="bg-slate-50 border-b border-slate-200">
                          <td colSpan={6} className="p-3">
                            <div className="text-xs font-semibold text-slate-600 mb-2">Latest 10 logs for {t.memberName}</div>
                            <div className="overflow-x-auto">
                              <table className="min-w-full text-xs">
                                <thead>
                                  <tr className="bg-slate-100 text-slate-700">
                                    <th className="px-2 py-1 text-left">Date</th>
                                    <th className="px-2 py-1 text-left">Amount</th>
                                    <th className="px-2 py-1 text-left">Updated By</th>
                                    <th className="px-2 py-1 text-left">Action</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {getMemberLogs(t.memberId).map(entry => (
                                    <tr key={entry.id} className="border-b border-slate-200">
                                      <td className="px-2 py-1 whitespace-nowrap">{fmt(entry.ts)}</td>
                                      <td className="px-2 py-1 whitespace-nowrap">{amountFromLog(entry)}</td>
                                      <td className="px-2 py-1 whitespace-nowrap">{entry.actor || '-'}</td>
                                      <td className="px-2 py-1 whitespace-nowrap">{entry.action || '-'}</td>
                                    </tr>
                                  ))}
                                  {getMemberLogs(t.memberId).length === 0 && (
                                    <tr>
                                      <td colSpan={4} className="px-2 py-2 text-slate-500">No logs found for this member.</td>
                                    </tr>
                                  )}
                                </tbody>
                              </table>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  ))}
                  {pageRows.length === 0 && (
                    <tr>
                      <td colSpan={6} className="px-3 py-4 text-center text-slate-500">No transactions found for selected filters.</td>
                    </tr>
                  )}
                </tbody>
              </table>
              {filteredTransactions.length > pageSize && (
                <div className="flex items-center justify-between mt-3 text-sm">
                  <div>Page {safePage} of {totalPages}</div>
                  <div className="flex gap-2">
                    <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={safePage === 1} className={cx('px-3 py-1 rounded-lg border', safePage === 1 ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white text-blue-700 hover:bg-blue-50 border-blue-300')}>Prev</button>
                    <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={safePage === totalPages} className={cx('px-3 py-1 rounded-lg border', safePage === totalPages ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-white text-blue-700 hover:bg-blue-50 border-blue-300')}>Next</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ---- Placeholder Page (for pages not yet implemented) ----
    function PlaceholderPage({ title }) {
      return (
        <div className="p-8"><h1 className="text-2xl font-semibold mb-2">{title}</h1><p className="text-slate-600">This section is under development.</p></div>
      );
    }

    // ---- User Management Page ----
    // This page allows the owner to add new staff and assign which sections they can access.
    function UserManagementPage({ users, setUsers, settings, setSettings, currentUser, logEvent }) {
      const [modalOpen, setModalOpen] = React.useState(false);
      const [form, setForm] = React.useState({ id: '', password: '', name: '', email: '', sections: [], blocked: false, blockedReason: '', blockedAt: '', updatedBy: '', photo: null });
      const [error, setError] = React.useState('');
      const [editingId, setEditingId] = React.useState(null);
      const [shownPasswords, setShownPasswords] = React.useState({});
      const isOwner = currentUser && currentUser.id === 'owner';
      const roleTemplates = React.useMemo(() => {
        const list = settings && Array.isArray(settings.roleTemplates) && settings.roleTemplates.length
          ? settings.roleTemplates
          : DEFAULT_ROLE_TEMPLATES;
        return list.map((role, idx) => ({
          ...role,
          id: role.id || `role-${idx + 1}`,
          title: role.title || 'Untitled Role',
          subtitle: role.subtitle || '',
          sections: Array.isArray(role.sections) ? role.sections : [],
          color: role.color || ['bg-emerald-50 border-emerald-200', 'bg-amber-50 border-amber-200', 'bg-blue-50 border-blue-200', 'bg-violet-50 border-violet-200'][idx % 4],
        }));
      }, [settings]);
      const [selectedRole, setSelectedRole] = React.useState('');
      const [roleModalOpen, setRoleModalOpen] = React.useState(false);
      const [editingRoleId, setEditingRoleId] = React.useState('');
      const [roleError, setRoleError] = React.useState('');
      const [roleForm, setRoleForm] = React.useState({
        title: '',
        subtitle: '',
        sections: [],
        color: 'bg-emerald-50 border-emerald-200',
      });

      const openAdd = () => {
        setForm({ id: '', password: '', name: '', email: '', sections: [], blocked: false, blockedReason: '', blockedAt: '', updatedBy: '', photo: null });
        setError('');
        setEditingId(null);
        setSelectedRole('');
        setModalOpen(true);
      };

      const openEdit = (u) => {
        setForm({
          id: u.id,
          password: u.password || '',
          name: u.name || '',
          email: u.email || '',
          sections: Array.isArray(u.sections) ? [...u.sections] : [],
          blocked: Boolean(u.blocked),
          blockedReason: u.blockedReason || '',
          blockedAt: u.blockedAt || '',
          updatedBy: u.updatedBy || '',
          photo: u.photo || null,
        });
        setError('');
        setEditingId(u.id);
        setSelectedRole('');
        setModalOpen(true);
      };
      const applyRolePreset = (roleKey) => {
        const role = roleTemplates.find(r => r.id === roleKey);
        if (!role) return;
        setSelectedRole(roleKey);
        setForm(prev => ({ ...prev, sections: [...role.sections] }));
      };
      const openRoleAdd = () => {
        if (!isOwner) return;
        setEditingRoleId('');
        setRoleError('');
        setRoleForm({ title: '', subtitle: '', sections: [], color: 'bg-emerald-50 border-emerald-200' });
        setRoleModalOpen(true);
      };
      const openRoleEdit = (role) => {
        if (!isOwner) return;
        setEditingRoleId(role.id);
        setRoleError('');
        setRoleForm({
          title: role.title || '',
          subtitle: role.subtitle || '',
          sections: Array.isArray(role.sections) ? [...role.sections] : [],
          color: role.color || 'bg-emerald-50 border-emerald-200',
        });
        setRoleModalOpen(true);
      };
      const toggleRoleSection = (sec) => {
        setRoleForm(prev => {
          const next = prev.sections.includes(sec) ? prev.sections.filter(x => x !== sec) : [...prev.sections, sec];
          return { ...prev, sections: next };
        });
      };
      const saveRoleTemplate = () => {
        setRoleError('');
        const title = roleForm.title.trim();
        const subtitle = roleForm.subtitle.trim();
        if (!title) {
          setRoleError('Role name is required.');
          return;
        }
        if (!roleForm.sections.length) {
          setRoleError('Select at least one section for role access.');
          return;
        }
        const nextRole = {
          id: editingRoleId || crypto.randomUUID(),
          title,
          subtitle,
          sections: [...roleForm.sections],
          color: roleForm.color || 'bg-emerald-50 border-emerald-200',
        };
        setSettings(prev => {
          const list = Array.isArray(prev.roleTemplates) && prev.roleTemplates.length ? prev.roleTemplates : [...DEFAULT_ROLE_TEMPLATES];
          if (editingRoleId) return { ...prev, roleTemplates: list.map(r => r.id === editingRoleId ? nextRole : r) };
          return { ...prev, roleTemplates: [nextRole, ...list] };
        });
        logEvent && logEvent(editingRoleId ? 'staff.role_template.updated' : 'staff.role_template.created', 'settings', nextRole.id, null, nextRole);
        setRoleModalOpen(false);
      };
      const deleteRoleTemplate = (role) => {
        if (!isOwner) return;
        const ok = window.confirm(`Delete role template "${role.title}"?`);
        if (!ok) return;
        setSettings(prev => {
          const list = Array.isArray(prev.roleTemplates) ? prev.roleTemplates : [];
          return { ...prev, roleTemplates: list.filter(r => r.id !== role.id) };
        });
        if (selectedRole === role.id) setSelectedRole('');
        logEvent && logEvent('staff.role_template.deleted', 'settings', role.id, role, null);
      };

      const onStaffPhoto = async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        if (file.size > MAX_IMAGE_FILE_BYTES) {
          setError('Image too large. Please upload a file up to 1MB.');
          return;
        }
        try {
          const raw = await loadImageDataUrl(file);
          const compressed = await downscaleImageDataUrl(raw);
          setForm(prev => ({ ...prev, photo: compressed }));
        } catch {
          setError('Unable to process image. Please try another file.');
        }
      };

      const toggleSection = (sec) => {
        setForm(f => {
          const list = f.sections.includes(sec) ? f.sections.filter(s => s !== sec) : [...f.sections, sec];
          return { ...f, sections: list };
        });
      };
      const toggleAllSections = () => {
        setForm(f => {
          const allSelected = ALL_SECTIONS.every(sec => f.sections.includes(sec));
          return { ...f, sections: allSelected ? [] : [...ALL_SECTIONS] };
        });
      };

      const toggleShowPassword = (u) => {
        setShownPasswords(prev => ({ ...prev, [u.id]: !prev[u.id] }));
        logEvent && logEvent('staff.password.view_toggled', 'user', u.id, null, { shown: !shownPasswords[u.id] });
      };

      const toggleBlocked = (u) => {
        if (!isOwner || u.id === 'owner') return;
        const nextBlocked = !Boolean(u.blocked);
        let blockedReason = '';
        let unblockNote = '';
        if (nextBlocked) {
          blockedReason = window.prompt('Reason for blocking this staff member?') || '';
        } else {
          unblockNote = window.prompt('Optional note for unblocking this staff member:') || '';
        }
        const now = new Date().toISOString();
        setUsers(prev => prev.map(x => x.id === u.id ? {
          ...x,
          blocked: nextBlocked,
          blockedReason: nextBlocked ? blockedReason : '',
          blockedAt: nextBlocked ? now : '',
          updatedBy: currentUser?.id || currentUser?.name || 'owner',
          unblockNote: nextBlocked ? '' : unblockNote,
        } : x));
        logEvent && logEvent('staff.block_toggled', 'user', u.id, u, { ...u, blocked: nextBlocked, blockedReason, blockedAt: nextBlocked ? now : '', unblockNote });
      };

      const handleDelete = (u) => {
        if (!isOwner || u.id === 'owner') return;
        const ok = window.confirm(`Delete staff "${u.id}"? This cannot be undone.`);
        if (!ok) return;
        setUsers(prev => prev.filter(x => x.id !== u.id));
        setSettings(prev => {
          const staffList = prev.staff || [];
          return { ...prev, staff: staffList.filter(s => s.id !== u.id) };
        });
        logEvent && logEvent('staff.deleted', 'user', u.id, u, null);
      };

      const save = () => {
        setError('');
        const id = form.id.trim();
        const password = form.password;
        const name = form.name.trim();
        const email = form.email.trim();
        if (!id || !password || !name) {
          setError('Please enter a username, password and name.');
          return;
        }
        if (!editingId && users.some(u => u.id === id)) {
          setError('A staff member with this username already exists.');
          return;
        }
        if (form.sections.length === 0) {
          setError('Please select at least one section.');
          return;
        }
        const beforeUser = editingId ? users.find(u => u.id === editingId) : null;
        const updatedUser = {
          id,
          password,
          name,
          email,
          sections: [...form.sections],
          blocked: Boolean(form.blocked),
          blockedReason: form.blockedReason || '',
          blockedAt: form.blockedAt || '',
          updatedBy: currentUser?.id || currentUser?.name || '',
          photo: form.photo || null,
        };
        if (editingId) {
          setUsers(prev => prev.map(u => (u.id === editingId ? updatedUser : u)));
          logEvent && logEvent('staff.updated', 'user', id, beforeUser || null, updatedUser);
        } else {
          setUsers(prev => [...prev, updatedUser]);
          logEvent && logEvent('staff.created', 'user', id, null, updatedUser);
        }
        setSettings(prev => {
          const staffList = prev.staff || [];
          const idx = staffList.findIndex(s => s.id === id);
          if (idx >= 0) {
            const next = [...staffList];
            next[idx] = { ...next[idx], id, name, email, avatar: form.photo || next[idx].avatar || null };
            return { ...prev, staff: next };
          }
          return { ...prev, staff: [...staffList, { id, name, email, avatar: form.photo || null }] };
        });
        setModalOpen(false);
        setEditingId(null);
      };

      return (
        <div className="p-8 space-y-6">
          <div className="flex justify-between items-center">
            <h1 className="text-2xl font-semibold mb-4">Staff Management</h1>
            {isOwner && (
              <button onClick={openAdd} className="rounded-xl px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Add Staff</button>
            )}
          </div>

          <div className="space-y-3">
            <div className="flex items-center justify-between">
              <h2 className="text-xl font-semibold text-slate-900">Role Configuration Manager</h2>
              {isOwner && (
                <button onClick={openRoleAdd} className="rounded-xl px-3 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Add New Role</button>
              )}
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              {roleTemplates.map(role => (
                <div key={role.id} className={cx('rounded-2xl border p-4', role.color)}>
                  <div className="text-lg font-semibold text-slate-900">{role.title}</div>
                  <div className="text-sm text-slate-600">{role.subtitle}</div>
                  <ul className="mt-2 text-xs text-slate-700 space-y-1 list-disc pl-4">
                    {role.sections.slice(0, 4).map(sec => <li key={sec}>{sec}</li>)}
                    {role.sections.length > 4 && <li>...etc</li>}
                  </ul>
                  {isOwner && (
                    <div className="mt-3 flex items-center gap-3">
                      <button onClick={() => openRoleEdit(role)} className="text-indigo-600 hover:underline text-xs font-medium">Edit</button>
                      <button onClick={() => deleteRoleTemplate(role)} className="text-rose-600 hover:underline text-xs font-medium">Delete</button>
                    </div>
                  )}
                  <button
                    onClick={() => {
                      if (!isOwner) return;
                      openAdd();
                      applyRolePreset(role.id);
                    }}
                    disabled={!isOwner}
                    className={cx(
                      'mt-3 rounded-lg px-3 py-1.5 text-xs font-medium border',
                      isOwner ? 'bg-white text-slate-700 border-slate-300 hover:bg-slate-100' : 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed'
                    )}
                  >
                    Create Staff with this Role
                  </button>
                </div>
              ))}
            </div>
          </div>

          <div className="rounded-3xl bg-white border border-slate-200 p-4 shadow-sm overflow-x-auto text-slate-900">
            <table className="min-w-full text-sm text-slate-900">
              <thead>
                <tr className="bg-blue-50 text-blue-700">
                  <th className="px-3 py-2 text-left">Photo</th>
                  <th className="px-3 py-2 text-left">Username</th>
                  <th className="px-3 py-2 text-left">Name</th>
                  <th className="px-3 py-2 text-left">Email</th>
                  <th className="px-3 py-2 text-left">Password</th>
                  <th className="px-3 py-2 text-left">Status</th>
                  <th className="px-3 py-2 text-left">Sections</th>
                  <th className="px-3 py-2 text-left">Actions</th>
                </tr>
              </thead>
              <tbody>
                {users.map(u => (
                  <tr key={u.id} className="border-b border-slate-200 hover:bg-slate-50">
                    <td className="px-3 py-2 whitespace-nowrap text-slate-900">
                      <Avatar name={u.name || u.id} photo={u.photo || null} className="h-8 w-8" />
                    </td>
                    <td className="px-3 py-2 whitespace-nowrap text-slate-900">{u.id}</td>
                    <td className="px-3 py-2 whitespace-nowrap text-slate-900">{u.name}</td>
                    <td className="px-3 py-2 whitespace-nowrap text-slate-900">{u.email || '-'}</td>
                    <td className="px-3 py-2 whitespace-nowrap text-slate-900">
                      <div className="flex items-center gap-2">
                        <span className="font-mono text-xs">{shownPasswords[u.id] ? (u.password || '') : '••••••••'}</span>
                        {isOwner && (
                          <button onClick={() => toggleShowPassword(u)} className="text-indigo-600 hover:underline text-xs font-medium">
                            {shownPasswords[u.id] ? 'Hide' : 'Show'}
                          </button>
                        )}
                      </div>
                    </td>
                    <td className="px-3 py-2 whitespace-nowrap text-slate-900">
                      <span
                        title={u.blocked && u.blockedReason ? `Reason: ${u.blockedReason}` : ''}
                        className={cx('text-xs font-medium px-2 py-1 rounded-full border', u.blocked ? 'bg-rose-50 text-rose-700 border-rose-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200')}
                      >
                        {u.blocked ? 'Blocked' : 'Active'}
                      </span>
                    </td>
                    <td className="px-3 py-2 whitespace-nowrap text-xs max-w-xs truncate text-slate-900">{u.sections && u.sections.join(', ')}</td>
                    <td className="px-3 py-2 whitespace-nowrap text-slate-900">
                      {isOwner && u.id !== 'owner' ? (
                        <div className="flex items-center gap-3">
                          <button onClick={() => openEdit(u)} className="text-indigo-600 hover:underline text-xs font-medium">Edit</button>
                          <button onClick={() => toggleBlocked(u)} className={cx('hover:underline text-xs font-medium', u.blocked ? 'text-emerald-600' : 'text-amber-700')}>
                            {u.blocked ? 'Unblock' : 'Block'}
                          </button>
                          <button onClick={() => handleDelete(u)} className="text-rose-600 hover:underline text-xs font-medium">Delete</button>
                        </div>
                      ) : (
                        <span className="text-slate-400 text-xs">No actions</span>
                      )}
                    </td>
                  </tr>
                ))}
                {users.length === 0 && (
                  <tr><td colSpan={8} className="text-center px-3 py-4 text-slate-500">No staff members yet.</td></tr>
                )}
              </tbody>
            </table>
          </div>

          {modalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 p-4">
              <div className="w-full max-w-lg rounded-3xl bg-white text-slate-900 border border-slate-200 shadow-xl ring-1 ring-slate-200">
                <div className="flex justify-between items-center px-6 py-4">
                  <h3 className="text-lg font-semibold text-slate-900">{editingId ? 'Edit Staff' : 'Add Staff'}</h3>
                  <button onClick={() => setModalOpen(false)} className="rounded-xl p-2 text-slate-700 hover:bg-slate-200"><span>✕</span></button>
                </div>
                <div className="px-6 pb-4 space-y-3">
                  {error && <div className="rounded-xl bg-rose-50 border border-rose-200 text-rose-700 px-3 py-2 text-sm">{error}</div>}
                  <div className="flex items-center gap-3">
                    <Avatar name={form.name || form.id || 'Staff'} photo={form.photo} className="h-12 w-12" />
                    <label className="cursor-pointer rounded-xl border border-slate-300 px-3 py-2 text-sm font-medium text-slate-800 hover:bg-slate-100">
                      <input type="file" accept="image/*" className="hidden" onChange={onStaffPhoto} />
                      Upload Picture
                    </label>
                  </div>
                  <div><label className="text-sm font-medium text-slate-700">Username</label><input value={form.id} onChange={(e) => setForm({ ...form, id: e.target.value })} readOnly={Boolean(editingId)} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 read-only:bg-slate-100 read-only:text-slate-500" /></div>
                  <div><label className="text-sm font-medium text-slate-700">Password</label><input type="text" value={form.password} onChange={(e) => setForm({ ...form, password: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" /></div>
                  <div><label className="text-sm font-medium text-slate-700">Name</label><input value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" /></div>
                  <div><label className="text-sm font-medium text-slate-700">Email</label><input value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" /></div>
                  <div>
                    <label className="text-sm font-medium text-slate-700">Role Template</label>
                    <select
                      value={selectedRole}
                      onChange={(e) => applyRolePreset(e.target.value)}
                      className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900"
                    >
                      <option value="">Custom (manual)</option>
                      {roleTemplates.map(role => <option key={role.id} value={role.id}>{role.title}</option>)}
                    </select>
                  </div>
                  <div>
                    <div className="mb-1 flex items-center justify-between">
                      <label className="text-sm font-medium text-slate-700 block">Sections</label>
                      <label className="inline-flex items-center gap-2 text-xs text-slate-700">
                        <input
                          type="checkbox"
                          checked={ALL_SECTIONS.every(sec => form.sections.includes(sec))}
                          onChange={toggleAllSections}
                          className="rounded"
                        />
                        All
                      </label>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      {ALL_SECTIONS.map(sec => (
                        <label key={sec} className="inline-flex items-center gap-2 text-sm text-slate-800">
                          <input
                            type="checkbox"
                            checked={form.sections.includes(sec)}
                            onChange={() => toggleSection(sec)}
                            className="rounded"
                          />
                          {sec}
                        </label>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="flex justify-end gap-3 px-6 py-4">
                  <button onClick={() => setModalOpen(false)} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium text-slate-700">Cancel</button>
                  <button onClick={save} className="rounded-xl px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">{editingId ? 'Update' : 'Save'}</button>
                </div>
              </div>
            </div>
          )}
          {roleModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 p-4">
              <div className="w-full max-w-lg rounded-3xl bg-white text-slate-900 border border-slate-200 shadow-xl ring-1 ring-slate-200">
                <div className="flex justify-between items-center px-6 py-4">
                  <h3 className="text-lg font-semibold text-slate-900">{editingRoleId ? 'Edit Role Template' : 'Add New Role'}</h3>
                  <button onClick={() => setRoleModalOpen(false)} className="rounded-xl p-2 text-slate-700 hover:bg-slate-200"><span>✕</span></button>
                </div>
                <div className="px-6 pb-4 space-y-3">
                  {roleError && <div className="rounded-xl bg-rose-50 border border-rose-200 text-rose-700 px-3 py-2 text-sm">{roleError}</div>}
                  <div>
                    <label className="text-sm font-medium text-slate-700">Role Name</label>
                    <input value={roleForm.title} onChange={(e) => setRoleForm(prev => ({ ...prev, title: e.target.value }))} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" />
                  </div>
                  <div>
                    <label className="text-sm font-medium text-slate-700">Subtitle</label>
                    <input value={roleForm.subtitle} onChange={(e) => setRoleForm(prev => ({ ...prev, subtitle: e.target.value }))} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" />
                  </div>
                  <div>
                    <label className="text-sm font-medium text-slate-700">Section Access</label>
                    <div className="mt-2 grid grid-cols-2 gap-2">
                      {ALL_SECTIONS.map(sec => (
                        <label key={sec} className="inline-flex items-center gap-2 text-sm text-slate-800">
                          <input
                            type="checkbox"
                            checked={roleForm.sections.includes(sec)}
                            onChange={() => toggleRoleSection(sec)}
                            className="rounded"
                          />
                          {sec}
                        </label>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="flex justify-end gap-3 px-6 py-4">
                  <button onClick={() => setRoleModalOpen(false)} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium text-slate-700">Cancel</button>
                  <button onClick={saveRoleTemplate} className="rounded-xl px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">{editingRoleId ? 'Update Role' : 'Save Role'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ---- Filter Panel Component ----
    // This component renders a modal that allows users to build complex filters on
    // the members list. It supports filtering by plan, status, billing month,
    // payment method, staff, and by joining/billing date ranges. Filters are
    // local to the panel until the user applies them.
    function FilterPanel({ open, onClose, filters, setFilters, clearFilters, settings, billingMonthOptions }) {
      const initial = {
        plan: '',
        status: '',
        billingMonth: '',
        paymentMethod: '',
        staff: '',
        joinFrom: '',
        joinTo: '',
        billFrom: '',
        billTo: ''
      };
      const [localFilters, setLocalFilters] = React.useState(filters);
      const [presetName, setPresetName] = React.useState('');
      const [presets, setPresets] = React.useState(() => {
        try {
          const saved = localStorage.getItem('apg.filterPresets');
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });
      // When the panel opens, initialise local state from current filters
      React.useEffect(() => {
        if (open) {
          setLocalFilters(filters);
        }
      }, [open, filters]);
      React.useEffect(() => {
        try {
          localStorage.setItem('apg.filterPresets', JSON.stringify(presets));
        } catch {}
      }, [presets]);
      const update = (key, value) => {
        setLocalFilters(prev => ({ ...prev, [key]: value }));
      };
      const clear = () => {
        setLocalFilters(initial);
      };
      const apply = () => {
        setFilters(localFilters);
        onClose();
      };
      const clearAll = () => {
        clearFilters();
        setLocalFilters(initial);
        onClose();
      };
      const savePreset = () => {
        const name = presetName.trim();
        if (!name) return;
        setPresets(prev => {
          const next = prev.filter(p => p.name !== name);
          return [{ name, filters: { ...localFilters } }, ...next].slice(0, 10);
        });
        setPresetName('');
      };
      const applyPreset = (name) => {
        const preset = presets.find(p => p.name === name);
        if (!preset) return;
        setLocalFilters({ ...initial, ...preset.filters });
      };
      const deletePreset = (name) => {
        setPresets(prev => prev.filter(p => p.name !== name));
      };
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
          <div className="w-full max-w-2xl rounded-3xl bg-white text-slate-900 border border-slate-200 shadow-xl overflow-hidden">
            <div className="flex justify-between items-center px-6 py-4 border-b border-slate-200">
              <h3 className="text-lg font-semibold">Filter Members</h3>
              <button onClick={onClose} className="rounded-xl p-2 hover:bg-slate-200"><span>✕</span></button>
            </div>
            <div className="px-6 py-4 space-y-4 max-h-[70vh] overflow-auto">
              <div className="rounded-xl border border-slate-200 bg-slate-50 p-3 space-y-2">
                <div className="text-sm font-medium text-slate-700">Saved Filters</div>
                <div className="flex items-center gap-2">
                  <input value={presetName} onChange={(e) => setPresetName(e.target.value)} placeholder="Preset name" className="flex-1 rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                  <button onClick={savePreset} className="rounded-xl px-3 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Save Preset</button>
                </div>
                {presets.length > 0 && (
                  <div className="space-y-1">
                    {presets.map(p => (
                      <div key={p.name} className="flex items-center justify-between text-sm">
                        <button onClick={() => applyPreset(p.name)} className="text-blue-700 hover:underline">{p.name}</button>
                        <button onClick={() => deletePreset(p.name)} className="text-rose-600 hover:underline text-xs">Delete</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div className="grid grid-cols-2 gap-4">
                {/* Plan */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Plan</label>
                  <select value={localFilters.plan} onChange={(e) => update('plan', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {settings.plans.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                {/* Status */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Status</label>
                  <select value={localFilters.status} onChange={(e) => update('status', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {settings.statuses.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                {/* Billing Month */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Billing Month</label>
                  <select value={localFilters.billingMonth} onChange={(e) => update('billingMonth', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {billingMonthOptions.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                {/* Payment Method */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Payment Method</label>
                  <select value={localFilters.paymentMethod} onChange={(e) => update('paymentMethod', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {settings.paymentMethods.map(pm => <option key={pm} value={pm}>{pm}</option>)}
                  </select>
                </div>
                {/* Staff */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Staff</label>
                  <select value={localFilters.staff} onChange={(e) => update('staff', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {(settings.staff || []).map(st => <option key={st.id} value={st.name}>{st.name}</option>)}
                  </select>
                </div>
                {/* Joining Date Range */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Joining Date From</label>
                  <input type="date" value={localFilters.joinFrom} onChange={(e) => update('joinFrom', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
                <div>
                  <label className="text-sm font-medium text-slate-700">Joining Date To</label>
                  <input type="date" value={localFilters.joinTo} onChange={(e) => update('joinTo', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
                {/* Billing Date Range */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Billing Date From</label>
                  <input type="date" value={localFilters.billFrom} onChange={(e) => update('billFrom', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
                <div>
                  <label className="text-sm font-medium text-slate-700">Billing Date To</label>
                  <input type="date" value={localFilters.billTo} onChange={(e) => update('billTo', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
              </div>
            </div>
            <div className="flex justify-end gap-3 px-6 py-4 border-t border-slate-200">
              <button onClick={clear} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium">Clear</button>
              <button onClick={clearAll} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium">Clear All</button>
              <button onClick={apply} className="rounded-xl px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium">Apply Filter</button>
            </div>
          </div>
        </div>
      );
    }

    // Mount the app
    ReactDOM.createRoot(document.getElementById('root')).render(<GymApp />);
  
  </script>
</body>
</html>
