                      <div className="md:self-end"><button onClick={addWeightLog} className="w-full rounded-full bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Add Weight</button></div>
                    </div>
                    <div className="text-sm text-slate-700">Current: <span className="font-semibold">{latestWeight == null ? 'NA' : `${latestWeight} kg`}</span> • Change: <span className="font-semibold">{weightDelta == null ? 'NA' : `${weightDelta > 0 ? '+' : ''}${weightDelta.toFixed(1)} kg`}</span></div>
                    <div className="space-y-1">
                      {weightLogs.slice().reverse().map(w => (
                        <div key={w.id} className="rounded-lg border border-slate-200 px-3 py-2 text-sm">{fmt(w.date)}: <span className="font-medium">{w.weight} kg</span></div>
                      ))}
                      {weightLogs.length === 0 && <div className="text-sm text-slate-500">No weight logs yet.</div>}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );

    // ---- Attendance Page ----
function AttendancePage({ users, settings, updateSetting, currentUser }) {
      const [date, setDate] = React.useState(iso(new Date()));
      const staff = (users || []).filter(u => !u.blocked);
      const records = settings.staffAttendance || [];
      const keyFor = (userId) => `${date}__${userId}`;
      const map = React.useMemo(() => {
        const out = {};
        records.forEach(r => { out[`${iso(r.date)}__${r.userId}`] = r; });
        return out;
      }, [records]);
      const upsert = (userId, patch) => {
        const existing = records.find(r => iso(r.date) === date && r.userId === userId);
        let next;
        if (existing) {
          next = records.map(r => (r.id === existing.id ? { ...r, ...patch, updatedAt: new Date().toISOString(), updatedBy: currentUser?.name || currentUser?.id || '' } : r));
        } else {
          next = [{ id: crypto.randomUUID(), date, userId, status: 'Present', checkIn: '', checkOut: '', note: '', markedBy: currentUser?.name || currentUser?.id || '', ...patch }, ...records];
        }
        updateSetting('staffAttendance', next);
      };
      const presentCount = staff.filter(s => (map[keyFor(s.id)]?.status || 'Absent') === 'Present').length;
      const leaveCount = staff.filter(s => (map[keyFor(s.id)]?.status || '') === 'Leave').length;
      return (
        <div className="p-3 md:p-8 space-y-4">
          <div className="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
            <div>
              <h1 className="text-xl md:text-2xl font-semibold text-slate-900">Attendance</h1>
              <p className="text-sm text-slate-600">Daily staff attendance with check-in/out tracking.</p>
            </div>
            <div className="flex items-center gap-2">
              <input type="date" value={date} onChange={(e) => setDate(iso(e.target.value))} className="rounded-xl border border-slate-300 px-3 py-2 text-sm" />
              <button onClick={() => staff.forEach(s => upsert(s.id, { status: 'Present' }))} className="rounded-full bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Mark All Present</button>
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div className="rounded-2xl border border-emerald-200 bg-emerald-50 p-3"><div className="text-xs text-emerald-700">Present</div><div className="text-xl font-semibold text-emerald-900">{presentCount}</div></div>
            <div className="rounded-2xl border border-amber-200 bg-amber-50 p-3"><div className="text-xs text-amber-700">On Leave</div><div className="text-xl font-semibold text-amber-900">{leaveCount}</div></div>
            <div className="rounded-2xl border border-slate-200 bg-slate-50 p-3"><div className="text-xs text-slate-600">Total Staff</div><div className="text-xl font-semibold text-slate-900">{staff.length}</div></div>
          </div>
          <div className="rounded-3xl border border-slate-200 bg-white p-3 sm:p-4 space-y-3">
            {staff.map(s => {
              const rec = map[keyFor(s.id)] || {};
              return (
                <div key={s.id} className="rounded-2xl border border-slate-200 p-3 grid grid-cols-1 lg:grid-cols-6 gap-2">
                  <div>
                    <div className="text-sm font-semibold text-slate-900">{s.name}</div>
                    <div className="text-xs text-slate-500">{s.id}</div>
                  </div>
                  <div>
                    <label className="text-xs text-slate-500">Status</label>
                    <select value={rec.status || 'Absent'} onChange={(e) => upsert(s.id, { status: e.target.value })} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm">
                      <option>Present</option><option>Absent</option><option>Half Day</option><option>Leave</option>
                    </select>
                  </div>
                  <div>
                    <label className="text-xs text-slate-500">Check-In</label>
                    <input type="time" value={rec.checkIn || ''} onChange={(e) => upsert(s.id, { checkIn: e.target.value })} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" />
                  </div>
                  <div>
                    <label className="text-xs text-slate-500">Check-Out</label>
                    <input type="time" value={rec.checkOut || ''} onChange={(e) => upsert(s.id, { checkOut: e.target.value })} className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" />
                  </div>
                  <div className="lg:col-span-2">
                    <label className="text-xs text-slate-500">Note</label>
                    <input value={rec.note || ''} onChange={(e) => upsert(s.id, { note: e.target.value })} placeholder="Reason / shift notes" className="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2 text-sm" />
                  </div>
                </div>
              );
            })}
          </div>

    // ---- Leave Tracker Page (module-registered) ----
    const LeaveTrackerPage = (window.__APG_MODULES__ && window.__APG_MODULES__.LeaveTrackerPageModule)
      ? window.__APG_MODULES__.LeaveTrackerPageModule
      : function LeaveTrackerFallback({ users = [], settings = {}, updateSetting, currentUser = null, focusLeaveRequestId = '', focusLeaveUserId = '', onClearFocus }) {
        const canApprove = currentUser?.id === 'owner' || currentUser?.id === 'manager';
        const leaveRequests = settings.leaveRequests || [];
        const [form, setForm] = React.useState({ userId: currentUser?.id || '', type: 'Casual', startDate: iso(new Date()), endDate: iso(new Date()), reason: '' });
        const [formError, setFormError] = React.useState('');
        const [formSuccess, setFormSuccess] = React.useState('');
        const [historyUserFilter, setHistoryUserFilter] = React.useState('');
        const staff = (users || []).filter(u => !u.blocked);
        const filteredLeaveRequests = React.useMemo(() => {
          if (focusLeaveRequestId) return leaveRequests.filter((r) => r.id === focusLeaveRequestId);
          if (focusLeaveUserId) return leaveRequests.filter((r) => r.userId === focusLeaveUserId);
          return leaveRequests;
        }, [leaveRequests, focusLeaveRequestId, focusLeaveUserId]);
        React.useEffect(() => {
          if (!form.userId && currentUser?.id) setForm(v => ({ ...v, userId: currentUser.id }));
        }, [currentUser, form.userId]);
        const daysBetween = (a, b) => {
          const start = new Date(a);
          const end = new Date(b);
          if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime()) || end < start) return 1;
          return Math.floor((end - start) / (24 * 60 * 60 * 1000)) + 1;
        };
        const submitLeave = () => {
          setFormError('');
          setFormSuccess('');
          if (!form.userId || !form.startDate || !form.endDate) {
            setFormError('Please select staff, start date, and end date.');
            return;
          }
          if (new Date(form.endDate) < new Date(form.startDate)) {
            setFormError('End date cannot be before start date.');
            return;
          }
          if (typeof updateSetting !== 'function') {
            setFormError('Leave tracker save is temporarily unavailable. Please refresh.');
            return;
          }
          const req = { id: crypto.randomUUID(), ...form, days: daysBetween(form.startDate, form.endDate), status: 'Pending', createdAt: new Date().toISOString(), createdBy: currentUser?.name || currentUser?.id || '' };
          updateSetting('leaveRequests', [req, ...leaveRequests]);
          setForm(v => ({ ...v, reason: '' }));
          setFormSuccess('Leave request submitted.');
          setTimeout(() => setFormSuccess(''), 2000);
        };
        const updateStatus = (id, status) => {
          if (!canApprove || typeof updateSetting !== 'function') return;
          updateSetting('leaveRequests', leaveRequests.map(r => r.id === id ? { ...r, status, actionAt: new Date().toISOString(), actionBy: currentUser?.name || currentUser?.id || '' } : r));
        };
        const balanceFor = (userId) => {
          const year = new Date().getFullYear();
          const used = leaveRequests
            .filter(r => r.userId === userId && r.status === 'Approved' && new Date(r.startDate).getFullYear() === year)
            .reduce((sum, r) => sum + Number(r.days || 0), 0);
          return Math.max(0, 24 - used);
        };
        const leaveHistoryRows = React.useMemo(() => {
          const cutoff = new Date();
          cutoff.setFullYear(cutoff.getFullYear() - 2);
          return leaveRequests
            .filter((r) => r.status === 'Approved')
            .filter((r) => {
              const start = new Date(r.startDate);
              return !Number.isNaN(start.getTime()) && start >= cutoff;
            })
            .filter((r) => (historyUserFilter ? r.userId === historyUserFilter : true))
            .sort((a, b) => String(b.startDate || '').localeCompare(String(a.startDate || '')));
        }, [leaveRequests, historyUserFilter]);
        return (
          <div className="p-3 md:p-8 space-y-4">
            <div>
              <h1 className="text-xl md:text-2xl font-semibold text-slate-900">Leave Tracker</h1>
              <p className="text-sm text-slate-600">Leave requests, approvals, and yearly balance tracking.</p>
            </div>
            <div className="rounded-3xl border border-slate-200 bg-white p-4 space-y-3">
              <h3 className="text-base font-semibold">Create Leave Request</h3>
              {formError && <div className="rounded-xl border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700">{formError}</div>}
              {formSuccess && <div className="rounded-xl border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">{formSuccess}</div>}
              <div className="grid grid-cols-1 md:grid-cols-5 gap-3">

    // ---- Settings Page ----
function SettingsPage({ settings, updateSetting, members, access, storageInfo, onExport, onImport }) {
      const [newValues, setNewValues] = React.useState({ plans: '', statuses: '', paymentMethods: '', holdDurations: '', genders: '' });
      const importRef = React.useRef(null);
      const [moduleDiag, setModuleDiag] = React.useState(() => {
        const logs = window.__APG_MODULE_TELEMETRY || [];
        if (!logs.length) return { status: 'ready', text: 'ready' };
        const last = logs[0];
        if (last.level === 'error' || last.code === 'fatal') return { status: 'fallback', text: 'fallback' };
        if (last.code === 'retry' || last.code === 'load-attempt-failed') return { status: 'retrying', text: 'retrying' };
        return { status: 'ready', text: 'ready' };
      });
      React.useEffect(() => {
        const applyTelemetry = () => {
          const logs = window.__APG_MODULE_TELEMETRY || [];
          if (!logs.length) {
            setModuleDiag({ status: 'ready', text: 'ready' });
            return;
          }
          const last = logs[0];
          if (last.level === 'error' || last.code === 'fatal') {
            setModuleDiag({ status: 'fallback', text: 'fallback' });
            return;
          }
          if (last.code === 'retry' || last.code === 'load-attempt-failed') {
            setModuleDiag({ status: 'retrying', text: 'retrying' });
            return;
          }
          setModuleDiag({ status: 'ready', text: 'ready' });
        };
        const onTelemetry = () => applyTelemetry();
        window.addEventListener('apg:module-loader', onTelemetry);
        applyTelemetry();
        return () => window.removeEventListener('apg:module-loader', onTelemetry);
      }, []);
      const handleAdd = (key) => {
        const val = newValues[key].trim();
        if (!val) return;
        if (settings[key].includes(val)) {
          setNewValues(v => ({ ...v, [key]: '' }));
          return;
        }
        updateSetting(key, [...settings[key], val]);
        setNewValues(v => ({ ...v, [key]: '' }));
      };
      const removeOpt = (key, val) => {
        // Prevent deletion if any member uses this value
        if (key === 'plans' && members.some(m => m.plan === val)) return;
        if (key === 'statuses' && members.some(m => m.status === val)) return;
        if (key === 'holdDurations' && members.some(m => m.holdDuration === val)) return;
        if (key === 'paymentMethods' && members.some(m => m.paymentMethod === val)) return;
        updateSetting(key, settings[key].filter(x => x !== val));
      };
      const settingsAccess = normalizeAccess(access).settings;
      const settingItems = [
        { key: 'plans', label: 'Plans', allowed: settingsAccess.managePlans },
        { key: 'statuses', label: 'Statuses', allowed: settingsAccess.manageStatuses },
        { key: 'paymentMethods', label: 'Payment Methods', allowed: settingsAccess.managePaymentMethods },
        { key: 'holdDurations', label: 'Hold Durations', allowed: settingsAccess.manageHoldDurations },
        { key: 'genders', label: 'Genders', allowed: settingsAccess.manageGenders },
      ].filter(x => x.allowed);
      return (
        <div className="p-3 md:p-8 space-y-6">
          <div className="flex items-center justify-between gap-2">
            <h1 className="text-xl md:text-2xl font-semibold text-slate-900 mb-4">Settings</h1>
            <span
              className={cx(
                'mb-4 inline-flex items-center rounded-full border px-2.5 py-1 text-[11px] font-semibold uppercase tracking-wide',
                moduleDiag.status === 'ready'
                  ? 'border-emerald-300 bg-emerald-50 text-emerald-700'
                  : moduleDiag.status === 'retrying'
                    ? 'border-amber-300 bg-amber-50 text-amber-700'
                    : 'border-rose-300 bg-rose-50 text-rose-700'
              )}
              title="Module loader diagnostics"
            >
              Module Loader: {moduleDiag.text}
            </span>
          </div>
          <div className="rounded-3xl bg-white border border-slate-200 p-4 shadow-sm space-y-2">
            <h3 className="text-lg font-semibold">Storage Diagnostics</h3>
            <div className="text-sm text-slate-700">
              Approx usage: <span className="font-medium">{(Number(storageInfo?.usageBytes || 0) / (1024 * 1024)).toFixed(2)} MB</span> / 4.50 MB
            </div>
            <div className="text-xs text-slate-500">
              Last error: {storageInfo?.lastError ? `${storageInfo.lastError} (${storageInfo.lastKey || 'unknown key'})` : 'None'}
            </div>
            <div className="pt-2 flex items-center gap-2">
              <button onClick={onExport} className="rounded-full px-3 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Export Data</button>
              <button onClick={() => importRef.current && importRef.current.click()} className="rounded-xl px-3 py-2 text-sm font-medium border border-slate-300 bg-white hover:bg-slate-100">Import Data</button>
              <input
                ref={importRef}
                type="file"
                accept="application/json"
                className="hidden"
                onChange={(e) => {
                  const file = e.target.files && e.target.files[0];
                  onImport && onImport(file);
                  e.target.value = '';
                }}
              />
            </div>
          </div>
          {settingItems.length === 0 && (
            <div className="rounded-2xl border border-amber-200 bg-amber-50 p-3 text-sm text-amber-800">
              You have Settings access, but no child permission is enabled for configuration lists.
            </div>
          )}
          {settingItems.map(({ key, label }) => (
            <div key={key} className="rounded-3xl bg-white p-4 shadow-sm space-y-3">
              <h3 className="text-lg font-semibold">{label}</h3>
              <div className="flex flex-wrap gap-2">
                {settings[key].map(val => (
                  <span key={val} className="inline-flex items-center gap-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-full px-3 py-1 text-sm">
                    {val}
                    <button onClick={() => removeOpt(key, val)} className="text-xs text-red-500 ml-1">✕</button>
                  </span>
                ))}
              </div>
              <div className="flex items-center gap-2">
                <input value={newValues[key]} onChange={(e) => setNewValues(nv => ({ ...nv, [key]: e.target.value }))} placeholder={`Enter new ${key.slice(0,-1)}`} className="flex-1 rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
                <button onClick={() => handleAdd(key)} className="rounded-full px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Add</button>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ---- Staff Management Page ----
    function StaffPage({ settings, updateSetting, logEvent }) {
      const staff = settings.staff || [];
      const [modalOpen, setModalOpen] = React.useState(false);
      const [editStaff, setEditStaff] = React.useState(null);
      const [form, setForm] = React.useState({ id: '', name: '', email: '', role: 'staff-basic', phone: '' });
      const openAdd = () => {
        setEditStaff(null);
        setForm({ id: '', name: '', email: '', role: 'staff-basic', phone: '' });
        setModalOpen(true);
      };
      const openEdit = (s) => {
        setEditStaff(s);
        setForm({ ...s });
        setModalOpen(true);
      };
      const saveStaff = () => {
        if (!form.id.trim() || !form.name.trim()) return;
        let updated;
        if (editStaff) {
          updated = staff.map(st => st.id === editStaff.id ? form : st);
          logEvent('settings.updated', 'settings', 'staff', editStaff, form);
        } else {
          updated = [...staff, form];
          logEvent('settings.updated', 'settings', 'staff', null, form);
        }
        updateSetting('staff', updated);
        setModalOpen(false);
      };
      const removeStaff = (s) => {
        // prevent deletion of initial users
        if (s.id === 'Bis' || s.id === 'Raja') return;
        updateSetting('staff', staff.filter(st => st.id !== s.id));
        logEvent('settings.updated', 'settings', 'staff', s, null);
      };
      return (
        <div className="p-3 md:p-8 space-y-6">
          <div className="flex justify-between items-center">
            <h1 className="text-xl md:text-2xl font-semibold text-slate-900 mb-4">Staff</h1>

          <div className="rounded-3xl bg-white p-4 shadow-sm">

                <div>{s.name}</div>

                    <button onClick={() => removeStaff(s)} className="rounded-lg border border-rose-300 bg-rose-50 px-3 py-2 min-h-[44px] text-xs font-medium text-rose-700 hover:bg-rose-100">Delete</button>

              </div>
            ))}

              <div className="px-3 py-4 text-slate-500 text-sm">No staff members yet.</div>
            )}

          {modalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
              <div className="w-full max-w-lg rounded-3xl bg-white shadow-xl">
                <div className="flex justify-between items-center px-6 py-4">
                  <h3 className="text-lg font-semibold">{editStaff ? 'Edit Staff' : 'Add Staff'}</h3>

                <div className="px-6 pb-4 space-y-3">
                  <div><label className="text-sm font-medium">Username</label><input value={form.id} onChange={(e) => setForm({ ...form, id: e.target.value })} disabled={!!editStaff} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" /></div>

    // ---- Logs Page ----
    function LogsPage({ logs, currentUser, onClearLogs }) {
      const [filter, setFilter] = React.useState('');
      const [actorFilter, setActorFilter] = React.useState('');
      const [actionFilter, setActionFilter] = React.useState('');
      const [entityFilter, setEntityFilter] = React.useState('');
      const [timeRange, setTimeRange] = React.useState('24h');
      const [expandedId, setExpandedId] = React.useState('');
      const [page, setPage] = React.useState(1);
      const pageSize = 25;
      const sinceTs = React.useMemo(() => {
        if (timeRange === '24h') return Date.now() - (24 * 60 * 60 * 1000);
        if (timeRange === '7d') return Date.now() - (7 * 24 * 60 * 60 * 1000);
        if (timeRange === '30d') return Date.now() - (30 * 24 * 60 * 60 * 1000);
        return 0;
      }, [timeRange]);
      const actors = React.useMemo(() => Array.from(new Set((logs || []).map(l => l.actor).filter(Boolean))), [logs]);
      const actions = React.useMemo(() => Array.from(new Set((logs || []).map(l => l.action).filter(Boolean))), [logs]);
      const entities = React.useMemo(() => Array.from(new Set((logs || []).map(l => l.entityType).filter(Boolean))), [logs]);
      const filtered = React.useMemo(() => {
        const q = filter.toLowerCase();
        return (logs || []).filter(l => {
          if (sinceTs && new Date(l.ts).getTime() < sinceTs) return false;
          if (actorFilter && l.actor !== actorFilter) return false;
          if (actionFilter && l.action !== actionFilter) return false;
          if (entityFilter && l.entityType !== entityFilter) return false;
          if (!q) return true;
          return (l.entityId || '').toLowerCase().includes(q) || (l.action || '').toLowerCase().includes(q) || (l.actor || '').toLowerCase().includes(q);
        });
      }, [logs, filter, actorFilter, actionFilter, entityFilter, sinceTs]);
      React.useEffect(() => {
        setPage(1);
      }, [filter, logs, actorFilter, actionFilter, entityFilter, timeRange]);
      const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
      const safePage = page > totalPages ? 1 : page;
      const start = (safePage - 1) * pageSize;
      const pageRows = filtered.slice(start, start + pageSize);
      const alertCount = React.useMemo(() => {
        return filtered.filter(l => String(l.action || '').includes('deleted') || String(l.action || '').includes('blocked')).length;
      }, [filtered]);
      const exportCsv = () => {
        const rows = filtered.map(l => [
          l.ts || '',
          l.actor || '',
          l.action || '',
          l.entityType || '',
          l.entityId || '',
          JSON.stringify(l.before || {}),
          JSON.stringify(l.after || {}),
        ]);
        const header = ['Time', 'Actor', 'Action', 'Entity Type', 'Entity ID', 'Before', 'After'];
        const csv = [header, ...rows]
          .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
          .join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `audit-logs-${new Date().toISOString().slice(0, 10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };
      return (
        <div className="p-3 md:p-8">
          <div className="mb-4 flex items-center justify-between gap-3 flex-wrap">
            <div>
              <h1 className="text-2xl font-semibold">Audit Command Center</h1>
              <div className="text-sm text-slate-600 mt-1">
                Log Health: <span className="text-emerald-700 font-medium">Operational</span> |
                {' '}Total Logs ({timeRange === '24h' ? '24h' : timeRange}): <span className="font-medium">{filtered.length}</span> |
                {' '}Security Alerts: <span className="font-medium text-amber-700">{alertCount}</span>
              </div>
            </div>
            <div className="flex items-center gap-2 flex-wrap">
              {currentUser && currentUser.id === 'owner' && (
                <button
                  onClick={() => onClearLogs && onClearLogs()}
                  className="rounded-xl px-3 py-2 min-h-[44px] text-sm font-medium border border-rose-300 bg-rose-50 text-rose-700 hover:bg-rose-100"
                >
                  Clear Logs
                </button>
              )}
              <button onClick={exportCsv} className="rounded-xl px-3 py-2 min-h-[44px] text-sm font-medium bg-blue-600 text-white hover:bg-blue-700">Export to CSV</button>
            </div>
          </div>
          <div className="mb-4 grid grid-cols-1 md:grid-cols-5 gap-2">
            <select value={actorFilter} onChange={(e) => setActorFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="">Select Users</option>
              {actors.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <select value={actionFilter} onChange={(e) => setActionFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="">Select Actions</option>
              {actions.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <select value={entityFilter} onChange={(e) => setEntityFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="">Select Entity</option>
              {entities.map(a => <option key={a} value={a}>{a}</option>)}
            </select>

                    <div className="flex items-center gap-2 flex-wrap">
                      <button
                        onClick={() => {
                          if (!canActInSuccessTab) return;
                          setPreview({ open: true, member: m, templateKey: activeType });
                        }}
                        disabled={!canActInSuccessTab}
                        className={cx(
                          'rounded-lg border px-3 py-2 min-h-[44px] text-xs font-medium',
                          canActInSuccessTab
                            ? 'border-emerald-300 bg-emerald-50 text-emerald-700 hover:bg-emerald-100'
                            : 'border-slate-300 bg-slate-100 text-slate-500 cursor-not-allowed'
                        )}
                      >
                        Send
                      </button>
                      <SmsSendInfoChip text={getSmsSentInfoText(m, activeType)} />
                    </div>
                  </div>
                ))}
                {rows.length === 0 && <div className="py-3 text-slate-500 text-sm text-center">No members match this SMS condition.</div>}
              </div>
            </div>
          </div>

          <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
            <div className="text-3xl font-semibold mb-3">Campaign Control</div>
            <div className="flex items-center gap-2 text-2xl mb-3">
              <button onClick={() => setRuleTab('all')} className={cx('px-3 py-1 border-b-4', ruleTab === 'all' ? 'border-blue-500' : 'border-transparent')}>All Rules</button>
              <button onClick={() => setRuleTab('status')} className={cx('px-3 py-1 border-b-4', ruleTab === 'status' ? 'border-blue-500' : 'border-transparent')}>Status Triggers (Instant)</button>
              <button onClick={() => setRuleTab('billing')} className={cx('px-3 py-1 border-b-4', ruleTab === 'billing' ? 'border-blue-500' : 'border-transparent')}>Billing Reminders (Daily)</button>
            </div>
            <div className="overflow-x-auto">
              <table className="min-w-full text-sm hidden md:table">
                <thead>
                  <tr className="bg-blue-50 text-blue-700">
                    <th className="px-3 py-2 text-left">Rule Name</th>
                    <th className="px-3 py-2 text-left">Status</th>
                    <th className="px-3 py-2 text-left">Recipients (Last 24H)</th>
                    <th className="px-3 py-2 text-left">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {shownRules.map(rule => (
                    <tr key={rule.name} className="border-b border-slate-200">
                      <td className="px-3 py-2">{rule.name}</td>
                      <td className="px-3 py-2">
                        <span className={cx('rounded-full px-2 py-1 text-xs font-medium border', rule.status === 'Active' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-amber-50 text-amber-700 border-amber-200')}>
                          {rule.status}
                        </span>
                      </td>
                      <td className="px-3 py-2">{rule.recipients}</td>
                      <td className="px-3 py-2 text-blue-700">Pause/Edit</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div className="md:hidden divide-y divide-slate-200">
                {shownRules.map(rule => (
                  <div key={`mobile-rule-${rule.name}`} className="py-3 space-y-2">
                    <div className="font-semibold text-slate-900">{rule.name}</div>
                    <div>
                      <span className={cx('rounded-full px-2 py-1 text-xs font-medium border', rule.status === 'Active' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-amber-50 text-amber-700 border-amber-200')}>
                        {rule.status}
                      </span>
                    </div>
                    <div className="text-xs text-slate-600">Recipients (Last 24H): {rule.recipients}</div>
                    <div className="text-xs font-medium text-blue-700">Pause/Edit</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
            <div className="text-xl font-semibold mb-2">Auto Sync Activity (from Member Status changes)</div>
            <div className="text-sm text-slate-600 mb-3">
              Triggered when Member status changes to Hold / Deactivated / Active. Member details and template placeholders are pulled automatically.
            </div>
            <div className="overflow-x-auto">
              <table className="min-w-full text-sm hidden md:table">
                <thead>
                  <tr className="bg-slate-100 text-slate-700">
                    <th className="px-3 py-2 text-left">Time</th>
                    <th className="px-3 py-2 text-left">Member</th>
                    <th className="px-3 py-2 text-left">Status Flow</th>
                    <th className="px-3 py-2 text-left">Template</th>
                    <th className="px-3 py-2 text-left">Message Preview</th>
                  </tr>
                </thead>
                <tbody>
                  {(smsEvents || []).slice(0, 20).map(ev => (
                    <tr key={ev.id} className="border-b border-slate-200">
                      <td className="px-3 py-2 whitespace-nowrap">{fmt(ev.ts)}</td>
                      <td className="px-3 py-2 whitespace-nowrap">{ev.memberName}</td>
                      <td className="px-3 py-2 whitespace-nowrap">{ev.fromStatus} → {ev.toStatus}</td>
                      <td className="px-3 py-2 whitespace-nowrap">{ev.templateKey}</td>
                      <td className="px-3 py-2 text-xs max-w-md truncate">
                        <div className="flex items-center gap-2">
                          <span className="truncate">{ev.message}</span>
                          <button
                            onClick={() => {
                              const m = members.find(x => x.memberId === ev.memberId);
                              sendNow(m, ev.templateKey, ev.message);
                            }}
                            className="shrink-0 rounded-lg border border-emerald-300 bg-emerald-50 px-2 py-1 text-[11px] font-medium text-emerald-700 hover:bg-emerald-100"
                          >
                            Send Now
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))}
                  {(smsEvents || []).length === 0 && (
                    <tr><td colSpan={5} className="px-3 py-3 text-slate-500">No status-triggered events yet.</td></tr>
                  )}
                </tbody>
              </table>
              <div className="md:hidden divide-y divide-slate-200">
                {(smsEvents || []).slice(0, 20).map(ev => (
                  <div key={`mobile-ev-${ev.id}`} className="py-3 space-y-2">
                    <div className="text-xs text-slate-500">{fmt(ev.ts)}</div>
                    <div className="font-semibold text-slate-900">{ev.memberName}</div>
                    <div className="text-xs text-slate-600">{ev.fromStatus} → {ev.toStatus} | {ev.templateKey}</div>
                    <div className="text-xs text-slate-600 truncate">{ev.message}</div>
                    <button
                      onClick={() => {
                        const m = members.find(x => x.memberId === ev.memberId);
                        sendNow(m, ev.templateKey, ev.message);
                      }}
                      className="rounded-lg border border-emerald-300 bg-emerald-50 px-3 py-2 min-h-[44px] text-xs font-medium text-emerald-700 hover:bg-emerald-100"
                    >
                      Send Now
                    </button>
                  </div>
                ))}
                {(smsEvents || []).length === 0 && <div className="py-3 text-slate-500 text-sm">No status-triggered events yet.</div>}
              </div>
            </div>
          </div>
          {preview.open && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
              <div className="w-full max-w-xl rounded-2xl bg-white p-4 shadow-xl space-y-3">
                <div className="flex items-center justify-between">
                  <div className="text-lg font-semibold">Message Preview</div>
                  <button onClick={() => setPreview({ open: false, member: null, templateKey: '' })} className="rounded-lg px-2 py-1 hover:bg-slate-100">✕</button>
                </div>
                <div className="text-xs text-slate-500">Variables: {VARIABLE_KEYS.join(', ')}</div>
                <div className="max-h-72 overflow-auto whitespace-pre-wrap rounded-xl border border-slate-200 bg-slate-50 p-3 text-sm">
                  {renderSms(templates[preview.templateKey] || '', preview.member)}
                </div>
                <div className="flex justify-end gap-2">
                  <button onClick={() => setPreview({ open: false, member: null, templateKey: '' })} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">Cancel</button>
                  <button onClick={() => { sendNow(preview.member, preview.templateKey); setPreview({ open: false, member: null, templateKey: '' }); }} className="rounded-full bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">Send</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ---- Finance Page ----
    function FinancePage({ members, settings, logs, access }) {
      const [query, setQuery] = React.useState('');
      const [appliedQuery, setAppliedQuery] = React.useState('');
      const [showFilter, setShowFilter] = React.useState(false);
      const [planFilter, setPlanFilter] = React.useState('');
      const [methodFilter, setMethodFilter] = React.useState('');
      const [statusFilter, setStatusFilter] = React.useState('');
      const [fromDate, setFromDate] = React.useState('');
      const [toDate, setToDate] = React.useState('');
      const [page, setPage] = React.useState(1);
      const [expandedId, setExpandedId] = React.useState('');
      const today = new Date();

      const transactions = React.useMemo(() => {
        return members
          .filter(m => m.billingDate)
          .map(m => {
            const due = asUTC(m.paymentBy || m.billingDate);
            const pending = m.status === 'Active' && due && due < today;
            return {
              id: m.memberId || crypto.randomUUID(),
              memberId: m.memberId || '',
              memberName: m.name || '',
              date: iso(m.billingDate),
              plan: m.plan || '',
              method: m.paymentMethod || '',
              amount: Number(m.amount || 0),
              status: pending ? 'pending' : 'paid',
              memberStatus: m.status || '',
            };
          })
          .sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
      }, [members, today]);

      const searchTokens = React.useMemo(() => {
        return appliedQuery.toLowerCase().trim().split(/\s+/).filter(Boolean);
      }, [appliedQuery]);

      const filteredTransactions = React.useMemo(() => {
        return transactions.filter(t => {
          if (planFilter && t.plan !== planFilter) return false;
          if (methodFilter && t.method !== methodFilter) return false;
          if (statusFilter && t.status !== statusFilter) return false;
          if (fromDate && String(t.date || '') < fromDate) return false;
          if (toDate && String(t.date || '') > toDate) return false;
          if (searchTokens.length) {
            const hay = [t.memberName, t.memberId, t.plan, t.method, t.memberStatus, t.status].join(' ').toLowerCase();
            if (!searchTokens.every(tok => hay.includes(tok))) return false;
          }
          return true;
        });
      }, [transactions, planFilter, methodFilter, statusFilter, fromDate, toDate, searchTokens]);

      React.useEffect(() => {
        setPage(1);
      }, [appliedQuery, planFilter, methodFilter, statusFilter, fromDate, toDate, members.length]);

      const revenue = filteredTransactions.reduce((sum, t) => sum + Number(t.amount || 0), 0);
      const pendingRows = filteredTransactions.filter(t => t.status === 'pending');
      const pendingAmount = pendingRows.reduce((sum, t) => sum + Number(t.amount || 0), 0);
      const expense = Math.round(revenue * 0.26);
      const profit = revenue - expense;

      const monthTotals = React.useMemo(() => {
        const months = [];
        const now = new Date();
        for (let i = 3; i >= 0; i -= 1) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const label = MONTHS[d.getMonth()];
          const total = filteredTransactions.reduce((sum, t) => {
            const td = asUTC(t.date);
            if (!td || td.getFullYear() !== d.getFullYear() || td.getMonth() !== d.getMonth()) return sum;
            return sum + Number(t.amount || 0);
          }, 0);
          months.push({ label, total });
        }
        return months;
      }, [filteredTransactions]);
      const highestMonth = Math.max(1, ...monthTotals.map(x => x.total));

      const planBreakup = React.useMemo(() => {
        const counts = {};
        filteredTransactions.forEach(t => {
          const key = t.plan || 'Unassigned';
          counts[key] = (counts[key] || 0) + 1;
        });
        const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        const total = entries.reduce((sum, [, c]) => sum + c, 0);
        return entries.slice(0, 4).map(([name, count], idx) => ({
          name,
          pct: total ? Math.round((count / total) * 100) : 0,
          color: ['#2563eb', '#16a34a', '#eab308', '#7c3aed'][idx % 4],
        }));
      }, [filteredTransactions]);

      const pieBackground = React.useMemo(() => {
        if (!planBreakup.length) return '#e2e8f0';
        let start = 0;
        const segments = planBreakup.map(seg => {
          const from = start;
          const to = start + seg.pct;
          start = to;
          return `${seg.color} ${from}% ${to}%`;
        });
        if (start < 100) segments.push(`#cbd5e1 ${start}% 100%`);
        return `conic-gradient(${segments.join(', ')})`;
      }, [planBreakup]);

      const pageSize = 10;
      const totalPages = Math.max(1, Math.ceil(filteredTransactions.length / pageSize));
      const safePage = page > totalPages ? 1 : page;
      const pageRows = filteredTransactions.slice((safePage - 1) * pageSize, safePage * pageSize);

      const resetFilters = () => {
        setPlanFilter('');
        setMethodFilter('');
        setStatusFilter('');
        setFromDate('');
        setToDate('');
      };

      const getMemberLogs = (memberId) => {
        return (logs || [])
          .filter(l => l.entityType === 'member' && l.entityId === memberId)
          .slice(0, 10);
      };

      const amountFromLog = (entry) => {
        if (entry && entry.after && entry.after.amount !== undefined) return entry.after.amount;
        if (entry && entry.before && entry.before.amount !== undefined) return entry.before.amount;
        return '-';
      };

      const cardBase = 'rounded-2xl border border-slate-200 bg-white p-4 shadow-sm';
      const canFinanceRevenue = access?.finance?.viewRevenueAutoMembers !== false;
      const canFinanceTrend = access?.finance?.viewRevenueTrend4Months !== false;
      const canFinancePlan = access?.finance?.viewPlanPopularity !== false;
      const canFinanceTransactions = access?.finance?.viewTransactionsAutoMembers !== false;
      const isMobile = useIsMobile();
      if (isMobile) {
        const upcoming = filteredTransactions.filter((t) => t.status !== 'pending').slice(0, 5);
        const overdue = filteredTransactions.filter((t) => t.status === 'pending').slice(0, 5);
        return (
          <div className="p-4 space-y-4 bg-[#F8FAFC]">
            <div className="text-xl font-semibold text-slate-900">Billing & Payments</div>
            <div className="grid grid-cols-2 gap-3">
              <div className="rounded-2xl border border-blue-200 bg-blue-50 p-4">
                <div className="text-xs font-semibold text-blue-700">Total Revenue</div>
                <div className="mt-2 text-2xl font-bold text-blue-900">₹{revenue.toLocaleString()}</div>
                <div className="text-xs text-blue-700">This Month</div>
              </div>
              <div className="rounded-2xl border border-rose-200 bg-rose-50 p-4">
                <div className="text-xs font-semibold text-rose-700">Pending Amount</div>
                <div className="mt-2 text-2xl font-bold text-rose-900">₹{pendingAmount.toLocaleString()}</div>
                <div className="text-xs text-rose-700">From {pendingRows.length} Members</div>
              </div>
            </div>
            <div className="flex gap-2 overflow-x-auto pb-1">
              {['All', 'Paid', 'Pending', 'Overdue'].map((x, idx) => (
                <button key={x} className={cx('shrink-0 rounded-full px-4 py-2 text-xs font-semibold border', idx === 0 ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600 border-slate-200')}>{x}</button>
              ))}
            </div>
            <div className="rounded-2xl border border-blue-100 bg-white p-3">
              <div className="mb-2 flex items-center justify-between">
                <div className="text-sm font-semibold text-slate-800">Upcoming Payments</div>
              </div>
              <div className="space-y-2">
                {upcoming.map((t) => (
                  <div key={`u-${t.id}`} className="flex items-center justify-between rounded-xl border border-slate-100 bg-slate-50 px-3 py-2">
                    <div className="min-w-0">
                      <div className="truncate text-sm font-semibold text-slate-900">{t.memberName}</div>
                      <div className="text-[11px] text-slate-500">{t.plan}</div>
                    </div>
                    <div className="text-sm font-semibold text-slate-900">₹{Number(t.amount || 0).toLocaleString()}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="rounded-2xl border border-rose-100 bg-white p-3">
              <div className="mb-2 flex items-center justify-between">
                <div className="text-sm font-semibold text-rose-700">Overdue Payments</div>
              </div>
              <div className="space-y-2">
                {overdue.map((t) => (
                  <div key={`o-${t.id}`} className="flex items-center justify-between rounded-xl border border-rose-100 bg-rose-50 px-3 py-2">
                    <div className="min-w-0">
                      <div className="truncate text-sm font-semibold text-slate-900">{t.memberName}</div>
                      <div className="text-[11px] text-rose-600">Overdue</div>
                    </div>
                    <div className="text-sm font-semibold text-rose-700">₹{Number(t.amount || 0).toLocaleString()}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="rounded-2xl border border-slate-200 bg-white p-4">
              <div className="flex items-center justify-between">
                <div className="text-lg font-semibold text-slate-900">Analytics</div>
                <div className="rounded-lg border border-slate-200 bg-white px-2 py-1 text-xs text-slate-600">This Month</div>
              </div>
              <div className="mt-3 grid grid-cols-2 gap-3">
                <div className="rounded-xl border border-slate-200 p-3"><div className="text-xs text-slate-500">Total Members</div><div className="text-2xl font-bold text-slate-900">{members.length}</div></div>
                <div className="rounded-xl border border-slate-200 p-3"><div className="text-xs text-slate-500">Active Members</div><div className="text-2xl font-bold text-slate-900">{members.filter(m => m.status === 'Active').length}</div></div>
                <div className="rounded-xl border border-slate-200 p-3"><div className="text-xs text-slate-500">New Members</div><div className="text-2xl font-bold text-slate-900">{members.filter(m => iso(m.joiningDate) === iso(new Date())).length}</div></div>
                <div className="rounded-xl border border-slate-200 p-3"><div className="text-xs text-slate-500">Churned Members</div><div className="text-2xl font-bold text-slate-900">{members.filter(m => m.status === 'Deactivated').length}</div></div>
              </div>
            </div>
          </div>
        );
      }
      return (
        <div className="p-3 md:p-8 space-y-5 bg-slate-100">
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <h1 className="text-2xl font-semibold text-slate-900">Finance</h1>
            <div className="flex gap-2 flex-wrap">
              <input
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="Search member, plan, method"
                className="rounded-xl border border-slate-300 bg-white px-3 py-2 min-h-[44px] text-sm w-full sm:w-auto"
              />
              <button onClick={() => setAppliedQuery(query)} className="rounded-full bg-blue-600 text-white px-4 py-2 min-h-[44px] text-sm font-medium hover:bg-blue-700">Search</button>
              <button onClick={() => setShowFilter(v => !v)} className="rounded-full border border-slate-300 bg-white px-4 py-2 min-h-[44px] text-sm font-medium text-slate-700">Filter</button>
            </div>
          </div>

          {showFilter && (
            <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm grid grid-cols-1 md:grid-cols-3 xl:grid-cols-5 gap-3">
              <select value={planFilter} onChange={(e) => setPlanFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                <option value="">All Plans</option>
                {(settings?.plans || []).map(p => <option key={p} value={p}>{p}</option>)}
              </select>
              <select value={methodFilter} onChange={(e) => setMethodFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                <option value="">All Methods</option>
                {(settings?.paymentMethods || []).map(m => <option key={m} value={m}>{m}</option>)}
              </select>
              <select value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">
                <option value="">All Payment Status</option>
                <option value="paid">Paid</option>
                <option value="pending">Pending</option>
              </select>
              <input type="date" value={fromDate} onChange={(e) => setFromDate(e.target.value)} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
              <div className="flex gap-2">
                <input type="date" value={toDate} onChange={(e) => setToDate(e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm" />
                <button onClick={resetFilters} className="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm">Reset</button>
              </div>
            </div>
          )}

          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
            {canFinanceRevenue && (
            <div className={cardBase}>
              <div className="text-sm text-slate-500">Revenue</div>
              <div className="mt-1 text-3xl font-bold text-emerald-700">${revenue.toLocaleString()}</div>
              <div className="text-sm text-emerald-700">Auto from Members</div>
            </div>
            )}
            <div className={cardBase}>
              <div className="text-sm text-slate-500">Pending Payments</div>
              <div className="mt-1 text-3xl font-bold text-amber-700">${pendingAmount.toLocaleString()}</div>
              <div className="text-sm text-amber-700">({pendingRows.length} pending)</div>
            </div>
            <div className={cardBase}>
              <div className="text-sm text-slate-500">Expenses</div>
              <div className="mt-1 text-3xl font-bold text-rose-700">${expense.toLocaleString()}</div>
              <div className="text-sm text-rose-700">Estimated (26%)</div>
            </div>
            <div className={cardBase}>
              <div className="text-sm text-slate-500">Profit</div>
              <div className={cx('mt-1 text-3xl font-bold', profit >= 0 ? 'text-emerald-700' : 'text-rose-700')}>${profit.toLocaleString()}</div>
              <div className="text-sm text-slate-600">Revenue - expense</div>
            </div>
          </div>

          <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
            {canFinanceTrend && (
            <div className={cx(cardBase, 'xl:col-span-2')}>
              <div className="text-lg font-semibold text-slate-900 mb-4">Revenue Trend (Last 4 Months)</div>
              <div className="h-48 flex items-end gap-3">
                {monthTotals.map(x => {
                  const h = Math.max(16, Math.round((x.total / highestMonth) * 160));
                  return (
                    <div key={x.label} className="flex-1 flex flex-col items-center gap-2">
                      <div className="text-xs text-slate-500">${x.total.toLocaleString()}</div>
                      <div className="w-full rounded-t-lg bg-blue-500/80" style={{ height: `${h}px` }} />
                      <div className="text-xs text-slate-700">{x.label}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            )}
            {canFinancePlan && (
            <div className={cardBase}>
              <div className="text-lg font-semibold text-slate-900 mb-4">Plan Popularity</div>
              <div className="flex items-center gap-4">
                <div className="h-36 w-36 rounded-full border border-slate-200 shrink-0" style={{ background: pieBackground }} />
                <div className="space-y-2 text-sm">
                  {planBreakup.map(seg => (
                    <div key={seg.name} className="flex items-center gap-2">

    // ---- User Management Page ----
    // This page allows the owner to add new staff and assign which sections they can access.
    function UserManagementPage({ users, setUsers, settings, setSettings, currentUser, logEvent }) {
      const [modalOpen, setModalOpen] = React.useState(false);
      const [form, setForm] = React.useState({ id: '', password: '', name: '', email: '', sections: [], access: { ...DEFAULT_ACCESS }, blocked: false, blockedReason: '', blockedAt: '', updatedBy: '', photo: null });
      const [error, setError] = React.useState('');
      const [editingId, setEditingId] = React.useState(null);
      const [shownPasswords, setShownPasswords] = React.useState({});
      const [dashboardAccessOpen, setDashboardAccessOpen] = React.useState(false);
      const [financeAccessOpen, setFinanceAccessOpen] = React.useState(false);
      const [settingsAccessOpen, setSettingsAccessOpen] = React.useState(false);
      const isOwner = currentUser && currentUser.id === 'owner';
      const closeStaffModal = () => {
        setModalOpen(false);
        setError('');
        setSelectedRole('');
        setDashboardAccessOpen(false);
        setFinanceAccessOpen(false);
        setSettingsAccessOpen(false);
      };
      const roleTemplates = React.useMemo(() => {
        const list = settings && Array.isArray(settings.roleTemplates) && settings.roleTemplates.length
          ? settings.roleTemplates
          : DEFAULT_ROLE_TEMPLATES;
        return list.map((role, idx) => ({
          ...role,
          id: role.id || `role-${idx + 1}`,
          title: role.title || 'Untitled Role',
          subtitle: role.subtitle || '',
          sections: Array.isArray(role.sections) ? role.sections : [],
          color: role.color || ['bg-emerald-50 border-emerald-200', 'bg-amber-50 border-amber-200', 'bg-blue-50 border-blue-200', 'bg-violet-50 border-violet-200'][idx % 4],
        }));
      }, [settings]);
      const [selectedRole, setSelectedRole] = React.useState('');
      const [roleModalOpen, setRoleModalOpen] = React.useState(false);
      const [editingRoleId, setEditingRoleId] = React.useState('');
      const [roleError, setRoleError] = React.useState('');
      const [roleForm, setRoleForm] = React.useState({
        title: '',
        subtitle: '',
        sections: [],
        color: 'bg-emerald-50 border-emerald-200',
      });

      const openAdd = () => {
        setForm({ id: '', password: '', name: '', email: '', sections: [], access: { ...DEFAULT_ACCESS }, blocked: false, blockedReason: '', blockedAt: '', updatedBy: '', photo: null });
        setError('');
        setEditingId(null);
        setSelectedRole('');
        setDashboardAccessOpen(false);
        setModalOpen(true);
      };

      const openEdit = (u) => {
        setForm({
          id: u.id,
          password: '',
          name: u.name || '',
          email: u.email || '',
          sections: Array.isArray(u.sections) ? [...u.sections] : [],
          access: normalizeAccess(u.access),
          blocked: Boolean(u.blocked),
          blockedReason: u.blockedReason || '',
          blockedAt: u.blockedAt || '',
          updatedBy: u.updatedBy || '',
          photo: u.photo || null,
        });
        setError('');
        setEditingId(u.id);
        setSelectedRole('');
        setDashboardAccessOpen(true);
        setFinanceAccessOpen(true);
        setSettingsAccessOpen(true);
        setModalOpen(true);
      };
      const applyRolePreset = (roleKey) => {
        const role = roleTemplates.find(r => r.id === roleKey);
        if (!role) return;
        setSelectedRole(roleKey);
        setForm(prev => ({ ...prev, sections: [...role.sections], access: normalizeAccess(prev.access) }));
      };
      const openRoleAdd = () => {
        if (!isOwner) return;
        setEditingRoleId('');
        setRoleError('');
        setRoleForm({ title: '', subtitle: '', sections: [], color: 'bg-emerald-50 border-emerald-200' });
        setRoleModalOpen(true);
      };
      const openRoleEdit = (role) => {
        if (!isOwner) return;
        setEditingRoleId(role.id);
        setRoleError('');
        setRoleForm({
          title: role.title || '',
          subtitle: role.subtitle || '',
          sections: Array.isArray(role.sections) ? [...role.sections] : [],
          color: role.color || 'bg-emerald-50 border-emerald-200',
        });
        setRoleModalOpen(true);
      };
      const toggleRoleSection = (sec) => {
        setRoleForm(prev => {
          const next = prev.sections.includes(sec) ? prev.sections.filter(x => x !== sec) : [...prev.sections, sec];
          return { ...prev, sections: next };
        });
      };
      const saveRoleTemplate = () => {
        setRoleError('');
        const title = roleForm.title.trim();
        const subtitle = roleForm.subtitle.trim();
        if (!title) {
          setRoleError('Role name is required.');
          return;
        }
        if (!roleForm.sections.length) {
          setRoleError('Select at least one section for role access.');
          return;
        }
        const nextRole = {
          id: editingRoleId || crypto.randomUUID(),
          title,
          subtitle,
          sections: [...roleForm.sections],
          color: roleForm.color || 'bg-emerald-50 border-emerald-200',
        };
        setSettings(prev => {
          const list = Array.isArray(prev.roleTemplates) && prev.roleTemplates.length ? prev.roleTemplates : [...DEFAULT_ROLE_TEMPLATES];
          if (editingRoleId) return { ...prev, roleTemplates: list.map(r => r.id === editingRoleId ? nextRole : r) };
          return { ...prev, roleTemplates: [nextRole, ...list] };
        });
        logEvent && logEvent(editingRoleId ? 'staff.role_template.updated' : 'staff.role_template.created', 'settings', nextRole.id, null, nextRole);
        setRoleModalOpen(false);
      };
      const deleteRoleTemplate = (role) => {
        if (!isOwner) return;
        const ok = window.confirm(`Delete role template "${role.title}"?`);
        if (!ok) return;
        setSettings(prev => {
          const list = Array.isArray(prev.roleTemplates) ? prev.roleTemplates : [];
          return { ...prev, roleTemplates: list.filter(r => r.id !== role.id) };
        });
        if (selectedRole === role.id) setSelectedRole('');
        logEvent && logEvent('staff.role_template.deleted', 'settings', role.id, role, null);
      };

      const onStaffPhoto = async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        if (file.size > MAX_IMAGE_FILE_BYTES) {
          setError('Image too large. Please upload a file up to 10MB.');
          return;
        }
        try {
          const raw = await loadImageDataUrl(file);
          const compressed = await downscaleImageDataUrl(raw);
          setForm(prev => ({ ...prev, photo: compressed }));
        } catch {
          setError('Unable to process image. Please try another file.');
        }
      };

      const toggleSection = (sec) => {
        setForm(f => {
          const list = f.sections.includes(sec) ? f.sections.filter(s => s !== sec) : [...f.sections, sec];
          return { ...f, sections: list };
        });
      };
      const toggleDashboardParent = () => {
        setForm(f => {
          const hasDashboard = f.sections.includes('Dashboard');
          const allChildren = DASHBOARD_CHILD_PERMISSIONS.every(p => f.access?.dashboard?.[p.key] !== false);
          const nextSections = hasDashboard ? f.sections.filter(s => s !== 'Dashboard') : [...f.sections, 'Dashboard'];
          const nextAccess = {
            ...normalizeAccess(f.access),
            dashboard: DASHBOARD_CHILD_PERMISSIONS.reduce((acc, p) => ({ ...acc, [p.key]: hasDashboard ? false : true }), {}),
          };
          if (!hasDashboard) return { ...f, sections: nextSections, access: nextAccess };
          if (!allChildren) return { ...f, sections: nextSections, access: nextAccess };
          return { ...f, sections: nextSections, access: nextAccess };
        });
      };
      const toggleDashboardChild = (key) => {
        setForm(f => {
          const normalized = normalizeAccess(f.access);
          const next = { ...normalized, dashboard: { ...normalized.dashboard, [key]: !(normalized.dashboard[key] !== false) } };
          const shouldEnableDashboard = Object.values(next.dashboard).some(Boolean);
          const hasDashboard = f.sections.includes('Dashboard');
          const nextSections = shouldEnableDashboard
            ? (hasDashboard ? f.sections : [...f.sections, 'Dashboard'])
            : f.sections.filter(s => s !== 'Dashboard');
          return { ...f, sections: nextSections, access: next };
        });
      };
      const FINANCE_CHILD_PERMISSIONS = [
        { key: 'viewRevenueAutoMembers', label: 'Finance - Revenue (Auto from Members)' },
        { key: 'viewRevenueTrend4Months', label: 'Revenue Trend (Last 4 Months)' },
        { key: 'viewPlanPopularity', label: 'Plan Popularity' },
        { key: 'viewTransactionsAutoMembers', label: 'Transactions (Auto from Members)' },
      ];
      const toggleFinanceParent = () => {
        setForm(f => {
          const hasFinance = f.sections.includes('Finance');
          const nextSections = hasFinance ? f.sections.filter(s => s !== 'Finance') : [...f.sections, 'Finance'];
          const nextAccess = {
            ...normalizeAccess(f.access),
            finance: FINANCE_CHILD_PERMISSIONS.reduce((acc, p) => ({ ...acc, [p.key]: hasFinance ? false : true }), {}),
          };
          return { ...f, sections: nextSections, access: nextAccess };
        });
      };
      const toggleFinanceChild = (key) => {
        setForm(f => {
          const normalized = normalizeAccess(f.access);
          const next = { ...normalized, finance: { ...normalized.finance, [key]: !(normalized.finance[key] !== false) } };
          const shouldEnableFinance = Object.values(next.finance).some(Boolean);
          const hasFinance = f.sections.includes('Finance');
          const nextSections = shouldEnableFinance
            ? (hasFinance ? f.sections : [...f.sections, 'Finance'])
            : f.sections.filter(s => s !== 'Finance');
          return { ...f, sections: nextSections, access: next };
        });
      };
      const toggleSettingsParent = () => {
        setForm(f => {
          const hasSettings = f.sections.includes('Settings');
          const nextSections = hasSettings ? f.sections.filter(s => s !== 'Settings') : [...f.sections, 'Settings'];
          const nextAccess = {
            ...normalizeAccess(f.access),
            settings: SETTINGS_CHILD_PERMISSIONS.reduce((acc, p) => ({ ...acc, [p.key]: hasSettings ? false : true }), {}),
          };
          return { ...f, sections: nextSections, access: nextAccess };
        });
      };
      const toggleSettingsChild = (key) => {
        setForm(f => {
          const normalized = normalizeAccess(f.access);
          const next = { ...normalized, settings: { ...normalized.settings, [key]: !(normalized.settings[key] !== false) } };
          const shouldEnableSettings = Object.values(next.settings).some(Boolean);
          const hasSettings = f.sections.includes('Settings');
          const nextSections = shouldEnableSettings
            ? (hasSettings ? f.sections : [...f.sections, 'Settings'])
            : f.sections.filter(s => s !== 'Settings');
          return { ...f, sections: nextSections, access: next };
        });
      };
      const toggleAllSections = () => {
        setForm(f => {
          const allSelected = ALL_SECTIONS.every(sec => f.sections.includes(sec));
          return {
            ...f,
            sections: allSelected ? [] : [...ALL_SECTIONS],
            access: allSelected
              ? normalizeAccess({
                dashboard: { viewRevenueMonthly: false, viewRevenueTrend: false },
                finance: { viewRevenueAutoMembers: false, viewRevenueTrend4Months: false, viewPlanPopularity: false, viewTransactionsAutoMembers: false },
                settings: { managePlans: false, manageStatuses: false, managePaymentMethods: false, manageHoldDurations: false, manageGenders: false },
              })
              : normalizeAccess(f.access),
          };
        });
      };

      const toggleShowPassword = (u) => {
        setShownPasswords(prev => ({ ...prev, [u.id]: !prev[u.id] }));
        logEvent && logEvent('staff.password.view_toggled', 'user', u.id, null, { shown: !shownPasswords[u.id] });
      };

      const toggleBlocked = (u) => {
        if (!isOwner || u.id === 'owner') return;
        const nextBlocked = !Boolean(u.blocked);
        let blockedReason = '';
        let unblockNote = '';
        if (nextBlocked) {
          blockedReason = window.prompt('Reason for blocking this staff member?') || '';
        } else {
          unblockNote = window.prompt('Optional note for unblocking this staff member:') || '';
        }
        const now = new Date().toISOString();
        setUsers(prev => prev.map(x => x.id === u.id ? {
          ...x,
          blocked: nextBlocked,
          blockedReason: nextBlocked ? blockedReason : '',
          blockedAt: nextBlocked ? now : '',
          updatedBy: currentUser?.id || currentUser?.name || 'owner',
          unblockNote: nextBlocked ? '' : unblockNote,
        } : x));
        logEvent && logEvent('staff.block_toggled', 'user', u.id, u, { ...u, blocked: nextBlocked, blockedReason, blockedAt: nextBlocked ? now : '', unblockNote });
      };

      const handleDelete = (u) => {
        if (!isOwner || u.id === 'owner') return;
        const ok = window.confirm(`Delete staff "${u.id}"? This cannot be undone.`);
        if (!ok) return;
        setUsers(prev => prev.filter(x => x.id !== u.id));
        setSettings(prev => {
          const staffList = prev.staff || [];
          return { ...prev, staff: staffList.filter(s => s.id !== u.id) };
        });
        logEvent && logEvent('staff.deleted', 'user', u.id, u, null);
      };

      const save = () => {
        setError('');
        const id = form.id.trim();
        const beforeUser = editingId ? users.find(u => u.id === editingId) : null;
        const passwordInput = String(form.password || '');
        const password = editingId ? (passwordInput || beforeUser?.password || '') : passwordInput;
        const name = form.name.trim();
        const email = form.email.trim();
        if (!id || !name || (!editingId && !password)) {
          setError('Please enter a username, password and name.');
          return;

    // ---- Filter Panel Component ----
    // This component renders a modal that allows users to build complex filters on
    // the members list. It supports filtering by plan, status, billing month,
    // payment method, staff, and by joining/billing date ranges. Filters are
    // local to the panel until the user applies them.
    function FilterPanel({ open, onClose, filters, setFilters, clearFilters, settings, billingMonthOptions }) {
      const initial = {
        plan: '',
        status: '',
        billingMonth: '',
        paymentMethod: '',
        staff: '',
        joinFrom: '',
        joinTo: '',
        billFrom: '',
        billTo: ''
      };
      const [localFilters, setLocalFilters] = React.useState(filters);
      const [presetName, setPresetName] = React.useState('');
      const [presets, setPresets] = React.useState(() => {
        try {
          const saved = localStorage.getItem('apg.filterPresets');
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });
      // When the panel opens, initialise local state from current filters
      React.useEffect(() => {
        if (open) {
          setLocalFilters(filters);
        }
      }, [open, filters]);
      React.useEffect(() => {
        try {
          localStorage.setItem('apg.filterPresets', JSON.stringify(presets));
        } catch {}
      }, [presets]);
      const update = (key, value) => {
        setLocalFilters(prev => ({ ...prev, [key]: value }));
      };
      const clear = () => {
        setLocalFilters(initial);
      };
      const apply = () => {
        setFilters(localFilters);
        onClose();
      };
      const clearAll = () => {
        clearFilters();
        setLocalFilters(initial);
        onClose();
      };
      const savePreset = () => {
        const name = presetName.trim();
        if (!name) return;
        setPresets(prev => {
          const next = prev.filter(p => p.name !== name);
          return [{ name, filters: { ...localFilters } }, ...next].slice(0, 10);
        });
        setPresetName('');
      };
      const applyPreset = (name) => {
        const preset = presets.find(p => p.name === name);
        if (!preset) return;
        setLocalFilters({ ...initial, ...preset.filters });
      };
      const deletePreset = (name) => {
        setPresets(prev => prev.filter(p => p.name !== name));
      };
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
              <div className="w-full max-w-2xl rounded-3xl bg-white text-slate-900 border border-slate-200 shadow-xl overflow-hidden max-h-[92vh]">
            <div className="flex justify-between items-center px-6 py-4 border-b border-slate-200">
              <h3 className="text-lg font-semibold">Filter Members</h3>
              <button onClick={onClose} className="rounded-xl p-2 hover:bg-slate-200"><span>✕</span></button>
            </div>
            <div className="px-6 py-4 space-y-4 max-h-[70vh] overflow-auto">
              <div className="rounded-xl border border-slate-200 bg-slate-50 p-3 space-y-2">
                <div className="text-sm font-medium text-slate-700">Saved Filters</div>
                <div className="flex items-center gap-2">
                  <input value={presetName} onChange={(e) => setPresetName(e.target.value)} placeholder="Preset name" className="flex-1 rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                  <button onClick={savePreset} className="rounded-full px-3 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Save Preset</button>
                </div>
                {presets.length > 0 && (
                  <div className="space-y-1">
                    {presets.map(p => (
                      <div key={p.name} className="flex items-center justify-between text-sm">
                        <button onClick={() => applyPreset(p.name)} className="text-blue-700 hover:underline">{p.name}</button>
                        <button onClick={() => deletePreset(p.name)} className="text-rose-600 hover:underline text-xs">Delete</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {/* Plan */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Plan</label>
                  <select value={localFilters.plan} onChange={(e) => update('plan', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {settings.plans.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                {/* Status */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Status</label>
                  <select value={localFilters.status} onChange={(e) => update('status', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {settings.statuses.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                {/* Billing Month */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Billing Month</label>
                  <select value={localFilters.billingMonth} onChange={(e) => update('billingMonth', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {billingMonthOptions.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                {/* Payment Method */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Payment Method</label>
                  <select value={localFilters.paymentMethod} onChange={(e) => update('paymentMethod', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {settings.paymentMethods.map(pm => <option key={pm} value={pm}>{pm}</option>)}
                  </select>
                </div>
                {/* Staff */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Staff</label>
                  <select value={localFilters.staff} onChange={(e) => update('staff', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {(settings.staff || []).map(st => <option key={st.id} value={st.name}>{st.name}</option>)}
                  </select>
                </div>
                {/* Joining Date Range */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Joining Date From</label>
                  <input type="date" value={localFilters.joinFrom} onChange={(e) => update('joinFrom', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
                <div>
                  <label className="text-sm font-medium text-slate-700">Joining Date To</label>
                  <input type="date" value={localFilters.joinTo} onChange={(e) => update('joinTo', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
                {/* Billing Date Range */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Billing Date From</label>
                  <input type="date" value={localFilters.billFrom} onChange={(e) => update('billFrom', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
                <div>
                  <label className="text-sm font-medium text-slate-700">Billing Date To</label>
                  <input type="date" value={localFilters.billTo} onChange={(e) => update('billTo', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
              </div>
            </div>
            <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 px-4 sm:px-6 py-4 border-t border-slate-200">
              <button onClick={clear} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium w-full sm:w-auto">Clear</button>
              <button onClick={clearAll} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium w-full sm:w-auto">Clear All</button>
              <button onClick={apply} className="rounded-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium w-full sm:w-auto">Apply Filter</button>
            </div>
          </div>
        </div>
      );
    }

    // Mount the app after module bridge registration completes.
    const mountApp = () => {
      ReactDOM.createRoot(document.getElementById('root')).render(<GymApp />);
    };
    Promise.resolve(window.__APG_MODULES_READY).finally(mountApp);
  
  </script>
</body>
</html>
