    function BackendPage({ setToast, access }) {
      const [busy, setBusy] = React.useState('');
      const [healthOk, setHealthOk] = React.useState(null);
      const [supervisorOk, setSupervisorOk] = React.useState(null);
      const [lastCheck, setLastCheck] = React.useState('');
      const supervisorBase = React.useMemo(() => {
        const rel = window.__APG_ENV__ && window.__APG_ENV__.SUPERVISOR_RELATIVE;
        if (rel && typeof location?.origin === 'string' && location.origin.startsWith('http')) {
          const path = rel.startsWith('/') ? rel : `/${rel}`;
          return `${location.origin}${path}`.replace(/\/$/, '');
        }
        const fromEnv = window.__APG_ENV__ && window.__APG_ENV__.SUPERVISOR_URL;
        if (fromEnv) return String(fromEnv).replace(/\/$/, '');
        const h = location.hostname;
        if (h === 'localhost' || h === '127.0.0.1') return 'http://127.0.0.1:4010';
        return '';
      }, []);
      const controlHeaders = React.useCallback(() => {
        const h = {};
        const t = window.__APG_ENV__ && window.__APG_ENV__.PROCESS_CONTROL_TOKEN;
        if (t) h['x-apg-process-token'] = String(t);
        return h;
      }, []);
      const backendAccess = normalizeAccess(access).backend;
      const canViewBackendPage = backendAccess?.viewBackendPage !== false;
      const canControlBackend = backendAccess?.controlBackendProcesses !== false;
      const pingHealth = React.useCallback(async () => {
        const ts = new Date().toLocaleTimeString([], { hour12: false });
        let apiUp = false;
        try {
          const res = await fetch(`${getBackendApiBaseUrl()}/health`, { cache: 'no-store' });
          apiUp = res.ok;
        } catch {
          apiUp = false;
        }
        let supUp = null;
        if (supervisorBase) {
          try {
            const sres = await fetch(`${supervisorBase}/health`, { cache: 'no-store' });
            supUp = sres.ok;
          } catch {
            supUp = false;
          }
        }
        setHealthOk(apiUp);
        setSupervisorOk(supUp);
        setLastCheck(ts);
        return apiUp;
      }, [supervisorBase]);
      React.useEffect(() => {
        pingHealth();
      }, [pingHealth]);
      const callProcess = async (action) => {
        if (!canControlBackend) {
          setToast('Backend control access is disabled for this staff profile.');
          setTimeout(() => setToast(''), 2500);
          return;
        }
        const apiPaths = { restart: '/process/restart', stop: '/process/stop', start: '/process/start' };
        const supPaths = { restart: '/backend/restart', stop: '/backend/stop', start: '/backend/start' };
        setBusy(action);
        const doneToast = (msg, isErr) => {
          setToast(msg);
          setTimeout(() => setToast(''), isErr ? 5000 : 3500);
        };
        const trySupervisor = async () => {
          if (!supervisorBase) return null;
          try {
            const res = await fetch(`${supervisorBase}${supPaths[action]}`, {
              method: 'POST',
              headers: controlHeaders(),
            });
            let data = {};
            try {
              data = await res.json();
            } catch {}
            return { res, data };
          } catch (e) {
            return { res: null, data: {}, netError: String(e?.message || e) };
          }
        };
        const tryApi = async () => {
          try {
            const res = await fetch(`${getBackendApiBaseUrl()}${apiPaths[action]}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', ...controlHeaders() },
            });
            let data = {};
            try {
              data = await res.json();
            } catch {}
            return { res, data };
          } catch (e) {
            return { res: null, data: {}, netError: String(e?.message || e) };
          }
        };
        const applySuccess = () => {
          if (action === 'stop' || action === 'restart') setHealthOk(false);
          setTimeout(() => pingHealth(), action === 'start' || action === 'restart' ? 2200 : 500);
        };
        try {
          if (supervisorBase) {
            const s = await trySupervisor();
            if (s && s.res && s.res.ok) {
              doneToast(s.data.message || 'Supervisor completed the request.');
              applySuccess();
              return;
            }
          }
          const a = await tryApi();
          if (a.netError) {
            doneToast(
              supervisorBase
                ? `${a.netError} (API unreachable; supervisor also failed — is the desktop app or node scripts/apg-supervisor.mjs running?)`
                : a.netError,
              true
            );
            return;
          }
          if (!a.res || !a.res.ok) {
            doneToast(a.data?.message || a.data?.error || `Request failed (${a.res?.status || '?'})`, true);
            return;
          }
          doneToast(a.data.message || 'Done.');
          applySuccess();
        } catch (e) {
          doneToast(String(e?.message || e), true);
        } finally {
          setBusy('');
        }
      };
      return (
        <div className="p-3 md:p-8 space-y-5">
          {!canViewBackendPage && (
            <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-600">
              Backend access is disabled for this staff profile.
            </div>
          )}
          {canViewBackendPage && (
          <>
          <h1 className="text-xl md:text-2xl font-semibold text-slate-900">Backend</h1>
          <p className="text-sm text-slate-600 max-w-2xl">
            <b>Turn on</b> and <b>Restart</b> use a local supervisor on port 4010 when you launch via the desktop app or <code className="text-xs bg-slate-100 px-1 rounded">npm run dev:all</code>, so they work even when the API is down. If the API is up, the same buttons can use the API when the supervisor is unavailable.
          </p>
          <div className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm space-y-3 max-w-xl">
            <div className="text-sm space-y-1">
              <div>
                <span className="font-semibold text-slate-800">API: </span>
                {healthOk === null ? (
                  <span className="text-slate-500">Checking…</span>
                ) : healthOk ? (
                  <span className="text-emerald-700">Reachable</span>
                ) : (
                  <span className="text-rose-700">Not reachable</span>
                )}
              </div>
              {supervisorBase ? (
                <div>
                  <span className="font-semibold text-slate-800">Supervisor: </span>
                  {supervisorOk === null ? (
                    <span className="text-slate-500">Checking…</span>
                  ) : supervisorOk ? (
                    <span className="text-emerald-700">Reachable ({supervisorBase})</span>
                  ) : (
                    <span className="text-rose-700">Not running — use desktop app or run <code className="text-xs bg-slate-100 px-1 rounded">npm run dev:supervisor</code></span>
                  )}
                </div>
              ) : null}
              {lastCheck ? <div className="text-xs text-slate-500">Last check: {lastCheck}</div> : null}
            </div>
            <div className="flex flex-wrap gap-2">
              <button
                type="button"
                onClick={() => pingHealth()}
                className="rounded-xl border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-800 hover:bg-slate-50"
              >
                Check connection
              </button>
            </div>
            <div className="flex flex-wrap gap-2 pt-2 border-t border-slate-100">
              <button
                type="button"
                disabled={Boolean(busy) || !canControlBackend}
                onClick={() => callProcess('restart')}
                className={cx(
                  'rounded-xl px-4 py-2 text-sm font-semibold text-white',
                  (busy || !canControlBackend) ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'
                )}
              >
                {busy === 'restart' ? 'Restarting…' : 'Restart backend'}
              </button>
              <button
                type="button"
                disabled={Boolean(busy) || !canControlBackend}
                onClick={() => callProcess('stop')}
                className={cx(
                  'rounded-xl px-4 py-2 text-sm font-semibold text-white',
                  (busy || !canControlBackend) ? 'bg-slate-400 cursor-not-allowed' : 'bg-rose-600 hover:bg-rose-700'
                )}
              >
                {busy === 'stop' ? 'Stopping…' : 'Turn off backend'}
              </button>
              <button
                type="button"
                disabled={Boolean(busy) || !canControlBackend}
                onClick={() => callProcess('start')}
                className={cx(
                  'rounded-xl px-4 py-2 text-sm font-semibold text-white',
                  (busy || !canControlBackend) ? 'bg-slate-400 cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700'
                )}
              >
                {busy === 'start' ? 'Starting…' : 'Turn on backend'}
              </button>
            </div>
            {!canControlBackend && (
              <div className="rounded-xl border border-amber-300 bg-amber-50 px-3 py-2 text-xs text-amber-800">
                You can view backend health, but process control actions are restricted for this staff profile.
              </div>
            )}
            <p className="text-xs text-slate-500">
              In production, set <code className="bg-slate-100 px-1 rounded">PROCESS_CONTROL_ENABLED=true</code> and optionally <code className="bg-slate-100 px-1 rounded">PROCESS_CONTROL_TOKEN</code> (must match frontend <code className="bg-slate-100 px-1 rounded">PROCESS_CONTROL_TOKEN</code> in <code className="bg-slate-100 px-1 rounded">/app.env.js</code>).
            </p>
          </div>
          </>
          )}
        </div>
      );
    }

                            Leave Tracker
                          </label>
                          <button
                            type="button"
                            onClick={() => setLeaveAccessOpen(v => !v)}
                            className="rounded-lg border border-slate-300 bg-white px-2 py-1 text-[11px] font-medium text-slate-700 hover:bg-slate-100"
                          >
                            {leaveAccessOpen ? 'Hide Access' : 'Expand Access'}
                          </button>
                        </div>
                        {leaveAccessOpen && (
                          <div className="mt-2 grid grid-cols-1 sm:grid-cols-2 gap-2 pl-2">
                            {LEAVE_CHILD_PERMISSIONS.map((perm) => (
                              <label key={perm.key} className="inline-flex items-center gap-2 text-xs text-slate-700">
                                <input
                                  type="checkbox"
                                  checked={normalizeAccess(form.access).leave[perm.key] !== false}
                                  onChange={() => toggleLeaveChild(perm.key)}
                                  className="rounded"
                                />
                                {perm.label}
                              </label>
                            ))}
                          </div>
                        )}
                      </div>
                      <div className="sm:col-span-2 rounded-xl border border-slate-200 bg-slate-50 p-2">
                        <div className="flex items-center justify-between gap-2">
                          <label className="inline-flex items-center gap-2 text-sm text-slate-800">
                            <input
                              type="checkbox"
                              checked={form.sections.includes('Members')}
                              onChange={toggleMembersParent}
                              className="rounded"
                            />
                            Members
                          </label>
                          <button
                            type="button"
                            onClick={() => setMembersAccessOpen(v => !v)}
                            className="rounded-lg border border-slate-300 bg-white px-2 py-1 text-[11px] font-medium text-slate-700 hover:bg-slate-100"
                          >
                            {membersAccessOpen ? 'Hide Access' : 'Expand Access'}
                          </button>
                        </div>
                        {membersAccessOpen && (
                          <div className="mt-2 grid grid-cols-1 sm:grid-cols-2 gap-2 pl-2">
                            {MEMBERS_CHILD_PERMISSIONS.map((perm) => (
                              <label key={perm.key} className="inline-flex items-center gap-2 text-xs text-slate-700">
                                <input
                                  type="checkbox"
                                  checked={normalizeAccess(form.access).members[perm.key] !== false}
                                  onChange={() => toggleMembersChild(perm.key)}
                                  className="rounded"
                                />
                                {perm.label}
                              </label>
                            ))}
                          </div>
                        )}
                      </div>
                      <div className="sm:col-span-2 rounded-xl border border-slate-200 bg-slate-50 p-2">
                        <div className="flex items-center justify-between gap-2">
                          <label className="inline-flex items-center gap-2 text-sm text-slate-800">
                            <input
                              type="checkbox"
                              checked={form.sections.includes('PT Clients')}
                              onChange={togglePtClientsParent}
                              className="rounded"
                            />
                            PT Clients
                          </label>
                          <button
                            type="button"
                            onClick={() => setPtClientsAccessOpen(v => !v)}
                            className="rounded-lg border border-slate-300 bg-white px-2 py-1 text-[11px] font-medium text-slate-700 hover:bg-slate-100"
                          >
                            {ptClientsAccessOpen ? 'Hide Access' : 'Expand Access'}
                          </button>
                        </div>
                        {ptClientsAccessOpen && (
                          <div className="mt-2 grid grid-cols-1 sm:grid-cols-2 gap-2 pl-2">
                            {PT_CLIENTS_CHILD_PERMISSIONS.map((perm) => (
                              <label key={perm.key} className="inline-flex items-center gap-2 text-xs text-slate-700">
                                <input
                                  type="checkbox"
                                  checked={normalizeAccess(form.access).ptClients[perm.key] !== false}
                                  onChange={() => togglePtClientsChild(perm.key)}
                                  className="rounded"
                                />
                                {perm.label}
                              </label>
                            ))}
                          </div>
                        )}
                      </div>
                      <div className="sm:col-span-2 rounded-xl border border-slate-200 bg-slate-50 p-2">
                        <div className="flex items-center justify-between gap-2">
                          <label className="inline-flex items-center gap-2 text-sm text-slate-800">
                            <input
                              type="checkbox"
                              checked={form.sections.includes('Backend')}
                              onChange={toggleBackendParent}
                              className="rounded"
                            />
                            Backend
                          </label>
                          <button
                            type="button"
                            onClick={() => setBackendAccessOpen(v => !v)}
                            className="rounded-lg border border-slate-300 bg-white px-2 py-1 text-[11px] font-medium text-slate-700 hover:bg-slate-100"
                          >
                            {backendAccessOpen ? 'Hide Access' : 'Expand Access'}
                          </button>
                        </div>
                        {backendAccessOpen && (
                          <div className="mt-2 grid grid-cols-1 sm:grid-cols-2 gap-2 pl-2">
                            {BACKEND_CHILD_PERMISSIONS.map((perm) => (
                              <label key={perm.key} className="inline-flex items-center gap-2 text-xs text-slate-700">
                                <input
                                  type="checkbox"
                                  checked={normalizeAccess(form.access).backend[perm.key] !== false}
                                  onChange={() => toggleBackendChild(perm.key)}
                                  className="rounded"
                                />
                                {perm.label}
                              </label>
                            ))}
                          </div>
                        )}
                      </div>
                      {ALL_SECTIONS.filter(sec => sec !== 'Dashboard' && sec !== 'Members' && sec !== 'PT Clients' && sec !== 'Finance' && sec !== 'Settings' && sec !== 'WhatsApp SMS' && sec !== 'Leave Tracker' && sec !== 'Attendance' && sec !== 'Logs' && sec !== 'Support' && sec !== 'Backend').map(sec => (
                        <label key={sec} className="inline-flex items-center gap-2 text-sm text-slate-800">
                          <input
                            type="checkbox"
                            checked={form.sections.includes(sec)}
                            onChange={() => toggleSection(sec)}
                            className="rounded"
                          />
                          {sec}
                        </label>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="sticky bottom-0 z-20 border-t border-slate-200 bg-white/95 backdrop-blur supports-[backdrop-filter]:bg-white/85">
                  <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 px-4 sm:px-6 py-4 pb-[max(1rem,env(safe-area-inset-bottom))]">
                    <button onClick={closeStaffModal} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium text-slate-700 w-full sm:w-auto min-h-[44px]">Cancel</button>
                    <button onClick={save} className="rounded-full px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white w-full sm:w-auto min-h-[44px]">{editingId ? 'Update' : 'Save'}</button>
                  </div>
                </div>
              </div>
            </div>
          )}
          {roleModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 p-4">
              <div className="w-full max-w-lg rounded-3xl bg-white text-slate-900 border border-slate-200 shadow-xl ring-1 ring-slate-200 max-h-[92vh] overflow-hidden">
                <div className="flex justify-between items-center px-6 py-4">
                  <h3 className="text-lg font-semibold text-slate-900">{editingRoleId ? 'Edit Role Template' : 'Add New Role'}</h3>
                  <button onClick={() => setRoleModalOpen(false)} className="rounded-xl p-2 text-slate-700 hover:bg-slate-200"><span>✕</span></button>
                </div>
                <div className="px-6 pb-4 space-y-3 overflow-auto">
                  {roleError && <div className="rounded-xl bg-rose-50 border border-rose-200 text-rose-700 px-3 py-2 text-sm">{roleError}</div>}
                  <div>
                    <label className="text-sm font-medium text-slate-700">Role Name</label>
                    <input value={roleForm.title} onChange={(e) => setRoleForm(prev => ({ ...prev, title: e.target.value }))} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" />
                  </div>
                  <div>
                    <label className="text-sm font-medium text-slate-700">Subtitle</label>
                    <input value={roleForm.subtitle} onChange={(e) => setRoleForm(prev => ({ ...prev, subtitle: e.target.value }))} className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" />
                  </div>
                  <div>
                    <label className="text-sm font-medium text-slate-700">Section Access</label>
                    <div className="mt-2 grid grid-cols-1 sm:grid-cols-2 gap-2">
                      {ALL_SECTIONS.map(sec => (
                        <label key={sec} className="inline-flex items-center gap-2 text-sm text-slate-800">
                          <input
                            type="checkbox"
                            checked={roleForm.sections.includes(sec)}
                            onChange={() => toggleRoleSection(sec)}
                            className="rounded"
                          />
                          {sec}
                        </label>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 px-4 sm:px-6 py-4">
                  <button onClick={() => setRoleModalOpen(false)} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium text-slate-700 w-full sm:w-auto">Cancel</button>
                  <button onClick={saveRoleTemplate} className="rounded-full px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white w-full sm:w-auto">{editingRoleId ? 'Update Role' : 'Save Role'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ---- Filter Panel Component ----
    // This component renders a modal that allows users to build complex filters on
    // the members list. It supports filtering by plan, status, billing month,
    // payment method, staff, and by joining/billing date ranges. Filters are
    // local to the panel until the user applies them.
    function FilterPanel({ open, onClose, filters, setFilters, clearFilters, settings, billingMonthOptions }) {
      const initial = {
        plan: '',
        status: '',
        billingMonth: '',
        paymentMethod: '',
        staff: '',
        joinFrom: '',
        joinTo: '',
        billFrom: '',
        billTo: ''
      };
      const [localFilters, setLocalFilters] = React.useState(filters);
      const [presetName, setPresetName] = React.useState('');
      const [presets, setPresets] = React.useState(() => {
        try {
          const saved = localStorage.getItem('apg.filterPresets');
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });
      // When the panel opens, initialise local state from current filters
      React.useEffect(() => {
        if (open) {
          setLocalFilters(filters);
        }
      }, [open, filters]);
      React.useEffect(() => {
        try {
          localStorage.setItem('apg.filterPresets', JSON.stringify(presets));
        } catch {}
      }, [presets]);
      const update = (key, value) => {
        setLocalFilters(prev => ({ ...prev, [key]: value }));
      };
      const clear = () => {
        setLocalFilters(initial);
      };
      const apply = () => {
        setFilters(localFilters);
        onClose();
      };
      const clearAll = () => {
        clearFilters();
        setLocalFilters(initial);
        onClose();
      };
      const savePreset = () => {
        const name = presetName.trim();
        if (!name) return;
        setPresets(prev => {
          const next = prev.filter(p => p.name !== name);
          return [{ name, filters: { ...localFilters } }, ...next].slice(0, 10);
        });
        setPresetName('');
      };
      const applyPreset = (name) => {
        const preset = presets.find(p => p.name === name);
        if (!preset) return;
        setLocalFilters({ ...initial, ...preset.filters });
      };
      const deletePreset = (name) => {
        setPresets(prev => prev.filter(p => p.name !== name));
      };
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4">
              <div className="w-full max-w-2xl rounded-3xl bg-white text-slate-900 border border-slate-200 shadow-xl overflow-hidden max-h-[92vh]">
            <div className="flex justify-between items-center px-6 py-4 border-b border-slate-200">
              <h3 className="text-lg font-semibold">Filter Members</h3>
              <button onClick={onClose} className="rounded-xl p-2 hover:bg-slate-200"><span>✕</span></button>
            </div>
            <div className="px-6 py-4 space-y-4 max-h-[70vh] overflow-auto">
              <div className="rounded-xl border border-slate-200 bg-slate-50 p-3 space-y-2">
                <div className="text-sm font-medium text-slate-700">Saved Filters</div>
                <div className="flex items-center gap-2">
                  <input value={presetName} onChange={(e) => setPresetName(e.target.value)} placeholder="Preset name" className="flex-1 rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                  <button onClick={savePreset} className="rounded-full px-3 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white">Save Preset</button>
                </div>
                {presets.length > 0 && (
                  <div className="space-y-1">
                    {presets.map(p => (
                      <div key={p.name} className="flex items-center justify-between text-sm">
                        <button onClick={() => applyPreset(p.name)} className="text-blue-700 hover:underline">{p.name}</button>
                        <button onClick={() => deletePreset(p.name)} className="text-rose-600 hover:underline text-xs">Delete</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {/* Plan */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Plan</label>
                  <select value={localFilters.plan} onChange={(e) => update('plan', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {settings.plans.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                {/* Status */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Status</label>
                  <select value={localFilters.status} onChange={(e) => update('status', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {settings.statuses.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                {/* Billing Month */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Billing Month</label>
                  <select value={localFilters.billingMonth} onChange={(e) => update('billingMonth', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {billingMonthOptions.map(m => <option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                {/* Payment Method */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Payment Method</label>
                  <select value={localFilters.paymentMethod} onChange={(e) => update('paymentMethod', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {settings.paymentMethods.map(pm => <option key={pm} value={pm}>{pm}</option>)}
                  </select>
                </div>
                {/* Staff */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Staff</label>
                  <select value={localFilters.staff} onChange={(e) => update('staff', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm">
                    <option value="">Any</option>
                    {(settings.staff || []).map(st => <option key={st.id} value={st.name}>{st.name}</option>)}
                  </select>
                </div>
                {/* Joining Date Range */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Joining Date From</label>
                  <input type="date" value={localFilters.joinFrom} onChange={(e) => update('joinFrom', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
                <div>
                  <label className="text-sm font-medium text-slate-700">Joining Date To</label>
                  <input type="date" value={localFilters.joinTo} onChange={(e) => update('joinTo', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
                {/* Billing Date Range */}
                <div>
                  <label className="text-sm font-medium text-slate-700">Billing Date From</label>
                  <input type="date" value={localFilters.billFrom} onChange={(e) => update('billFrom', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
                <div>
                  <label className="text-sm font-medium text-slate-700">Billing Date To</label>
                  <input type="date" value={localFilters.billTo} onChange={(e) => update('billTo', e.target.value)} className="w-full rounded-xl border border-slate-300 bg-white text-slate-900 px-3 py-2 text-sm" />
                </div>
              </div>
            </div>
            <div className="flex flex-col-reverse sm:flex-row justify-end gap-3 px-4 sm:px-6 py-4 border-t border-slate-200">
              <button onClick={clear} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium w-full sm:w-auto">Clear</button>
              <button onClick={clearAll} className="rounded-xl px-4 py-2 border border-slate-300 bg-white text-sm font-medium w-full sm:w-auto">Clear All</button>
              <button onClick={apply} className="rounded-full px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium w-full sm:w-auto">Apply Filter</button>
            </div>
          </div>
        </div>
      );
    }

    // Mount the app after module bridge registration completes.
    const mountApp = () => {
      ReactDOM.createRoot(document.getElementById('root')).render(<GymApp />);
    };
    Promise.resolve(window.__APG_MODULES_READY).finally(mountApp);
  
  </script>
</body>
</html>
